body:
  text: 月表九九月九月寒露九月節天道南行宜向南行宜修造南方天德在丙天德合在辛月德在丙月德合在辛月空在壬宜修造取土月建在戌月破在辰月厭在寅月刑在未月害在酉劫煞在亥災煞在子月煞在丑忌修造取土三日四日長星十六日十七日短星寒露後二十七日往亡土王用事後忌修造動土己午日添母倉霜降九月中日躔在卯宫為九月將宜用癸乙丁辛時孟年甲子海中金義滿日乙丑海中金制平日丙寅爐中火義定日丁卯爐中火義執日戊辰大林木專破日己巳大林木義危日庚午路傍土伐成日辛未路傍土義收日壬申劔鋒金義開日癸酉劒鋒金義閉日甲戌山頭火制建日乙亥山頭火義除日丙子澗下水伐滿日丁丑澗下水寶平日戊寅城頭土伐定日己卯城頭土伐執日庚辰白鑞金義破日辛巳白鑞金伐危日壬午楊柳木制成日癸未楊柳木伐收日甲申井泉水伐開日乙酉井泉水伐閉日丙戌屋上土寶建日丁亥屋上土伐除日戊子霹靂火制滿日己丑霹靂火專平日庚寅松柏木制定日辛卯松柏木制執日壬辰長流水伐破日癸巳長流水制危日甲午砂石金寶成日乙未砂石金制收日丙申山下火制開日丁酉山下火制閉日戊戌平地木專建日己亥平地木制除日庚子壁上土寶滿日辛丑壁上土義平日壬寅金箔金寶定日癸卯金箔金寶執日甲辰覆燈火制破日乙巳覆燈火寶危日丙午天河水專成日丁未天河水寶收日戊申大驛土寶開日己酉大驛土寶閉日庚戌叉釧金義建日辛亥叉釧金寶除日壬子桑柘木專滿日癸丑桑柘木伐平日甲寅大溪水專定日乙卯大溪水專執日丙辰沙中土寶破日丁巳沙中土專危日戊午天上火義成日己未天上火專收日庚申石榴木專開日辛酉石榴木專閉日壬戌大海水伐建日癸亥大海水專除日右六十干支從建戌者始寒露終霜降其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十八
