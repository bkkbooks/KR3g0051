body:
  text: 月表二二月驚蟄二月節天道西南行宜向西南行宜修造西南維天徳在坤月徳在甲月徳合在己月空在庚宜修造取土月建在夘月破在酉月厭在酉月刑在子月害在辰劫煞在申災煞在酉月煞在戌忌修造取土初四日長星十九日短星驚蟄後十四日往亡春分前一日四離春分二月中日躔在戌宫為二月將宜用艮巽坤乾時甲子海中金義收日乙丑海中金制開日丙寅鑪中火義閉日丁夘鑪中火義建日戊辰大林木專除日己巳大林木義滿日庚午路傍土伐平日辛未路傍土義定日壬申劔鋒金義執日癸酉劔鋒金義破日甲戌山頭火制危日乙亥山頭火義成日丙子澗下水伐收日丁丑澗下水寶開日戊寅城頭土伐閉日己夘城頭土伐建日庚辰白鑞金義除日辛巳白鑞金伐滿日壬午楊栁木制平日癸未楊栁木伐定日甲申井泉水伐執日乙酉井泉水伐破日丙戌屋上土寶危日丁亥屋上土伐成日戊子霹靂火制收日己丑霹靂火專開日庚寅松栢木制閉日辛夘松栢木制建日壬辰長流水伐除日癸巳長流水制滿日甲午砂石金寳平日乙未砂石金制定日丙申山下火制執日丁酉山下火制破日戊戌平地木專危日己亥平地木制成日庚子壁上土寳收日辛丑壁上土義開日壬寅金箔金寳閉日癸夘金箔金寳建日甲辰覆燈火制除日乙巳覆燈火寳滿日丙午天河水専平日丁未天河水寳定日戊申大驛土寳執日己酉大驛土寳破日庚戌釵釧金義危日辛亥釵釧金寳成日壬子桑柘木専收日癸丑桑柘木伐開日甲寅大溪水專閉日乙夘大溪水専建日丙辰沙中土寳除日丁巳沙中土専滿日戊午天上火義平日己未天上火專定日庚申石榴木專執日辛酉石榴木專破日壬戌大海水伐危日癸亥大海水専成日右六十干支從建夘者始驚蟄終春分其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十一
