body:
  text: 月表七七月立秋七月節天道北行宜向北行宜修造北方天德在癸天德合在戊月德在壬月德合在丁月空在丙宜修造取土月建在申月破在寅月厭在辰月刑在寅月害在亥劫煞在巳災煞在午月煞在未忌修造取土初八日長星二十二日短星立秋前一日四絶後九日往亡處暑七月中日躔在巳宫為七月將宜用甲丙庚壬時甲子海中金義定日乙丑海中金制執日丙寅爐中火義破日丁卯爐中火義危日戊辰大林木專成日己巳大林木義收日庚午路傍土伐開日辛未路傍土義閉日壬申劔鋒金義建日癸酉劒鋒金義除日甲戌山頭火制滿日乙亥山頭火義平日丙子澗下水伐定日丁丑澗下水寶執日戊寅城頭土伐破日己卯城頭土伐危日庚辰白鑞金義成日辛巳白鑞金伐收日壬午楊柳木制開日癸未楊柳木伐閉日甲申井泉水伐建日乙酉井泉水伐除日丙戌屋上土寶滿日丁亥屋上土伐平日戊子霹靂火制定日己丑霹靂火專執日庚寅松柏木制破日辛卯松柏木制危日壬辰長流水伐成日癸巳長流水制收日甲午砂石金寶開日乙未砂石金制閉日丙申山下火制建日丁酉山下火制除日戊戌平地木專滿日己亥平地木制平日庚子壁上土寶定日辛丑壁上土義執日壬寅金箔金寶破日癸卯金箔金寶危日甲辰覆燈火制成日乙巳覆燈火寶收日丙午天河水專開日丁未天河水寶閉日戊申大驛土寶建日己酉大驛土寶除日庚戌叉釧金義滿日辛亥叉釧金寶平日壬子桑柘木專定日癸丑桑柘木伐執日甲寅大溪水專破日乙卯大溪水專危日丙辰沙中土寶成日丁巳沙中土專收日戊午天上火義開日己未天上火專閉日庚申石榴木專建日辛酉石榴木專除日壬戌大海水伐滿日癸亥大海水專平日右六十干支從建申者始立秋終處暑其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十六
