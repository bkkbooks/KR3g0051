body:
  text: 義例四三合臨日驛馬天后劫煞災煞天火月煞月虛月刑月害大時大敗咸池遊禍天吏致死六合無翹兵吉五富天倉天賊要安玉宇金堂敬安普護福生聖心益後續世血忌九神總論陽德隂德天馬兵禁地囊土符大煞歸忌往亡氣往亡上朔反支四離四絶月忌日曽門經曰三合者異位而同氣也寅午戌火之三合巳酉丑金之三合申子辰水之三合亥卯未木之三合其日宜結㑹親姻和合交易修營起土立木上梁歷例曰正月在午戌二月在未亥三月在子申四月在丑酉五月在寅戌六月在卯亥七月在子辰八月在丑巳九月在寅午十月在卯未十一月在辰申十二月在丑巳考原曰三合者各與其月建㑹成三合局也按子午為衝子未為害衝重於害也寅卯為類寅午戌為合合必輕於類矣而不然者何也天之圓積氣也地之方積形也人者圓首方趾上圓下方而為三角實天地之心是故方圓之數必以三角為用以明天為大圓地為大方必由人之三角而神以著然則辰之三合固天地之道所由及於人之端歟三方既立五行以之終以之始四序以之生以之成一生二二生三三生萬物理之自然至粗而至精至近而至逺至微而至巨至庸而至神其唯三合之義歟樞要歷曰臨日者上臨下之義也其日忌臨民訴訟歷例曰臨日者正月午二月亥三月申四月丑五月戌六月卯七月子八月巳九月寅十月未十一月辰十二月酉曹震圭曰臨者上臨於下也是陽建之使臣奉上命以授百官者也建陽之月在三合前辰是臨於文官官符也建隂之月在三合後辰是臨於武職白虎也按三合前辰為定日三合後辰為成日定成三合固吉陽順而前隂逆而後是為隂陽得位其義尤吉即配年方而論定日為官符建前第四辰也成日為白虎建後第四辰也官符為文白虎為武隂後而陽前左文而右武也陽月前左取官符隂月後右取白虎别名之為臨日蓋隂陽不得其位則官符白虎皆為害於人隂陽各得其位則官符白虎皆為人除害者也是宜為臨民受訟之吉占乃樞要歷以為忌者蓋誤也神樞經曰驛馬者驛騎也其日宜封贈官爵詔命公卿逺行赴任移徙遷居李鼎祚曰驛馬者正月起申逆行四孟總要歷曰天后者月中福神也其日宜求醫療病祈福禮神歷例曰天后與驛馬同位儲泳祛疑說曰今世之所謂驛馬者先天三合數也先天寅七午九而戌五合數二十有一故自子順至申凡二十有一而為火局之驛馬亥卯未之數四六八合為十八故自子順至巳凡十八而為木局之驛馬木火陽局也從子一陽順行金水隂局也從午一隂順行故申子辰之數七九五合二十有一自午順至寅凡二十有一而為水局之驛馬巳酉丑之數四六八合為十八自午順至亥凡十有八而為金局之驛馬此驛馬之法所由起也曹震圭曰驛馬者五行將病得見妻子似人值困途逢妻子者也假令寅午戌火也病於申中有庚為妻戊為子故以申為馬申子辰水也病於寅中有丙為妻甲為子亥卯未木也病於巳中有戊為妻丙為子巳酉丑金也病於亥中有申為妻壬為子也洞源經曰既病見子驛馬到來又曰天后者驛馬也五行受病得見妻子反有救助天后主生育萬物為萬物之母故以名之按寅為功曹申為傳送亥為天門巳為地户皆道路之象也三合在寅午戌則對寅之申有驛馬之象焉三合在巳酉丑則對巳之亥有驛馬之象焉又驛馬者不安其居之謂也數窮則變寅午戌之數盡而恰遇夫申則火將變而之乎水矣火生於木木絶於申而申又生水以生木是火以變而不窮也巳酉丑之數盡而恰遇夫亥則金將變而之乎木矣金生於火土火土絶於亥而亥又生木以生火是金以變而不窮也申子辰亥卯未倣此易稱乘馬班如用拯馬壯皆以舍舊圖新改過遷善為義故驛馬又曰天后亦絶處逢生之意也若洞源經所謂既病見子驛馬到來者則以申為火病巳為木病以見驛馬即是三合病鄉聊以識之耳猶三煞為太嵗三合絶胎養之類恰遇其方即用以為記而非於病絶胎養有所取義也於此穿鑿附㑹則失之逺矣曹震圭以三煞為絶胎養則絶胎養皆屬幽隂之地猶若可通至以驛馬為五行將病得見妻子則妄謬已甚矣又按驛馬有從年支取者有從日支取者其義例皆與月同故不重列神樞經曰劫煞者劫害之辰也其日忌臨官視事納禮成親戰伐行軍出入興販李鼎祚曰正月起亥逆行四孟按月劫煞義與嵗劫煞同按月災煞義與嵗災煞同又按神煞起例亦有伏兵大禍五兵神煞與嵗同例而歷家不特無伏兵大禍二神并無災煞其為闕遺固不待言但月主一月之事不必一一與嵗同例其伏兵大禍可以弗論至於三煞斷難闕一自當依起例補足又按天獄正月起子順行四仲曹震圭以為天獄即是災煞應逆行四仲而今順行者流傳之誤也其說是今從之天獄天火神樞經曰天獄者月中禁神也其日忌獻封章興詞訟赴任征討玉帳經曰天火者月中凶神也其日忌苫蓋築壘垣牆振旅興師㑹親娶婦歷例曰天火者正月在子順行四仲按天獄與天火向為正月起子順行四仲曹震圭以為天獄即是月災煞以逆行四仲為是而天火仍順行四仲其說曰寅午戌月在子蓋子中藏陽氣之火其勢最弱待寅午戌月火勢興旺以顯其光故子中有霹靂火也是水中之火見之於天也亥卯未月在卯蓋卯中有伏焰之火也火氣既生於寅至卯而木旺反蔽其焰而成炭又待亥卯未月木再生之故卯內有爐中火也申子辰月在午蓋午中有正旺之火其勢最大物莫敢侵其光反暗待申子辰月水勢將興反制其光上下俱明故午中有天上火也巳酉丑月在酉謂酉中有長生丁火如硫黃煤炭之類故待巳酉丑月金石之氣而再發旺也故酉中有山下之火也且子中之陽火卯中之木火午中之旺火酉中長生丁火莫非天道自然故以名之觀曹震圭之論亦為近似但古人立義命名純一不二使其宛轉推移兼收並舉納甲不得入於納音河洛不得入於壬遁則無往而不可立說矣寅午戌火既取子水申子辰水既取午火則亥卯未木必不取卯木而取酉金巳酉丑金必不取酉金而取卯木可斷也子水何以有火曰子中之火乃真火於人身驗之命門為真火於海驗之無月之夜一海皆火蓋坎中一畫是為純陽故寅午戌之火局根於子也出乎震則為龍為雷而人乃見水中之火焉不知其不見者乃子水之天火也知乎此則申子辰水之以午為天火一而非二取左手以例右手可矣若夫木中有火鑽燧得之石為金母擊火出之金中有火摩軋亦生人所見也其不見者則為木之天火云木老則腐而火發焉即鑽木出火亦木敗而出火以自焚也木敗於金然則金者木之天火也金老則生水矣若夫金之火金之少也石者未成之金也少於金則火居焉土者又未成之石也又少於石則火更散布漫衍於其中而草木生之又為火之母焉然則木者金之天火無疑矣水火之中冬夏至也短長各極而天火轉為一體金木之中春秋分也短長齊等而天火轉居兩端此以見天地之道其相反者實一而神也其相似者實兩而化也是故天火亦應逆行四仲又天獄即災煞今用災煞天獄應刪廣聖歷曰月殺者月內之殺神也其日忌停賓客興穿掘營種植納羣畜歷例曰月煞者正月起丑逆行四季樞要歷曰月虛者月內虛耗之神也其日忌開倉庫出財物結婚出行歷例曰月虛者正月起丑逆行四季按在嵗為嵗煞在月為月煞無二義也圖說巳見嵗神唯又謂月虛者蓋亦以月建三合旺氣之對則必虛耗猶破日之又名大耗也按月刑之義與嵗刑同詳見嵗刑條下神樞經曰月害者陽建所害之辰也所值之日忌攻城野戰牧養羣畜結㑹親姻請醫巫納奴婢歷例曰正月起巳逆行十二辰曹震圭曰月害者月中六害也假令卯辰相害者卯以乙旺之木害辰墓之土辰以墓土却害卯中癸水也寅巳相害者謂寅以旺甲害巳中戊土而巳以生庚害寅中旺甲也丑午相害者丑以癸水害午中丁火午以巳土害丑中癸水也子未相害者子以所生之辛金害未中墓木未以旺土害子中旺水也申亥相害者亥以生木害申中生土申以旺金害亥中生木又以生土害亥中旺水也酉戌相害者戌以墓火害酉之旺金酉以所生丁火害戌中辛金也考原曰六害者不和也凡事莫不喜合而忌衝正月建寅與亥合而巳衝之故寅與巳害二月建卯與戌合而辰衝之故卯與辰害蓋月建者衆神之首衝其所合是以害也按六害之義考原得之震圭非也年日六害皆同月害取義故不重列淮南子曰斗柄為小嵗月從左行十二辰咸池為大嵗正月建卯月從右行四仲終而復始大嵗迎者辱背者強左者衰右者昌小嵗東南則生西北則殺不可迎也而可背也不可左也而可右也大時者咸池也小時者月建也神樞經曰大時者將軍之象也所值之日忌出軍攻戰築室㑹親李鼎祚曰大時者正月起卯逆行四仲曹震圭曰大時者乃月建三合五行沐浴之辰也蓋五行至此則敗絶是最凶之辰也故曰大凶之時按咸池大時神樞經有忌無宜曹震圭以為大凶之時今考淮南本義則其義與嵗神大將軍相似神樞經曰遊禍者月中惡神也其日忌服藥請醫祝神致祭李鼎祚曰遊禍者正月起巳逆行四孟曹震圭曰遊禍者三合五行臨官之神是對衝劫煞之位也考原曰遊禍神者以其流行於四隅故曰遊以其過旺故曰禍按天干以臨官為祿而地支以臨官為禍其義不同干陽也支隂也陽善而隂惡故陽以方旺為吉而隂以方旺為凶也嵗方不忌陽刃而忌大煞義亦類此若夫成定之吉則取日月三合不可與是同語矣樞要歷曰天吏者月中凶神也其日忌臨官赴任逺行詞訟歷例曰天吏者正月起酉逆行四仲曹震圭曰天吏者三合五行死氣之位五行至此死而無氣乃天之凶吏全無生意也其忌可知按天吏者三合之死氣也故又為致死司馬遷曰削木為吏義不對漢酷吏尹賞且死戒子曰丈夫為吏正坐殘賊免追思其功效則復進用矣一坐軟弱不勝任免終身廢棄無有赦時蓋吏之心誠利人之死也為此名者其為三代以下無疑矣如果天吏則必曰求其生而不得則死者與吾兩無憾也奈何以致死辱天吏哉神樞經曰六合者日月合宿之辰也其日宜㑹賓客結婚姻立契劵合交易李鼎祚曰正月在亥逆行十二辰考原曰六合者月建與月將相合也天寶歷曰無翹者翹猶尾也陽烏所主隂則無之常居厭後故曰無翹其日忌嫁娶曹震圭曰翹猶首翹婦人之飾也無翹者是無其飾也故忌嫁娶按六合月將太陽過宫並見本原及公規卷內惟是日乂名無翹天寶歷以為烏尾曹震圭以為首飾其義亦不足取矣蓋堪輿家最忌月厭故以厭前一辰為章光厭後一辰為無翹其日皆忌嫁娶猶嵗神之以嵗前為羅㬋嵗後為病符也夫月厭僅值一日非若方位之相比連斷無因忌一日而并忌前後兩日之理且六合天願皆宜嫁娶吉日又以為無翹而忌之母乃欺世而滋惑乎俗士又名飛翹更屬訛繆應刪總要歷曰兵吉者月內用兵之吉辰也其日宜出師命將攻伐略地歷例曰兵吉者正月子丑寅卯二月亥子丑寅三月戌亥子丑四月酉戌亥子五月申酉戌亥六月未申酉戌七月午未申酉八月巳午未申九月辰巳午未十月卯辰巳午十一月寅卯辰巳十二月丑寅卯辰曹震圭曰兵吉逐月漸退一辰者是兵家無有妄進無有躁動之意故云兵者不祥之器不得已而用之也又易卦師之六四曰師左次旡咎言左次則為退舍也故見可而進知難而退師之常也又太白隂經曰未見而戰雖衆必潰見利而戰雖寡必勝是兵家不可以妄舉輕進此隂陽之戒也按兵吉者皆太陽後四辰也太陽前一位為月厭太陽隔之則太陽之後一二三四皆厭所不到之地兵行之吉道也常處太陽之後隨太陽以行則物莫敢犯者矣其終於四者并太陽而為五則太陽為我軍之伍長也總要歷曰五富者富盛之神也其日宜興舉運動估市經求歷例曰正月起亥順行四孟曹震圭曰五富者月中餘盛之神也蓋寅午戌月火王喜亥中甲木而生申子辰月水王愛巳中庚金而生亥卯未月木王求寅木相助巳酉丑月金王求申中庚金相益故曰餘盛此其義也按五富者三合長生之六合也寅午戌火火長生於寅亥者寅之合也亥卯未木木長生於亥寅者亥之合也申子辰水水長生於申巳者申之合也巳酉丑金金長生於巳申者巳之合也生我之神居得合地則其益我者必多故曰五富也或曰當逆行四孟其說謂三合父母之長生也寅午戌火以木為父母木長生於亥亥卯未木以水為父母水長生於申申子辰水以金為父母金長生於巳巳酉丑金以土為父母土長生於寅生我之神既得長生則吉慶莫有大焉者也故以五富名之言無不足也九五福二曰富富固五福之一五福而皆富有則洵乎其無不足也其說亦通故附存之總要歷曰天倉者天庫之神也其日可以修倉庫受賞賜納財牧養歷例曰天倉者正月起寅逆行十二辰曹震圭曰倉者藏也月建私藏之神也蓋建寅之月天地交泰隂陽各半而氣同故共藏於本建至二月隂陽氣離則建事於前私藏於後故歷丑逆行至七月隂陽否其氣又同隂陽各半亦同藏於申也按太陽在亥則天倉在寅太陽在戌則天倉在丑每居太陽後四辰然則天倉者太陽之收日也建後四辰為收日神煞起例以收為天倉方可互觀而自得也收必有倉倉於何所必於其六合之地矣天倉在寅則亥為收日天倉在丑則子為收日然則天倉者又收之六合也若夫曹震圭建事於前收藏於後之說亦太支且遁矣神樞經曰天賊者月中盜神也其日忌逺行李鼎祚曰天賊者正月在丑逆行十二辰曹震圭曰天賊者盜神也常居天倉後辰蓋倉庫之後必有盜也按天賊者月厭之收日也常居厭後四辰月厭逆行天賊亦逆行故建之平乃厭之收建所為前乃厭所為後也月厭主隂私國語曰天事恆象厭所收必天賊矣樞要歷曰要安者月中吉神也所值之日宜安撫邊境修葺城隍歷例曰要安者正月寅二月申三月卯四月酉五月辰六月戌七月巳八月亥九月午十月子十一月未十二月丑也曹震圭曰要安者要而用之可得安也蓋陽建之月歷寅卯辰巳午未隂建之月歷申酉戌亥子丑也如是則陽辰之月用陽氣通泰之辰隂辰之月用隂氣柔和之辰類易卦之六爻剛柔相應之象樞要歷曰玉宇者月中貴神也所值之日宜修宫闕繕亭臺結婚姻㑹賓客歷例曰正月卯二月酉三月辰四月戌五月巳六月亥七月午八月子九月未十月丑十一月申十二月寅曹震圭曰玉宇者月建所安之室也卯酉者日月之門分界之位東南方陽位也為外為前故陽建居之西北方隂位也為內為後故隂月居之似人之居處男居於前女居於後也樞要歷曰金堂者月中善神也所值之日宜營建宫室興造修築歷例曰正月辰二月戌三月巳四月亥五月午六月子七月未八月丑九月申十月寅十一月酉十二月卯曹震圭曰金堂者建神安樂之堂也常在玉宇之前似王公建修宅第之次序也樞要歷曰敬安者恭順之神也所值之日宜睦親族叙尊卑納禮儀行慶賜歷例曰敬安者正月未二月丑三月申四月寅五月酉六月卯七月戌八月辰九月亥十月巳十一月子十二月午曹震圭曰敬安者是隂陽相㑹之義也陽㑹隂而必敬隂㑹陽而必恭若恭而敬必得安也蓋未申酉戌亥隂氣用事之辰故陽辰之月㑹之丑寅卯辰巳陽氣用事故隂辰之月㑹之子午隂陽爭故自㑹也其義如此樞要歷曰普護者神廕之神也所值之日宜祭祀禱祠尋醫避病歷例曰普護者正月申二月寅三月酉四月卯五月戌六月辰七月亥八月巳九月子十月午十一月丑十二月未曹震圭曰普護者乃月中普護萬物無偏私之神也常與要安相對蓋申酉戌亥子丑乃隂權否窒之位與陽建之月相配寅卯辰巳午未乃陽氣通泰之位與隂建之月相配是月內隂陽暗有相護之神也樞要歷曰福生者月中福神也所值之日宜祈福求恩祀神致祭歷例曰福生者正月酉二月卯三月戌四月辰五月亥六月巳七月子八月午九月丑十月未十一月寅十二月申曹震圭曰福生者月內祈求福願之神也故與玉宇相對謂玉宇為月建之所安向之則所以邀福月建顧其所向亦所以造福也樞要歷曰聖心者月中福神也其日宜上表章行恩澤營百事歷例曰聖心者正月亥二月巳三月子四月午五月丑六月未七月寅八月申九月卯十月酉十一月辰十二月戌曹震圭曰勞而不敢安者聖人之心也蓋陽辰之月順理陽卦之位隂辰之月順理隂卦之位初寅之月起於乾宫亥者是順天之道也考原曰正三五七九十一為陽建之月故從亥至辰配乾坎艮震四陽卦二四六八十十二為隂建之月故從巳至戌配巽離坤兌四隂卦樞要歷曰益後者月中福神也所值之日宜造宅舍築垣墻行嫁娶安産室歷例曰正月子二月午三月丑四月未五月寅六月申七月卯八月酉九月辰十月戌十一月巳十二月亥曹震圭曰益後者於子嗣有補益之神也子丑寅卯辰巳為陽氣之位以陽建之月配之午未申酉戌亥為隂氣之位以隂建之月配之隂陽㑹和既生男女當夫訓其男婦教其女使男從夫道女從婦道各從其道當有益於將來故云益後樞要歷曰續世者月中善神也所值之日宜結婚姻睦親族祀神祗求嗣續歷例曰續世者正月丑二月未三月寅四月申五月卯六月酉七月辰八月戌九月巳十月亥十一月午十二月子是也考原曰按續世者月中繼續之神也常在益後後一辰蓋亦與玉宇金堂之相連者同意又按自要安至續世凡九神其起例皆以六隂月與六陽月對衝如正月寅則二月申正月卯則二月酉是也餘倣此九神總論右要安以下九神皆以對衝兩兩相比或陽月陽隂月隂或陽月隂隂月陽從寅月寅起至寅月丑止取其九位而去其寅月巳午戌三位不用或又以寅月從巳午戌起如例歷十二辰者為龍虎為罪至為受死皆為凶神而以此九位為吉神雖有其例而莫名其物衆說紛然皆不明確夫神之有凶吉也皆本年月日神所喜所忌之隂陽五行以為斷或以三合五合言或以六合六冲言或以納音納甲言或以卦位方位言或以旺相休囚言千變萬化要皆不離乎此而此以寅申卯酉兩兩相比以命十二辰則皆不可得而符合也史記漢武帝時有五行家堪輿家建除家叢辰家歷家天人家太一家聚訟不決各守其師傳而不相下彼時術家之多如此今則統歸於歷家其說之傳者皆斷爛蒙昧莫尋其端緒堪輿建除五行歷家猶可意揣而命之若叢辰等家之言則更莫可考也今此九神與堪輿建除五行歷家之旨俱不符合意者其叢辰等家之遺緒歟而傳之最久歷代相沿不廢用於禱祠鬼神而亦為建造等事之吉日唯歷神原始則曰此九神專為祈禳而設今觀其命名之義且參之禮記柔日剛日之旨其說殆近是歟存之以為祭祀擇日之占而樞要歷所言上表章修造諸事者並不復用若夫龍虎罪至受死三辰並仍舊歷從刪夫既以九神為吉則餘三不用可知不必重立名目也又按神煞起例以龍虎罪至為天地爭雄日由此觀之九神為禱祀鬼神而設益驗蓋己午者隂陽之交也故有天地爭雄之目而又南方正位也故與幽則有鬼神之義相反其戌之為受死者亥為陽氣剝盡之㑹而乾之純陽居之以首萬物此隂陽之妙義六壬之以壬名而不曰六甲者此也亥既為首則戌必居終故以戌為受死也然此特以六陽六隂十二辰從寅輪轉而命之云爾若自寅而卯以至于丑逐月論之則義並不可通夫唯鬼神之道有其始之即要其終不若人事之顯著事各一理而不可稍有差忒也故曰宜祭祀之吉辰庶幾近之要安言徼福於鬼神也金堂玉宇神所居也修祠立廟之類用之內神以金堂而外神以玉宇也敬安安神位之日也普護福生聖心泛禱之日也益後續世祠高禖之日也總要歷曰陽德者月中德神也所值之日宜交易開市結親姻歷例曰正月起戌順行六陽辰曹震圭曰陽德者乾陽之道也陽道不可以盡剝故正月起戌應乾之上九戌者乾之世爻又五月一隂生即配於午順歷乾之六爻六陽月居於寅午戌火炎上為尊為夫也六隂月臨於申子辰水潤下為卑為婦也故所值之日長幼有序夫婦有别是嘉㑹合禮之辰故宜如此總要歷曰隂德者月內隂德之神也所值之日宜施隂隲行惠愛雪寃枉舉正直歷例曰正月起酉逆行六隂辰曹震圭曰隂德者是月中坤隂之道也正月起於酉應坤之上六酉者坤之世爻故從酉逆歷坤之六爻坤者厚德載物也含𢎞光大萬物資生故宜如此按陽德乾六爻之納甲也隂德坤六爻之納甲也卯酉者日月也各從卯酉起初爻以歷十二辰陽德卯月乾初子隂德卯月坤初未陽德辰月乾二寅隂德辰月坤二巳陽德巳月乾三辰隂德巳月坤三卯陽德午月乾四午隂德午月坤四丑陽德未月乾五申隂德未月坤五亥陽德申月乾上戌隂德申月坤上酉而六爻各一終矣復自酉至寅以次順列焉從卯至申生萬物者也從酉至寅成萬物者也帝出乎震而復生焉生生不巳也夫乾坤以生萬物成萬物為職而其用在日月今六陽六隂從卯酉順布天施地生之象備矣陽曰陽德隂曰隂德言隂陽之德皆在於生成萬物也其日必吉神樞經曰天馬者天之驛騎也其日宜拜公卿擇賢良宣布政事逺行出征李鼎祚曰天馬者正月起午順行六陽辰曹震圭曰天馬者是乾體六陽用事之神也易曰乾為馬按乾卦納子寅辰午申戌天馬則四十月在子四月乾卦十月建亥又乾宮也午為馬詩曰吉日庚午既差我馬說者謂午為馬祖之神寅申為道路午起寅順歷六陽辰則申又得午取象於馬之用也總要歷曰兵禁者用兵凶辰也其日忌出師振旅閲武教戰歷例曰兵禁者正月起寅逆行六陽辰曹震圭曰兵家所利者隂道也所忌者陽道也故兵禁正月起寅逆行六陽辰也又月令曰孟春之月不可稱兵稱兵必天殃兵戎不起不可從我始故正月以寅為禁辰也二月子相刑四煞也三月戌耗破之辰也四月申四煞三刑也五月午自刑也六月辰天罡四煞也七月寅破耗三刑也八月子四煞死神也九月戌河魁也十月申六害也十一月午破耗也十二月辰四煞天罡也其忌可知按易曰地中有水師說者謂伏至險于大順之中王者之師所以有征無戰也兵禁則與卦義相反夫坎之六爻納甲寅辰午申戌子也今自坎之初爻翻轉至上倒行而逆施之是以其至險顯然橫行于天下矣若由乾坤以日月為用之義推之則卯月起坎上爻逆行而下豈非坎之所為上六失道凶三嵗者乎從上而至初係用徽纆而入于坎窞豈非兵之大禁歟歷例曰地囊者正月庚子庚午二月癸未癸丑三月甲子甲寅四月己卯己丑五月戊辰戊午六月癸未癸巳七月丙寅丙申八月丁卯丁巳九月戊辰戊子十月庚戌庚子十一月辛未辛酉十二月乙酉乙未曹震圭曰月令云孟春之月天氣下降地氣上騰天地和草木萌動蓋草木者震也故易云動萬物者莫疾乎雷故正月震納甲為地囊也仲春之月雷乃發聲蟄蟲咸動啓户始出當養生者德莫比坤故二月用坤之納甲為地囊也季春之月時雨將降下水上騰覆育萬物莫大於天故用乾之納甲也孟夏之月農乃登麥聚畜百藥靡草死蠶事畢能烜燥萬物者莫熯乎火故四月用離之納甲也仲夏之月隂陽爭死生分雩祀山川百源設坎壇無用火南方故使萬物潤澤者莫潤乎坎故五月地囊用坎之納甲也季夏之月不可以興土功土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆以配中央之位故用坤之納甲也孟秋之月農乃登穀萬物有成用始行戮故易曰萬物之所以成終而所以成始也莫盛乎艮故用艮之納甲也仲秋之月務蓄菜勸種麥雷乃收聲蟄蟲壞户隂浸盛陽日衰莫說乎澤故用兌之納甲也季秋之月蟄蟲咸俯在內皆墐其户霜始降草木黃落農事備收五穀之實藏帝藉之收于神倉是萬物之所收藏也莫勞乎坎故用坎之納甲也孟冬之月天氣上騰地氣下降閉塞而成冬水始氷地始凍雉入大水為蜃虹藏不見反動於下也故用震之納甲也仲冬之月氷益堅地始坼藝始生荔挺出蚯蚓結土事無作隂陽爭諸生蕩萬物潔齊故用巽之納甲也季冬之月數已終歲更始水澤腹堅修耒耜耦耕具田器出土牛以送寒氣其德厚載而致役者莫大乎坤故用坤之納甲也按地囊乃四時三合卦之納甲蓋三合無土局而土旺於四季木火金水之所以生旺墓者無適非土故用當時三合卦內外兩初爻之納甲為地囊日其一卦兩用者則再用世應二爻之納甲日春木亥卯未局為震坤乾卦正月用震內卦初爻庚子外卦初爻庚午二月用坤內卦初爻乙未外卦初爻癸丑三月用乾內卦初支甲子外卦初爻壬午夏火寅午戌局為離乾艮卦四月用離內卦初爻己卯外卦初爻己酉五月用乾世爻壬戌應爻甲辰六月用艮內卦初爻丙辰外卦初爻丙戌秋金巳酉丑局為兌艮巽卦七月用兌內卦初爻丁巳外卦初爻丁亥八月用艮世爻丙寅應爻丙申九月用巽內卦初爻辛丑外卦初爻辛未冬水申子辰局為坎巽坤卦十月用坎內卦初爻戊寅外卦初爻戊申十一月用巽世爻辛卯應爻辛酉十二月用坤世爻癸酉應爻乙卯今世傳歷例二月乙未訛癸未三月壬午訛甲寅四月己酉訛己丑五月訛戊午戊辰六月訛癸未癸巳七八月互易丁亥訛丁卯九月訛戊辰戊子十月訛庚戌庚子十一月辛卯訛辛未十二月癸酉訛乙酉乙卯訛乙未曹震圭不辨其誤曲為之解而愈不能通今推其義而改正之蓋舊本傳寫謬誤四十八字中誤二十三字亦天願之類也總要歷曰土符土神也其日忌破土穿井開渠築墻歷例曰土符者正月丑二月巳三月酉四月寅五月午六月戌七月卯八月未九月亥十月辰十一月申十二月子曹震圭曰土符者乃土地握符信之神使掌五土也假令春木旺土受其尅故托子金以制之是春三月歷巳酉丑也夏火旺土休賴火為母以飬之故夏三月歷寅午戌也秋金旺土相不畏木制故秋三月歷亥卯未也冬水旺土亦剛堅賴水以柔和之故冬三月歷申子辰也按曹震圭以土符為符信之義似也而以夏為土休秋為土相則于五勝之義舛焉夫天之生物皆地生之者也故十二辰無非土也萬物生於東旺於南收于西藏于北而由北而東則土之所以終萬物始萬物者也由南而西則土之所以盛美昌熾夫萬物者也由西而北則土之所以伏藏保固夫萬物者也寅巳申亥長生之位則以丑寅卯辰為其長生之符子卯午酉帝旺之位則以巳午未申為其帝旺之符辰未戌丑收藏之位則以酉戌亥子為其收藏之符故曰土符也其有所忌者亦猶月建之為土府尊之故不敢犯也神樞經曰大煞者月中亷察也所值之日忌出軍征討嫁娶納財豎柱上梁移徙置室李鼎祚曰大煞者正月在戌二月在巳三月在午四月在未五月在寅六月在卯七月在辰八月在亥九月在子十月在丑十一月在申十二月在酉曹震圭曰東方之位生育萬物南方之位成熟萬物西方之位殺伐萬物北方之位收藏萬物大煞者月中廉察也子丑寅月歷西方申酉戌者蓋謂陽氣將出萬物將生故巡察西方無以妄殺也卯辰巳月歷南方巳午未者謂萬物生長之時故巡察南方使有成熟也午未申月歷東方寅卯辰者謂萬物成熟宜在養育也酉戌亥月歷北方亥子丑者謂萬物收成使有斂藏也按月之大煞即嵗之飛廉其義亦相同見第三卷廣聖歷曰歸忌者月內凶神也其日忌逺行歸家移徙娶婦歷例曰孟月丑仲月寅季月子曹震圭曰子者一陽丑乃二陽寅乃三陽蓋此三辰陽氣始盛主動於外不可反歸於內也考原曰孟月忌丑仲月忌寅季月忌子者皆忌退後一辰所謂歸忌也如子為仲丑為季寅為孟故孟月忌退歸於季仲月忌退歸於孟季月忌退歸於仲也後漢書郭鎮傳曰陳伯敬行必矩步坐必端膝還觸歸忌則止寄鄉亭注曰隂陽書歷法曰歸忌日四孟在丑四仲在寅四季在子其日不可逺行歸家及徙也然則歸忌之說其來舊矣曹震圭與考原所云俱有理而其旨未暢蓋子一陽也丑二陽也寅三陽也陽主進隂主退今丑退於子寅退於丑卯退於寅是逆陽之道也故為歸忌餘月倣此又按歸忌與飛廉同義子丑寅為支辰之始子旺之始也丑墓之始也寅生之始也寅申巳亥四生之月歸忌在丑是忌生之退歸於墓也卯午酉子四旺之月歸忌在寅是忌旺之退歸於生也辰未戌丑四墓之月歸忌在子是忌墓之退歸於旺也故其日忌逺回移徙廣聖歷謂并忌嫁娶者蓋以婦人謂嫁曰歸而忌之夫謂嫁曰歸明從夫之義云耳非逺行之歸也易漸卦彖辭曰女歸吉漸進也非退也詩曰女子有行行亦進也非退也漢書注及他通書亦無忌嫁娶之說應止忌般移逺回不忌嫁娶堪輿經曰往者去也亡者無也其日忌拜官上任逺行歸家出軍征討嫁娶尋醫歷例曰往亡者正月在寅二月在巳三月在申四月在亥五月在卯六月在午七月在酉八月在子九月在辰十月在未十一月在戌十二月在丑曹震圭曰往亡者往而不反之意也孟者初也仲者中也季者末也蓋嵗之始中終之意也正二三四月乃歲之初皆以四孟辰為之乃五行初生之地是生氣之道往而亡也五六七八月乃嵗之中皆以四仲辰為之蓋四仲者五行當旺之辰是旺氣之道往而亡也九十十一十二月乃嵗之終皆以四季辰為之謂四季者乃五行終墓之地是萬物皆歸往而亡也按通書曰宋武帝以往亡起兵軍吏以為不可帝曰我往則彼亡果克之由此言之可廢明矣今按隂陽之義無非慎微謹始以昭欽若之忱不必以一事之無驗而遽謂其可廢也亦思其理之當否而已往亡者寅午戌火月順行寅卯辰卯未亥木月順行巳午未辰申子水月順行申酉戌巳酉丑金月順行亥子丑火性遂於木木性遂於火水性遂於金金性遂於水木生火而火焚木金生水而水沉金蓋無尅則生不生無制則化不化無貞則元不能以起也故曰往亡也微乎深哉歷例曰氣往亡者立春後七日驚蟄後十四日清明後二十一日立夏後八日芒種後十六日小暑後二十四日立秋後九日白露後十八日寒露後二十七日立冬後十日大雪後二十日小寒後三十日皆自交節日數之曹震圭曰氣往亡者以四立月往亡日三合化象之成數為之假令正月立春寅為往亡寅午戌合火局火之成數七也四月立夏卯為往亡亥卯未合木局木之成數八也七月立秋酉為往亡巳酉丑合金局金之成數九也十月立冬未為往亡土無化象便以本行土為之其成數十也各倍之為次月往亡日三之為下月往亡日也獨水數不用者蓋四立之月往亡無申子辰日也然一嵗之內四季之月以辰為首辰月以申為往亡申合水局水之成數六也故三月中氣後六日九月中氣後十二日六月土旺後十二日十二月土旺後十八日各得往亡或節氣早晚間有差一日者然其理大槩如此按氣往亡日曹震圭之說亦自巧合但專取孟辰則四方與三合彼此互異且既取三合之氣又不以未為木而以為土未免自相抵牾今以四時五行之序推之則固自然之數也蓋一二三四五五行之生數也六七八九十五行之成數也一六為水水即氣也氣以終而復始往而不亡者也火木金土則有質矣其氣乃有時而盡而二三四五為生數至而伸者也七八九十為成數返而歸者也故七八九十為往亡日而以四時之序配之立春七立夏八立秋九立冬十仲月為四時第二月故二之為仲月往亡日季月為四時第三月故三之為季月往亡日堪輿經曰上朔日忌宴㑹嫁娶逺行上官歷例曰陽年以年干加寅順數至亥隂年以年干加丑順數至巳也曹震圭曰丑寅者艮卦之方也萬物始終之所也巳者陽極之辰亥者隂極之辰故陽有生發萬物之功者寅也隂有成終萬物之道者丑也以陽而來㑹於極隂以隂而往㑹於極陽則非其相㑹之道也其忌可知按上朔日為不吉者惡其隂陽與德俱盡也陽盡於亥隂盡於巳干盡於十如甲年以甲為德甲至癸而十甲年之癸而又臨於亥則癸為德盡亥為陽盡也乙年以庚為德庚至巳而十乙年之巳而又臨於巳則巳為德盡巳為隂盡也餘可類推其以上朔名者朔有始義又有盡義尚書平在朔易正義曰朔盡也後漢書王符傳曰公車以反支日不受章奏注曰反支日用月朔為正戌亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支見隂陽書也歷例曰其日忌上表章按反支之義惡其將盡也戌亥朔本日即支將盡矣申酉朔則在二日午未朔則在三日胥同此例也推此而言則結㛰姻納財等事亦必有應忌者而歷例止言忌上表章蓋古之隂陽書傳者蓋少而今歷例則轉據後漢書公車不受奏章而言忌上表章也四離四絶玉門經曰離者隂陽分至前一辰也謂建卯之月陽氣出隂氣入建子之月隂氣降陽氣升建酉之月隂氣出陽氣入建午之月陽氣降隂氣升故先一日為四離辰也李鼎祚曰此日忌出行征伐曹震圭曰四離者冬至前一日水離夏至前一日火離春分前一日陽體分而木亦離也秋分前一日隂體分而金亦離也故名曰四離玉門經曰四絶者四立前一辰也李鼎祚曰此日忌出軍逺行曹震圭曰立春木旺水絶立夏火旺木絶立秋金旺土絶立冬水旺金絶故先一日為絶也月忌日歷例曰月忌日止注祭祀宴㑹沐浴整容剃頭整手足甲求醫療病補垣掃舍宇修飾垣墻平治道塗破屋壞垣餘事不注齊東野語曰俗以每月初五十四二十三日為月忌凡事必避之其說不經後見衛道夫云聞前輩云此三日即河圖之中宫五宫五數耳五為君象故民庶不可用此說頗有理通書曰俗忌初五十四二十三以五黃值日配廉貞火生起中宫之土也其法每月初一日起一白水入中宫與貪狼木相配水木相生也初二日二黑土與巨門土相配比和也初三日三碧木能制祿存土也初四日四緑木與文曲水相生也初五日五黃土配廉貞火火加中宫之土火生土旺火晦土湮而已初十十九又起一白貪狼至十四二十三又值五黃廉貞前輩云此俗忌之日有吉星可用考原曰九宫之次自一白至九紫九星之次一貪狼二巨門三祿存四文曲五廉貞六武曲七破軍八左輔九右弼故其相配如此又以其日為九五之數自初一至初五五數也自初五至十四自十四至二十三皆距九日世不敢用故忌也按月忌之義中宫五黃之說皆為得之而廉貞生土之說則不可信今宫殿衙署有穿堂坐向用正子午家居則不敢用又以太嵗為堆黃煞皆避尊也以卑犯尊則凶非以其為廉貞也月忌之義亦猶夫是國家亦不用是日者國有事必及臣民故亦不用也欽定協紀辨方書卷六
