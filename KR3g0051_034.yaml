申丙子甲申辛夘丙申庚子丙午戊午己酉辛亥壬子乙夘己未庚申除日忌建破日逐月除服吉日正月辛夘乙夘外丁夘癸夘己夘二月戊辰庚辰壬辰丙辰三月辛巳癸巳乙巳丁巳四月庚午壬午甲午戊午五月乙未己未外辛未六月壬申甲申丙申庚申七月己酉外癸酉丁酉乙酉辛酉八月甲戌丙戌戊戌庚戌壬戌九月辛亥外乙亥癸亥丁亥十月丙子庚子外甲子戊子十一月乙丑丁丑己丑辛丑十二月戊寅外丙寅庚寅壬寅甲寅按康熈七年吏部禮部欽天監㑹議選擇通書内缺少公規春牛經日出入晝夜時刻氣候歳時紀事逐月起工架馬吉日定磉扇架吉日修廚吉日造門吉日塑繪神像吉日男女合婚行嫁月養子納壻吉日作牛欄吉日作馬枋吉日養蠶作繭吉日作生墳吉日斬草吉日入棺吉時入殮吉時入殮安葬的呼日殃煞出去方成服除服吉日事類總集等項二十三條於通書大全内取用今除公規春牛經日出入晝夜時刻氣候歳時紀事已入公規男女合婚行嫁月入殮安葬的呼日殃煞出去方入辨訛事類總集内洪範五行九宫貴人神煞等條入本原義例利用外餘皆附載於此其論周堂值翁姑則世俗之權而失其經亦可見陋説之害理也其論專取吉時則至不得已而通其變亦可見術數之不拘也至其選定吉日世亦不甚遵信如入殮成服各有禮制不問隂陽也牛欄馬枋事本相同無須别擇也若門光星大月起寅小月起夘按日順數上旬越戌下旬越辰東西為吉南損畜北損人雖有例可推而實無義可解略之而索隱或以為竒錄之而習見自呈其陋觀者當自知辨也至于上官天遷圖亦出通書大全已為選擇通書所不取蓋與諸家周堂同出術士揑造概置不錄年月神煞年干甲乙丙丁戊巳庚辛壬癸右年神皆從嵗干起例官星即正官也催官即正官六合也干鬼即偏官也羊刃即陽刃飛刃其對衝也天禄星即干禄與本宫卦也文昌星即食神禄也魁名星即比刧也天財星即印綬也文魁星即傷官與其六合也今臺本惟用干禄不用禄宫餘皆不用葢皆禄命之法不係神煞宗鏡以羊刃為李廣箭甚言其凶殊屬無謂故將全例備錄於此以見專取羊刃者之可以不必也右年神皆從嵗支三合起例今臺本不取長生沐浴臨官及衰方葢沐浴衰方不比死地長生為生天太陽臨官為嵗德合名義不符遊禍論日辰不係方位想亦後人因其八而補其四如王日之因其五而補其七也况三煞原非取絶胎養為義而俗術又合病死墓三方名曰通天煞益屬荒唐故將起例附録於此以見此編非闕畧也右年神皆從嵗厭起例臺本惟用五鬼支退六害餘皆不用支退流財無理陰中太嵗名義不合見辨譌嵗支六合雖有取義然嵗非月比太陽嵗一周天專以六合名金烏其義較逺枝德已是五合又取六合亦屬太紆紅鸞天喜星命家用之亦無𦂳要嵗厭雖近古然大率由月而推不如四時之切且厯來通書皆不用何可又增之以滋拘忌乎至於太陽升殿則因厭對又為六儀也太陰守殿則因在厭後二辰如嵗後二辰為太隂也玉兎對金烏年解隨天喜觀其起例大扺亦術士所推衍附錄於此庶不得挾以為秘訣云爾年干甲乙丙丁戊己庚辛壬癸天帑星乾坤艮兑坎離震巽乾坤右年神從納甲遁干起例天帑星為年干納甲破敗五鬼即其衝也今臺本不用天帑星是不以天帑為吉亦實無吉可言則破敗五鬼之不為凶可知矣甲為穿山羅㬋乙為天禁朱雀甲乙之間為山家困龍丙丁為獨火戊巳為都天庚辛為金神壬癸為水德十干本屬一例今臺本通書既不用戊巳壬癸而于丙丁獨火又云與年獨火打頭火併方為災金神雖載在時憲書亦不甚以為拘忌乃獨于甲乙則曰開山凶甚屬非理夫十干甲乙最吉不當以遁干為凶壬癸為丙丁之對宗鏡諸書以水德制火星其義畧有可取戊巳屬土入中宫叠太嵗為堆黄與月建併忌動土猶土王用事忌動土之義即不列為吉凶神而於理固不背也已具利用卷中故附録於此右月神皆從四時起例天貴為令星旺相日兼干支土公忌即月建巳見義例利用卷六畜肥則生當令之三合由母倉而推衍者也天良日以令星陽干加寅由天赦而推衍者也其義雖吉然不可為典要太嵗遊即四時長生之卦浄欄煞為其對衝又由生天太陽破敗五鬼而推衍者也孤辰寡宿以令前為孤令後為寡又由竒門孤虛而推衍者也雖有義例而紆濶不切事理故今臺本皆不用然較之世俗以月令所生之三合為大敗六不成以母倉為魯班刀砧煞者尚屬可通故録之以備一説而其餘之不録者槩可𩔖推也天星吉時按天貴星太乙星即青龍也明輔星貴人星即明堂也月僊星福德星即金匱也天德星寶光星即天德也天開星少微星即玉堂也日僊星鳯輦星即司命也術士飾其名以動聽其實非有二也今日表已刪去附載於此又本以道逺幾時通達路遙何日還鄉為訣子午日起申丑未日起戌寅申日起子夘酉日起寅辰戌日起辰巳亥日起午以次數之值道逺通達遙還字有辵遶者為吉亦即起黄道之法非另有秘訣也吉將加時通書曰善用時者使六神悉伏如不得六神悉伏則宜就吉將加時亦以吉論按六神悉伏即貴登天門吉將加時則六壬之貴人六合青龍太常太陰天后六吉將也其法以月將加時視時上所臨之神遇吉將者是夫六神既不悉伏則六吉亦不得位未足為吉若四大吉時又遇吉將乃為吉耳然於義不悖大統厯亦用之附録於此不作立成者以四大吉時貴登天門已列立成同一月將加時故也竒門三元歌軒轅黄帝戰蚩尤涿鹿經今苦未休偶遇天神授符訣登壇致祭謹䖍修神龍負圖出洛水彩鳯銜書碧雲裏因命風后演成文遁甲竒門從此始一千八十當時制太公刪成七十二逮於漢代張子房一十八局為精藝先須掌上排九宫縱横十五在其中次將八卦輪八節一氣統三為正宗隂陽二遁分順逆一氣三元人莫測五日都來換一元超神接氣為准的二至之前有閏竒此時叠節累乗之積日以成閏月積時以成閏竒認取九宫為九星八門時逐九星行九宫逢甲為直符八門直使自分明符上之門為直使十時一位堪評據直符常以加時干直使逆順時宫去六甲元號六儀名三竒即是乙丙丁陽遁順儀竒逆佈隂遁逆儀竒順行吉門偶爾合三竒直此經云百事宜更合從傍加簡㸃餘宫不可有㣲疵三竒得使誠堪取六甲遇之非小補乙逢犬馬丙䑕猴六丁玉女騎龍虎又有三竒遊六儀號為玉女守門扉若作隂私和合事請君但向此中推天三門兮地四户問君此法知何處太衝夘小吉未與從魁酉此是天門私出路地户除危定與開舉事皆從此中去六合太隂太常君三辰元是地私門更得竒門相照耀出門百事總忻忻太衝天馬最為貴卒然有難宜逃避但當乘取天馬行劍㦸如山不足畏三為生氣五為死盛在三兮衰在五能識遊三避五時造化真機須記取就中伏吟為最凶天蓬加著地天蓬天蓬若到天英上須知即是反吟宫八門返復皆如此生在生門死在死縱令吉宿得竒門萬事皆凶不堪使六儀擊刑何太凶甲子直符愁向東戌刑在未申刑虎寅己辰辰午刑午三竒入墓好詳之甲日那堪得未時丙丁屬火火墓戌此時諸事不須為更兼六乙來臨二星竒臨六亦同推又有時干入墓宫課中時下忌相逢戊戌壬辰兼丙戌癸未丁丑亦同凶五不遇時龍不睛號為日月損光明時干來尅日干上甲日須知時忌庚竒與門兮共太隂三般難得總加臨若還得二亦為吉舉措行藏必遂心更得直符直使利兵家用事最為貴當從此地擊其衝百戰百勝君須記天乙之神所在宫大將宜居擊對衝假令直符居離九天英坐取擊天蓬甲乙丙丁戊陽時神居天上要君知坐擊須憑天上竒隂時地下亦如之若見三竒在五陽偏宜為客自髙强忽然逢著五隂位又宜為主好裁詳直符前三六合位太隂之神在前二後一宫中為九天後二之神為九地九天之上好揚兵九地潛藏好立營伏兵但向太隂位若逢六合利逃形天地人分三遁名天遁月精華蓋臨地遁日精紫雲蔽人遁當知是太隂生門六丙合六丁此為天遁甚分明開門六乙合六巳地遁如斯而已矣休門六丁共太隂欲求人遁無過此庚為太白丙為惑庚丙相加誰㑹得六庚加丙白入熒六丙加庚熒入白白入熒兮賊即來熒入白兮賊須滅丙為勃兮庚為格格則不通勃亂逆丙加天乙為直符天乙加丙為飛勃庚加日干為伏干日干加庚飛干格加一宫兮戰在野同一宫兮戰於國庚加直符天乙伏直符加庚天乙飛庚加癸兮為大格加已為刑格不宜庚加壬時為上格又嫌歳月日時遲更有一般竒格者六庚謹勿加三竒此時若也行兵去匹馬隻輪無返期六癸加丁蛇夭矯六丁加癸雀投江六乙加辛龍逃走六辛加乙虎猖狂請觀四者是凶神百事逢之莫措手丙加甲兮鳥跌穴甲加丙兮龍回首只此二者是吉神為事如意十八九八門若遇開休生諸事逢之總趂情傷宜捕獵終須獲杜好邀遮及隱形景上投書并破陣驚能擒訟有聲名若問死門何所主只宜弔死與行刑蓬任沖輔禽陽星英芮柱心隂宿名輔禽心星為上吉衝任小吉未全亨大凶蓬芮不堪遇小凶英柱不精明大凶無氣變為吉小凶無氣亦同之吉星更能逢旺相萬舉萬全功必成若遇休囚并廢沒勸君不必進前程要識九星配五行各隨八卦考羲經坎蓬星水離為火中宫坤艮土為營乾兑為金震巽木旺相休囚看重輕與我同行即為相我生之月誠為旺廢於父母休於財囚於鬼兮真不旺假如水宿乃天蓬相在初冬與仲冬旺於正二休四五其餘倣此自研窮急則從神緩從門三五返覆天道亨十干加伏若加錯入庫休囚百事危十精為使用為貴起宫天乙用無疑宫制其門不為迫門制其宫是迫推天網四張無走路一二網低有路通三至四宫行入墓八九髙强任西東節氣推移時候定隂陽順逆要精通三元積數成六紀天地未成有一理請觀歌裡精㣲訣非是賢人莫傳與陽遁歌冬至驚蟄一七四小寒二八五為次大寒春分三九六立春八五二為局雨水九六三無失清明立夏四一七穀雨小滿五二八芒種六三九為法隂遁歌夏至白露九三六小暑八二五隂局大暑秋分七一四立秋二五八宫次處暑一四七為是霜降小雪五八二寒露立冬六九三大雪四七一宫緘八門九星定例歌坎宫一位起蓬休芮死還居坤二流沖宿傷門三震位杜門天輔巽宫周心開乾六禽星五天柱驚門兑七求生任居艮景英九禽宿無門坤上遊按竒門擇時之法以乙丙丁三竒與開休生三吉門㑹合為吉修造則專取三竒到方其起例如前法隂陽遁各九局自局之本宫起甲子陽遁順布六儀逆布三竒隂遁逆布六儀順布三竒戊同甲子己同甲戌庚同甲申辛同甲午壬同甲辰癸同甲寅捷法陽順隂逆以戊己庚辛壬癸丁丙乙為次蓋順布丁丙乙在乙丙丁即是逆而逆布丁丙乙在乙丙丁即是順也其八卦八節一氣統三之法冬至坎立春艮春分震立夏巽皆陽遁順行夏至離立秋坤秋分兌立冬乾皆隂遁逆行如冬至上元用坎一局小寒上元則用坤二局大寒上元則用震三局夏至上元用離九局小暑上元則用艮八局大暑上元則用兑七局是也上元局定中元下元皆輪流自然之理蓋五日六十時為一元而甲巳日必甲子時故以甲巳日為符首甲子甲午己夘己酉日為上元甲寅甲申己巳己亥日為中元甲辰甲戌己丑己未日為下元如陽遁一局甲子日為上元甲子時起坎一己巳日為中元甲子時起兑七甲戌為下元甲子時起巽四至己夘日復為上元一節十五日三元既周則下節叧起也又有置閏之法乃由氣盈而生如今年甲子日冬至用冬至上元是為正授正之云者符首與節同日也至明年冬至為己巳日符首甲子在冬至前五日則冬至前甲子日即用冬至上元是為超神超之云者符首在節前也至後年冬至為甲戌日前之符首甲子在冬至前十日後之符首己夘在冬至後五日前逺後近則冬至前甲子日仍用大雪上元己巳日仍用大雪中元冬至之甲戌日仍用大雪下元而冬至後之己夘日方用冬至上元重用大雪三元是為置閏閏之云者謂閏一氣也後己夘日方用冬至上元是為接氣接之云者符首在節後也故曰置閏必在二至之前超不過十接不過五然此乃以平氣正授起算若以定氣而論盈縮各有不同當以逺近為斷如前之符首在節前七日後之符首在節後八日前近後逺則當仍用超神若前之符首在節前八日後之符首在節後七日前逺後近則當置閏可也接氣又有拆局補局之法先用本節下元不可從要之正授之後為超神超神之後為置閏置閏之後為接氣接氣之後為正授或為超神此則一定不易耳其每局六十時飛布之法先依本局排定地盤次取各時六甲之星為直符六甲之門為直使以直符加時干陽順隂逆九星飛布九宫以直使加時宫不論隂陽八門順轉八卦一説九星亦是順行八卦直符螣蛇太隂六合白虎元武九地九天八神陽順隂逆以次推排一説白虎作勾陳元武作朱雀今列二式於左如陽遁一局甲子戊起坎一甲戌己在坤二甲申庚在震三甲午辛在巽四甲辰壬在中五寄坤甲寅癸在乾六丁在兌七丙在艮八乙在離九是為地盤甲子時蓬戊直符加甲子休門直使亦加甲子是為伏吟乙丑時蓬戊直符加乙在離九芮已在坎一衝庚在坤二輔辛在震三禽壬在巽四心癸在中五柱丁在乾六任丙在兌七英乙在艮八休門直使加乙丑在坤二生門在兌開門在離丙竒與生門合于兌方吉如隂遁九局甲子戊起離九甲戌己在艮八甲申庚在兌七甲午辛在乾六甲辰壬在中五寄坤甲寅癸在巽四丁在震三丙在坤二乙在坎一是為地盤甲子時英戊直符加甲子景門直使亦加甲子是為伏吟丙寅時英戊直符加丙在坤二任己在坎一柱庚在離九心辛在艮八禽壬在兌七輔癸在乾六衝丁在中五芮丙在巽四蓬乙在震三景門直使加丙寅在兌七開門在艮休門在震與乙竒合生門在巽與丙竒合丙寅時震巽二方吉全局一千八十各有專書今不盡錄也欽定協紀辨方書卷三十五
