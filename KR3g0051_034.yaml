body:
  text: 附錄選擇之道自本原以至利用亦綦備矣顧有世俗相沿雖無甚義理而今猶仍其舊者亦有臺本流傳雖不甚遵信而昔已備一説者又或醇疵各半舉其全而義乃明抑或名異實同抉其原而情始見是雖不比於正編而亦不可缺也至於壬遁之法雖非日家之本義而亦選擇所兼資略舉大要以備叅考作附錄推測時刻男女九宫逐日人神所在太白逐日遊方長星短星百忌日祀竈日洗頭日嫁娶周堂五姓修宅事類總集雜用宜忌年月神煞天星吉時吉將加時竒門三元推測時刻春分戌宫初度日出夘正初刻晝四十八刻日入酉正初刻夜四十八刻六度日出夘初三刻七分晝四十九刻一分日入酉正初刻八分夜四十六刻十四分十二度日出夘初二刻十四分晝五十刻二分日入酉正一刻一分夜四十五刻十三分清明十五度十八度日出夘初二刻六分晝五十一刻三分日入酉正一刻九分夜四十四刻十二分二十四度日出夘初一刻十三分晝五十二刻四分日入酉正二刻二分夜四十三刻十一分榖雨酉宫初度日出夘初一刻六分晝五十三刻三分日入酉正二刻九分夜四十二刻十二分六度日出夘初初刻十三分晝五十四刻四分日入酉正三刻二分夜四十一刻十一分十二度日出夘初初刻六分晝五十五刻三分日入酉正三刻九分夜四十刻十二分立夏十五度十八度日出夘初初刻晝五十六刻日入戌初初刻夜四十刻二十四度日出寅正三刻九分晝五十六刻十二分日入戌初初刻六分夜三十九刻三分小滿申宫初度三度日出寅正三刻一分晝五十七刻十三分日入戌初初刻十四分夜三十八刻二分芒種十五度日出寅正二刻八分晝五十八刻十四分日入戌初一刻七分夜三十七刻一分夏至未宫初度日出寅正二刻四分晝五十九刻七分日入戌初一刻十一分夜三十六刻八分小暑十五度日出寅正二刻八分晝五十八刻十四分日入戌初一刻七分夜三十七刻一分二十七度日出寅正三刻一分晝五十七刻十三分日入戌初初刻十四分夜三十八刻二分大暑午宫初度六度日出寅正三刻九分晝五十六刻十二分日入戌初初刻六分夜三十九刻三分十二度日出夘初初刻晝五十六刻日入戌初初刻夜四十刻立秋十五度十八度日出夘初初刻六分晝五十五刻三分日入酉正三刻九分夜四十刻十二分二十四度日出夘初初刻十三分晝五十四刻四分日入酉正三刻二分夜四十一刻十一分處暑已宫初度日出夘初一刻六分晝五十三刻三分日入酉正二刻九分夜四十二刻十二分六度日出夘初一刻十三分晝五十二刻四分日入酉正二刻二分夜四十三刻十一分十二度日出夘初二刻六分晝五十一刻三分日入酉正一刻九分夜四十四刻十二分白露十五度十八度日出夘初二刻十四分晝五十刻二分日入酉正一刻一分夜四十五刻十三分二十四度日出夘初三刻七分晝四十九刻一分日入酉正初刻八分夜四十六刻十四分秋分辰宫初度日出夘正初刻晝四十八刻日入酉正初刻夜四十八刻六度日出夘正初刻八分晝四十六刻十四分日入酉初三刻七分夜四十九刻一分十二度日出夘正一刻一分晝四十五刻十三分日入酉初二刻十四分夜五十刻二分寒露十五度十八度日出夘正一刻九分晝四十四刻十二分日入酉初二刻六分夜五十一刻三分二十四度日出夘正二刻二分晝四十三刻十一分日入酉初一刻十三分夜五十二刻四分霜降夘宫初度日出夘正二刻九分晝四十二刻十二分日入酉初一刻六分夜五十三刻三分六度日出夘正三刻二分晝四十一刻十一分日入酉初初刻十三分夜五十四刻四分十二度日出夘正三刻九分晝四十刻十二分日入酉初初刻六分夜五十五刻三分立冬十五度十八度日出辰初初刻晝四十刻日入酉初初刻夜五十六刻二十四度日出辰初初刻六分晝三十九刻三分日入申正三刻九分夜五十六刻十二分小雪寅宫初度三度日出辰初初刻十四分晝三十八刻二分日入申正三刻一分夜五十七刻十三分大雪十五度日出辰初一刻七分晝三十七刻一分日入申正二刻八分夜五十八刻十四分冬至丑宫初度日出辰初一刻十一分晝三十六刻八分日入申正二刻四分夜五十九刻七分小寒十五度日出辰初一刻七分晝三十七刻一分日入申正二刻八分夜五十八刻十四分二十七度日出辰初初刻十四分晝三十八刻二分日入申正三刻一分夜五十七刻十三分大寒子宫初度六度日出辰初初刻六分晝三十九刻三分日入申正三刻九分夜五十六刻十二分十二度日出辰初初刻晝四十刻日入酉初初刻夜五十六刻立春十五度十八度日出夘正三刻九分晝四十刻十二分日入酉初初刻六分夜五十五刻三分二十四度日出夘正三刻二分晝四十一刻十一分日入酉初初刻十三分夜五十四刻四分雨水亥宫初度日出夘正二刻九分晝四十二刻十二分日入酉初一刻六分夜五十三刻三分六度日出夘正二刻二分晝四十三刻十一分日入酉初一刻十三分夜五十二刻四分十二度日出夘正一刻九分晝四十四刻十二分日入酉初二刻六分夜五十一刻三分驚蟄十五度十八度日出夘正一刻一分晝四十五刻十三分日入酉初二刻十四分夜五十刻二分二十四度日出夘正初刻八分晝四十六刻十四分日入酉初三刻七分夜四十九刻一分以上係京都節氣日出入晝夜時刻其各省日出入晝夜長短刻分不同皆依北極髙度推之查時憲書即得右通書推測時刻從春分起或隔六度或隔九度故清明立夏小滿大暑立秋白露寒露立冬小雪大寒立春驚蟄交節氣之日無日出入刻分今按各節氣推得日出入晝夜時刻已載公規卷内其原表附録於此男女九宫三元經曰九宫建宅男命上元甲子起坎一中元甲子起巽四下元甲子起兑七逆行九宫女命上元甲子起中五中元甲子起坤二下元甲子起艮八順行九宫按上元甲子起坎一中元甲子起巽四下元甲子起兑七而逆行九宫者即三元年九星入中宫之一星不分男女命也三元家以一白入中宫則六白起坎一六白乾也乾為男故以一白入中宫者屬之男命又以乾六白為男則坤二黑為女男以六白起坎一則女以二黑起坤二二黑加坤二則五黄入中宫故以五黄入中宫者屬之女命而上元甲子遂于是始焉年逆者星實順故男逆行年順者星實逆故女順行世俗誤以上元為中元遂謂上元起兑七中元起坎一下元起巽四康熙五十六年奉㫖改正列表於左男女生命上元中元下元甲子癸酉壬午辛夘庚子己酉戊午乙丑甲戌癸未壬辰辛丑庚戌己未丙寅乙亥甲申癸巳壬寅辛亥庚申丁夘丙子乙酉甲午癸夘壬子辛酉戊辰丁丑丙戌乙未甲辰癸丑壬戌己巳戊寅丁亥丙申乙巳甲寅癸亥庚午己夘戊子丁酉丙午乙夘辛未庚辰己丑戊戌丁未丙辰壬申辛巳庚寅己亥戊申丁巳逐日人神所在一日在足大指二日在外踝三日在股内四日在腰五日在口六日在手七日在内踝八日在腕九日在尻十日在腰背十一日在鼻柱十二日在髮際十三日在牙齒十四日在胃脘十五日在徧身十六日在胷十七日在氣衝十八日在股内十九日在足二十日在内踝二十一日在手小指二十二日在外踝二十三日在肝及足二十四日在手陽明二十五日在足陽明二十六日在胷二十七日在膝二十八日在隂二十九日在膝脛三十日在足趺十干十二支人神所在甲日在頭乙日在項丙日在肩背丁日在胷脇戊日在腹己日在背庚日在膝辛日在脾壬日在腎癸日在足子日在目丑日在耳寅日在胷夘日在鼻辰日在腰巳日在手午日在心腹未日在足申日在頭一云在肩腰酉日在背一云在脛戌日在頭一云在咽喉亥日在項十二時人神所在子時在踝丑時在頭寅時在耳一云在目夘時在面辰時在項巳時在乳一云在肩午時在胷未時在腹申時在心酉時在膝戌時在腰亥時在股右皆人神所在不宜鍼灸見類經今時憲書止載逐日人神具錄於此太白逐日遊方通書曰一日十一日二十一日正東二日十二日二十二日東南三日十三日二十三日正南四日十四日二十四日西南五日十五日二十五日正西六日十六日二十六日西北七日十七日二十七日正北八日十八日二十八日東北九日十九日二十九日中方十日二十日三十日在天按太白逐日遊方出於西域日時善惡宿曜經臨既非太白行度且西域月日又與中國不合實無義例然載在通書時憲書由來已久姑存其舊云長星短星歴例曰長星者正月初七二月初四三月初一四月初九五月十五六月初十七月初八八月初二初五九月初三初四十月初一十一月十二十二月初九是也短星者正月二十一二月十九三月十六四月二十五五月二十五六月二十七月二十二八月十八十九九月十六十七十月十四十一月二十二十二月二十五日是也其日忌開市納財立券交易裁衣曹震圭曰長星金也短星火也謂金火之氣能毁傷萬物也考原曰長星者庚辛也以月建内所寄之干用五虎元遁得庚辛者自建辰向前數之春夏至庚則止秋冬至辛則止其本節所當之卦則取其宫數其餘辰則一辰當一得數是也如正月建寅寅中有甲以甲遁得庚午自寅一震三辰一巳一午一共得七數故七日為長星也二月建夘夘中有乙以乙遁得庚辰自夘之震三併辰一共四數故四日為長星也二月建辰辰中寄乙就乙仍遁得庚辰止得一數故一日為長星也四月建巳用丁遁得庚戌自巳之巽四歴午未申酉戌共九數也午不用離九者以巳用巽四故也五月建午用丙遁得庚寅為丙火長生之位故向前得庚子自離九歴未申酉戌亥子得一十五也六月建未就丁遁得庚戌自未申歴酉之兑七至戌共得一十也用兑七者以六月為金氣伏藏之時故用西方之卦也七月建申申中有庚為同體又以秋冬用辛故不用遁辰而用旺辰之酉自申至酉之兑七共得八數也八月建酉酉中有辛故即得兑七也今為二日五日合之亦得七九月建戌就辛遁得庚子辛丑自戌至子得三自戌至丑得四也不用宫數者以戌尚西方之令未至於乾也十月建亥用癸遁得辛酉為干支同體故用壬遁得辛亥止得一也十一月建子用壬遁得辛亥故自子之坎一至亥得十二也十二月建丑就癸遁得辛酉自丑至酉得九也不用宫數與九月同短星者丙丁也以月建内所寄之干用五子元遁得丙丁者自建辰向前數之春夏至丙則止秋冬至丁則止其本節所當之卦則取其宫數其餘辰則一辰當一得數於朔實二十九内減之餘數是也如正月用甲遁得丙寅寅為艮八以減二十九餘二十一日為短星也二月用乙遁得丙戌自夘之震三至戌得十以減二十九餘十九也三月就乙遁得丙子自辰一歴巽四至子得十三以減二十九餘十六也四月用丁遁得丙午為干支同體故即用本宫之巽四以減二十九餘二十五也五月用丙遁得丙申自午至申之坤二共四以減二十九餘二十五也六月就丁遁得丙午為干支同體故即用旺辰得午之離九以減二十九餘二十也七月用庚遁得丁丑自申之坤二歴酉戌亥子丑得七以減二十九餘二十二也八月用辛遁得丙申丁酉自兑七至申得十八至酉得十九也不以減二十九者以其在十六以後也九月就辛遁得丙申丁酉自戌至申得十一至酉得十二不用宫數與長星同以減二十九餘十八十七也今為十六日十七日未知孰是十月用癸遁得丁巳自亥之乾六至巳得十二以減二十九餘十七也今為十四日未知孰是大抵長星應在十五以前短星應在十六以後恐傳者誤也十一月用壬遁得丙午以子丑之月水旺火寒又為丙火胎養之位故復用也自子之坎一至午得七以減二十九餘二十二也十二月就癸遁得丙辰自丑至辰得四以減二十九餘二十五也不用宫數與長星同邵泰衢曰明原以長星為金短星為火非也不知此生於月也十五以前月光漸長而曰長十六以後月輪漸缺而曰短正七月者春秋之始也故長於初七初八之上弦短於二十一二十二之下弦也長至於望之十五者長也短自十六而至於二十五者短不及晦也五月而十五者物長至五月而一隂生也九月而十六十七者五隂盛而隂將消也十月而初一日者陽將長而長之所由始也四月五月而二十五者陽已極而短之所由止也十五之前初六十一十四無長星十五之後二十七二十六二十三無短星正相應也短星皆在下半月不應有十四也按明原以長星為金短星為火考原依其説曲為遷就仍不能盡合邵泰衢以為生乎月又無理解顧相傳已久存其名而闕其義可也百忌日甲不開倉乙不栽植丙不修竈丁不剃頭戊不受田己不破券庚不經絡辛不合醬壬不決水癸不詞訟子不問卜丑不冠帶寅不祭祀夘不穿井辰不哭泣巳不逺行午不苫蓋未不服藥申不安牀酉不㑹客戌不乞狗亥不嫁娶祀竈日凡祀竈擇六癸日洗頭日每月宜用三日四日八日九日十日十一日十三日十四日十五日二十二日二十三日二十六日二十七日及申酉亥子日不宜伏社建破平收日按百忌日所忌用事凡萬年書通書所有及沐浴宜申酉亥子日不宜伏社日已入宜忌卷内原文附載於此嫁娶周堂凡選擇嫁娶日大月從夫順數小月從婦逆數遇第堂厨竈日用之如遇翁姑而無翁姑者亦可用按周堂圖乾為翁坎為第艮為竈震為婦巽為厨離為夫坤為姑兑為堂有合於儀禮新婦饋盥舅姑饗婦之位次其所謂翁姑夫婦者各人所立之方向也第與堂者第為坎宅堂為坐西向東之堂行禮之所古人堂室如是也有厨而又有竈者厨為女氏之行厨所以饋舅姑竈為男氏之爨竈所以饗新婦也豈得有吉凶生於其間耶曹震圭以卦為説義亦類此而要謂遇翁姑夫婦則凶殊為非理因載在時憲書故存其舊第勿拘忌可耳五姓修宅唐書吕才傳卜宅篇曰易稱上古穴居而野處後世聖人易之以宫室葢取諸大壯殷周時有卜擇之文詩稱相其陰陽書卜洛食近世乃有五姓謂宫也商也角也徴也羽也以為天下萬物悉配屬之以處吉凶然言皆不類如張王為商武庚為羽是以音相諧附至栁為宫趙為角則又不然其間一姓而兩屬復姓數字不得所歸是直野人巫師説爾按堪輿經黃帝對天老始言五姓且黄帝時獨姬姜數姓耳後世賜族者寖多然管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇本之姬姓孔殷宋華向蕭亳皇甫本之子姓至因官命氏因邑賜族本同末異詎為配宫商哉春秋以陳衛秦為水姓齊鄭宋為火姓或所出之祖所分之星所居之地以著由來非宫商角徴羽相管攝也考原曰宫音為土商音為金角音為木徴音為火羽音為水若歳遇絶位為氣絶胎為白虎自墓為大墓衝墓為小墓尅歳枝為害財歳枝來尅者為鬼賊同類為大通相生為小通如宫姓屬土長生於申則巳年氣絶午年白虎申酉年小通辰年大墓戌年小墓丑未年大通亥子年害財寅夘年鬼賊也商姓屬金寅年氣絶夘年白虎丑年大墓未年小墓己午年鬼賊申酉年大通辰戌亥子年小通也角姓屬木申年為氣絶鬼賊酉年為白虎鬼賊未年為大墓丑年為小墓辰戌年為害財寅夘年為大通己午亥子年為小通也徴姓屬火亥年為氣絶鬼賊子年為白虎鬼賊戌年為大墓辰年為小墓申酉年為害財寅夘丑未年為小通己午年為大通也羽姓屬水則巳年為氣絶午年為白虎丑未年為鬼賊辰年為大墓戌年為小墓寅夘申酉年為小通亥子年為大通也起月與年同宜大通小通月不宜大墓小墓月按五姓修宅以五姓分五音歴代以來諸儒駁論不勝枚舉吕才其最著者也顧載在時憲書由來已久姑存其舊至其配年之法既取生尅又取墓絶胎且氣絶白虎既兼取鬼賊而宫姓己午年又為小通商姓寅夘年羽姓己午年又為害財則皆不取其配月之法小通惟取兩月或取生我或取我生皆無義例亦不足辨矣事類總集通書曰年貴人冬至後用陽貴夏至後用隂貴時貴人晝用陽貴夜用隂貴又一説子至巳用陽貴午至亥用隂貴凡修造用家主名姓昭告若家主行年不利即以子弟行年得利者作修造主昭告神祗俟修造完偹入宅然後安謝凡新立宅舍或盡行折除舊宅倒堂豎造修主人眷既已出火避宅其起工只就坐上架馬若修主不出火避宅或坐宫或移宫但就所修之方擇吉方起工架馬或别擇吉方架馬亦利若修作在住近空屋或在一百步之外起工架馬並不問吉凶方道凡原有舊宅淨盡折去叧造謂之倒堂豎造與新立宅舍同擇吉方出火避宅俟工作完備别擇吉年月入宅歸火凡立磉便為立向修方如月家不利須與豎造同月蓋豎造既得吉日則在前定磉難得全吉之日吉多凶少亦可用至扇架則又輕於定磉矣凡修造橋梁僧尼院宇庵觀神廟開山立向修方並與民俗年月同凡新立宅舍尚未歸火入宅即於宅内新造牛欄馬枋羊棧猪牢等屋並不問年月方道如在百二十步之外須看年月方道無凶煞占方宜起手修作凡方道有三曰隂方道曰陽方道曰交接方道隂方道者即中宫滴水門也陽方道者地基不與舊宅相接也交接方道者或前後左右屋宇與舊宅相連也如屋上起樓及架天井就簷滴水歸裏皆屬中宫名曰隂方只取中宫無煞得吉㑹為大利如建亭臺造軒閣不進中宫名曰陽方只取外方向為利如就屋比連接架增簷添桁補廊名曰交接方要内外俱有吉㑹方為大利凡作宅據方隅而作方隅則當用作方法若開新基立棟宇或淨盡拆除舊屋而創新居則當用作山法然造作之事以人家居處為本宫所居在所作百步外則新創者始可專用作山法若所居在所作百步内則雖新創亦當以作方法論之如所居雖在所作百步之外但屋宇舊房門廊俱在則其宅已定不過補東而去西除舊而換新尚當用作方法但不在百步之内禍福輕耳故凡造作用作方法者多用作山法者少論方道逺近神煞京城府州縣寸金之地所作之方但隔街路作之不妨如小修葺並不問吉凶之方但要吉日餘即不畏若是鄉村之地修方道或隔大溪水人不得渡四時常流亦不問凶煞若隔小水溪澗常流不絶小煞不妨若居城市隔一街巷三五尺非自已地者亦不犯方隅神煞如欲屋近作樓臺㕔館雖是修方亦取方道有吉神無凶煞作之不妨論入宅法山向中宫並無凶煞惟大門㣲有凶神却用闗閉正門從左右作小門出入或開横門出入或奉祖先福神香火暫駐吉方俟凶神過後正向得利别擇吉月吉日或歳除正初或立春交接移入祖先福神香火奉祀遂開正門無妨論歸火與豎造同日惟推吉時家主先移祖先福神香火入宅俗謂先過香火俟畢工後再擇吉日同家眷從吉方入宅如豎造之日不先移香火入宅必待山向年月得利方可入宅歸火若豎造之日雖吉或犯歸忌九醜又須别擇凡人家修造内堂完備已歸火入宅向後續造廳廊或久住宅舍又欲修作安磑開渠修築等事只用修方法擇年月其山家墓運隂府太歳並不必忌惟浮天空亡巡山羅㬋及月家飛宫方道𦂳煞忌之凡造葬先看山家墓運要正隂府太歳不尅山頭若浮天空亡天官符占舍位並忌開山立向巡山羅㬋止忌立向次論月家飛宫天地官符忌開山立向又論月家飛宫天地官符忌開山立向又論山家墓運正隂府太歳月日時忌尅山如山家官符穿山羅㬋天禁朱雀山家困龍並忌開山吉星到則能制但用通天竅走馬六壬星馬貴人為主尅擇利宜年月兼求三竒紫白祿馬貴人諸家鑾駕帝星若有一吉神同到蓋照山向以佐其吉修造則擇豎造吉日安葬則擇破土吉日大吉凡吉星到山為蓋到方向為照若吉星到山到向併照中宫豎造安葬大利如修方對宫方上得吉星名曰吉星照方修作大利凡方道遭火盡七日之内擇日起工半月内擇日豎造並不問吉凶方道凡入山伐木起工架馬定磉扇架與豎造宅舍同凡成造船隻日與豎造宅舍吉日同忌火星天賊伏斷正四廢執破日凡蓋船篷日忌天火天賊八風破日凡新船下水日與出行日同宜天徳月徳天徳合月徳合要安平定成日忌觸水龍日凡合壽木宜木建日正月庚寅二月辛夘二月戊辰四月己巳五月壬午六月癸未七月庚申八月辛酉九月戊戌十月己亥十一月壬子十二月癸丑及四廢日本命納音生旺日忌本命日本命對衝日建日破日重日日辰納音尅本命納音日凡甃砌生墳亦如葬事選擇年月要開山立向不犯年月家凶煞更得吉神蓋照山向却可用事若作印堂土堆惟擇吉日不問山向吉凶開壙砌金井宜四廢日旬中空亡月日及本命納音有氣月日凡金井下磚日擇日與葬日同凡療病針灸卒然有疾豈待擇吉而後求醫然先賢必用擇日欲人之不輕服藥也至於針灸視逐日人神所値之處尤宜迴避凡嫁娶吉日宜不將天徳月徳天徳合月徳合母倉黄道上吉次吉月恩益後續世戊寅己夘人民合日又日辰合吉雖無不將亦可用不必拘也凡月忌日不忌嫁娶辛亥年十一月初五日辛夘壬子年十二月初五日乙夘嫁娶用之亦多略舉此事以袪俗忌凡嫁娶周堂值翁姑新人入門時俗有從權出外少避候新人坐牀翁姑方可回家凡封拜施恩事出於上百無忌惟擇吉時凡上官嫁娶出行入宅修造安葬修方一切動用宜四大吉時兼黄道吉星時得吉星到時可勝諸凶所有九醜路空旬空俱不忌或合通天竅走馬六壬天罡取用吉時吉神到山到向為吉雜用宜忌起工架馬吉日正月辛未乙未壬午丙午外癸酉丁酉丁丑癸丑二月戊寅庚寅己巳外丙寅甲寅丁丑癸丑三月己巳甲申四月外丁丑丙戌丙午庚午丙子庚子五月乙亥己亥外辛亥六月乙亥甲申庚申外癸酉丁酉辛亥七月戊子壬子外丙子庚子戊辰丙辰八月乙亥己亥庚寅戊寅甲申戊申庚申外戊辰壬辰丙辰辛亥丙寅九月癸夘外辛夘十月壬午辛未乙未外庚午丁未十一月庚寅戊寅外乙丑丁丑癸丑甲寅十二月戊寅己夘乙夘己巳外丙寅甲寅起工通用吉日己巳辛未甲戌乙亥戊寅己夘壬午甲申乙酉戊子庚寅乙未己亥壬寅癸夘丙午戊申己酉壬子乙夘己未庚申辛酉成開日架馬吉方宜天徳月徳月空三竒帝星併諸吉方架馬凶方忌年家三煞獨火官符月飛宫州縣官符月流財小兒煞惟坐宫修方不出火避宅忌之定磉扇架吉日正月丁酉丙午癸丑二月乙丑丙寅乙亥戊寅癸未庚寅己亥癸丑甲寅己未三月甲子甲申戊子丁酉庚子壬子四月甲子庚午庚子丙午癸丑五月丙寅戊辰辛未甲戌戊寅癸未庚寅甲寅丙辰己未六月丙寅乙亥戊寅甲申甲寅庚申七月甲子戊辰辛未戊子庚子壬子丙辰八月乙丑丙寅戊寅庚寅己亥癸丑丙辰九月庚午己夘壬午癸夘丙午十月甲子庚午辛未壬午戊子乙未庚子壬子丙辰辛酉十一月丙寅戊寅甲申庚寅戊申甲寅丙辰庚申十二月甲子丙寅己巳戊寅甲申戊子庚子壬子甲寅庚申定磉扇架通吉日甲子乙丑丙寅戊寅己巳庚午辛未甲戌乙亥戊寅己夘辛巳壬午癸未甲申丁亥戊子己丑庚寅癸巳乙未丁酉戊戌己亥庚子壬寅癸夘丙午戊申己酉壬子癸丑甲寅乙夘丙辰丁巳己未庚申辛酉又宜天徳月徳黄道併諸吉神值日亦可通用忌正四廢天賊建破日