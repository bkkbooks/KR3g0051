body:
  text: 義例二建除十二神建除同位異名建兵福小時土府除吉期兵寶滿福德天巫天狗平陽月天罡隂月河魁死神定時隂官符死氣執枝德小耗破大耗危成天醫天喜收陽月河魁隂月天罡開時陽生氣閉血支建除十二神所合叢辰月建月厭地火厭對六儀招搖隂陽不將隂陽大會隂陽小會行狠了戾孤辰單隂純隂孤陽純陽歲薄逐陳隂陽交破隂陽擊衝陽破隂衝隂道衝陽隂位三隂陽錯隂錯隂陽俱錯絶隂絶陽厯書曰厯家以建除滿平定執破危成收開閉凡十二日周而復始觀所值以定吉凶每月交節則疊兩值日其法從月建上起建與斗杓所指相應如正月建寅則寅日起建順行十二辰是也淮南子曰正月建寅則寅為建卯為除辰為滿已為平主生午為定未為執主陷申為破主衡酉為危主杓戌為成主小德亥為收主大德子為開主太陽丑為閉主太隂選擇宗鏡曰建為歲君為元神為吉凶衆神之主帥可坐不可向其在山在方疊吉星則大吉疊凶星則凶除為四利太陽小吉滿為土瘟為四利喪門又為天富小吉平為三台又為土曲大吉定為歲三合為顯星吉又為地官符畜官次凶執為四利之死符又為小耗凶破為歲破為大耗大凶危為極富星為谷將星為四利龍德吉成為三合吉又為飛廉又為四利白虎小凶收為四利福德小吉又為八座小凶開為青龍太隂為生氣華蓋上吉又為四利弔客小凶閉為病符凶平成開危最吉定除次吉破大凶考原曰按月建十二神除危定執成開為吉建破平收滿閉為凶歷書所謂建滿平收黑除危定執黃成開皆可用閉破不相當者也選擇宗鏡以四利三元諸神相配吉凶亦未盡合如以建為太歲除為太陽滿為喪門破為歲破危為龍德此相合者也至以平為太隂定為官符執為死符成為白虎收為福德開為弔客此不相合者也大抵凡日吉神多則吉凶神多則凶又各視其神之宜忌以為趨避亦未可以執一而論也按建者一月之主故從建起義而參伍於十二辰古之所謂建除家言也建次為除除舊布新月之相氣也一生二二生三三者數之極故曰滿滿則必溢矣易曰坎不盈祇既平概滿則平繼滿故必以平也平則定建前四位則三合合亦定也定則可執矣故繼之以執執者守其成也物無成而不毁故繼之以破對七為衝衝則破也救破以危在易已日乃革之已十干之第六破十二辰之第七其義同也是故救破以危既破而心知危孟子曰危故逹夫心能危者事乃成矣不必待其成而後知為逹也淮南子云前三後五百事可舉平前三也危後五也繼危者成何以成建三合備也既成必收自建至此而十十極數也數無終極之理開之開之云者十即一也一生二二生三由此一而三之則復為建矣建固生於開者也故開為生氣也氣始萌芽不閉則所謂發天地之房而物不能以生故受之以閉終焉唯其能閉故復能建與易同也又按自建至閉十二神其辰皆由建改而遞更古今論說紛紜吉凶不一夫止以建除論吉凶未甚彰顯著明也此建則彼除十二辰自然輪轉耳逮夫參以萬事錯以二氣五行然後吉凶生焉特其吉凶之大小劑量則生於建除雲駛月運舟行岸移明者默契其微神而明之可也今具列各條之下隂陽之變化無窮夫亦舉一隅云耳又按建除之說見於古者自淮南子外又有太公六韜云開牙門當背建向破越絶云黃帝之元執辰破已伯王之氣見於地户王莽傳云以戊辰直定御王冠即真天子位師古曰於建除之次其日當定也知所由來久矣蓋其說與諸家同起戰國時而並託之黃帝云古有建除家叢辰家時師已莫識其統系總名選擇而咸統於天官今按建除之義以年統時以時統月以月統日雖原本於五行而以建為重若夫叢辰云者猶言衆辰吉凶各以義起者也如兵福小時之即建吉期兵寶之即除之類或建除家之異名見義或叢辰家之殊途同歸己莫可考但散而無紀殽而無序此云吉而彼云凶方稱宜而旋稱忌莫之適從今為類聚之而悉統於建除取其必須異名而後義見者或此吉彼凶不妨一辰兩義者著於篇厯例曰兵福者與月建同行太白經曰五帝所在不可出軍向之必敗春東方夏南方秋西方冬北方又云春不東行是謂伐生百事不成夏不南行是謂伐强兵卒多殃秋不西行是謂伐熟兵將不復冬不北行是謂伐藏士卒多傷故月建所在為王相之方我用而我利也淮南子曰小時者月建也神樞經曰小時者郎將之象也其日忌結姻親開倉庫總要厯曰四時之氣隨斗杓所指而建立雖非四時之大時亦一月之小時也選擇宗鏡曰建破平收俗之所忌惟破日最凶建日吉多可用平日甚吉收日吉多無妨曹震圭曰小時者是當時之旺辰也忌結姻親者因陽氣獨持旺氣也忌開倉庫者是旺氣發而不收也邵泰衢曰建為土府者猶言中府也月建當月令而為主於中府也按厯書建日不利行師而於兵福則又曰利行師兵福即建也而矛盾如是蓋月建所在我用則我利用之則為兵福矣若敵在建方則不利行師以伐之以彼據王氣故也然禮記孟春月令云兵戎不起不可從我始然則建雖兵福要須視此建為何月之建如孟春建寅則亦不利行師也月建大義詳後厭建篇此專以明建之同位異名者又按建日忌結姻親者男為日女為月夫建者月也女壯之象故忌之若夫忌開倉庫猶夫甲不開倉之意建為十二辰之首亦有朔旦之象焉惡其月建初轉之月即有所費民俗所忌耳至今元旦俗忌用財謂一歲不能積蓄皆此類也總要厯曰吉期者吉慶之神也所值之日宜出軍行師攻城寨興弔伐㑹親姻厯例曰常居月建前一辰也曹震圭曰吉期者是月建腹心同契之侍臣也蓋常居建前一辰可與要約吉事故因名之厯例曰兵寶者月建前一辰也按兵寶之義與兵福同說已見前假如寅為兵福則卯為兵寶皆四時當王之氣云耳總要厯曰福德者月中福德之神也其日宜祀神祗求福願修宫室獻封章厯例曰福德常居月建前二辰曹震圭曰建前二辰者是月所生之子以其當相氣在前為引與我能為福為德之神也故易卦以子孫爻為福德其義一也大抵子能制乎鬼使不害已故為福德假令正月寅以火生辰土為子其土能制水鬼也二月卯木生巳火為子火能制金鬼也三月辰之衰木能生午火為子去制金鬼也餘倣此考原曰十二地支各有所藏若以前二辰為月建所生者亦無不合則生氣之在月建前二辰亦當取此義總要厯曰天巫者月中善神也所值之日宜合藥請醫祀鬼神求福願厯例曰常居月建前二辰曹震圭曰天巫者月中善神能克除鬼煞也義與福德同樞要厯曰天狗者月中凶神也其日忌禱祀鬼神祈求福願厯例曰天狗者常居月建前二辰曹震圭曰天狗者月中禦衛之犬也祛除私邪之神無使敢侵故居建前二辰是禦於門首也自子建之月起於寅寅者艮之陽辰也易曰艮為夫是也祈福願祠鬼神皆為正道故並忌之按滿為福德總要厯謂其日宜祭神祇祈福願又謂之天巫亦謂宜祀鬼神求福願夫天巫云者巫能通幽明以見日吉辰良其誠意可逹於鬼神故比之天巫云耳豈真是日有神號天巫者下行世間哉顧同一滿日也忽又謂之天狗同一樞要歷也又云忌禱祀鬼神祈求福願誠不可解矣詳考其義蓋天狗者戌日值滿也天官家謂太白餘氣散為天狗滿既是戌建必在申滿之為滿也以三為數之極也天之刑神當令之時而又居盛滿之極則其與他滿日不可同例論明矣故又謂之天狗而謂不宜禱祀非謂凡為滿日皆天狗也夫滿日所以為福德而宜祭祀者以月建為本日之生氣有鬼神降福之象也若滿在戌日則從申至酉悉屬金行其為神也乃蓐收司刑之神而非降福之神矣故忌之也乃曹震圭以天狗為祛除私邪之神夫天狗本妖星如彗孛之類從未有被以嘉稱者其說不類又謂建前二辰為禦於門首之象犬之守宅亦不必其在門也又以寅為艮艮為犬而謂建子則滿寅有犬之象焉未識建丑滿卯則又何說也又謂祈福願祀鬼神皆為正道故並忌之然則為邪道則不須忌也無論隂陽之道本不為小人謀且前既以天狗為祛除私邪之神矣此又謂忌用正道倐命之為正倐命之為邪何其無特見也又按天狗為申建之戌止一位故不入圖桑道茂曰天罡河魁者月內凶神也所值之日百事宜避厯例曰陽建之月前三辰為天罡後三辰為河魁隂建之月反是曹震圭曰魁罡者乃月建四煞之辰平收之日也洞源經曰對七為衝隔三為破選擇家所謂辰破丑而丑衝未亥破寅而寅衝申午破卯而卯衝酉酉破子而子衝午申破巳而巳衝亥戌破未而未衝丑是也神樞經曰死神者月中凶神也其日忌請醫服藥出師征討種植樹木進人納畜李鼎祚曰常居月建前三辰曹震圭曰死神者以月建為旺辰前逢死位也大抵死氣之前必有死神其義同前按天罡者辰也河魁者戌也平收二日輪轉十二支何與辰戌事而亦命為天罡河魁耶洞源經曰對七為衝隔三為破說者曰辰破丑而丑衝未亥破寅而寅衝申謂辰至丑上則破其所居之丑而丑又衝我對宫之未也然辰何以破丑耶其義未詳也今按辰戌之所以為魁罡者以其為二氣之樞紐也陽從辰而左至於戌而成剝蔑之象隂從戌而右至於辰而成夬決之象隂陽消息之大會也是故歲從辰始而至巳辰陽善之通也厭從戌始而至亥戌隂慝之作也二者必不能比而和且辰戌互相衝擊故畏忌之今建除家以平收為魁罡者乃比擬於魁罡以見宜畏忌之意非真以此為魁罡也由是言之則洞源經所謂隔三為破者破即是罡罡破軍也本從此魁罡借義以及於破而後人釋之遂謂辰破丑亥破寅失其㫖矣亥與寅合安得有破義也凡數三而極建前三而建後三則前後之數皆極矣而此二位必自相衝擊假如建在子前三為平為卯後三為收為酉卯酉衝也建在丑前三為平為辰後三為收為戌辰戌衝也推之十二辰莫不皆然有龍戰之象焉故亦以魁罡名之也其隂月陽月兩相易位者以此見其非真魁罡也若魁罡則有定位矣夫以一歲而論陽生於冬至三於寅五於辰隂生於夏至三於申五於戌三者春秋之首隂陽各半也五者歲厭之首隂陽之紐也故曰魁罡取義於斗之第一第七星以其為運斗之樞也國語曰王者必合三五以一建而論陽生於開半於建終於平故平為死神而開為生氣為時陽也半於建者陽長至三而乃可建與寅為歲首同也隂生於定半於破終於收故定為時隂為死氣一建之內亦有十二月之象故亦曰魁罡取諸歲神之魁罡以見意也平之為死神也平在定前定為死氣則其神已降於平矣氣在萌芽之前而神又在氣之前也由此推之開為生氣收必為生神而厯不言者或係闕文或以其微而不足於吉故不言均未可定然神煞起例以收為月命座則亦生神之意云總要厯曰時隂者月中隂神也所值之日宜運謀算畫計䇿睦子孫㑹親友厯例曰常居月建前四辰曹震圭曰時隂者月內隂氣之神母婦之象故隂神主事機密不測故其日宜運謀算畫計䇿㑹親友睦子孫起例常以月建加功曹子上所得之辰為時陽午上所得之辰為時隂謂子者一陽初生也故時陽取焉午者一隂初生也故時隂取焉寅者艮方成終成始之位三陽交泰之所故以加之太乙家常以計神加和德其義一也總要厯曰官符者其日忌拜官視事上表章陳詞訟厯例曰官符者正月起午順行十二辰曹震圭曰官符者是歲月中掌符信之官文職也常居三合前辰大抵歲辰月建以其三合前辰為文官後辰為武職是左文右武之義假令正月建寅則午上有官符文官也戌上有白虎武職也併見第二卷神樞經曰死氣者無氣之辰也其日忌戰鬬征伐療病求醫安置産室經營栽植李鼎祚曰死氣者常居月建前四辰曹震圭曰死氣者以月建為臨官前臨死位也假令二月建卯為臨官帝旺在辰衰在巳病在午死在未也或云生氣之衝辰也謂此愛其生彼愛其死我旺而彼死也故常與生氣相對按時隂死氣之義具見前條而曹震圭月建加功曹之說亦甚有理至官符之義已見歲官符條下四利三元成為白虎定為官符皆同歲神取義官符為文白虎為武今厯家不用白虎而惟用官符於義例不合蓋四利三元原從太歲起例官符白虎皆歲神方位以其弔照太歲故避之若其在日則定成為月建三合何凶之有厯家特誤以年方配日辰耳其以臨日為凶者誤亦由此今既不用白虎應亦不用官符也經曰枝德者地支帶德也所值之日宜修造築垣厯例曰枝德者正月在未順行十二辰樞要厯曰亦月內之耗神也其日忌經營種蒔納財交易開市厯例曰小耗者常居月建前五辰曹震圭曰小耗者小損也乃月建氣絶之辰大耗之從神也按枝德乃歲神吉方詳歲枝德條下蓋陽年歲幹即歲德隂年歲幹即歲德合自太歲順數至前五辰其幹必與歲幹合陽年則為歲德合隂年則為歲德方為枝而幹為德故曰地枝帶德也若其在月則一丙寅月也而未日有五其辛未日為月幹合矣乙丁己癸四未日初與丙寅無涉也何以概謂之枝德耶即以辛未日而論辛為月幹五合六辛皆然與枝無取非若歲枝前五辰之獨與歲幹合也且月幹非月德即與之合亦第幹合云爾非若歲幹合之必為德也是則枝德之名曰枝曰德皆無取義可見古人原由歲枝起例後世誤用之於月而於歲反遺之也今添入歲神月枝德應刪去月小耗義詳歲小耗條下舊歲破為歲小耗則舊月破為月小耗又為本月閉日之衝應閉而衝之是小耗也考原曰月破者月建所衝之日也與歲破義同樞要厯曰大耗者月中虛耗之神也其日忌營庫藏出財物逺經求取債負厯例曰大耗者正月起申順行十二辰曹震圭曰大耗者月建擊衝破散之辰也與月破同位按選擇宗鏡曰危為極富星為谷將星為四利之龍德吉顧其所以為極富為谷將則無其義神煞起例又名之為地輅皆今厯家所不用龍德别詳四利三元條下總要厯曰天醫者天之巫醫其日宜請藥避病尋巫禱祀厯例曰天醫者正月起戌順行十二辰曹震圭曰天醫者三合後辰能使萬物死而復生損而復益如正月建寅三合為寅午戌而戌為寅之後辰是也餘倣此選擇宗鏡曰天喜者正月戌二月亥三月子四月丑順輪十二月乃日支與月建三合故曰天喜通書曰春戌夏丑秋辰冬未今人不原其理嘗於卦書中得其要領大抵取日辰與月建相合為天喜也與成日同位按月建後二辰生氣也又後二辰即生氣之生氣也故曰天醫又成日也萬物莫不喜其有成故曰天喜厯書以春戌夏丑秋辰冬未為天喜日而曹震圭謂母喜見子然亦有成就之義如春之令屬木木生火火墓在戌至於戌則火之道成矣故春以戌為天喜夏之令屬火土火土生金金墓在丑至於丑則金之道成矣故夏以丑為天喜秋辰冬未可以類推今通書與宗鏡皆以成日為天喜惟寅申巳亥四孟月與戌丑辰未相合或古有兩說或一為後起俱未可知然成日之理為長且通書總論既取成日而立成又用戌丑辰未日不宜自相矛盾故改從畫一而並存其說以備參考按陽月魁隂月罡之義己見平日條下總要厯曰時陽者月中陽神也所值之日宜叙婚姻行宴樂厯例曰常居月建後二辰曹震圭曰時陽者月內掌陽氣之神父夫之象故陽之主事威儀正直有禮義儀容故其日宜叙婚姻行宴樂五行論曰生氣者極福之神也其日宜修築城壘開道溝渠起土修營養育羣畜種蒔如出軍戰陳則宜背之厯例曰生氣者常居月建後二辰曹震圭曰生氣者萬物所生之辰也生育萬物者土也土之所居者四季也四季者乃四時五行所衰之辰也自衰然後可生彼故以四時前季辰為生物之位假令冬水生春木水衰於丑生木於前木之長生在亥也木衰於辰生火於前火之長生在寅也火衰於未生金於前金生於巳也金衰於戌生水於前水生於申也皆各居其後二辰此其義也考原曰月建乃當王之氣不可以衰言也且生氣亦不專在四維之位亦不可專以五行之長生言也大抵月建者當正王之位而前二辰己有生氣是未旺而將旺者也如正月為三陽之月而子則一陽己生是為生氣也可與王日官日參看益明按孫奭孟子疏曰木旺亥子丑寅卯火旺寅卯辰巳午金旺巳午未申酉水旺申酉戌亥子土與水同其言旺也始於長生之位而終於正旺之鄉此即生氣居建後二辰之義也隂符經曰天地之道浸故隂陽勝隂陽相推而變化順矣建為月中天子其後二辰為極福之神隂陽以漸浸而勝也必以二位者從生氣至建而成三蓋一生二二生三而天地之道備也歲後二辰為太隂建後二辰為生氣太隂為后妃之象天下之母也生氣之義亦母道也於建除為開日無一之不吉也曹震圭强以衰論者豈疑其與太隂同位歟不知太隂固吉神也特不宜侵犯耳樞要經曰血支其日忌針刺出血曹震圭曰血支者氣血之支流也故起於旺建之後生氣之前如人生之後自有血脉暢於四肢若其日針刺者是去其血也故忌之按月令仲冬以後忌作土事謂地氣阻泄是謂發天地之房閉之為血忌而不宜針刺者亦此意人身與天地之氣相應不宜於應閉之日而發泄之建之為建也生於開而養於閉以成其建閉在十二辰猶小冬也閉日針刺猶冬日發房也凡月神之以十二辰起例者雖莫考其為建除家言叢辰家言今一以建除統之如寅為建則凡神煞之在正月為寅者皆與建同也卯為建則凡神煞之在二月為卯者皆與建同也如寅為除則凡神煞之在十二月為寅者皆與除同也卯為除則凡神煞之在正月為卯者皆與除同也餘可類推既使一日之內吉凶神煞如指諸掌又可參詳其吉凶之大小深淺有制無制可化不可化以為從違也天寶厯曰月建者陽建之神也所理之方戰鬬攻伐宜背之不可抵向所值之日宜封建視事不宜興造土功結親禮厯例曰正月建寅順行十二辰曹震圭曰月建所理之地戰鬬攻伐不宜向而宜背者蓋使我乘旺氣而攻彼休囚也所值之日宜封建視事者建者健也是月內羣神之長萬神無不咸服也不可興造土功者蓋彼當旺勢不可犯也其不可結親禮者是陽建獨旺隂建氣消之辰親禮之道宜隂陽相和若偏則不宜也按淮南子云斗柄為小歲正月建寅月從左行十二辰小歲東南則生西北則殺不可近也而可背也不可左也而可右也賈公彥疏周禮占夢曰建謂斗柄所建謂之陽建故左旋於天史記天官書曰斗為帝車運於中央臨制四鄉然則月建者諸神之主帥也俗謂之月中天子從建而之焉則有除滿以下十一神並建而十二觀所值以定吉凶古所為建除家者也建之所在日躔其所合之辰則太陽月將也太陽前一位則為月厭月厭謂之隂建右旋於天厭建相值相離則周禮所稱觀天地之㑹者也其說各詳本條下堪輿經曰天老曰正月陽建於寅隂建在戌春秋繁露曰天道大數相反之物也不得俱出隂陽是也春出陽而入隂秋出隂而入陽夏右陽而左隂冬右隂而左陽隂出則陽入陽入則隂出隂右則陽左隂左則陽右是故春俱南秋俱北而不同道夏交於前冬交於後而不同理並行而不相亂澆滑而各持分此之謂天之意而何以從事天之道初薄大冬隂陽各從一方來而移於後隂由東方來西陽由西方來東至於中冬之月相遇北方合而為一謂之曰至别而相去隂適右陽適左適左者其道順適右者其道逆逆氣左上順氣右下故下暖而上寒以此見天之冬右隂而左陽也上所右而下所左也冬月盡而隂陽俱南還陽南還出於寅隂南還入於戌此隂陽所始出地入地之見處也至於中春之月陽在正東隂在正西謂之春分春分者隂陽相半也故晝夜均而寒暑平隂日損而隨陽陽日益而鴻故為燒熱初得大夏之月相遇南方合而為一謂之曰至别而相去陽適右隂適左適右由下適左由上上暑而下寒以此見天之夏右陽而左隂也上其所右下其所左夏月盡而隂陽俱北還陽北還而入於申隂北還而入於辰此隂陽之所始出地入地之見處也至於中秋之月陽在正西隂在正東謂之秋分秋分隂陽相半也故晝夜均而寒暑平陽日損而隨隂隂日益而鴻故至於季秋而始霜至於孟冬而始大寒下雪而物咸成大寒而物畢藏天地之功終矣淮南子曰北斗之神有雌雄十一月始建於子月徙一辰雄左行雌右行五月合午謀刑十一月合子謀德隂建所居辰為厭日厭日不可以舉百事堪輿徐行雄以意知雌故為竒辰數從甲子始子母相求所合之處為會十日十二辰周六十日凡八會會於歲前則死亡會於歲後則無殃天寶厯曰月厭者隂建之辰也所理之方可以禳災祈福避病所值之日忌逺行歸家移徙婚嫁厯例曰月厭者正月在戌逆行十二辰曹震圭曰月厭者厭魅之神也其性暗昧私邪不正故各忌之蓋十一月建子隂陽氣爭冬至前隂氣極冬至後陽氣生故自建子之月陽建順厯丑寅卯一十二辰隂建逆歷亥戌酉一十二辰至五月夏至二氣又同建而相爭也亦名曰隂建按月建者斗柄所建也象見於天仰而望之而莫不見者也月厭者二氣消息之原運於太無而出萬有者也推建可以知厭故淮南云堪輿徐行雄以意知雌也曰堪輿者蓋此堪輿家言也其曰厭者以其每處日躔之前故謂之厭厭古壓字也月建左行月厭右行六十甲子相交相錯而吉凶生焉周禮所為觀天地之㑹者鄭康成以厭建當之可以知古之日者必宗乎此也若其所以然則董仲舒春秋繁露言之詳且明矣淮南子云㑹於歲前則死亡㑹於歲後則無殃然則八會之日非吉日也建陽而厭隂建吉而厭凶其同位之日隂陽參雜斷可識矣夫和㑹者隂從乎陽之謂太陽為陽月建為隂如寅月之亥卯月之戌則當以隂陽和㑹論若從月建而復生隂建則所為隂中之隂其所會之干支安得以吉論乎又參以太歲而消息之如歲在甲寅正月甲戌大㑹則歲前也尤凶若八月辛卯大㑹則在歲後矣可無殃也漢時已有堪輿八會見於經史今厯家大㑹八即其傳也又有小㑹八又有行狠了戾孤隂單陽等名考原詳之今並載於後要之皆為不吉之日而曹震圭以大小㑹為隂陽和會則顯與淮南子不符不可從也若夫天子用大小㑹日謂之歲位皇后太子諸侯用歲前卿大夫用歲對士庶人用歲後其所為歲前歲後亦與淮南子不同而以歲前為可用益悖於古均無取焉地火神樞經曰地火者月中凶神也其日忌修築園圃栽植種蒔厯例曰地火者正月起戌逆行十二辰按厭建堪輿家言也地火叢辰家言也然地火即是月厭故載於此天寶厯曰厭對者月厭所衝之辰也其日忌嫁娶又為招搖忌乘船渡水厯例曰厭對者正月起辰逆行十二辰神樞經曰六儀者月中吉神也所值之日宜牧養生財栽植樹木結親納禮視事臨官厯例曰正月起辰逆行十二辰曹震圭曰六儀者月中正禮儀之神也月厭主暗昧六儀與之敵衝以威厲之使不敢妄失儀容也故以名之按厭對正月起辰逆行十二辰六儀亦正月起辰逆行十二辰然則厭對之即為六儀也明甚乃選擇之書於厭對則曰忌嫁娶於六儀則曰宜結親納禮適相反也蓋堪輿家言其大指總以建為陽厭為隂必干支與厭全不相涉者始為吉日故厭對雖衝破月厭亦不以為吉也而叢辰家則以其能衝破月厭而名之曰六儀謂月厭主曖昧隂私則月厭之反必威儀正直之神也是以兩相矛盾而並見于厯書莫之適從也今定為厭對忌嫁娶六儀宜視事臨官庶於義各當云招搖見後天寶厯曰隂陽不將者以月建為陽謂之陽建正月起寅順行十二辰月厭為隂謂之隂建正月起戌逆行十二辰分於卯酉㑹於子午厭前枝幹自相配者為陽將厭後枝幹自相配者為隂將厭後幹配厭前枝者為隂陽俱將厭前幹配厭後枝者為隂陽不將也陽將傷夫隂將傷婦隂陽俱將夫婦俱傷隂陽不將夫婦榮昌戊己之幹位在中央戊為陽土寄於艮己為隂土寄於坤經曰春冬己不將秋夏戊不將厯例曰隂陽不將者正月辛亥辛丑辛卯庚子庚寅己亥己丑己卯丁亥丁丑丁卯丙子丙寅二月庚戌庚子庚寅己亥己丑丁亥丁丑丙戌丙子丙寅乙亥乙丑三月己酉己亥己丑丁酉丁亥丁丑丙戌丙子乙酉乙亥乙丑甲戌甲子四月丁酉丁亥丙申丙戌丙子乙酉乙亥甲申甲戌甲子戊申戊戌戊子五月丙申丙戌乙未乙酉乙亥甲申甲戌戊申戊戌癸未癸酉癸亥六月乙未乙酉甲午甲申甲戌戊午戊申戊戌癸未癸酉壬午壬申壬戌七月乙巳乙未乙酉甲午甲申戊午戊申癸巳癸未癸酉壬午壬申八月甲辰甲午甲申戊辰戊午戊申癸己癸未壬辰壬午壬申辛巳辛未九月戊辰戊午癸卯癸巳癸未壬辰壬午辛卯辛巳辛未庚辰庚午十月癸卯癸巳壬寅壬辰壬午辛卯辛巳庚寅庚辰庚午己卯己巳十一月壬寅壬辰辛丑辛卯辛巳庚寅庚辰己丑己卯己巳丁丑丁卯丁巳十二月辛丑辛卯庚子庚寅庚辰己丑己卯丁丑丁卯丙子丙寅丙辰考原曰厭前枝幹自相配者為陽將純陽無隂也厭後枝幹自相配者為隂將純隂無陽也厭後幹配厭前枝者為隂陽俱將隂非其隂陽非其陽其道相乖也蓋幹為陽當居於前枝為隂當從其後是夫唱婦隨之理故厭前幹配厭後枝為隂陽不將也按隂陽不將者乃堪輿家之吉日凡事可用非僅施之嫁娶也惟六月戊午為逐陳不可用今世所傳祗曰嫁娶吉而又不明歲前歲後之義且于天子皇后卿士庶民用日妄說亦覺其支離而難通遂將大㑹等日一併廢棄而不用不知此法最古其於隂陽之義亦最微妙縝密良不可忽也具詳於後隂陽大㑹堪輿經曰正月大㑹甲戌二月大㑹乙酉五月大會丙午六月大㑹丁巳七月大會庚辰八月大會辛卯十一月大會壬子十二月大會癸亥如正月陽建在寅隂建在戌陽主干隂主支也陽建在寅近於甲陽甲隂戌支干相和㑹故甲戌為正月大會也二月陽建於卯隂建於酉卯近於乙陽乙隂酉故乙酉為二月大會也五月隂陽二建俱㑹於午午近於丙以丙配午故丙午為五月大會也六月陽建於未隂建於己未近於丁以丁配巳故丁巳為六月大會也七月陽建於申隂建於辰陽建近庚以庚配辰故庚辰為七月大會也八月陽建於酉隂建於卯酉近於辛以辛配卯故辛卯為八月大㑹也十一月隂陽二建俱㑹於子子近於壬以壬配子故壬子為十一月大㑹也十二月陽建於丑隂建於亥丑近於癸以癸配亥故癸亥為十二月大會也隂陽大會立成月會大會大㑹所領日春夏秋冬正月甲戌癸亥甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉歲位歲後歲對歲前七月庚辰甲戌乙亥丙子丁丑戊寅己卯歲對歲前歲位歲後二月乙酉庚辰辛巳壬午癸未甲申歲位歲後歲對歲前八月辛卯乙酉丙戌丁亥戊子己丑庚寅歲對歲前歲位歲後五月丙午辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳歲前歲位歲後歲對十一月壬子丙午丁未戊申己酉庚戌辛亥歲後歲對歲前歲位六月丁巳壬子癸丑甲寅乙卯丙辰歲前歲位歲後歲對十二月癸亥丁巳戊午己未庚申辛酉壬戌癸亥歲後歲對歲前歲位右大㑹望後用之其所領日從本㑹日起逆數至上㑹止即得所領日數也隂陽小㑹堪輿經曰小㑹二月己酉三月戊辰四月己巳五月戊午八月己卯九月戊戌十月己亥十一月戊子皆以中宫戊巳配厭建為之如二月陽建於卯隂建於酉隂陽相衝以乙配酉以辛配卯大㑹皆已有之故以已配隂建之酉為隂陽小㑹也三月陽建於辰隂建於申以庚配辰大㑹有之以乙配申隂陽非耦故以戊配辰為三月小會也四月純陽用事隂勢盡消故無大㑹而以己巳為四月小㑹也五月陽建隂建俱㑹於午故以戊配所建之辰則戊午為五月小㑹也八月秋分建厭分位亦以已配隂陽建厭之辰故八月以己卯為小㑹也九月剝卦直月陽消將盡故無大㑹而以戊戌為小會也十月陽勢消盡純隂用事故無大㑹則以己亥為十月小會也十一月隂陽二建俱會於子亦以戊配所建之子故十一月戊子為小會也隂陽小會立成月會小會小會所領日春夏秋冬二月己酉丙午丁未戊申歲位歲後歲對歲前三月戊辰癸亥甲子乙丑丙寅丁卯歲位歲後歲對歲前四月己巳戊辰歲前歲位歲後歲對五月戊午丁巳歲前歲位歲後歲對八月己卯甲戌乙亥丙子丁丑戊寅歲對歲前歲位歲後九月戊戌辛卯壬辰癸巳甲午乙未丙申丁酉歲對歲前歲位歲後十月己亥戊戌歲後歲對歲前歲位十一月戊子乙酉丙戌丁亥歲後歲對歲前歲位右小會望前用之其所領日亦從本會日逆數至他大小會止曹震圭曰大會者是月內隂陽正會之辰也小會者是隂陽偶會之辰也故為上吉之日比和之辰考原曰大會者陽會於隂也小會者隂會於陽也其月無大會者以其干支不能相配如三月辰中之乙不能配隂建之申四月巳中之丙不能配隂建之未是也小會為隂㑹陽故其日皆用陽建惟二月八月隂陽二建對衝故相易也其月無小會者以其日大會巳有之或他月小會巳有之觀其所領日逆至他月大小會日則止可見矣行狠了戾孤辰堪輿經曰三月陽建於辰隂建於申陽前不及於丙隔於巳也後過於甲隔於卯也故以甲配申則不從以丙配申則不及以戊庚壬配申則不合故甲申為行狠丙申為了戾戊申庚申壬申為孤辰也四月陽建於巳隂建於未陽前不及於丁隔於午也後過於乙隔於辰也故以乙配未則不從以丁配未則不及以己辛癸配未則不合故乙未為行狠丁未為了戾己未辛未癸未為孤辰也九月陽建於戌隂建於寅陽前不及壬隔於亥也後過於庚隔於酉也故以庚配寅則不從以壬配寅則不及以甲丙戊配寅則不合故庚寅為行狠壬寅為了戾甲寅丙寅戊寅為孤辰也十月陽建於亥隂建於丑陽前不及癸隔於子也後過於辛隔於戌也故以辛配丑則不從以癸配丑則不及以乙丁己配丑則不合故辛丑為行狠癸丑為了戾乙丑己丑丁丑為孤辰也天寶厯曰過為行狠不及為了戾不合為孤辰曹震圭曰月建者陽也月厭者隂也陽主干隂主支若得陽建前後近干以配隂建者大會也若以陽建後隔位之干配隂建者為行狠不從乃陽氣不從也陽建前隔位之干配隂建者為了戾不及是陽氣不及也以隂建左右之干自配者為孤辰非正應隂自配也故曰不合單隂自單隂至純陽四位皆以時無大會故以戊己配月建為之堪輿經曰三月卦得夬謂五陽爻對一隂爻故戊配辰為單隂也純隂堪輿經曰十月卦得坤謂六爻皆隂陽氣已盡故以己配亥為純隂也孤陽堪輿經曰九月卦得剝謂五隂爻對一陽爻故以戊配戌為孤陽也純陽堪輿經曰四月卦得乾謂六爻皆陽隂氣已盡故以己配巳為純陽也歲薄堪輿經曰四月陽建於巳而左行隂建於未而右行隂陽相向欲合於午故以丙午戊午為四月歲薄也十月陽建於亥而左行隂建於丑而右行隂陽相向欲合於子故以壬子戊子為十月歲薄也曹震圭曰薄者迫也隂陽二建交相迫之丙壬則近子午之干戊者謂時無大會皆以戊己配之也逐陳堪輿經曰六月陽建於未而左行隂建於巳而右行隂陽相背分别於午故以戊午丙午為六月逐陳十二月陽建於丑而左行隂建於亥而右行隂陽相背分别於子故以壬子戊子為十二月逐陳曹震圭曰隂陽二建此月相分背各隨其陳也隂陽交破堪輿經曰四月陽建於巳破於亥隂建於未破於癸癸陽也為隂所破也亥隂也為陽所破也是謂陽破隂隂破陽故四月癸亥為隂陽交破十月陽建於亥破於巳隂建於丑破於丁丁陽也為隂所破也巳隂也為陽所破也是為陽破隂隂破陽故十月丁巳為隂陽交破隂陽擊衝堪輿經曰五月隂陽俱至午陽建挾丙而擊壬隂建居午而衝子故五月以壬子為隂陽擊衝十一月隂陽俱至子陽建挾壬而擊丙隂建居子而衝午故十一月以丙午為隂陽擊衝陽破隂衝堪輿經曰六月陽建於未而破丑隂建於巳而衝癸故六月癸丑為陽破隂衝也十二月陽建於丑而破未隂建於亥而衝丁故十二月丁未為陽破隂衝也隂道衝陽堪輿經曰二月陽建於卯而衝酉隂建於酉而衝卯故二月己卯月宿在卯為隂道衝陽八月陽建於酉而衝卯隂建於卯而衝酉故八月以己酉月宿在酉為隂道衝陽隂位堪輿經曰三月陽建於辰隂建於申故三月庚辰月宿在辰為隂位九月陽建於戌隂建於寅故九月甲戌月宿在戌為隂位三隂堪輿經曰正月破在申一隂也厭在戌二隂也辛在其間三隂也故正月得辛酉月宿在酉為三隂也七月破在寅一隂也厭在辰二隂也乙在其間三隂也故七月得乙卯月宿在卯為三隂也陽錯堪輿經曰以陽建之支配當方之干隂陽自相配合為日以值所衝之宿為陽錯如正月陽建在寅近於甲支干相配為甲寅日寅衝於申故正月甲寅之日月宿在申為陽錯二月陽建在卯近於乙支干相配為乙卯日卯衝於酉故二月乙卯之日月宿在酉為陽錯三月陽建在辰近於甲支干相配得甲辰日辰衝於戌故三月甲辰之日月宿在戌為陽錯也餘月倣此隂錯堪輿經曰以隂建之支配當方之干隂陽自相配合為日以值所衝之宿為隂錯如正月隂建於戌近於庚支干相配為庚戌日戌衝辰故正月庚戌之日月宿在辰為隂錯二月隂建於酉近於辛支干相配為辛酉日酉衝卯故二月辛酉之日月宿在卯為隂錯三月隂建在申近於庚支干相配為庚申日申衝寅故三月庚申之日月宿在寅為隂錯餘倣此唯五月十一月隂陽二建會於子午故無隂錯陽錯隂陽俱錯堪輿經曰五月十一月隂陽二氣同建一辰則以所建之支配所近之干共為一日月宿居月建所衝之辰為隂陽俱錯如五月隂陽二建合於午近於丙配為丙午月宿在子為隂陽俱錯十一月隂陽二建合於子近於壬配為壬子月宿在午為隂陽俱錯也絶隂堪輿經曰絶隂者謂三月四月隂氣絶也故三月小會所領日為四月絶隂所領日絶陽堪輿經曰絶陽者謂九月十月陽氣絶也故九月小會所領日為十月絶陽所領日立成行狠了戾孤辰單隂純隂孤陽純陽歲薄逐陳隂陽交破隂陽擊衝陽破隂衝隂位隂道衝陽三隂陽錯隂錯隂陽俱錯絶隂絶陽曹震圭曰以上諸日雖遇天德月德玉堂生氣黃道吉星值日亦不可用集正所謂隂陽不足之辰是也忌興造嫁娶上官赴任入宅遷移出行交易合藥問病百事不宜按大小會所領日考原依歷事明原所載堪輿經列之曹震圭既以大小會為上吉之日比和之辰則其所領必亦以為吉日也今按淮南之言大小會既為凶日則所領日當亦非吉然周禮漢鄭康成注有八會之目而唐賈公彥謂堪輿大會有八小會亦有八然則大小會之來舊矣顧未言大小會所領日今考其㫖日辰參差不齊多寡不等無義可尋恐後人之附會歟又以歲位歲對歲前歲後屬之春夏秋冬以季為歲名實紊矣又與淮南之言大相徑庭復分屬天子皇后卿士庶民或用歲位歲對或用歲前歲後其謬更甚今將所分用日四條刪去仍其春秋冬夏歲位歲對歲前歲後之目刪者以其不可為法也存者不沒其迹使後人可考也其行狠了戾以下二十神俱從厭建起義合不將日觀之堪輿家擇日之道備矣堪輿經單隂純隂孤陽純陽以時無大會故以戊己配月建為之而謂皆不吉然則堪輿家本意以大會為凶日益可知矣特其書無傳吉凶之義不著歷家不覩淮南等書故曹震圭輩妄意以為吉耳又按賈公彥疏周禮引堪輿經黃帝問天老云四月陽建於己巳破於亥隂建於未未破於癸是為陽破隂隂破陽故四月有癸亥為隂陽交會十月丁巳為隂陽交會言未破癸者即是未與丑對而近癸也云云是即立成中隂陽交破之二日也今曰交破古曰交會然則會之為義與破同洵非吉也至大㑹等名義考原所載甚詳而猶有未盡今按隂陽二建合于子午分于卯酉大會為陽會隂由合而至分故自十一月至二月自五月至八月共八日而三四九十月無大會小會為隂會陽由分而至合故自二月至五月自八月至十一月共八日而六七十二正月無小會非以其月干支不能相配而無大會其日己有大會而無小會也陽會于隂者干建支厭甲即寅乙即卯非取近干也隂會于陽者干厭支建厭為隂隂為地故以戊己配月建為小會非近干已有大會而後取戊己也又小會皆建日衝皆破日明原以二月己酉八月己卯為小會二月己卯八月己酉為隂道衝陽當是互誤也三九月隂陽始侵四十月隂陽相逼故行狠了戾孤辰無虛日單隂純陽孤陽純隂乃從小會别取一義為名非以其月無大會也歲薄隂陽將合而氣已先爭逐陳隂陽始分而難猶未解故以二建配子午日丙壬即陽建非取近干也戊即隂建非以無大會而取戊己也辰戌為戊己之分故以隂建配辰戌日為隂位非但以辰戌為陽建也如第取陽建而已則逐月皆有之何獨三九月耶正七月厭破將併而氣已先交故正月辛酉七月乙卯皆取厭破間干支自相配者為三隂日與歲薄同義明原作正月辛卯七月乙酉當亦是互誤也陽建疊陽建為陽錯隂建疊隂建為隂錯五月十一月隂陽同建又疊同建之干為隂陽俱錯亦非取近干也又自隂位以下皆取月宿孫思邈房中經載月宿日是否即此亦不可考然其日之不吉義例甚明不待值月宿而後定矣今三隂己為改正小會改載立成卷中此則仍舊以備參考若夫絶隂絶陽乃從單隂孤陽更進一義蓋三月之單隂至四月而絶九月之孤陽至十月而絶也其所領日亦後人附會故刪欽定協紀辨方書卷四
