body:
  text: 義例六嵗祿飛天祿飛天馬飛宫貴人通天竅走馬六壬四利三元蓋山黃道三元九星八節三竒巡山羅㬋坐煞向煞灸退獨火浮天空亡隂府太嵗天官符飛天官符飛地官符飛大煞小月建大月建丙丁獨火月遊火甲年在寅乙年在卯丙戊年在巳丁巳年在午庚年在申辛年在酉壬年在亥癸年在子按嵗祿者嵗干臨官方也五行之性臨官吉於帝旺蓋臨官則方盛而帝旺則太過矣故祿命家以臨官為祿而帝旺為刃選擇家亦有嵗刃之説天官非之語見附録日祿見本條月神皆從支取故獨無月祿例通書曰馬到山頭人富貴祿到山頭旺子孫若逢祿馬一同到千祥百福自駢臻選擇宗鏡曰祿馬貴人山方皆吉在本遁內者有力遁外次之又曰先以五虎遁尋本年祿馬干支為真祿馬次以月建入中宫尋本年真祿馬在何宫即以吉論按祿馬為年方吉神同到尤吉通書年神立成止取祿馬地支一字以月建入中宫順飛九宫如甲子年祿馬俱在寅正月寅建入中宫即祿馬同在中宫二月卯建入中宫順數寅在兌七即祿馬同在兌宫乙丑年祿在卯馬在亥二月卯建入中宫亥在巽四即祿在中宫馬在巽宫三月辰建入中宫卯在兌七亥在震三即祿在兌宫馬在震宮宗鏡兼取本遁天干為真祿馬又以月建干支入中宫順飛九宫如甲子年祿馬俱在寅用五虎元遁得丙寅即丙寅為真祿馬正月丙寅入中宫即祿馬同在中宫二月丁卯入中宫順數丙寅在坎一即祿馬同在坎宫乙丑年祿在卯馬在亥用五虎元遁得己卯為真祿丁亥為真馬二月己卯入中宫丁亥在巽四即祿在中宫馬在巽宫三月庚辰入中宫己卯在坎一丁亥在震三即祿在坎宫馬在震宫二説皆為有理然通書無飛宫貴人故用宗鏡之法與貴人一例而並録通書之説以備參考選擇宗鏡曰嵗祿馬貴人山方皆吉在本甲內者為有力甲外次之又曰先以五虎遁尋嵗貴係何干支次以月建入中宫順尋嵗貴在何宫即以吉論如乙丑年六月建癸未修乾坎二山方先以本年五虎遁起戊寅順尋甲申為真陽貴戊子為真隂貴次以月建癸未入中宫順行陽貴甲申到乾隂貴戊子到坎二山方修造皆吉餘倣此又曰貴人與祿馬取用不同要在分辨隂陽陽貴人冬至後用之有力飛在陽宫尤有力隂貴人夏至後用之有力飛在隂宫尤有力按貴人祿馬皆為嵗中吉神今通書有飛天祿馬而無飛宫貴人實為闕略故取宗鏡補之通書曰通天竅乃楊救貧真訣凡修造葬埋開山立向修方若遇吉星所值不問太嵗三煞官符大將軍諸凶煞此星並能壓之其法只用八干四維求年月日時吉星所到之處修之大吉其例則用雙山五行各從本年三合長生起迎財進寶庫珠順行三位其對衝三位為大吉進田青龍共為十二吉山利用本年三合及其對衝月日時按通書云通天竅只用八干四維而其例又用雙山兼十二支雖有異同而於理無害至其從嵗三合長生起迎財進寶庫珠三星并取對宫大吉進田青龍三星為吉者蓋三合本方為大煞之位對方為三煞之位長生前三位則為三合後方其對宫則為三合前方不犯大煞三煞諸凶如申子辰年大煞在子三煞在巳午未從三合長生起例則迎財在坤申進寶在庚酉庫珠在辛戌其對宫艮寅為大吉甲卯為進田乙辰為青龍自不犯大煞三煞坐煞向煞諸凶是也用本年三合月日時者月日時皆不犯三煞諸凶也然惟子午卯酉年為然餘年不可概論如申年太嵗在申寧可以迎財為吉乎辰年太嵗在辰寧可以青龍為吉乎是其能壓太嵗之説既不可為典要又自不犯三煞則能壓三煞之説更屬有名無實此宗鏡所以詆其不足為據也但與走馬六壬並傳已久世俗稱為竅馬而亦不害於理故存之惟迎財進寶諸名殊不雅馴今質名之曰三合前方三合後方庶為例明義正坊本又以三合本方為大州牢小縣獄小重喪對方為小火血大火血大重喪使十二宫各有名色尤為俗惡無理臺本不載蓋刪之也通書曰六壬天罡年月例取天罡為首順行十二支以天罡配辰太乙配巳勝光配午小吉配未傳送配申從魁配酉河魁配戌登明配亥神后配子大吉配丑功曹配寅太衝配卯取神后子勝光午功曹寅傳送申天罡辰河魁戌六位為吉用三合月日時楊救貧造葬用山頭吉星修方用方道吉星如修凶方從吉方起手主十二年田財大旺按地支配十二將以神后大吉功曺勝光小吉傳送登明為吉太衝天罡太乙從魁河魁為凶今不取大吉小吉登明而取天罡河魁者蓋以子寅辰午申戌六陽辰為吉耳其起例謂子年以天罡加辰每年退行一位蓋古有嵗厭之説子年合於子為伏吟則天罡必在辰矣厭逆行故天罡每年退一位其義與黃黑二道倣佛相同非有深意大抵其方疊吉神則吉無吉神則不能為福此宗鏡諸書所以詆其不足為據也然相傳已久其説亦不害理故存之選擇宗鏡曰李淳風四利三元一太嵗二太陽三喪門四太隂五官符六死符七嵗破八龍德九白虎十福德十一弔客十二病符太陽太隂龍德福德為吉餘方皆凶按三元之義未詳而四利方則載於通書年表八凶方皆載於時憲書今以各義例推之太嵗嵗破不敢犯也喪門弔客則合拱嵗破以衝太嵗者也官符白虎則三方弔照太嵗者也病符舊太嵗也死符舊嵗破也惟太陽在太嵗之前方興未艾龍德在嵗破之前安吉無虞太隂福德界乎太嵗嵗破之間不衝不照其吉固宜然此乃從太嵗起例猶日之有建除故宗鏡又有以四利配建除之説若以三合而論則辰戌丑未年之太陽又為劫煞寅申己亥年之福德亦為劫煞太隂又為天官符子午卯酉年之龍德又為嵗煞不可以吉言矣故須兼看各神未可執一而定也蓋山黃道起於青囊九曜以本年支對宫之卦為本宫用小遊年變卦法貪狼為黃羅巨門為天皇文曲為紫檀武曲為地皇如子年屬坎對宫為離即以離為本宫貪狼在震巨門在兌文曲在坤武曲在巽又依九曜納甲三合之法庚亥未並屬於震丁巳丑並屬於兌乙納於坤辛納於巽是也餘年倣此法見本原通書曰其方開山立向修營並吉起例則止取八卦不用納甲三合今按青囊九曜以貪巨武輔為吉此不用輔弼而用文曲其義未詳然破軍為浮天空亡亷貞為獨火歷來通書避忌用之已久既以彼為凶則以此為吉宜也惟黃羅等名益不可曉今從起例仍用原名庶不失本義云黃帝遁甲經曰三元者起於九宫也以休門為一白死門為二黑傷門為三碧杜門為四緑中宫為五黃開門為六白驚門為七赤生門為八白景門為九紫通書云九宫者神龜負文於背禹因以陳九疇即洛書戴九履一左三右七二四為肩六八為足五數居中縱橫斜皆成十五者是也河圖則天一地二天三地四天五地六天七地八天九地十而先儒有除十用九之説所謂河圖洛書相為經緯八卦九章相為表裏者也東漢張衡變九章為九宫從一白二黑三碧四緑五黃六白七赤八白九紫分三元六甲以數作方而一白居坎二黑居坤三碧居震四緑居巽五黃居中六白居乾七赤居兌八白居艮九紫居離是為九宫靜則隨方而定動則依數而行體為地盤用為天盤坤二黑兌七赤乾六白乾六兌七艮八離九離九紫中五黃坎一白中五巽四緑震三碧艮八白巽四震三坤二坎一三元年九星入中宫康熙二十三年甲子為上元上元中元下元三元太嵗所在一白四緑七赤甲子癸酉壬午辛卯庚子己酉戊午九紫三碧六白乙丑甲戌癸未壬辰辛丑庚戌己未八白二黑五黃丙寅乙亥甲申癸巳壬寅辛亥庚申七赤一白四緑丁卯丙子乙酉甲午癸卯壬子辛酉六白九紫三碧戊辰丁丑丙戌乙未甲辰癸丑壬戌五黃八白二黑己巳戊寅丁亥丙申乙巳甲寅癸亥四緑七赤一白庚午己卯戊子丁酉丙午乙卯三碧六白九紫辛未庚辰巳丑戊戌丁未丙辰二黑五黃八白壬申辛巳庚寅巳亥戊申丁巳考原曰上元甲子中宫起一白中元甲子起四緑下元甲子起七赤三元一百八十年而一周蓋一百八十者以宫數九與花甲六十俱可以度盡也逐年逆轉如甲子年中宫起一白乙丑年中宫起九紫而其實甲子年一白在中宫乙丑年一白則在乾六故九紫在中宫似逆而實順也以其年所值星入中宫順布九宫如康熙二十三年甲子一白入中宫二黑在乾三碧在兌四緑在艮五黃在離六白在坎七赤在坤八白在震九紫在巽餘倣此三元月九星入中宫子午卯酉年辰戌丑未年寅申巳亥年正月八白正月五黃正月二黑二月七赤二月四緑二月一白三月六白三月三碧三月九紫四月五黃四月二黑四月八白五月四緑五月一白五月七赤六月三碧六月九紫六月六白七月二黑七月八白七月五黃八月一白八月七赤八月四緑九月九紫九月六白九月三碧十月八白十月五黃十月二黑十一月七赤十一月四緑十一月一白十二月六白十二月三碧十二月九紫考原曰甲子年正月中宫起八白蓋年前十一月甲子起一白十二月起九紫故本年正月起八白也三年而一周蓋三年三十有六月以月數十二與宫數九俱可以度盡也故以子午卯酉年為上元正月起八白辰戌丑未年為中元正月起五黃寅申巳亥年為下元正月起二黑逐月逆轉亦以其月所值星入中宫順布九宫與年九星同按遁甲之法冬至上元甲子起坎一乙丑坤二丙寅震三丁卯巽四戊辰中五己巳乾六庚午兌七辛未艮八壬申離九癸酉復坎一以次順數甲戌坤二甲申震三甲午巽四甲辰中五甲寅乾六至中元甲子則起兌七下元甲子則起巽四歷六甲復為上元甲子又起坎一此順行九宫者也九星之法上元甲子一白入中宫乙丑九紫丙寅八白丁卯七赤戊辰六白己巳五黃庚午四緑辛未三碧壬申二黑癸酉復一白以次逆數甲戌九紫甲申八白甲午七赤甲辰六白甲寅五黃中元甲子四緑下元甲子七赤歷六甲復為上元甲子又一白入中宫此逆行九宫者也究之九星亦係順行星順行而前則入中宫之星自逆轉而後修造之法以入中宫之星為主而順布於八宫故自上元甲子起一白逆行而得其年入中宫之星其實九星皆順行也考原之説得之至月九星以子午卯酉年為上元辰戌丑未年為中元寅申巳亥年為下元則其例亦是其法亦簡明而其義則不合蓋花甲一周方為一元三元既周方復為上元今上元甲子年嵗前十一月甲子一白入中宫十二月乙丑九紫入中宫正月丙寅八白入中宫固已而至次年乙丑又次年丙寅則各歷十有二月不得為一元再至次年丁卯共歷三十有六月其正月為壬寅花甲未滿一周尚不得為一元更不得復為上元也今按甲子年正月丙寅中宫八白是為上元以次逆數乙丑年正月戊寅五黃丙寅年正月庚寅二黑丁卯年正月壬寅八白戊辰年正月甲寅五黃至己巳年正月復為丙寅中宫乃得二黑是為中元甲戌年正月復為丙寅中宫乃得五黃是為下元至己卯年正月丙寅中宫又得八白復為上元如此則與竒門甲巳為符頭子午卯酉為上元寅申巳亥為中元辰戌丑未為下元之義合而其例則不如三年一周之為便故月九星入中宫之法仍用三年一周第不用三元之名而明其義如此庶義例兩得云通書曰天上三竒乙丙丁者出於貴人之干德遊行十二支辰以陽貴順行則乙德在丑丙德在寅丁德在卯三干之德相聨而無間斷以隂貴逆行則乙德在未丙德在午丁德在巳亦相聮而無間斷又以其隨貴人在天故謂之天上三竒能制煞發祥中宫坐向得之上官嫁娶入宅移居修造營葬並吉餘如戊己庚辛壬癸隨貴人所涉或間羅網或間天空皆不相聨也選擇宗鏡曰八節三竒從八節本宫起甲子陽遁順飛九宫隂遁逆飛九宫尋見本年太嵗泊何宫便於其宫起本年虎遁依八節順逆飛尋三竒分布取用如庚申年冬至節用事從坎一宫起甲子順飛九宫尋見太嵗庚申在震三宫乙庚年五虎遁得戊寅便從震三宫起戊寅亦順飛九宫乙酉在坎一丙戌在坤二丁亥在震三即庚申年冬至節乙竒在坎丙竒在坤丁竒在震也修作到山到方主進田産生貴子旺丁財按竒門以六甲為符使最忌庚金故用乙以合之用丙丁以制之選擇之用三竒蓋本諸此冬至屬坎宫用陽遁一局坎一起甲子立春屬艮宫用陽遁八局艮八起甲子春分屬震宫用陽遁三局震三起甲子立夏屬巽宫用陽遁四局巽四起甲子俱順飛九宫夏至屬離宫用隂遁九局離九起甲子立秋屬坤宫用隂遁二局坤二起甲子秋分屬兌宫用隂遁七局兌七起甲子立冬屬乾宫用隂遁六局乾六起甲子俱逆飛九宫此即時竒門法也至以太嵗所泊之宫起五虎遁則與竒門順布六儀逆布三竒之法不同而亦自有理宗鏡曰三竒當用竒門用八節三竒亦可則是古有此法也又按月神以月建入中官遇丙丁為火此自嵗建起虎遁遇丙丁為竒似乎兩相矛盾然各有取義而起例亦各不同且丙丁獨火本不為凶第忌廉貞打頭月遊諸火星逢之而火發丙丁二竒又取照蓋山向制尅金神而非用之以制火星則其義固並行而不相背也起例巡山羅㬋為太嵗前一位子年在癸丑年在艮寅年在甲卯年在乙辰年在巽巳年在丙午年在丁未年在坤申年在庚酉年在辛戌年在乾亥年在壬選擇宗鏡曰巡山羅㬋止忌立向開山修方不忌通書曰申子辰羅㬋乙巽辛寅午戌丁癸艮宫出巳酉丑丙壬乾作首亥卯未甲庚坤大忌注曰申年辛子年乙辰年巽寅年艮午年丁戌年癸巳年丙酉年乾丑年壬亥年庚卯年甲未年坤按起例巡山羅㬋為嵗前最近之方又為嵗君自本年至次年所巡行必經之地故立向避之以其為嵗前一位猶前星為太子次於嵗駕不敢抵向但又不敢斥言前星以為神煞名字而以佛子之名羅㬋當之故曰羅㬋也通書既論三合年分而其羅㬋所在之方與三合全無取義起例則申子辰年在庚癸巽寅午戌年在甲丁乾巳酉丑年在丙辛艮亥卯未年在壬乙坤皆成雙山三合五行甚為有理通書惟辰巳午未年與起例合其為傳寫之誤無疑也今依起例改正通書曰絶胎之間為伏兵胎養之間為大禍二者又為夾三煞坐向皆不宜如申子辰年伏兵在丙大禍在丁寅午戌年伏兵在壬大禍在癸則申子辰年坐丙丁為坐煞寅午戌年坐丙丁為向煞蓋坐丙則向壬坐丁則向癸也餘年倣此按選擇宗鏡曰太嵗可坐不可向三煞可向不可坐又曰三煞最凶伏兵大禍次之然則坐煞向煞特統同之論細分之則坐與向當有輕重之不同也見利用通書曰申子辰年在卯巳酉丑年在子寅午戌年在酉亥卯未年在午選擇宗鏡曰死方為六害為灸退此太嵗不足之氣也宜用三合局補之按灸退者三合死方也其名義不可曉術家又為六害又為飛天獨火大抵兼獨火死氣而取義耳夫六害獨火與灸退同行異名於義無取今刪去不用而其為太嵗不足之氣則出於三合自然之理故獨存之而名亦仍其舊云通書曰獨火一名飛禍又名六害即蓋山黃道內朱雀廉貞也修營動土犯之主災埋葬不忌按獨火與蓋山黃道同一起例如子年屬坎對宫為離即以離為本宫卦下一爻變為艮為廉貞故子年以艮為獨火也丑寅年皆屬艮對宫為坤即以坤為本宫卦下一爻變為震故丑寅年皆以震為獨火也餘年倣此又按蓋山黃道兼用納甲三合獨火則止用本卦通書曰獨火方遇丙丁飛弔其上其火方發無凶神併不妨然則本宫且不必忌矣納甲三合又為紆逺其不用也宜哉起例曰浮天空亡甲年離壬乙年坎癸丙年巽辛丁年震庚戊年坤乙巳年乾甲庚年兌丁辛年艮丙壬年乾甲癸年坤乙通書曰浮天空亡其例出於變卦納甲乃絶命破軍之位甲巳年在壬乙戊年在癸丙年在辛丁年在庚庚年在丁辛年在丙壬年在甲癸年在乙選擇宗鏡曰甲己辛年丙壬乙庚戊年丁癸丙癸年乙辛丁壬年庚甲山向並忌止忌向而不忌山非是按絶命破軍原係卦位故以年干納甲之卦為本宫取中爻變之卦為破軍所在如甲為乾卦所納則乾卦為甲年本宫中爻變為離卦離納壬故甲年以離壬為破軍也餘倣此推法見本原今通書止用干而遺卦是取末而舍本又以己年同於甲猶謂己與甲合至以戊年同於乙則更自不可解矣夫坎納戊離納己乃納甲本義二十四山無戊巳故離納壬坎納癸以八卦分納八干耳若年干戊己未有不以坎離為本宫而反統同於乾坤者也宗鏡並忌山向甚為有理而謂一年占兩方則益失本義蓋其襲誤久矣今從起例改正通書年神立成隂府太嵗甲己年艮巽乙庚年兌乾丙辛年坎坤丁壬年離戊癸年震又曰隂府太嵗惟忌開山營造修方不忌甲己年月日時屬土尅艮丙巽辛山乙庚年月日時屬金尅乾甲兌丁巳丑山丙辛年月日時屬水尅坎癸坤乙申辰山丁壬年月日時屬木尅離壬寅戌山戊癸年月日時屬火尅震庚亥未山起例曰正隂府甲己年艮巽乙庚年兌乾丙辛年坎坤丁壬年乾離戊癸年坤震傍隂府甲己年丙辛乙庚年丁壬丙辛年戊癸丁壬年甲己戊癸年乙庚隂府三合乙庚年己丑丙辛年申辰丁壬年寅戌戊癸年亥未按隂府太嵗乃本年之化氣尅山家之化氣開山忌嵗月日時尅坐山故名之曰太嵗示不可犯耳非另有隂府之太嵗在某山也如甲己年月日時化氣屬土土尅水而水乃丙辛合化之氣艮納丙巽納辛故甲己年以艮巽二山為正隂府丙辛二山為傍隂府乙庚年月日時化氣屬金金尅木而木乃丁壬合化之氣兌納丁乾納壬故以兌乾為正隂府丁壬為傍隂府餘倣此推然則卦之所由取皆從兩干合化而來通書丁壬年有離無乾戊癸年有震無坤無兩則不能化其為遺漏無疑又納甲之法乾納甲壬坤納乙癸坎納戊離納己選擇家以二十四山無戊己則以坎納癸以離納壬而乾坤専納甲乙子午卯酉四山不用卦而用支則以支之三合並納於一卦此乃二十四山納甲之法通書失隂府太嵗之本義而反即卦以配干乙庚年月丁壬訛丁甲是因乾専納甲而誤也丙辛年月戊癸訛乙癸是因坎納癸坤専納乙而誤也丁壬年少甲而已訛壬是因遺乾而遺又因離納壬而誤也戊癸年有庚無乙是因遺坤而遺也可見古人原止用卦後人以干附之又失納甲本義乃致多誤曰正曰傍諸説不一然卦從干來用干猶屬有理至於納甲三合與兩干合化全無干涉則又附會支離之尤甚而必不可從者今圖訂正庶曉然於作者之意又按十干化氣本諸素問逐年遞變洪範五行又推其意以為墓龍變運不取角軫而取墓庫不取干氣而取納音要亦逐年逐變者也隂府太嵗則不論年而論山甲山己山皆常屬土乙山庚山皆常屬金不待合而化不隨年而變此亦拘迂之甚矣且以甲山而論正五行則屬木洪範五行則屬水隂府五行則屬土墓龍變運則又屬火或又屬金行止有五而一山已占其四一年月日時而干支納音化氣又占其四求其不尅不亦難乎今臺官用卦不用干遵行已久姑存其舊用干雖屬有理然其義本非親切故亦不取也通書曰天官符忌修方申子辰年屬水水臨官在亥故以亥為天官符巳酉丑年屬金金臨官在申故以申為天官符寅午戌年屬火火臨官在巳故以巳為天官符亥卯未年屬木木臨官在寅故以寅為天官符按天官符為太嵗三合五行方旺之氣故修造避之與月家遊禍同義名曰天官符者五行質具於地而氣行於天三合固氣也通書曰天官符忌修方一年占一字選擇宗鏡曰申子辰年在亥巳酉丑年在申寅午戌年在巳亥卯未年在寅以月建入中宫順飛九宫遇本年天官符所占之字為本月天官符每宫占三位按月家飛宫天官符即本年天官符逐月飛弔之位如子年天官符在亥正月修作則以寅建入中宫順數復至中宫遇亥字即正月天官符在中宫若子年三月修作則以辰建入中宫順數至震三遇亥字震宫統甲震乙三位即三月天官符在甲震乙也又按二十四山四正位不用卦而用支飛宫又不用支而用卦者以卦可逐宫而數也餘倣此通書曰地官符忌修方一年占一字選擇宗鏡曰太嵗前五位為地官符以月建入中宫順飛九宫遇本年地官符所占之字為本月地官符每宫占三位按地官符義例巳見年神月家飛宫地官符即本年地官符逐月飛弔之位如子年地官符在辰正月修作則以寅建入中宫順數至兌七遇辰字兌宫統庚兌辛三位即正月地官符在庚兌辛也若子年二月修作則以卯建入中宫順數至乾六遇辰字乾宫統戌乾亥三位即二月地官符在戌乾亥也餘倣此通書曰打頭火忌修方寅午戌年在午亥卯未年在卯申子辰年在子巳酉丑年在酉蓋子午卯酉是本宫旺鄉飛宫犯之則凶選擇宗鏡曰打頭火即三合旺方又為金匱將星主火燭若疊太嵗尤凶蓋太旺則亢亢則屬火也其法以所用月建入中宫順飛九宫遇本年三合旺方為本月打頭火每宫占三位按打頭火即本年大煞逐月飛弔之位大煞義例巳見年神其逐月飛弔與天官符同法天官符為臨官大煞為帝旺其曰火者以其旺極為災亦猶災煞之又名天火耳打頭火名不雅馴又嫌多立名色易致失實故名曰飛大煞以存本義云通書曰小月建即小兒煞忌修方選擇宗鏡曰小月建忌占方然占山占向亦忌子寅辰午申戌為陽年正月起中宫丑卯巳未酉亥為隂年正月起離九俱順飛九宫如陽年正月起中宫二月在乾六三月在兌七隂年正月起離九二月在坎一三月在坤二是也每宫亦占三位按小月建即月建飛宫也修造最重太嵗次則月建故忌之其法以月建為陽建月厭為隂建陽年用正月陽建寅加中宫順行故正月在中五二月在乾六三月在兌七順飛九宫隂年用正月隂建戌加中宫順數至本月陽建故正月在離九二月在坎一三月在坤二亦順飛九宫厯家謂隂年起離九順飛九宫乃捷法也又按月神飛弔皆以月建入中宫此從月建起例已是飛宫故不又用飛弔大月建倣此通書曰大月建忌修方動土選擇宗鏡曰大月建係月家土煞占山占向占方占中宫皆不宜動土甲丁庚癸年正月起艮八乙戊辛年正月起中五丙己壬年正月起坤二逆行九宫按元經以上元甲子一白中元甲子四緑下元甲子七赤為太嵗一星子午卯酉年正月起八白辰戌丑未年正月起五黃寅申巳亥年正月起二黑為月建選擇宗鏡載嵗月建之法以太嵗尋月建以月建尋太嵗又載元經起例下元甲子年七赤為太嵗一星子年正月起八白為月建如六月修離方正月起八白二月七赤三月六白四月五黃五月四緑六月三碧則三碧為六月建即以三碧入中宫順尋七赤到離九即月太嵗一星在離凶由此觀之則太嵗即三元年九星入中宫之一星而月建即三元月九星入中宫之一星蓋九星順行六甲逆轉其年其月到某宫則其宫之星即入中宫而用事是其星乃太嵗月建之用神而其宫即太嵗月建之所在也今通書不用飛太嵗而用飛月建豈以月建較太嵗尤親切歟然其例當三年三十有六月而一周其義當十五年厯三元周而復始選擇宗鏡所載甲丁庚癸等年分雖亦皆隔三年但誤用天干起例則惟甲子至癸酉十年與元經合至甲戌年則不與癸酉年相輪而又自甲起不惟與太嵗相尋之例不合且與其月之九星俱相矛盾是蓋止據甲子至癸酉十年而撮其例遂致誤也今依元經改正子午卯酉年正月起艮八辰戌丑未年正月起中五寅申巳亥年正月起坤二逐月逆轉則其例與月九星及元經月建吻合而其義亦曉然矣又按小月建専用月支故曰小大月建兼用月干故曰大月建為土府故動土忌之然在山在方自以定位為重飛宫為輕選擇最重太嵗而未有用飛太嵗者則月建之輕重可以類推術士不明其義乃因其大小之名而謬為之説謂犯小月建則傷小兒犯大月建則傷宅長又别名小月建曰小兒煞舉世畏忌而不知其由惑世誣民不已甚乎通書曰丙丁獨火忌修方其法以月建入中宫飛弔得丙丁二字到方修作動土犯之凶按丙丁獨火乃諸火星之總要蓋取天干丙丁之氣照於其上為火之所由發也如甲巳年丙寅月修作則以丙寅入中宫順數丙在中五丁在乾六即正月丙丁獨火在中宫與乾宫也若丁卯月修作則以丁卯入中宫丁在中五戊在乾六以次順數丙又在中五即二月丙丁獨火在中宫也然必與年獨火飛大煞併方忌通書曰月遊火忌修方其煞與打頭火或年獨火併飛得丙丁二字同到方其災方發無凶神併不妨按月遊火即來年太嵗為進氣方旺之辰於二十四山則又在巡山羅㬋前一位去太嵗尚逺又為四利太陽本不為凶第以火未發先炎故取太嵗前一辰曰火月移一位故曰月遊然必與打頭火年獨火併又得丙丁同到而後為忌也如子年前一辰為丑丑年前一辰為寅丑寅皆屬艮故子丑年正月月遊火同在艮八二月在離九三月在坎一順行九宫寅年前一辰為卯卯屬震故寅年正月月遊火在震三二月在巽四三月在中五順行九宫是也餘倣此又按月遊火逐月順飛九宫不以月建入中宫與大小月建同義欽定協紀辨方書卷八
