body:
  text: 義例三天道天德月德天德合月德合月空天恩天赦天願母倉月恩四相時德王官守相民日四擊九空五墓四耗四廢四忌四窮八龍七鳥九虎六蛇九坎九焦五虛八風觸水龍寶義制專伐日八專無祿重日五合五離除神解神復日鳴吠日鳴吠對日乾坤寶典曰天道者天之元陽順理之方也其地宜興舉衆務向之上吉廣聖歷曰天道正月九月在南方二月在西南方三月七月在北方四月十二月在西方五月在西北方六月十月在東方八月在東北方十一月在東南方也考原曰按天道者天德所在之方也乾坤寶典曰天德者天之福德也所理之方所值之日可以興土功營宮室堪輿經曰天德者正月丁二月坤三月壬四月辛五月乾六月甲七月癸八月艮九月丙十月乙十一月巽十二月庚曹震圭曰四孟之月以隂干為天德者是天道惠其未生也正月丙火生而丁火未生四月庚金生而辛金未生七月壬水生而癸水未生十月甲木生而乙木未生故以隂干為德也四季之月以陽干為天德者是天道惠其自墓也三月壬水墓六月甲木墓九月丙火墓十二月庚金墓故以陽干為德也四仲之月以四維之卦為德者是天道變化成功也二月萬物將生致役乎坤也五月隂氣將生乾道變化也八月萬物將收成言乎艮也十一月隂氣散陽氣入巽入也風以散之也考原曰天德者三合之氣也如正五九月建寅午戌合火局故以火為德正月丁九月丙五月乾戌火墓在乾宫也二六十月建卯未亥合木局故以木為德六月甲十月乙二月坤未木墓在坤宮也三七十一月建辰申子合水局故以水為德三月壬七月癸十一月巽辰水墓在巽宮也四八十二月建巳酉丑合金局故以金為德四月辛十二月庚八月艮丑金墓在艮宮也寅申巳亥月乃五行長生之位故配隂干辰戌丑未乃五行墓庫之位故配陽干子午卯酉乃五行當王之位故以配墓辰本宮之卦不用支而用干者支地也干天也名曰天德故用天干又用四卦以代辰戌丑未者不用地支故也按月建皆支也斗柄運於天其所建者建於地所建者火則建之者亦火所建者水則建之者亦水必矣是故建寅午戌則建之者必丙丁乾矣建之者天也德者得也其所自得也地得寅午戌火則天必得丙丁乾火矣然必正丁五乾九丙者何也地以寅為火之生則天必丁為火之成矣地以戌為火之成則天必丙為火之所從生矣火生於日丙日也天火也丁火也地火也若五月之午則火之正位地居正位則天必居乾戌為火之終始天執其兩端而地乃得用其中焉餘可類推皆易天一地六之義也天德所在用之無不吉順天也又按淮南鴻烈解天文訓曰子午卯酉為二繩丑寅辰巳未申戌亥為四鉤東北為報德之維西南為背陽之維東南為常羊之維西北為蹄通之維斗指子則冬至加十五日指癸則小寒加十五日指丑則大寒加十五日指報德之維則越隂在地故曰距冬至四十五日而立春加十五日指寅則雨水加十五日指甲則雷驚蟄加十五日指卯中繩故曰春分則雷行加十五日指乙則清明風至加十五日指辰則穀雨加十五日指常羊之維則春分盡故曰又四十六日而立夏加十五日指巳則小滿加十五日指丙則芒種加十五日指午則陽氣極故曰又四十六日而夏至加十五日指丁則小暑加十五日指未則大暑加十五日指背陽之維則夏分盡故曰又四十六日而立秋加十五日指申則處暑加十五日指庚則白露降加十五日指酉中繩故曰秋分加十五日指辛則寒露加十五日指戌則霜降加十五日指蹄通之維則秋分盡故曰又四十六日而立冬加十五日指亥則小雪加十五日指壬則大雪加十五日又指子所謂報德之維常羊之維背陽之維蹄通之維者即艮巽坤乾也艮巽坤乾之維斗柄各指十五日不若震兌坎離之居卯酉子午統於十五日之中不别立分位也故天德方祗有艮巽坤乾而無震兌坎離者以此又按蠡海集曰術家取天德之法至子午卯酉月居於四卦之上每卦有二支人懷疑大抵天德不加於戊巳者天氣不親於土其子午卯酉之月只用巳亥寅申不用四墓矣又一說既不用四墓則五行之中土氣遂絶土其可絶乎蓋正用四墓爾春二月木墓未夏五月火墓戌秋八月金墓丑冬十一月水墓辰乃四行休墓于四季為德也是以古今術家兼取用焉况亥月用乙未月用甲則卯月必用未不用申無疑矣寅月丁戌月丙則午月在戌不在亥無疑矣蓋生月用隂墓月用陽旺月用墓餘倣此由今觀之蓋以天德取用以天干者八以卦位者四干卦不純故論說紛紛如此爾夫戊巳者中宮之位本無方也是故以其母家命之則曰巳未以其祿旺命之則曰巳午以其終萬物始萬物之義命之則曰罡魁以其生萬物成萬物之義命之則曰坤艮要之舉其一義而未舉其全如欲舉其全莫若參同契以戊巳為坎離虛中不用為得也夫不用者乃無適而不用凡十二月之天德皆戊巳也雖然四正方必尤著焉是故寓之於四維凡物之四維必通於心心立而後角乃見用角即所以用心凡乾坤艮巽云者即戊巳耳若夫長生墓庫云者十二支乃有之十干無也今天德既用十干則不應雜以十二支之義考原同王逵墓庫之說聊存以傳一解可也又按天道即是天德專言其方則曰天道兼日干與方向言之則曰天德其實一也又龍首經天道起例陽月用丑隂月用未加月建視天上甲庚所臨為天道與此不同别詳辨訛天寶歷曰月德者月之德神也取土修營宜向其方宴樂上官利用其日歷例曰月德者正五九月在丙二六十月在甲三七十一月在壬四八十二月在庚曹震圭曰月德者月中之陽德也故幹為尊枝為卑是臣求君德也以三合五行陽干為德假令寅午戌三合為火以丙為德是各求自旺之幹為應助也餘倣此按月隂也隂無德以陽之德為德其一乎陽者皆德也其二乎陽者皆慝也是故正五九火則以丙為德丙天上之火也天上之火地火之所稟也故寅午戌火月以丙為月德餘倣此推甲丙庚壬皆陽也陽者德也是以不用乙丁辛癸也然則天德何以有乙丁辛癸也曰從天而言之天秉陽故德宜陽而陽德宜隂而隂也從月而言之月秉隂故專以陽為德也然則何以無戊也曰三合只四行也土寄其中無適而非土也居中者用中生殺並施德刑互濟今專以德言之則當旺之一行為德自不得及乎土也土者地也無德之德是謂大德大德者必不德也天寶歷曰天德合者合德之神也所理之方宜營構宫室修築城垣所值之日宜覃恩肆赦命將出師禱禮山川祈請福願歷例曰天德合者正月壬三月丁四月丙六月巳七月戊九月辛十月庚十二月乙是也四仲之月天德居四維故無合也考原曰天德合者即各以其月天德所合之干為之按陽干為德者隂干為合隂干為德者陽干為合四維固無合矣然舉坤乾艮巽之維以為德則其近維即為合乾與艮合寅亥合也寅戌合也坤與巽合申巳合也申辰合也不言者以四維無十干則不得有其日然以方向論則乾為天德方艮即為天德合方巽為天德方坤即為天德合方可以三隅反者也此亦可備一義五行論曰月德合者五行之精符會為合也所理之地衆惡皆消所值之日百福並集利以出師命將上冊受封祠祀星辰營建宫室歷例曰月德合者正五九月在辛二六十月在巳三七十一月在丁四八十二月在乙考原曰月德合者即各以月德所合之干為之按甲丙壬庚為月德則巳辛丁乙為月德合矣月德與月德合無戊癸戊在巳為金母癸在丑為金墓酉為金之正位庚辛所不臨合之即巳酉丑全局也夫金者刑也德之反也巳酉丑謂之三煞又謂之破碎又謂之紅沙德合之外戊癸之方恰存金局隂陽之自然而然者其妙如此厯例曰寅午戌月壬亥卯未月庚申子辰月丙巳酉丑月甲天寶厯曰月中之陽辰也所理之日宜設籌謀陳計䇿厯神原始曰月德自南而東丙甲壬庚月空自北而西壬庚丙甲乃天德之衝神也而曰宜設籌謀陳計䇿者貴人之對名曰天空宜上書陳言故天空即奏書也此對月德之神亦名之以空而曰月空故利於上表章也按月德丙則月空壬則是凡為月空皆與月德為仇為敵者也何以名曰月空歟孟子曰仁者無敵凡月德之所在莫敢與為對而亦莫或與為敵則是方之神固有而不有者也故如十二神天空之例而以為奏書之神焉天寶歷曰天恩者施德寬下之辰也天有四禁常開一門甲為陽德配巳成養育之功故甲配子巳配卯酉各五日而為恩也萬物非土不生故以巳土配甲成功其日可以施恩賞布政事恤孤惸興宴樂歷例曰常以甲子至戊辰巳卯至癸未巳酉至癸丑凡一十五日曹震圭曰天有四禁子午卯酉也子為元武門午為明堂門卯為日門酉為月門蓋聖人居明堂而治天下故常開此門易所謂聖人南面聽天下嚮明而治者也甲為乾之納甲巳為離之納甲先天乾居正南後天離居正南故以甲配子巳配卯酉然則不配午者以甲巳皆南方卦之納甲也各進五辰而不及六者謂五為君位中央之數不可過也故各配五日合之成一十有五為天恩大吉日按十母皆天也十二子皆地也然就十母而分之則甲乙丙丁戊又屬天巳庚辛壬癸又屬地天地之心無往而非恩也然必有所見端焉其端維何曰天必以始而地必以中元善乾之所以統也黃中坤之所以大也天必以始故自甲子以至戊辰六十甲子之首五日為天恩地必以中故自巳卯至癸未巳酉至癸丑分六十而半之此十日者各居其中亦為天恩甲至戊天也巳至癸地也天五而地十者陽一而隂兩也不曰地恩而皆名天恩者地統于天也天寶歷曰天赦者赦過宥罪之辰也天之生育甲與戊地之成立子午寅申故以甲戊配成天赦其日可以緩刑獄雪寃枉施恩惠若與德神會合尤宜興造歷例曰春戊寅夏甲午秋戊申冬甲子是也曹震圭曰天赦者乃天之赦過宥罪之神也生萬物者土也土之所居者四季也助土而成功者甲巳也子午者隂陽氣爭之辰是其罪也寅申者隂陽否泰之辰是其過也至此四辰天道憫其罪過故以甲巳配合而助以赦之辰戌者陽土也以甲配之春起甲戌秋起甲辰丑未者隂土也以己配之夏起己丑冬起己未皆四時長生前一辰順數至當旺之陽辰是也考原曰天赦為赦過之辰則非以子午寅申為罪過也蓋子午寅申者乃四時當旺之陽辰甲戊於十干中為最尊所謂甲為諸神之首戊以助甲成功也故以配其日皆取干不克支有上能生下之意如戊寅木非土不生也甲午木生火也戊申土生金也甲子雖非相生若戊子則以土克水故以甲配之且甲木生於亥水亦生木也故曰天赦按歷神原始曰天有五緯歲星為仁而甲應之鎮星為德而戊應之仁德之神莫甲戊若也其說高於曹震圭逺矣史記天官書以木土為吉星又道家以甲戊日為祈禳所宜蓋其來久矣天赦與天恩義相似從六十甲子而論則有天恩十五日從四季而論則有天赦四日甲為十干之首戊為十干之中寅申為春秋之始子午為冬夏之中不以巳為中者巳則過中又隂干也故易曰已日乃革之言甲至戊則數窮而當變也不用卯酉者生物者春始之夏終之成物者秋始之冬終之始之者天也終之者地也春秋屬天故不用中而用始且卯酉亦隂支也用支之始則以干之中配之故春戊寅而秋戊申用支之中則以干之首配之故夏甲午而冬甲子是為天地合德之辰天地生心之所見端也之死而忽生之莫大於赦故以天赦名也施恩赦罪固宜用之然謂必天恩之日乃可施恩天赦之日乃可赦罪則亦拘論也夫賞之不可行罪之不可宥歟則固不得以日之為天恩天赦而曲法以從事也其恩之宜施罪之宜宥歟則如火之然如泉之達雖破敗休廢之日何擇焉安得擇此十九日而用之餘並屯其膏而不下耶總要歷曰天願者月中善神也所值之日宜嫁娶納財敦睦親族歷例曰天願者正月甲午二月甲戌三月乙酉四月丙子五月丁丑六月戊午七月甲寅八月丙辰九月辛卯十月戊辰十一月甲子十二月癸未曹震圭曰天願者乃月建枝德合神也陽前隂後五辰各以陽干配之四季月以隂干配之若遇四孟及丑未子午者無合蓋謂亥巳為隂陽終極之辰寅申為隂陽否泰之辰丑未為隂陽絶蔑之辰子午為陽消隂長之辰故不可為合也十干巳為六賊庚為白虎壬為元武故不可用也若逢忌用之辰以前後近者用之假令正月未為枝德今忌用取近未者午以王干甲配之得甲午也二月甲戌三月乙酉四月丙子五月忌亥退合丑就以丁配故得丁丑六月忌寅就午六合以戊配得戊午七月否建之辰忌丑就寅寅中有甲從其泰也八月忌庚用丙謂金生於己巳中有丙火也配得丙辰九月辛卯十月忌壬以戊之陽土能聚水潰土易有比卦之義故得戊辰十一月以其自建者謂前後皆無所配然建子之月未可假力於人其忌壬用甲者是待其子有所助也十二月忌申以就近申之未故得癸未其義如此按曹震圭之論支離難通不待辨而明矣於東不可則轉而之西于西不可又轉而之南之北陽干不可通則借隂干用之本位不可通則借下位用之然則神煞者乃聽人造作之物矣古人造作以愚今人今人解之又宛轉自道其造作之狀而號於天下曰當從我之造作以定吉凶雖三尺童子亦知不信矣考諸神煞起例乃知傳寫謬誤二十四字中誤十三字焉曹震圭不知其誤而曲為解展轉支離如韓昌黎狀侯劉與軒轅彌明聫句所謂口吻鳴益悲者也起例曰正月乙亥二月甲戌三月乙酉四月丙申五月丁未六月戊午七月己巳八月庚辰九月辛卯十月壬寅十一月癸丑十二月甲子十二辰皆太陽也其十干皆令星也唯十二月甲非令星而其為甲子其義最大蓋丑寅為艮終萬物始萬物丑月木巳甲於地中而太陽又適始於子故丑雖嵗終而實始萬物樞紐隂陽尤令星之大者也太陽日也天之所以生物者也令星時也天之所以成嵗者也太陽右旋令星左旋五氣順布四時行焉百物生焉天之願也天願之義大矣哉天寶歷曰母倉者五行當王所生者為母倉如遇土王後則以巳午為之其日宜飬育羣畜栽植種蒔歷例曰春亥子夏寅卯秋辰戌丑未冬申酉土王後巳午曹震圭曰生我者為母積藏者為倉故以名之各以生當時五行之辰為之考原曰春屬木水生之故以亥子為母倉也餘倣此不用干而用支者支為地有母道焉萬物生於土有藏道焉按母倉者種植畜牧納財等事之吉辰也春木以亥子為母木者亥子之所生水至木成則休矣母老則待養於子也故以倉為名又木生於水木之所以能旺於春者由水生之則木固由水而得養也故以母為名又我尅者為財而尅我之所由生者亦財也以母倉之辰而納財一以見藏于生我之方則其原不匱也一以見生我之方之宜致養焉以是為報本返始也一以見財者所以養人而多藏則尅我之所由生轉以為我害矣非所以為養也母倉之義大矣哉五行論曰月恩者陽建所生之干也子母相從謂之月恩其日宜營造婚姻移徙祭祀上官納財歷例曰月恩者正月丙二月丁三月庚四月巳五月戊六月辛七月壬八月癸九月庚十月乙十一月甲十二月辛曹震圭曰月恩者子母相從是月建反生於彼蓋母生我我生子之義歷神原始曰寅木生丙火卯木生丁火辰戌土生庚金丑未土生辛金巳火生巳土午火生戊土申金生壬水酉金生癸水子水生甲木亥水生乙木皆月建之所生故曰月恩也考原曰正月寅陽木生丙陽火二月卯隂木生丁隂火則各從其類也餘倣此按月恩者母倉之對待也母倉為義爻月恩為寶爻生令神之神母倉也有恩於本令者也月神所生之神月恩也有恩於彼神者也母倉為本月之母本月為月恩之母寅生丙即甲生丙也卯生丁即乙生丁也辰戌生庚即戊生庚也子平家謂之食神寅卯辰猶母也丙丁庚猶男子也從地支以生天干猶母之生子也故結婚姻則宜子營造上官無所不宜總要歷曰四相者四時王相之辰也其日宜修營起工養育生財栽植種蒔移徙逺行歷例曰春丙丁夏戊巳秋壬癸冬甲乙曹震圭曰四相者養育之道母生子也春木王生丙丁夏火王生戊巳秋金王生壬癸冬水王生甲乙惟庚辛者金也能殺萬物故不用按四相無庚辛此非人之所能為也木相本是火火相本是土金相本是水水相本是木五行之自然而然者也相者輔我者也此以知天之道任德不任刑也相者相君者也此以知臣之道導以德而不導以刑也總要歷曰四時天德者四序中德神也其日宜慶賜宴樂拜官賞賀歷例曰春午夏辰秋子冬寅曹震圭曰子寅辰午乃東方生育之陽辰故用事吉也申戌者西方之殺氣故不可用也各以四時所生之陽辰為之是我生者為德也亦名時德按時德與四相同義春木生午火夏火生辰土秋金生子水冬水生寅木也四相取天干時德取地支按子寅辰午申戌為六陽辰陽者德也時德所以取陽辰也分而言之春秋各二冬夏各一各以其時所生取之春木生火取午夏火生土取辰戌辰先戌後取辰秋金生水取子冬水生木取寅六取四而所餘者適秋令之二辰焉亦猶十干為四相而却餘庚辛二干不用皆自然而然非人之所能為也天心之以德不以刑豈日者強為說哉壇經曰王官相民守日者皆月內視事之吉辰也所值之日宜命將登壇襲爵受封上官赴任臨政親民歷例曰王日者春寅夏巳秋申冬亥今易為官日官日者春卯夏午秋酉冬子今易為王日相日者春巳夏申秋亥冬寅民日者春午夏酉秋子冬卯守日者春酉夏子秋卯冬午曹震圭曰王日者四時正王之辰四正之位帝王之象故得其政治也官日者四時臨官之辰諸侯之象相日者四時官日所生也相氣之辰宰相之象民日者四時死絶之辰庶民之象守日者四時胎絶之辰無氣能自固守以待將來各取其義以為名也按此以春夏秋冬取令星王相以為吉辰也王日天子所用日官日臣下所用日守日封疆之臣所用日相日貴近之臣所用日民日百姓所用日五日之外歷家又以未戌丑辰為四序獄日申亥巳寅為四序𨽻日酉子卯午為四序牢日戌丑辰未為四序死别日亥寅巳申為四序伏罪日子卯午酉為四序大敗日又曰不舉日丑辰未戌為四序罪刑日又曰刑獄日蓋獄日為四序之墓辰餘並休囚死辰云耳後人以王官守相民日有吉無凶而十二辰未遍也于是一一區而别之而命以名又勢必不能確切也于是重出疊見支離覆逆而不可信據矣然神煞雖增七類而别無所宜不過一例忌用則止存原定五辰而餘並勿用可耳何必多其辭說以惑世哉今悉刪去至王日向為寅巳申亥官日向為卯午酉子後人兩易其位蓋以寅為春木之臨官而卯為春木之帝旺也然細繹其理不如舊說為高蓋寅為陽木之臨官卯為隂木之臨官五行之性臨官吉於帝旺以其中也君用陽而臣用隂又易之道也帝居帝位官居官位皆臨官也不必帝用帝旺官用臨官然後為得且使隂陽易位轉為失也至於春辰夏未秋戌冬丑者四序當王之土神也故曰守日守封疆之臣用之春巳夏申秋亥冬寅四序之相氣則自元子以下王侯卿相通用之吉辰也夫春旺木而生火則午為正令夏旺土而生金則酉為正令相宜以午酉子卯而以午酉子卯為民日而不曰相者何也巳陽火陽土也申陽金也亥陽水也寅陽木也故為相也午隂火隂土也酉隂金也子隂水也卯隂木也故為民也臣陽而民隂猶王陽而官隂也抑更有進焉相之為相也為王之所生固已然已有金申有水亥有木寅有火不專一行其吉凶未定也書曰惟吉凶不僣在人惟天降災祥在德其吉凶未定正與富貴相似用其日者適順乎天之道而致警於人之心也若夫午酉子卯則專火專金專水專木為四序當令之真子吉莫大焉故為民日民得全吉則王官相守皆得全吉也而曹震圭以四時死絶之辰為庶民之象最為無理夫人心之惡雖桀紂盜跖未必欲庶民之死絶也且衆庶馮生故曰庶民雖一晝一夜萬生萬死而終古無死絶者乃庶民也安得有死絶之象耶其荒謬至於如此又按歷例以春酉夏子秋卯冬午為守日以春辰夏未秋戌冬丑為牢日邵泰衢作歷神原始謂守與牢二字相近而訛易之則吉凶各以類聚且與五勝義恰符甚為有理今從之通書曰四擊者春戌夏丑秋辰冬未其日忌軍事考原曰四擊者四時所衝之墓辰也如春月建寅卯辰辰與戌衝故戌為四擊也餘倣此按四季以土旺為守日四擊其衝也春土旺於辰而戌擊之夏土旺於未而丑擊之秋冬亦然故其日忌出軍防邊等事廣聖歷曰九空者月內殺神也其日忌修造倉庫出入貨財歷例曰九空者正月在辰逆行四季曹震圭曰九空者墓庫破散之神也庫破則空衝則散假令寅午戌月火庫在戌辰能衝散也亥卯未月木墓在未丑能衝散也申子辰月水墓在辰戌能衝散也巳酉丑月金墓在丑未能衝散也今歷家所傳與九坎九焦同行者非蓋所傳有誤紀嵗歷亦止是逆行四季廣聖歷曰五墓者四旺之墓辰也其日忌營造起土嫁娶出軍歷例曰五墓者正二月乙未四五月丙戌七八月辛丑十月十一月壬辰四季月戊辰也曹震圭曰五墓者五行旺干自臨墓辰也十干者身之象若營造起土似臨於無氣之位也又以干為夫之象若嫁娶則夫自臨死氣之位也又以干為我若出軍征伐是自臨死墓之地也故忌之假如正二月木旺木墓於未加以乙未是自臨墓辰也餘倣此總聖歷曰四耗者謂四時休干臨分至之辰也其日忌㑹親姻出師開倉庫施債負歷例曰春壬子夏乙卯秋戊午冬辛酉曹震圭曰物之將分者必散也至者盡也是隂陽數盡而將分也又得休干臨之故曰耗考原曰四耗日固是休干亦休支也春壬子幹枝皆水夏乙卯幹枝皆木冬辛酉幹枝皆金秋戊午幹土而枝火洞源經云火不尅金何旺土生金火亦生金也蓋春木旺則水耗夏火旺則木耗秋金旺則火土耗冬水旺則金耗故曰四耗廣聖歷曰四廢者四時衰謝之辰也其日忌出軍征伐造舍迎親封建拜官納財開市歷例曰春庚申辛酉夏壬子癸亥秋甲寅乙卯冬丙午丁巳蓬瀛經曰四廢者是五行無氣福德不臨之辰百事忌用曹震圭曰四廢者干支俱絶也假令庚申辛酉絶於春寅卯辰也他倣此神煞起例曰四忌春甲子夏丙子秋庚子冬壬子合四窮日即為八龍七鳥九虎六蛇總要歷曰四窮者謂亥為隂絶之辰以四時旺干臨之故曰四窮所值之日不可逺行征伐出納財物歷例曰春乙亥夏丁亥秋辛亥冬癸亥曹震圭曰亥者地支末辰極隂之位以四時隂干配之故曰四窮總要歷曰八龍七鳥九虎六蛇其日皆不可迎婚嫁娶歷例曰春甲子乙亥為八龍夏丙子丁亥為七鳥秋庚子辛亥為九虎冬壬子癸亥為六蛇曹震圭曰亥者隂氣之極子者陽氣初生是隂陽氣絶脫謝之辰也十干象夫十二支象婦今以四時旺干而配亥子是夫旺而婦絶且我臨於絶地也故用忌之考原曰甲乙者東方木也為青龍其成數八丙丁者南方火也為朱雀其成數七庚辛者西方金也為白虎其成數九壬癸者北方水也為龜蛇其成數六故各因以為名也按四耗日干支皆休氣也四廢日干支皆死氣也四忌日以本令陽干加於辰首也四窮日以本令隂干加於辰尾也夫休死固非吉辰矣本令陽干加子本令隂干加亥何以亦凶耶曰易之道天德不可為首今以陽干而居辰首是為首也地道無成今以隂干而居辰尾是有成也皆以其旺極而為凶非衰謝之義也其八龍七鳥九虎六蛇義亦本此蓋春甲子乙亥合之則是春之陽干據其首春之隂干據其尾全備而無遺矣故曰八龍八者春之數也龍者春之獸也猶言全春之數盡在是也易曰積善之家必有餘慶天地循環不窮萬化日新皆由氣盈朔虛而出無餘者非天道也故忌之廣聖歷曰九坎者月中殺神也其日忌乘船渡水修堤防築垣墻苫蓋屋舍歷例曰九坎者正月在辰逆行四季五月在卯逆行四仲九月在寅逆行四孟曹震圭曰坎者陷也險也不平也義與九焦同廣聖歷曰九焦者月中殺神也其日忌爐冶鑄造種植修築園圃歷例曰正月在辰逆行四季五月在卯逆行四仲九月在寅逆行四孟曹震圭曰九坎九焦者是月中之殺神逆天地之道者也假令正二三四為嵗首東方之位當用孟辰以生萬物今則以季辰收殺萬物是其逆也五六七八為嵗中今雖用仲辰成熟萬物然嵗首不與其生焉有成熟哉九十十一十二月為嵗之終萬物收藏之時今方欲以孟辰生育萬物豈能有生育哉是逆天地之道萬物無能成就也按寅午戌火月逆行辰卯寅亥卯未木月逆行丑子亥申子辰水月逆行戌酉申巳酉丑金月逆行未午巳火逆於木則火成燎原木逆於水則木多沉溺水逆於金則水多搏激金逆於火則金多爍銷故曰九坎曰九焦然從水火以命二名故歷家止忌乘船鼓鑄栽種等事義無大害今從之樞要厯曰五虛者四時絶辰也其日忌開倉庫營種蒔出財寶施債負厯例曰五虛者春巳酉丑夏申子辰秋亥卯未冬寅午戌也曹震圭曰五虛者四時逢絶之辰也物絶則損朽其中虛而無實也故曰虛如春木旺巳酉丑金絶也夏火旺申子辰水絶也秋金旺亥卯未木絶也冬水旺寅午戌火絶也樞要歷曰咸池招搖八風觸水龍所值之日忌乘船渡水涉江河歷例曰八風者春丁丑巳酉夏甲申甲辰秋辛未丁未冬甲戌甲寅觸水龍者丙子癸丑癸未也曹震圭曰八風者是八節八卦之風也各以四立之建後一辰為四立之風以其三合前辰為次節風如立夏建巳以辰為立夏風申為三合前辰為夏至風是也假令立春建寅以建前丑為正風以丁配之取溫和之意也以酉為傍風配之以巳取巳土長生之地也立夏建巳以辰為正風申為傍風皆以甲配之者立夏之後風勢極微故配甲以生之也立秋建申以未為正風而不取傍風者謂秋氣好殺而無養育之性以辛配之取金風之象又以丁配之存其溫和之氣也立冬建亥以戌為正風寅為傍風皆以甲配之者以風鳴冬其勢極大配之以甲木以生風也共為八節故曰八風觸水龍者觸犯也龍水物也壬癸亥子水也能與水相勝者火土也火在上為丙土居下為四季辰乃龍之正位壬水所居戌亥為乾天之位有龍象焉故惟餘丙子癸未癸丑為觸水龍日也按靈樞經曰一者天二者地三者人四者時五者音六者律七者星八者風九者野又曰冬至之日太一立於叶蟄之宫風從南方來為虛風賊傷人者也立春之日風從西方來萬民又皆中於虛風由此觀之八風之義其本諸此乎春丁丑丁巳夏甲申甲辰秋丁未丁亥冬甲戌甲寅己丑之於春也即五虛巳酉丑而去其正位之酉也申辰之於夏也即五虛申子辰而去其正位之子也秋冬可推蓋正風猶可而邪風更凶也其以丁甲者木為風風又出於火也觸水龍者水之伐日也龍水族之長子為水宫癸即子也干為水而支伐之與支為水而干為支之所伐皆猶觸水中之龍也招搖即六儀六儀即天罡隂建之衝也咸池五行沐浴之地也圖並見前故不著觸水龍不論四時皆忌此三日故不圖涉江並忌故比而陳之而咸池招搖不嫌重見者别著一義故也淮南子曰子生母曰義母生子曰寶子母相得曰專母勝子曰制子勝母曰困以制擊殺勝而無報以專從事而有功以義行理名立而不墮以寶畜養萬物蕃昌以困舉事破滅死亡遁甲經曰寶日者幹生枝也義日者枝生幹也制日者幹克枝也其日利行軍伐日者支克干辰也其日忌攻討征伐出軍掠地專日者干支五行相同也其日忌出軍歷例曰寶日者丁未丁丑丙戌甲午庚子壬寅癸卯乙巳戊申己酉辛亥丙辰義日者甲子丙寅丁卯己巳辛未壬申癸酉乙亥庚辰辛丑庚戌戊午制日者乙丑甲戌壬午戊子庚寅辛卯癸巳乙未丙申丁酉己亥甲辰伐日者庚午辛巳丙子戊寅己卯癸未癸丑甲申乙酉丁亥壬辰壬戌也專日者甲寅乙卯丁巳丙午庚申辛酉癸亥壬子戊辰戊戌己丑己未曹震圭曰幹生枝者得其天時也枝生幹者得其地利也幹克枝者得其人和我可制彼也故幹為天為我枝為地為彼也伐者彼伐於我也干為尊為我支為卑為彼是卑伐於尊彼尅於我其義逆也今幹枝同類是彼我同德兩勢相敵不分勝負故忌出軍考原曰專日亦名和日按淮南以專日為吉謂以專從事則有功而遁甲則以專日為凶今按專日所忌止在行軍其他固當從淮南並以吉日論曾門經曰八專日忌出軍嫁娶丁未己未庚申甲寅癸丑也按八專而止五日者十干所寄止於八支不居子午卯酉而此八支之中六甲循環干支相見則曰八專也忌出軍者彼己同位則交綏也忌嫁娶者隂陽同居則無别也通書云甲辰乙巳庚辰辛巳丙申戊戌丁亥己丑壬申癸亥此十日祿皆落空故云無祿如甲祿在寅乙祿在卯甲辰旬寅卯空故甲辰乙巳為無祿也庚祿在申辛祿在酉甲戌旬申酉空故庚辰辛巳為無祿也丙戊祿在巳甲午旬巳空故丙申戊戌為無祿也丁巳祿在午甲申旬午空故丁亥己丑為無祿也壬祿在亥甲子旬亥空故壬申為無祿也癸祿在子甲寅旬子空故癸亥為無祿也此十日名曰無祿日又曰十惡大敗日然惟隨各年及本命避之如庚戌年及庚戌生人忌用甲辰之類是也按無祿日乃祿陷旬空故以為忌然六壬火珠林之法填實則不空非不論年月而概以此十日為祿空也如甲辰日寅祿落空若太嵗月建太陽在寅則不為空而此年月之甲辰日即不為無祿日矣餘日倣此術士盲於理不問年月而概忌之固拘滯不可通又謂惟對衝之年及對衝本命人忌用其日則又曲為通融而悖謬不可解者也天寶歷曰重日者以隂陽混合於亥陽起於甲子而順隂起於甲戌而逆至己亥而同故曰重日其日忌為凶事利為吉事歷例曰重日者己亥二日也曹震圭曰亥為隂極之位坤辟在焉巳為陽極之位乾辟在焉是陽中陽而隂中隂也故曰重其日忌為凶事者恐重犯也利為吉事者宜再見也五合樞要歷曰五合者月內良日也其日宜結婚姻㑹親友立劵交易歷例曰五合者寅卯日也曹震圭曰十干者夫之象十二支者婦之象今自子為始以甲相配至酉而止不及戌亥然戌能進五辰配寅中之甲亥能進前五辰配卯中之乙而成夫婦㑹合之禮故曰五合若其他則進五無所配也雖有辰配申中之庚巳配酉中之辛而申酉反為五離者易曰一隂一陽之謂道雜則相乖合則暌離也故曰五離按歷例五合者寅卯日也而曹震圭以戌亥為言未詳其義今按漢書曰甲寅無子言甲寅旬中無子丑也然則寅卯之為五合日者以寅配甲卯配乙而六甲乃成有貞下起元之義則使五位相得而各有合者寅卯也故曰五合反此則為申酉六十甲子至戌亥而絶則未絶而離者乃申酉矣若以四時言之寅卯為春和㑹之氣也故為五合申酉為秋清肅之氣也故宜解除五離除神樞要歷曰五離者月中離神也其日忌結婚姻㑹親友作交關立契劵歷例曰五離者申酉日是也曹震圭曰五離者是隂陽重㑹之辰再合則離也考原曰按通書以申酉日為除神與五合對衝之日也宜沐浴祓除災眚按日神不從年月天干起義者唯此三條故并為一圖總要歷曰解神者月中善神也所值之日宜上詞章雪寃枉歷例曰正二月申三四月戌五六月子七八月寅九十月辰十一月十二月午也曹震圭曰解神者月中奏對直諫之臣也常居與月建相對之陽辰與太嵗中奏書一義蓋忠直之臣不處私隂之位也按隂陽之性非衝不解而解神於六陽辰即用衝神於六隂辰則不用衝神而即用陽辰之衝神者何也陽者德也衝之而即解所為如日月之食者也隂者慝也衝之即慝作矣然而隂非無陽者也必衝其陽則慝亦解動其固有之德也雖然不可徑衝其本位也為臣者知此得進諌之方焉為君者知此得受諫之道焉故曹震圭比之奏書也天寶歷曰復日者為魁罡所繫之辰也其日忌為凶事利為吉事歷例曰復日者正七月甲庚二八月乙辛四十月丙壬五十一月丁癸三九六十二月戊巳日也曹震圭曰復者重見也為本建之辰與所遇之干同也假令正月寅即甲也而又見甲是復也又如辰戌即戊也丑未即巳也而又見戊巳是復也餘倣此地理新書云正月甲七月庚二月乙八月辛四月丙十月壬五月丁十一月癸三月九月戊六月十二月巳按建寅而得甲日則是月與日同也為凶事之所忌者蓋猶忌月建之義然干與支不可同日語矣俗則以為犯此則致重喪益無是理選擇宗鏡載古人葬課多用建日又曰正月甲日二月乙日得令得祿最吉三月戊日雖不得祿而實得令次吉然則復日之忌固不可從而世俗相傳已久今定為鳴吠遇復日則忌德赦六合遇復日則不忌庶存其名不害於義云一行云鳴吠者五性安葬之辰也用之者得金雞鳴玉犬吠上下相呼亡靈安穩子孫富昌鳴吠日者庚午壬申癸酉壬午甲申乙酉庚寅丙申丁酉壬寅丙午己酉庚申辛酉也歷事明原曰金雞者兌也兌宫酉也玉犬者艮也艮為犬也大抵外宅之要在山澤地勢是坤艮兌也故以坤兌往來加艮順布八卦視艮所臨之辰為良也如兌加艮則艮臨離午也又以離加艮則艮臨兌酉也又以坤加艮則艮臨坤未申也又以艮自加艮丑寅也丑未二辰乃墓絶無氣之位故不可用又十干之中戊為陽土以配中宮明堂之位不可用也甲午甲寅丙寅者乃自死自旺自生之日故不用止餘一十四日為鳴吠吉日也一行經云鳴吠對日者用之破土斬草也鳴吠對日者丙寅丁卯丙子辛卯甲午庚子癸卯壬子甲寅乙卯也考原曰按鳴吠對者乃與鳴吠對衝之日其己丑日無對衝庚寅與甲申壬寅與丙申又互為對衝故止餘九日今取十日者蓋甲午日雖不用為鳴吠然其對衝庚子可用為鳴吠對也若甲寅之對庚申丙寅之對壬申則鳴吠日中巳用之矣惟甲午疑應作甲子蓋甲子本與庚午對衝且既用庚子不宜并用甲午也恐傳者有誤神煞起例曰金雞鳴玉犬吠並鳴吠對日相傳始於郭公而定於邵子舉世用之大葬日曰金雞鳴玉犬吠小葬日曰鳴吠對試問何為金雞玉犬何為對則莫知所由來矣蓋生人之禮屬於陽葬者藏也則屬於隂夫人身有生死一世之隂陽也四序有春秋一嵗之隂陽也十二時有晝夜一日之隂陽也陽取乎陽隂取乎隂各從其類道本自然耳時日之隂陽分於日之出沒日出東方為陽生人之事也日入西方為隂送終之事也金雞者酉為日入之門玉犬者戌為閉物之㑹然埋藏於土而不敢犯土凡支干屬土者如戊巳名都天辰戌丑未名大墓皆所不宜故不用戌而用酉溯酉而上至午而止午乃一隂之始過午而巳則六陽之卦矣用五酉以為主巳隂土屬酉故亦不忌是謂金雞也申去戊而用四申越未而午亦去戊而用四午共為大葬之十三日謂之鳴吠者以此次酉之對為卯則去巳而用四卯以别於酉也申之對為寅亦去戊而用四寅午之對為子亦去戊子不用至於甲乃十干之長純陽也故亦不用而用三子共為小葬之十一日謂之鳴吠對者以此亥為巳之對故亦不用云又星命之術數人生時遇卯安命取東方出地之義而中陽子葬埋克擇則遇酉安命亦取西方入地之義豈非用酉之一證耶其餘因金雞而多張名目則術家巧飾耳目之為不足深究矣立成一隂生日庚午壬午甲午丙午戊午不用鳴吠日未土不用用申日壬申甲申丙申戊申不用庚申癸酉乙酉丁酉己酉辛酉五戌屬土不用不用不用不用不用不用甲戌丙戌戊戌庚戌壬戌酉對日癸卯乙卯丁卯己卯不用辛卯鳴吠對日丑土不用用申對日壬寅甲寅丙寅戊寅不用庚寅隂生日對日庚子壬子不用甲子丙子戊子不用按通書安葬用庚寅壬寅丙午庚午壬午甲申丙申庚申壬申乙酉丁酉己酉辛酉癸酉十四日為鳴吠日啓攢用丙子庚子壬子甲寅丙寅乙卯丁卯辛卯癸卯甲午十日為鳴吠對日相傳始自郭璞謂之金雞鳴玉犬吠日而不知其所由明原曲為之解而不能通考原疑其有誤而未之定今按神煞起例之語於理為安庶幾可信其法以甲丙庚壬四干配午申得八日避戊土不用以乙丁巳辛癸五干配酉得五日避未土不用共十三日為鳴吠日巳為隂土生於酉故配酉而不避也又以丙庚壬三干配子得三日避戊土不用甲配子為純陽亦避不用以甲丙庚壬四干配寅得四日避戊不用以乙丁辛癸四干配卯得四日避巳不用共十一日為鳴吠對日通共二十四日通書誤以庚寅壬寅為鳴吠甲午為鳴吠對遂不可解今圖依起例改正又按起例以戌為土不用而止用酉則止有金雞鳴而無玉犬吠矣何以為鳴吠耶曰一行之言金雞鳴玉犬吠上下相呼亡靈安穩人之葬也歸骨於土戌為終萬物之地至亥則又為始矣故亥曰登明然則戌者指葬地而非指葬日也言擇日必以酉為主則是金雞鳴於上而地下之玉犬與之吠應上下相呼而亡靈安穩矣酉辛也然辛不居酉而居戌辛金也玉金之精也故有金雞玉犬之號人事行於地上魂魄安於地下正以地上之金雞呼地下之玉犬而非並用雞日犬日之謂也欽定協紀辨方書卷五
