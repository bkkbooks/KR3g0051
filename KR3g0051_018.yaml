body:
  text: 年表六甲寅至癸亥太歲甲寅幹木枝木納音屬水開山立向修方吉歲德甲歲德合巳歲枝德未陽貴人未隂貴人丑歲祿寅歲馬申奏書艮博士坤三元紫白上元一白坎六白乾八白艮九紫離中元一白兌六白震八白中九紫乾下元一白巽六白離八白坤九紫震蓋山黃道貪狼艮丙巨門巽辛武曲兌丁己丑文曲離壬寅戌通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后辛戌功曹壬子天罡艮寅勝光乙辰𫝊送丙午河魁坤申十二吉山宜寅午戌申子辰年月日時四利三元太陽卯太隂巳龍德酉福德亥開山立向修方凶太歲寅歲破申三煞亥子丑坐煞向煞壬癸丙丁浮天空亡離壬開山凶年剋山家離壬丙乙山隂府太歲艮巽六害巳死符未灸退酉立向凶巡山羅㬋甲病符丑修方凶天官符巳地官符午大煞午大將軍子力士巽蠶室乾蠶官戌蠶命亥歲刑巳黃􅜖戌豹尾辰飛亷戌喪門辰弔客子白虎戊金神午未申酉獨火震五鬼寅破敗五鬼巽開山立向修方吉太歲乙卯幹木枝木納音屬水開山立向修方吉歲德庚歲德合乙歲枝德申陽貴人申隂貴人子歲祿卯歲馬巳奏書艮博士坤三元紫白上元一白坤六白兌八白離九紫坎中元一白艮六白巽八白乾九紫兌下元一白中六白坎八白震九紫巽蓋山黃道貪狼乾甲巨門離壬寅戌武曲坤乙文曲巽辛通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十二吉山宜亥卯未巳酉丑年月日時走馬六壬神后庚酉功曹乾亥天罡癸丑勝光甲卯𫝊送巽巳河魁丁未十二吉山宜亥卯未巳酉丑年月日時四利三元太陽辰太隂午龍德戌福德子開山立向修方凶太歲卯歲破酉三煞申酉戌坐煞向煞庚辛甲乙浮天空亡坎癸開山凶年剋山家二十四山並無剋冬至後剋乾亥兌丁山隂府太歲兌乾六害辰死符申灸退午立向凶巡山羅㬋乙病符寅修方凶天官符寅地官符未大煞卯大將軍子力士巽蠶室乾蠶官戌蠶命亥歲刑子黃幡未豹尾丑飛亷巳喪門巳弔客丑白虎亥金神辰巳獨火坎五鬼丑破敗五鬼艮開山立向修方吉太歲丙辰幹火枝土納音屬土開山立向修方吉歲德丙歲德合辛歲枝德酉陽貴人酉隂貴人亥歲祿巳歲馬寅奏書艮博士坤三元紫白上元一白震六白艮八白坎九紫坤中元一白離六白中八白兌九紫艮下元一白乾六白坤八白巽九紫中蓋山黃道貪狼兌丁巳丑巨門震庚亥未武曲艮丙文曲坎癸申辰通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后坤申功曹辛戌天罡壬子勝光艮寅𫝊送乙辰河魁丙午十二吉山宜申子辰寅午戌年月日時四利三元太陽巳太隂未龍德亥福德丑開山立向修方凶太歲辰歲破戌三煞巳午未坐煞向煞丙丁壬癸浮天空亡巽辛開山凶年尅山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太歲坎坤六害卯死符酉灸退卯立向凶巡山羅㬋巽病符卯修方凶天官符亥地官符申大煞子大將軍子力士巽蠶室乾蠶官戌蠶命亥歲刑辰黃􅜖辰豹尾戌飛亷午喪門午弔客寅白虎子金神寅卯午未子丑獨火巽五鬼子破敗五鬼坤開山立向修方吉太歲丁巳幹火枝火納音屬土開山立向修方吉歲德壬歲德合丁歲枝德戌陽貴人亥隂貴人酉歲祿午歲馬亥奏書巽博士乾三元紫白上元一白巽六白離八白坤九紫震中元一白坎六白乾八白艮九紫離下元一白兌六白震八白中九紫乾蓋山黃道貪狼兌丁己丑巨門震庚亥未武曲艮丙文曲坎癸申辰通天竅三合前方乾亥壬子癸丑三合後方巽巳丙午丁未十二吉山宜己酉丑亥卯未年月日時走馬六壬神后丁未功曹庚酉天罡乾亥勝光癸丑𫝊送甲卯河魁巽巳十二吉山宜己酉丑亥卯未年月日時四利三元太陽午太隂申龍德子福德寅開山立向修方凶太歲巳歲破亥三煞寅卯辰坐煞向煞甲乙庚辛浮天空亡震庚開山凶年剋山家震艮巳山隂府太歲乾離六害寅死符戌灸退子立向凶巡山羅㬋丙病符辰修方凶天官符申地官符酉大煞酉大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑申黃􅜖丑豹尾未飛亷未喪門未弔客卯白虎丑金神寅卯戌亥獨火巽五鬼亥破敗五鬼震開山立向修方吉太歲戊午幹土枝火納音屬火開山立向修方吉歲德戊歲德合癸歲枝德亥陽貴人丑隂貴人未歲祿巳歲馬申奏書巽博士乾三元紫白上元一白中六白坎八白震九紫巽中元一白坤六白兌八白離九紫坎下元一白艮六白巽八白乾九紫兌蓋山黃道貪狼巽辛巨門艮丙武曲震庚亥未文曲乾甲通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后丙午功曹坤申天罡辛戌勝光壬子𫝊送艮寅河魁乙辰十二吉山宜寅午戌申子辰年月日時四利三元太陽未太隂酉龍德丑福德卯開山立向修方凶太歲午歲破子三煞亥子丑坐煞向煞壬癸丙丁浮天空亡坤乙開山凶年剋山家二十四山並無剋冬至後剋乾亥兌丁山隂府太歲坤震六害丑死符亥灸退酉立向凶巡山羅㬋丁病符巳修方凶天官符巳地官符戌大煞午大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑午黃幡戌豹尾辰飛亷寅喪門申弔客辰白虎寅金神申酉子丑獨火兌五鬼戌破敗五鬼離開山立向修方吉太歲己未幹土枝土納音屬火開山立向修方吉歲德甲歲德合巳歲枝德子陽貴人子隂貴人申歲祿午歲馬巳奏書巽博士乾三元紫白上元一白乾六白坤八白巽九紫中中元一白震六白艮八白坎九紫坤下元一白離六白中八白兌九紫艮蓋山黃道貪狼坤乙巨門坎癸申辰武曲乾甲文曲震庚亥未通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十