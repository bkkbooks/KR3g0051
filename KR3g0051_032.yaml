  - {type: page-break, offset: 0, content: '', id: KR3g0051_WYG_032-1a, image: WYG0811/WYG0811-0883a.png}
body:
  text: 利用一選擇之道有體有用龍山方向之一定者體也年月日時之無定者用也補龍扶山制凶助吉以無定而合有定者用之體也弔替飛宫合局相主以無定而合無定者用之用也錯綜參伍精義入神庶足前民而利用矣作利用選擇要論楊筠松造命歌疑龍經論造𦵏論正五行生旺取用論補龍論扶山論立向論相主論開山立向與修山修向不同論修方論修方兼山向及中宫論用盤針羅經圖定方隅法選擇要論選擇宗鏡曰楊筠松曰年月要妙少人知年月無如造命法吴景鸞曰選擇之法莫如造命體用之妙可奪神工郭景純曰天光下臨地徳上載藏神合朔神迎鬼避此十六字至精至㣲即造命體用之謂也葢藏神者收藏地中元神也其法選成四柱八字支干純粹成格成局扵以扶補龍氣則地脉旺盛而上騰於墳宅之中所謂藏神所謂地德上載造命之體也合朔者取初一日太陽太隂合照之義舉一以該百也其法取三竒三徳金水紫白貴人禄馬到山到向自然吉慶所謂合朔所謂天光下臨造命之用也然使犯動凶煞則禍且隨之亦屬無益又必先於年月之内推求山向吉神相迎一切嵗破三煞隂府等項盡行退避不相干犯乃為全吉則神迎鬼避之説也此亦體中之最緊者體用兼全上也不然寧舍用而取體每年之中有吉神凶神焉有吉星凶星焉二者不同不可不辨神隸於地或吉或凶隨太嵗之所指揮而已葢太嵗君也其分最尊其力最大共此二十四山其與太嵗相喜相合及為太嵗之所生扶者即為吉神故凡嵗德嵗徳合嵗貴嵗禄嵗馬以及開字成字平字危字俱吉除字定字次吉總之與嵗君相得故吉也其與太嵗相衝相鬬及為太嵗之所尅制者則為凶神故嵗破者太嵗所對衝而破也三煞者太嵗所殺之三方也隂府者太嵗之化氣尅山化氣也年尅者太嵗納音尅坐山本墓納音也此皆受尅於太嵗而不可犯之者也臨官方為天官符主官訟帝旺方為打頭火主火災此太嵗有餘之氣也故宜三合局尅之死方為六害為灸退主退敗此太嵗不足之氣也故宜三合局補之又以嵗千起五虎遁遁至戊巳方為戊巳煞庚辛方為天金神丙丁方為獨火以上神煞總之隨嵗君而轉移其餘紛紛神煞不從太嵗而起者皆後人之所添設者也内惟嵗破最凶例無制法三煞亦大凶不可輕犯其餘凶煞俟其休囚之月而以四柱制化之可也若不知制化之法則寧避之此神迎鬼避之大畧也星運扵天七政中之日月金水四餘中之紫氣月孛及八節之三竒紫白竅馬皆吉星也内中日最尊月與三竒竅馬紫白次之至扵玉皇鑾駕等星皆捏造而無據者也月令為權要之官其所冲者為月破所尅者為月隂府為月尅山家與年家之嵗破隂府年尅同也月家之土煞為大月建小兒煞與年家之戊巳煞同也惟大月建更凶此月家真凶神也本月之旺方為金匱星臨官帝旺之間為月徳相合之方為月徳合正丁二坤之類為天徳相合之方為天徳合此月家真吉神也天星可以降地曜然天星氣清地煞力猛若犯三煞隂府及月家之大月建小兒煞則太陽到亦不能制況其他乎大煞避之中煞制之小煞不必論也但得八字停當吉星照臨自然貞吉若揑造之假煞則削之而已修凶福猛不如修吉之穏然修吉如修太嵗方三徳方本命貴禄方食禄方必取吉方旺相之月而以四柱扶補之則吉者愈吉矣修凶如修三煞方官符方金神方必俟凶方休囚之月而以八字尅制之則凶者亦吉矣修吉要扶得旺制凶要制得伏如本命禄馬貴人飛到山向最吉亦可降中下等煞二十四山方無吉凶聴太嵗以吉凶而已不從太嵗起者皆偽造也如偽吉神則曰玉皇曰紫㣲曰鑾駕之類偽凶神則曰天命煞飛天火星及各様火星官符血刄之類不可勝紀一考其起例再考其所以然則乖謬了然矣六十日亦無吉凶聴月令以吉凶而已日統於月為月之所合所生者及與月令同旺者乃真吉日如旺日相日月徳日之類是也日支干為月之所尅所衝及休囚而不當月令者乃真凶日如破日四廢之類是也其不從月令起者皆偽造也如偽吉日則曰滿徳吉慶之類偽凶日則曰死别滅門之類細考起例真假了然矣楊筠松疑龍經已及造命體用之槩而千金歌言言名理愈翫愈佳真千古日家之指南車也嗣是曽文辿陳希夷吴景鸞廖金精以及後來名術一切𦵏課皆以扶龍相主為宗其修吉方則曲盡扶吉之法其修凶方則曲盡制凶之法取而玩之無不鑿鑿有理通書未有及此者也造命之法一看來龍宜何局以補之二看山向何煞宜避何煞可制以何法制之取何吉星照之三看主人本命宜何如以扶之三者俱得而後舉事吉無不利矣至扵修吉方則擇吉方旺相之月而扶持之如培植善類也修凶方則擇凶方休囚之月而尅制之如收降盜賊必我强而彼弱乃為我用也彼選定八字不問龍山主命而槩施之乃假造命也扵古法天淵矣學者當辨别其是非以定從違庻無差悮按自此以下十二篇並註皆出選擇宗鏡其扵龍山嵗命之理獨為精細故並録之其中有錯誤駁雜者則取其意而刪易其辭别本有與為發明者則亦取而附于其後惟戊巳除危成開等方及尊帝等星皆今通書所不用以其自成一家之言故存其舊辨論詳後各條並見附録辨譌卷楊筠松造命歌又名千金歌天機妙訣值千金不用行年與姓音但看山頭併命位五行生旺好推尋此造命之綱領也行年如幾十幾嵗之類姓音即五姓修宅也世俗以此二者分吉凶謬甚故不用也山頭乃來龍入首一節及坐山也命位者即本山命五虎遁納音是也山命所屬五行合年月日時皆要生旺如子山命擇申子辰年月日時有氣用之併取天干合格合局大吉一要隂陽不溷雜二要坐向逢三合三要明星入向來四要帝星當六甲四中失一還無妨若是平分便非法一論龍之淨隂淨陽此龍單指入首結穴一節之脈非坐山也乾甲坤乙坎癸申辰離壬寅戌十二來龍屬陽宜立陽向用申子辰寅午戌陽日期也艮丙巽辛震庚亥未兑丁己丑十二來龍屬隂宜立隂向用己酉丑亥夘未隂日期也反此則為溷雜不吉然古人不盡拘此如艮亥龍用申子辰者三合補龍法也二論三合以三合補龍則補之有力不言龍而言坐向者借坐向以補龍也如巽龍作己山亥向用夘未局以補巽木龍非真補亥向也發福全在龍上即坐山亦次之況向有何益乎俱以正五行論有四柱與向三合者則不可衝山必減一字如亥龍則亥山己向止用丑酉金局以生亥龍可也如己字則衝破亥山矣餘倣此推三要七政中之日月到向明星即日月也葢到向則照山陳希夷云太陽到山惟國家修宫殿宜之士庶人不能當也故楊公屢言三合對宫福禄堅若太隂金水則山向皆可或日在向月在山前後夾照尤妙四要尊星帝星到山到向六甲者六個甲子葢尊帝從甲子起乾次坎故也此四者乃造命之樞得全為上失一猶可若失二得二則非法矣況全不合者乎煞在山頭更若何貴人禄馬喜相過三竒諸徳能降煞吉制凶神發福多山頭坐山也煞謂年月諸惡曜犯占也必求年命真禄馬貴人同到山方及山家禄馬貴人同到為美如丁夘年煞在酉丁貴人亦在酉多用酉日時修之乃貴人制煞又如丙午生人用丁亥年辛亥月乙亥日丁亥時作亥向乃一氣貴人壓制太嵗三竒竒門乙丙丁也或取八節三竒亦驗諸徳嵗徳并天月二徳也如其年方位有年月諸凶煞若用徳竒制之則化煞為權反能召福二位尊星宜值日一氣堆干為第一拱禄拱貴喜到山飛馬臨方為愈吉三元合格最為上四柱喜見財官旺用支不可有損傷取干最宜逢健旺生旺得合喜相逢須避尅破與刑衝吉星有氣小成大惡曜休囚不作凶尊帝二星喜扵年月到矣而日時亦宜取之更能助吉一氣堆干謂四干一様也然必與山向及命主之干支相合而無刑尅為美拱禄者如甲命禄在寅四柱用二丑二夘則拱出寅禄矣怕衝所拱及填實亦要與山頭相關為吉拱貴倣此喜到山則指四柱之禄馬貴人到山也修方者宜到方修向者宜到向曰山而包方與向也飛馬又包禄貴在内即活禄活馬活貴人之謂也本命者以太嵗入中宫遁之本年者又以月建入中宫遁之或飛到山或飛到向或飛到方皆吉八字以干為天元支為地元納音為人元如堆干堆支兩干兩支三合局及四納音皆以純粹不雜而又補龍相主方為合格也財官論主命不論山如甲生人用三四㸃已字為合財已命人用三四㸃甲字為合官以合為妙不合不佳查楊曽日課凡用財官者皆十干合氣也四柱地支或互相衝刑則彼此互傷而大凶故曰不可有損傷四柱中日干甚重最宜旺相得令日干休囚非貧即夭或三干四干一氣不則正當月令如比肩既少又不當月令則必年月上有印以生之再用禄時亦健旺而有力矣然支干有力固好又必與山命相合補龍補山補命是得衆力之扶持也何吉如之若尅龍尅山尅主刑龍刑山刑主衝龍衝山衝主是受衆力之摶擊也凶可知矣故曰生旺得合喜相逢須避尅破與刑衝至此而造命之法無遺蘊矣若八字自相刑衝則用支損傷之謂也古八字亦有自相衝者衝即破也如用辰戌局丑未局以補土山之類四墓之山不衝則不開也若衝主命則㫁㫁不可至扵制煞修方以吉降凶則全看月令必凶方休囚之月制神旺相之月則吉如以一白水制南方打頭火必申子辰水旺火衰之月可也故曰吉星有氣惡曜休囚也此指修方而言若坐山休囚則不吉矣山家造命既合局更有金水來相逐太陽照處自光輝周天度數看躔伏六箇太陽三箇緊中間歴數第一親前後照臨扶山脈不可坐下支干缺更得玉兔照坐處能使生人沾福澤既解天機字字金精㣲選擇可追尋不然背理庸士術執著浮文枉用心字字如金真可誇㑹使天機錦上花不得真龍得年月也應富貴旺人家此申結上文造命之法全以補龍為主也因龍山屬何五行而以四柱補之則可以奪神功改天命此之謂山家造命法也葢從山脈而造富貴非四柱之能自造也能如上所云則造命八字已合格局矣此造命之體也有體而後言用求諸吉星皆照山向乃用如金水二星亦喜到山到向葢天以五星為經日月而外莫尊於此然火星凶烈土星木星又能掩日月之光而蔽山向之明故不可用金清水秀二星獨吉若與日月同到山向謂之金水扶日月大吉之兆也此惟臺歴可查外此有昇元金水周仙金水皆終年守住一方而不運行不足信也太陽照臨諸吉之首必以臺歴日躔宫度為真外此有昇元太陽都纂太陽烏兔太陽四利太陽皆不足信天無二日且一太陽在東一太陽在西終年不動有是理乎得真太陽矣又得真太隂同臨山向福澤尤厚然此日月金水竒徳禄馬貴人皆助福之星非發福之根本也福之根本全在坐下山脈山脈旺相則發休囚則不發此全在吉課以生扶之天干地支純全不缺乃可若支干既缺補脈不起雖諸吉併臨亦無大福如無為無用之人縱得貴人扶持終不能大有為也故再丁寧曰不可坐下支干缺葢明體之重而用之輕也人悟得此義古人之選擇亦可追蹤比美不然庸術之士背造命之正理不論年月之生龍尅龍只曰某山宜某年又云某日大造某日大𦵏龍山受尅主命休囚何益之有末四句復深自贊美此歌以啟人之留意也又歌方方位位煞神臨避得山過向又侵只有山家自旺處天機妙訣好留心支如不合干中取迎福消凶旺處尋任是羅㬋隂府煞也須藏伏九泉隂二十四方位神煞占犯最多避得年煞又有月煞避得月煞又有日煞且山利向又不利向利山又不利難得全吉只取本山來脈自旺處得令有氣更四柱干支乘時旺相如坐山得干取天干一氣或堆禄堆干坐山得支取地支一氣或三合年月日時無非扵山家自旺處斟酌調和使之更旺耳此旺則彼衰凶煞自伏是天機妙訣疑龍經大凡修造與𦵏埋須将年月星辰排地吉𦵏凶禍先發名曰棄屍福不來此是前賢景純説景純雖説無年月後來年月數十家一半有頭無尾結大抵此文無十全一半都是俗人𫝊不是青囊起鬼卦便是三元遁甲銓禄馬雲騰兼氣耀六壬局與通天竅装成圖局號飛天飛天名出何人造云是祖師口訣傳金盤圖是左仙録雷霆九刼號昇元坤鑑黄羅并武曲催官使者大單于鼓角喧傳為第一統例一百二十家九十六家年月要問之一一皆通曉飛度星辰説元妙試令選擇作宅墳福未到時禍先到不知年月有元機年月要妙人少知年月無如造命法装成好命恣人為吉人生時得好命一生享福兼富盛不獨已身富貴髙奕世雲仍沾餘慶我因厯數考諸天元象幽㣲萬萬千星到曉時次第沒只有陽烏萬古全太隂因日有盈缺不比太陽常麗天請君專用太陽照三合對宫福禄堅更看素曜在何處福力却與太陽兼金木二星并紫氣月孛同用又無嫌周天本是十一曜只嫌逆伏災炎炎右經詳言諸家恍惚無如造命之妙因龍山主命以起四柱八字成格成局扶龍相主所謂装成好命也八字既好乃取吉星以照臨之日為最宜到向上吉對宫即到向也三合亦吉或與山三合或與向三合也月次之五星中金水二星吉土木二星掩蔽光明火星燥烈皆凶也四餘中惟紫氣最吉月孛柔星遇吉則吉故曰同用無嫌葢與日月金水同用也火羅土計皆凶七政四餘共十一曜若遇逆伏則凶者愈凶吉者亦凶矣論造𦵏造𦵏二者乃選擇大端不可不慎慎之如何曰合造命之體用而已然豎造與𦵏地亦略不同𦵏以補龍為主而山向亡命次之造以山向主命為重而補龍次之葢𦵏乘生氣生氣旺而體自煖雖山向與亡命不甚全利亦無妨也若修造則斧斤震動且曠日持久倘山向不空主命受尅不敢妄議興舉況八宅禍福皆論坐山乎論正五行生旺取用五行生旺各有其時惟土分三等有隂有陽有半隂半陽故元經曰三等殊生是也艮土屬陽坤土屬隂辰戌丑未隸中宫辰戌屬半陽丑未屬半隂艮旺立春之先坤旺立秋之後四墓扵四季之下各旺一十八日此土之墓也木山春旺除土旺一十八日之外惟七十二日又以冬至後一陽生處互論自冬至至立春為進氣謂之向令自立春至春分為正氣謂之得令自春分至清明為旺氣謂之化令火山夏旺自立春至驚蟄為進氣向令自驚蟄至立夏為正氣得令自小滿至夏至為旺氣化令夏至後火燥金流物極則反不可用也凡用火山不宜大暑之後金山秋旺自芒種至夏至為進氣何令自夏至至立秋為正氣得令自處暑至秋分為旺氣化令水山冬旺自立秋至白露為進氣向令自秋分至霜降為正氣得令自立冬至冬至為旺氣化令凡化令乃他山進氣之時尅擇之法務以財禄培根乃為中和若以官旺加之則太旺而反危矣用日之法向令取其生氣得令用其胎養氣化令取其財源便是妙理如春月清明前後作寅山為化令取甲日用之為甲禄在寅財者四墓并納音土也又如得令向令不同進氣化令有異如春震山甲乙輔之甲向冬至而生旺震向春分而正旺乙向清明而化旺尅擇之法取其将化者補以財禄正旺者培以根元向旺者益以胎息損益得中乃為貞吉論補龍造𦵏同邱平甫曰先觀風水定其蹤次看年月要相同吉凶合理叅元妙好向山家覓旺龍此言先擇吉地次擇吉年月日時以補龍千古不易之論凡入其鄉而星峰竒特龍神秀拔富貴無疑入其鄉而山岡撩亂龍神卑弱貧賤無疑禍福之本總屬之龍擇日而不補龍又何必擇知補龍之説而此道之元樞得矣凡逺龍不論單以到穴之小脈為主以正五行論生尅日時四柱生扶之則吉尅洩之則凶不問陽宅隂地至結穴處必有一線小脈細細察定即以羅經格之屬木則用亥夘未局屬水土則用申子辰局屬火則用寅午戌局屬金則用己酉丑局或印局生之亦可龍雄帶煞者宜用財局山谷隂地聳起開窩者近穴止有圓毬無小脈圓毬若闊非脈也宜扵山後蜂腰處審而補之凡省城府縣非午向則丙丁向其午向者必壬子癸龍也其丙丁向必亥艮龍也俱宜申子辰局但正脈已結衙署矣民居或東或西皆脈上枝分横來者不知屬何五行只以補坐山為主自此以外則皆補脈而隂地尤緊葢𦵏乘一線之生氣也龍氣之衰旺全看月令故補龍者必扵三合月或臨官月墓月亦作旺月非衰病死之例也葢丑宫有辛金未宫有乙木辰宫有癸水戌宫有丁火固知四墓之旺而非衰也故三合局用之凡補龍全在四柱地支葢天干氣輕地支力重也有以地支一氣補者如夘龍用四夘之類極妙但難取十餘年始一遇而又或月家日家山向不空其可强為乎不若三合局之活動易取也三合局只要在三合月内生月旺月墓月皆可如此三月内凶神占方則臨官月亦可名曰三合兼臨官地支一氣局或四生或四旺不用四墓三合字不必全二字亦可十二淨隂龍宜用隂課十二淨陽龍宜用陽課楊筠松曰一要隂陽不溷雜正此謂也但五行龍各有隂有陽而亥夘未木局己酉丑金局則皆隂也寅午戌火局申子辰水局則皆陽也故舊課亦不甚拘隂陽之説古人造𦵏八字多以地支補龍以天干補主命或與命比肩一氣或合官或合財或合禄馬貴人又或天干合命而禄馬貴人到山到向而地支又補龍脈則八字之上上局也唐一行禪師宋託長老皆以四柱納音補龍本年之納音亦甚應驗但不如地支之力耳又有論納音者其法不論本龍之納音而扵龍之墓上起納音論生尅如庚寅年作戌山戌龍正五行屬土水土墓辰亦用五虎遁得庚辰金音八字宜土音金音吉火音為克龍墓凶此葢本洪範變運而論者與一行禪師託長老之㫖有異亦宜叅看凡以三合水局補水龍以木局補木龍者為旺局上吉以金局生水龍以水局生木龍者為相局又為印局次吉水龍用火局者為財局龍雄帶煞者不必再補則用財局不補亦不洩也補龍古課俱以正五行論亥壬子癸四龍屬水生申旺子墓辰申子辰乃三合旺局上吉臨官在亥吉己酉丑為印局亦吉寅午戌為財局次吉亥夘未為洩局凶辰戌丑未為鬼煞局尤凶得壬癸庚辛干尤妙然難盡拘一亥龍乾山巽向曽文辿用壬寅年壬寅月壬寅日壬寅時後八子入朝係丁亥亡命取丁壬合以丁命言之為合官又四㸃壬禄到亥龍四寅與亥命合又與亥龍合妙甚四壬水又補亥龍上上吉課也又有用癸亥年甲子月甲申日乙亥時者後發甲貴顯此以申子水局補亥龍而用二亥為臨官也一亥龍壬山丙向楊筠松取辛亥年庚子月丙申日丙申時後出丞相此以申子亥水局補亥龍三合兼臨官局一壬龍子山午向楊筠松取四癸亥後多貴顯葢四亥乃壬龍禄地又四癸禄到子山名臨官格又名聚禄格又名支干一氣格妙甚主命非戊則癸或子命俱妙一子龍艮山坤向曽文辿取癸巳年丁巳月癸酉日癸丑時後代貴顯此因艮山坤向俱屬土能克子龍之水故不用申子辰局而用己酉丑金局以生子水而洩土氣也又三㸃癸禄到子重龍不重坐山也主命非癸則戊或戊子命尤妙一壬龍子山午向楊筠松取壬申年戊申月壬申日戊申時後大貴此取壬龍四長生在申也又兩干不雜地支一氣丁巳亡命取丁與壬合為合官格又巳與申合也寅生人皆夭折四申衝也艮坤辰戌丑未六龍屬土亦生申旺子墓辰臨官亥以申子辰為旺局亦土克水財局也上吉以寅午戌為印局亦吉金局洩木局克皆凶喜丙丁戊巳干然難盡拘一艮龍壬山丙向楊筠松取辛亥年庚子月丙申日丙申時大貴廖金精取庚申年戊子月庚申日庚辰時三合局一艮龍甲山庚向楊筠松取丙辰年丙申月丙申日丙申時後發貴綿逺此不惟申子辰局而四丙火生艮土又艮宫納丙主命非丙生必辛生也或辛巳命則四丙禄到巳尤妙一艮龍癸山丁向楊筠松取四丙申五百日及第支干一氣格艮土生申又名四長生格又四㸃丙火生艮土又艮宫納丙四帑也妙甚寅甲夘乙巽龍屬木生亥旺夘墓未以亥夘未為旺局上吉臨官在寅以申子辰為印局亦吉己酉丑為煞局寅午戌為洩局皆凶喜壬癸干然難盡拘一夘龍甲山庚向楊筠松取乙夘年己夘月庚寅日己夘時此單用臨官帝旺二字也名官旺局一夘龍亥山巳向古人取四辛夘𦵏辛巳亡命取四辛以扶辛命四夘以補夘脈又合亥山又冲動辛命之酉禄也夘龍在辛年五虎遁得辛夘木又納音補納音也一夘龍乙山辛向曽文辿取庚寅年丁亥月辛夘日辛夘時三合兼臨官賴布衣取甲寅年丁夘月辛夘日己夘時三合兼臨官一巽龍乙山辛向朱子取庚寅年戊寅月癸夘日甲寅時臨官帝旺局巳丙午丁四龍屬火生寅旺午墓戌臨官巳以寅午戌為三合局上吉亥夘未為印局吉己酉丑為財局次吉申子辰為煞局凶辰戌丑未土局洩氣亦凶天干喜丙丁甲乙然難盡拘一丙龍巳山亥向楊筠松取己巳年己巳月壬午日壬寅時三合兼臨官又丙龍禄在巳一丙龍坤山艮向賴布衣取癸巳年丁巳月庚午日戊寅時以上皆三合兼臨官葢因三合之年分月分山向不空則用臨官年月也申庚酉辛乾五龍屬金生巳旺酉墓丑臨官申以己酉丑為三合金局上吉以辰戌丑未土為印局然相衝不吉以亥夘未為財局次吉以申子辰為洩局凶寅午戌為煞局尤凶喜庚辛戊巳干然難盡拘一酉龍酉山夘向楊筠松取甲申年癸酉月丁酉日己酉時官旺局賴布衣取辛酉年辛丑月辛丑日癸巳時三合局又三㸃辛禄到酉龍酉山一辛龍乾山巽向曽文辿取丁酉年己酉月甲申日己巳時又取己酉年癸酉月壬申日乙巳時三合兼臨官吉雖是隂府金局制之無妨一辛龍壬山丙向賴布衣取辛酉年辛丑月辛酉日癸巳時三合局又三辛補辛龍古課甚多難以備録姑舉此為式或三合局或三合中止用二字或三合兼臨官或單臨官帝旺二字或天干一氣或地支一氣總之皆補龍也以補龍為主而又不衝尅坐山不衝尅主命且坐山有吉神無凶煞主命或比肩或合財或合官或㑹合四柱之禄馬貴人又或四柱之禄馬貴人到山到向則上上吉課也地支一氣者四支一様也或本龍之四長生字四臨官字四帝旺字皆可若四墓字則凶墓非三合結局不用也又有納音以補龍者一行禪師諄諄尚之矣託長老為豐城宛岡黄氏𦵏墓戌龍作辛山乙向得甲戌火龍入穴也宜木音生之火音比助之正宜立夏乘旺故用庚寅年木音壬午月木音戊午日火音己未時火音下𦵏又曰造𦵏八字取用全在納音不可分毫爭差則福應如嚮然以前法叅之亦相合焉戌龍屬土又與寅午同三合火局今託長老用寅午火局以生戌土則非徒納音之屬木屬火能助甲戌火龍也故補龍者必以前三合局或一氣局為主而叅以納音之説託不補辛山而單補戌龍之納音因知古人重龍不重山也今人不問龍而單問山豈不謬哉又有一法謂之占奪一方秀氣亦甚吉如木龍則四柱用寅夘辰三字全謂之占盡東方秀氣火龍則用己午未三字全謂之占盡南方秀氣金龍則用申酉戌三字全謂之占盡西方秀氣水土龍則用亥子丑三字全謂之占盡北方秀氣與官旺局同但多一字耳以三字凑作四柱擇一字空利者多用一字以成四柱也三字外不可叅一别字叅一别字則亂格矣楊筠松與人修方用壬寅年甲辰月甲辰日丁夘時此必寅甲夘乙龍又坐寅夘山方也寅夘辰全秀占東方格論扶山坐山不必補但宜扶起不宜尅倒尅倒則凶何謂扶起坐山有吉星照之無大凶煞占之而又八字相合不衝不尅即扶也如坐山與龍同氣則補龍即以補山如壬癸龍坐子向午龍與山皆屬水用申子辰局可也倘龍與山不同氣則止以補龍為主而坐山有吉星無凶煞即妙何謂尅倒太嵗衝山則倒日月時忌衝山嵗衝尤忌三煞隂府年尅及伏兵大禍占山則倒此開山之緊要凶神勿造勿𦵏可也年家天地官符占山俟其飛出别卦之月以吉星照之或太陽或紫白或三竒此中得一二吉星到反能發福葢天官乃臨官方又名歳徳吉方地官乃顯星方又為歳位合皆可吉可凶非大凶煞也但要吉星到耳忌還宫忌本月忌旺月占向同此其餘神煞置之勿論凡太嵗占山疊戊巳隂府年尅打頭火則大凶疊金神次凶若不疊此數凶而以八字比之或三合之又八節之三竒同到上吉其福最久凡日月金水紫白三竒竅馬得二三件到山大吉凡八字四柱禄馬貴人到山到向大吉如寅山多用甲字甲山多用寅字名堆禄格餘倣此推凡主命之真禄真馬真貴人以太歳入中宫遁到山向上吉凡嵗貴嵗禄嵗馬以月建入中宫遁到山向次吉凡八字宜扶山合山或與山比肩一氣或印綬生山或禄貴到山皆吉切忌地支衝山次忌天干尅山惟辰戌丑未山不甚忌衝然嵗衝亦凶日月時内止一字衝之可也衝多亦破而凶矣凡四柱中有納音尅山者若年尅月尅忌修造不能制也𦵏則以月日納音制之制者當令尅者休囚乃穏凡陽居原有屋而修山者兼方論忌大将軍大月建小兒煞破敗五鬼及金神煞此五者惟金神可制而秋月難制大将軍飛出别卦無妨還宫則凶吉多無妨此俱忌修方修山不忌𦵏年家打頭火及月家飛宫打頭火丙丁火占山占向忌修造不忌𦵏月家天地官符占山向中宫得月家紫白同到又有氣不忌居城市者龍逺難測宜補坐山與補龍法同陽居坐山頗重與隂地不同也論立向向不必補但有吉星而無凶煞可也何謂凶煞太嵗也戊巳煞也地支三煞也浮天空亡也此造𦵏同忌者也内惟太歳戊巳尤凶蓋太歳可坐不可向而戊巳在向猛于在山也三煞可制亦宜斟酌俟其休囚之月以三合尅之吉星照之然𦵏可而造險葢𦵏暫而造久也浮天空亡略輕主退財耳伏兵大禍占向次凶然修造亦忌𦵏不忌也巡山羅㬋占向一白到則吉古人有補向者所求補龍扶山也不然則坐山之財局也如艮龍作丙丁向或用四丙或用寅午戌火局者生艮土也又如子山午向用寅午戌火局者子山尅火為財也然止用寅戌二字切忌午字冲山餘倣此推論相主相主者何以四柱八字輔相主人之命也從來皆論生年不論生日有論生日者非古法也修造以宅長一人之命為主𦵏以亡命為主祭主止忌冲壓餘可勿拘古人皆論生年之天干或合官或合財或比肩或印綬或四長生或取禄馬貴人不衝命尅命而又補龍扶山則上上吉課也昔楊筠松為俞侍御修陽宅俞係乙亥生用庚寅年庚辰月庚寅日庚辰時取乙與庚合合官格也乙禄到夘寅辰拱之拱禄格也四柱又名天干一氣兩支不雜上吉格也課曰行年七十六嵗自乙亥至庚寅年正七十六歳此論生年不論生日之證也又一戊午年生人扵丙子造𦵏是非不停皆衝生年也故知生年為重用合財合禄格者如曽文辿為壬午修主楊筠松𦵏壬午亡命皆取四丁未蓋丁與壬合合財格也又午與未合天地合格也四㸃丁禄到午命聚禄格也故其課曰支干合命愈為竒上上格也今人以支干合命者為晦氣煞何其謬歟昔楊筠松為乙巳主命修艮山坤向屋取丁丑年庚戌月庚申日庚辰時葢取乙與庚合合官格也又庚禄居申坤向驛馬到艮寅山故其課曰三合馬進山三禄向上頒又三庚名三台格一印綬格宜正印忌梟印如甲命宜四癸乙命宜四壬之類梟印亦能生我多見則忌一二㸃不忌也若傷官食神洩氣多見則忌一比肩格如己巳亡命楊筠松取四己巳比肩格也今人忌本日何歟比肩上吉如己命見三己四己是也劫財凶如己命多見戊字是也一四長生格如壬生人用四申丙生人用四寅是也官不相合不宜多見多則尅身一二㸃可也合官則四㸃愈妙七煞大能尅命忌用或年月利而干係七煞一㸃可也得四柱中天干食神制之為妙若至二㸃必凶況多乎昔有乙夘生人造屋用辛丑年辛夘月後大不吉乙以辛為七煞也若用庚字則合官大吉矣合官者貴格也合財者富格也不合則無情財與官俱宜一㸃二㸃禄馬貴人宜四柱活動取之如甲以寅為禄甲命人疊見寅字乃自家之現財禄也寅命人疊見甲字乃財禄自外而來也皆聚禄吉格貴人與馬倣此命禄與命貴人最吉馬次之乃病地也馬有必不可用者如寅以申為馬四柱若用申字則衝寅命凶查古人造𦵏課所云禄馬貴人皆四柱中之顯然可見者如上數課是也然難逢難遇蓋成格成局之難也又有本命飛禄飛貴飛馬取造𦵏之年飛到山向中宫俱大吉此稍易取一本命地支切忌四柱地支衝之若又天干尅命干者名天尅地衝最凶一太歳衝命最凶月次之日又次之時為輕如辰戌丑未命遇衝不吉但略輕土衝土也然太嵗衝之亦凶又曰東衝西不動南衝北不移謂木不能傷金火不能尅水也亦略輕如申酉命遇寅夘衝亥子命遇己午衝是也止主是非若北衝南命西衝東命則凶莫堪矣然亦以太嵗為重月次之蓋歳君力大而月乃司令也凡本命羊刃四柱切忌多見如甲命忌夘字之類本命煞惟天罡四煞最凶造𦵏皆忌天罡四煞即嵗煞也修忌宅長𦵏忌化命及祭主吉不能制寅午戌生人屬火忌扵丑年月日時内作甲乙庚辛四向凶非此四向則犯丑字不忌不犯丑字則此四向亦不忌二者俱犯乃凶犯一箇丑字亦凶申子辰年生人屬水忌扵未年月日時内作甲乙庚辛四向凶己酉丑年生人屬金忌扵辰年月日時内作丙丁壬癸四向凶亥夘未年生人屬木忌扵戌年月日時内作丙丁壬癸四向凶命食禄最吉能催官禄乃本命食神之禄也八字用三四㸃俱吉或修食禄方亦妙如甲命以丙為食神丙禄在巳四柱多用巳字是也或修巳方亦吉凡三合之力勝扵六合但主命喜與八字六合而三合次之惟用三合降煞者得主命與八字共成三合為妙山向又喜與八字三合而六合輕矣凡坐山及來龍與命干命支同推但二十四山向少戊巳二字而多乾坤艮巽四字用禄馬貴人則乾與亥同坤與申同艮與寅同巽與巳同如四柱用壬字則為禄到乾亥用丙丁則貴人到乾亥用巳則馬到乾亥也坤艮巽倣此推如乾坤艮巽山用長生印綬者則乾金與庚金同坤土與戊土同艮土與巳土同巽木與乙木同馬有衝山者則取到向如寅山馬在申忌申字衝寅山則四柱多用寅字又助起寅山又馬到申向也禄貴到向俱吉宜活法取之毋執一也又有本命飛遁真禄真貴真馬則支干俱全之謂也以太嵗入中宫遁到山向中宫造𦵏安床入宅俱大吉修方者宜到方如甲子年生人寅為禄馬丑未為貴人用甲年五虎遁則寅為丙寅丑為丁丑未為辛未乙丑年修作以太嵗乙丑入中宫順數丙寅到乾六則乾為禄馬辛未到坤二則坤為陽貴人丁丑到艮八則艮為隂貴人乾坤艮三方大吉按通書云本命日不宜用事諸歴皆無明説惟見道藏經今選擇家通忌天尅地衝年月日時如甲子忌庚午之類並忌天比地衝年月日時如甲子忌甲午之䫫起例又忌𦵏日納音尅化命納音而地支相衝者與篇内戊午忌丙子日者相合具表扵後天尅地衝天比地衝顯而易明故不列表甲子忌戊午乙丑忌己未丙寅忌甲申丁夘忌乙酉戊辰忌庚戌己巳忌辛亥庚午忌壬子辛未忌癸丑壬申忌丙寅癸酉忌丁夘甲戌忌壬辰乙亥忌癸巳丙子忌庚午丁丑忌辛未戊寅忌庚申己夘忌辛酉庚辰忌甲戌辛巳忌乙亥壬午忌甲子癸未忌乙丑甲申忌戊寅乙酉忌己夘丙戌忌戊辰丁亥忌己巳戊子忌丙午己丑忌丁未庚寅忌壬申辛夘忌癸酉壬辰忌丙戌癸巳忌丁亥甲午忌戊子乙未忌己丑丙申忌甲寅丁酉忌乙夘戊戌忌庚辰己亥忌辛巳庚子忌壬午辛丑忌癸未壬寅忌丙申癸夘忌丁酉甲辰忌壬戌乙巳忌癸亥丙午忌庚子丁未忌辛丑戊申忌庚寅己酉忌辛夘庚戌忌甲辰辛亥忌乙巳壬子忌甲午癸丑忌乙未甲寅忌戊申乙夘忌己酉丙辰忌戊戌丁巳忌己亥戊午忌丙子己未忌丁丑庚申忌壬寅辛酉忌癸夘壬戌忌丙辰癸亥忌丁巳論開山立向與修山修向不同凡鼎新開居倒堂豎造皆謂開山立向則單論開山立向吉凶神至年與月之修方凶神俱不必論修主原有住屋欲扵屋後修造謂之修山不名開山則忌開山凶神兼忌修方凶神也向上凶神除太嵗三煞二者外其餘不必論矣住屋前修造謂之修向不名立向則忌立向凶神兼忌修方凶神也坐山凶神除歳破三然二者外其餘不必忌矣若所修之處前後還有屋則又兼中宫凶神論修山修向修方看與修主住房利否如與住房不利又欲急修則宜避宅别居俟工完後入新宅可也既避宅而去則止論山向空利而方道與中宫神煞皆可不拘修方神煞年家則以三煞嵗破為最打頭火天地官符次之月家以大月建小兒煞為最飛宫官符獨火次之凡修山修向者必要兼避方煞惟新開山立向者不論方煞也修山而忌三煞在向者蓋三煞在向亦凶必俟休囚之月乃可修山也修向而忌三煞嵗破在山者蓋山既大不利則向亦不利也論修山凡修方先定中宫扵中宫下羅經格定所修之方屬何字先查此字何年可修次查何月可修然後擇吉日與方生合則吉方之必不可修者曰本年戊巳方也嵗破方也太歳到方而帶戊巳打頭火金神也月家則大月建小兒煞也此皆必不可犯者也至月家丙丁火及飛宫之打頭火天地官符次之有制可修方之可修者有三種一曰空利方本年無甚大凶煞占方亦無甚吉神到方但擇吉月吉日以修之亦自平穏二曰修吉神方或太歳方而帶吉不帶凶也必要八節之三竒到或三德方如甲年六月則歳徳天徳月徳㑹扵甲方也年天喜方也子年酉丑年申寅年未夘年午辰年己巳年辰午年夘未年寅申年丑酉年子戌年亥亥年戌次之則年月之三台土曲方也即平字青龍官國方也即開字極富谷将方也即危字魁罡顯星方也即定字月家之金匱方也本年之竅馬方也此皆年月之吉方也又或本命之禄馬貴人方也本命食禄方也又或本命之貴人禄馬飛到此方也此三者乃本命之吉方也必年月之吉方又合本命之吉方擇吉日修之則無不吉也擇吉日之法如何曰吉方宜扶不宜尅扶則福大尅則無福年家與此方或三合局或一氣局又必此方旺相之月則諸吉當權修之自然發福然修吉方必不疊𦂳要煞乃可蓋吉不宜尅而煞又要尅二者不可並行也若不緊要之煞則不必論也方吉命吉自然降伏矣三曰修凶煞方除戊巳嵗破及太嵗之帶凶者不修外其餘皆可制而修也其制之之法詳見後論修方兼山向及中宫修方亦有分别不問正向横向但在後不作住房而止作書室下房者則止論修方而開山立向之吉凶不必論也若在後欲作住房則以開山立向為主而兼修方論必山向利方向又利乃可修也此論甚確蓋雖修方而欲作正寢則是其宅以所修之屋為主房故即同開山論今人修方不論後面是住屋閑屋一槩論方不論山向大失古人之㫖四圍有屋則中間之屋皆名中宫太歳在向及戊巳煞三煞占山占向則中宫終年不吉不可修月家大月建小兒煞打頭火占中宫亦不可修也月家飛宫天地官符入中宫若年月紫白三竒在中宫或本命禄馬貴人飛入中宫則可修也凡修中宫忌戊巳日蓋中宫本屬土又用戊巳土日則助起土煞不吉也若辰戌丑未月尤忌戊巳日論用盤針通書曰盤針之法漢初只用十二支自唐以來始添用四維八干古歌云縫針之法壬子中更論正針子亦中又胡舜申隂陽備用云聞諸前輩言盤針之用當以丙午壬子之中者為正狐首經云陽生扵子隂生扵午自子至丙東南司陽自午至壬西北司隂丙午壬子之間為天地之中南北之正其説相合故㫁然以丙午壬子中針為是按通書以壬子之中為縫針今謂之中針蓋中針之子位當壬子之中乃子之初自子至癸皆子位也地理家格龍用之若定方向則用正針消砂納水則用縫針詳見本原並見後圖羅經體製不一多者至三十餘層然其用總不離乎三針者近是今約取十二層内一層天池以受指南針者也二層八卦正方隅也三層二十四山一卦三山也四層坐山九星變卦也五層淨隂淨陽配龍向也六層穿山七十二龍正針分金也七層中針二十四山八層二十四天星九層六十龍皆屬中針所以格龍者也十層縫針二十四山十一層六十龍十二層一百二十分金皆屬縫針所以消砂納水者也其餘配卦配宿皆由此推故約舉之而其義已偹也定方隅法選擇宗鏡曰中宫下羅經中宫定而後方隅定如直進有幾層者必自山下第一層之後簷起量至大門之前簷水止共幾丈折半為中宫下羅經以定二十四字而方隅始確通書有論層數者如只有一層則以棟柱之中為中宫若有前廊前深後淺又以簷下為中宫若前有廊後有披厦前後相等則又以棟柱為中宫也如有二層則前層之後後層之前中間天井為中宫也如有三層則以中層為中宫也四層則以二層後天井為中宫與二層同也五層則以第三層為中宫與三層同也此其説似是而非蓋棟數有淺深而羅經二十四方位無伸縮也近時有以祖堂為中宫者亦非是古並無此説羅經二十四字乃一定之方位如一居周圍有二十四丈則一字管一丈有十二丈則一字管五尺此定理也如子山午向則夘酉當腰若必以祖堂為中宫則祖堂在山下者夘酉前長後短祖堂近大門者夘酉前短後長有是理乎修方忌扵祖堂不利則合家不利然相離稍逺者猶之可也若扵祖堂利而扵修主之住屋不利則修主不利而合家亦不得受福矣大抵修主之住屋若與祖堂共一棟則吉凶同論若異棟則必兼論必俱利乃可今人有單論祖堂利否者非古人之㫖也古人云祖堂不利則移香火扵吉方如修主住房不利必要遷住吉方乃可修作其義甚明凡移徙而修者必待修完後方可擇吉入宅或歳官交承亦可如主命本年利作兑不利作震則當遷居扵東使所修之方昔視之為震者今則視之為兑矣此活變之法也按定中宫之法論層數固未精而論丈尺亦未甚確蓋方位皆以目之所見為定如大門則以㕔事為中可也如㕔後則以正寝為中可也如墳塋則以祖穴為中可也移步換形惟變所適要在相其形勢取其尊者為主以臨四方庶義精而理得矣欽定協紀辨方書卷三十三
