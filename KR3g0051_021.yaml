body:
  text: 月表三三月清明三月節天道北行宜向北行宜修造北方天德在壬天德合在丁月德在壬月德合在丁月空在丙宜修造取土月建在辰月破在戌月厭在申月刑在辰月害在卯劫煞在巳災煞在午月煞在未忌修造取土初一日長星十六日短星清明後二十一日往亡土王用事後忌修造動土巳午日添母倉穀雨三月中日躔在酉宮爲三月將宜用癸乙丁辛時甲子海中金義成日乙丑海中金制收日丙寅鑪中火義開日丁卯鑪中火義閉日戊辰大林木專建日己巳大林木義除日庚午路傍土伐滿日辛未路傍土義平日壬申劔鋒金義定日癸酉劔鋒金義執日甲戌山頭火制破日乙亥山頭火義危日丙子澗下水伐成日丁丑澗下水寶收日戊寅城頭土伐開日己卯城頭土伐閉日庚辰白鑞金義建日辛巳白鑞金伐除日壬午楊柳木制滿日癸未楊柳木伐平日甲申井泉水伐定日乙酉井泉水伐執日丙戌屋上土寶破日丁亥屋上土伐危日戊子霹靂火制成日己丑霹靂火專收日庚寅松柏木制開日辛卯松柏木制閉日壬辰長流水伐建日癸巳長流水制除日甲午砂石金寶滿日乙未砂石金制平日丙申山下火制定日丁酉山下火制執日戊戌平地木專破日己亥平地木制危日庚子壁上土寶成日辛丑壁上土義收日壬寅金箔金寶開日癸卯金箔金寶閉日甲辰覆燈火制建日乙巳覆燈火寶除日丙午天河水專滿日丁未天河水寶平日戊申大驛土寶定日己酉大驛土寶執日庚戌釵釧金義破日辛亥釵釧金寶危日壬子桑柘木專成日癸丑桑柘木伐收日甲寅大溪水專開日乙卯大溪水專閉日丙辰沙中土寶建日丁巳沙中土專除日戊午天上火義滿日己未天上火專平日庚申石榴木專定日辛酉石榴木專執日壬戌大海水伐破日癸亥大海水專危日右六十干支從建辰者始清明終穀雨其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十二
