body:
  text: 月表六六月小暑六月節天道東行宜向東行宜修造東方天德在甲天德合在巳月德在甲月德合在巳月空在庚宜修造取土月建在未月破在丑月厭在巳月刑在丑月害在子劫煞在申災煞在酉月煞在戌忌修造取土初十日長星二十日短星小暑後二十四日往亡土王用事後忌修造動土巳午日添母倉大暑六月中日躔在午宫為六月將宜用癸乙丁辛時甲子海中金義執日乙丑海中金制破日丙寅爐中火義危日丁卯爐中火義成日戊辰大林木專收日己巳大林木義開日庚午路傍土伐閉日辛未路傍土義建日壬申劒鋒金義除日癸酉劒鋒金義滿日甲戌山頭火制平日丙子澗下水伐執日丁丑澗下水寶破日戊寅城頭土伐危日己卯城頭土伐成日庚辰白鑞金義收日辛巳白鑞金伐開日壬午楊栁木制閉日癸未楊栁木伐建日甲申井泉水伐除日乙酉井泉水伐滿日丙戌屋上土寶平日丁亥屋上土伐定日戊子霹靂火制執日己丑霹靂火專破日庚寅松柏木制危日辛卯松柏木制成日壬辰長流水伐收日癸巳長流水制開日甲午砂石金寶閉日乙未砂石金制建日丙申山下火制除日丁酉山下火制滿日戊戌平地木專平日己亥平地木制定日庚子壁上土寶執日辛丑壁上土義破日壬寅金箔金寶危日癸卯金箔金寶成日甲辰覆燈火制收日乙巳覆燈火寶開日丙午天河水專閉日丁未天河水寶建日戊申大驛土寶除日己酉大驛土寶滿日庚戌叉釧金義平日辛亥叉釧金寶定日壬子桑柘木專執日癸丑桑柘木伐破日甲寅大溪水專危日乙卯大溪水專成日丙辰沙中土寶收日丁巳沙中土專開日戊午天上火義閉日己未天上火專建日庚申石榴木專除日辛酉石榴木專滿日壬戌大海水伐平日癸亥大海水專定日右六十干支從建未者始小暑終大暑其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十五
