  text: 月表八八月八月白露八月節天道東北行宜向東北行宜修造東北維天德在艮月德在庚月德合在乙月空在甲宜修造取土月建在酉月破在卯月厭在卯月刑在酉月害在戌劫煞在寅災煞在卯月煞在辰忌修造取土二日五日長星十八日十九日短星白露後十八日往亡秋分前一日四離秋分八月中日躔在辰宫為八月將宜用艮巽坤乾時孟年甲子海中金義平日乙丑海中金制定日丙寅爐中火義執日丁卯爐中火義破日戊辰大林木專危日己巳大林木義成日庚午路傍土伐收日辛未路傍土義開日壬申劒鋒金義閉日癸酉劒鋒金義建日甲戌山頭火制除日乙亥山頭火義滿日丙子澗下水伐平日丁丑澗下水寶定日戊寅城頭土伐執日己卯城頭土伐破日庚辰白鑞金義危日辛巳白鑞金伐成日壬午楊柳木制收日癸未楊柳木伐開日甲申井泉水伐閉日乙酉井泉水伐建日丙戌屋上土寶除日丁亥屋上土伐滿日戊子霹靂火制平日己丑霹靂火專定日庚寅松柏木制執日辛卯松柏木制破日壬辰長流水伐危日癸巳長流水制成日甲午砂石金寶收日乙未砂石金制開日丙申山下火制閉日丁酉山下火制建日戊戌平地木專除日己亥平地木制滿日庚子壁上土寶平日辛丑壁上土義定日壬寅金箔金寶執日癸卯金箔金寶破日甲辰覆燈火制危日乙巳覆燈火寶成日丙午天河水專收日丁未天河水寶開日戊申大驛土寶閉日己酉大驛土寶建日庚戌叉釧金義除日辛亥叉釧金寶滿日壬子桑柘木專平日癸丑桑柘木伐定日甲寅大溪水專執日乙卯大溪水專破日丙辰沙中土寶危日丁巳沙中土專成日戊午天上火義收日己未天上火專開日庚申石榴木專閉日辛酉石榴木專建日壬戌大海水伐除日癸亥大海水專滿日右六十干支從建酉者始白露終秋分其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十七
