body:
  text: 月表十二十二月小寒十二月節天道西行宜向西行宜修造西方天德在庚天德合在乙月德在庚月德合在乙月空在甲宜修造取土月建在丑月破在未月厭在亥月刑在戌月害在午劫煞在寅災煞在卯月煞在辰忌修造取土初九日長星二十五日短星小寒後三十日往亡土王用事後忌修造動土巳午日添母倉大寒十二月中日躔在子宫為十二月將宜用癸乙丁辛時甲子海中金義閉日乙丑海中金制建日丙寅爐中火義除日丁卯爐中火義滿日戊辰大林木専平日己巳大林木義定日庚午路傍土伐執日辛未路傍土義破日壬申劔鋒金義危日癸酉劔鋒金義成日甲戌山頭火制收日乙亥山頭火義開日丙子澗下水伐閉日丁丑澗下水寶建日戊寅城頭土伐除日己卯城頭土伐滿日庚辰白鑞金義平日辛巳白鑞金伐定日壬午楊栁木制執日癸未楊栁木伐破日甲申井泉水伐危日乙酉井泉水伐成日丙戌屋上土寶收日丁亥屋上土伐開日戊子霹靂火制閉日己丑霹靂火専建日庚寅松柏木制除日辛卯松柏木制滿日壬辰長流水伐平日癸巳長流水制定日甲午砂石金寶執日乙未砂石金制破日丙申山下火制危日丁酉山下火制成日戊戌平地木専收日己亥平地木制開日庚子壁上土寶閉日辛丑壁上土義建日壬寅金箔金寶除日癸卯金箔金寶滿日甲辰覆燈火制平日乙巳覆燈火寶定日丙午天河水專執日丁未天河水寶破日戊申大驛土寶危日己酉大驛土寶成日庚戌叉釧金義收日辛亥叉釧金寶開日壬子桑柘木專閉日癸丑桑柘木伐建日甲寅大溪水專除日乙卯大溪水專滿日丙辰沙中土寶平日丁巳沙中土專定日戊午天上火義執日己未天上火專破日庚申石榴木專危日辛酉石榴木專成日壬戌大海水伐收日癸亥大海水專開日右六十干支從建丑者始小寒終大寒其神煞吉凶用事宜忌具於表欽定協紀辨方書卷三十一
