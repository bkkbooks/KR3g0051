body:
  text: 本原二二十四方位正五行中針雙山五行縫針三合五行洪範五行墓龍變運年月尅山家二十四節氣方位八卦納甲三合小遊年變卦大遊年變卦遊年變卦圖卦四天干八地支十二共為二十四方位隂陽家名二十四山言山則向在其中如子山則必午向午山則必子向壬山則必丙向丙山則必壬向之類是也八卦惟用四隅而不用四正者以四正卦正當地支子午卯酉之位故不用卦而用支用支即用卦也八卦既定四正則以八干輔之甲乙夾震丙丁夾離庚辛夾兌壬癸夾坎四隅則以八支輔之戌亥夾乾丑寅夾艮辰巳夾巽未申夾坤合四維八干十二支共二十四天干不用戊巳者戊巳為中央土無定位也以二十四山分屬八卦則一卦管三山戌乾亥屬乾壬子癸屬坎丑艮寅屬艮甲卯乙屬震辰巽巳屬巽丙午丁屬離未坤申屬坤庚酉辛屬兌謂之八宫以二十四山分屬五行諸家不同具各有義亥壬子癸屬水寅甲卯乙巽屬木己丙午丁屬火申庚酉辛乾屬金辰未戌丑坤艮屬土此八卦干支之五行也後有雙山洪範諸家因名此為正五行圖外層所列為正針乃二十四山之正位內層所列為中針其子位在正針壬子二位之間比正針先半位其雙取者為雙山其取三合者為雙山五行地理家格龍用之蓋龍為來脈故用先至者承之乃無失也圖外層所列為正針內層所列為縫針其子位在正針子癸二位之間比正針後半位其雙取三合者為三合五行與雙山同特比中針正差一位耳地理家用以消砂納水蓋砂水為去路故用後至者收之乃無遺也按雙山五行即三合五行也地支十二取生旺墓三者為三合局而四卦八干各在支前一位今以支前一位之卦干與支雙並而同取地支三合之五行故曰雙山五行坤申壬子乙辰合水局六山皆屬水乾亥甲卯丁未合木局六山皆屬木艮寅丙午辛戌合火局六山皆屬火巽己庚酉癸丑合金局六山皆屬金地理書曰正五行乃五行之質雙山五行乃五行之氣故推龍氣之生旺用雙山而不用正五行也又地理家有三針一曰正針乃二十四山之正位定向用之一曰中針其子位在正針壬子二位之中格龍用之一曰縫針其子位在子癸二位之縫消砂納水用之故中針與縫針差一位在中針則曰雙山五行在縫針則曰三合五行其實皆雙山法也甲寅辰巽戌坎辛申八山屬水離壬丙乙四山屬火震艮已三山屬木乾亥兌丁四山屬金丑癸坤庚未五山屬土地理大成曰洪範者即正五行而進推其本初之氣者也子午卯酉五行之正位故無變卯為木木必藉水故甲變水酉屬金金必藉土故庚變土午為火火不必木生而生于日之光故丙為太陽之火子為水水不必藉金生而反根于火水不得火則寒凍而冰死故壬為水中之火卯為木木旺則喜生火故乙為火酉為金金旺則喜生水故辛為水午為火火旺則喜鎔金故丁為金子為水水旺無土則散故癸為土此十二位皆以八干輔成四正之氣其中水火異于金木者金木以形用其理易直水火以神用其妙奧曲也四生者四正之始氣水之始本于金故亥是金木之始本于水故寅是水火之始本于木故已是木金之始本于土而申不變土而變水者燥土不生金土必得水而生金水實金之始氣道家所以水中求金故申是水也四墓者四正之歸氣萬物生則向上歸則向下在下之物水土是也火歸于土而灰水歸于土而涸故丑未為土金出于土不復能歸于土木出于土亦不能歸于土故同歸于水金入水則沈木入水則朽故辰戌為水也四維者四方之交也乾本生北水之金坤本生西金之土二老也故不變艮居水木之交受水以生木而土不能生木故從而變木巽居木火之交木固能生火而火實根于水蓋坎中之陽為火根離中之隂為水根水火互為其根故巽變水以為火根也神煞起例曰晉趙載注郭氏元經山家五行篇不用正五行而用洪範可見其傳已久或謂始于唐時一行禪師者妄也惜郭趙諸公用之而未嘗解釋其義逮元季無著大士始有紫白原本連山洪範論以洛書方位生成奇耦之數定五行而分吉凶又皆引而不發人不能解後見楚江萬民英所注三命通㑹論河圖及洪範五行頗有發明其言曰古者庖羲氏之王天下也則河圖以作八卦故序乾坤坎離震巽艮兌之名設天地日月風雷山澤之象繫辭曰天地定位山澤通氣雷風相薄水火不相射八卦相錯八卦成列而二十四位同行乎其中逮夫以隂陽消息驗之八卦之變甲本屬木納卦于乾乾與坤對以坤之上下二爻換乾之上下二爻化成坎象甲隨坎化故屬水也乙本屬木納卦于坤坤與乾對以乾之上下二爻換坤之上下二爻化成離象乙受離化故屬火也丙本屬火納卦于艮艮與兌對以兌之下爻換艮之下爻化成離象丙受離化故屬火也丁本屬火納卦于兌兌與艮對以艮之上爻換兌之上爻化成乾象丁受乾化故屬金也庚本屬金納卦于震震與巽對以巽之下爻換震之下爻化成坤象庚受坤化故屬土也辛本屬金納卦于巽巽與震對以震之上爻換巽之上爻化成坎象辛受坎化故屬水也壬本屬水納卦于離離與坎對以坎之中爻換離之中爻化成乾象壬受乾化本當屬金納于離火火焰金銷不能退立而自附于離火立焉故屬火也癸本屬水納卦于坎坎與離對以離之中爻換坎之中爻化成坤象癸受坤化故屬土也此八干納卦之變其爻之交換雖有不同而要各有取義如乾坤上下二爻交者取象于否泰之義故曰天地定位震艮以上爻交于巽兌巽兌以下爻交于震艮者取象于咸恆損益之義故曰雷風相薄山澤通氣坎離以中爻交于乾坤乾坤以中爻交于坎離取象于既濟未濟故曰水火不相射是也至八卦所屬之五行變不變雖有不同而亦各有取義乾坤本乎金土而不變者乃隂陽之祖宗衆卦之父母也退身于休息之地老亢而不變也坎離震兌位乎四正金木水火而不變者以子午卯酉隂位各専四旺之地宣布四時之令而氣化行焉故不變也艮巽用變者艮土易位于坎震東北之界處身于衰丑病寅之間思于更相代立自然成山而化木也巽木易位于震離東南之界立身于衰辰病已之間不能自立反歸于水辰為墓地故巽辰皆水也亥本屬水因金以生乘代金立故亥屬金也寅本屬木因水以生乘代水立故寅屬水也巳本屬火因木以生乘震之衰代震而立故巳屬木也申本屬金水能生申金助水勢故申屬水也辰戌丑未五方五土之神分為四季作造化甄陶之主為厚載之質本不可變因土以生木木附于土奪土一半為水水動土靜辰戌陽之動也故屬水丑未隂之靜也故屬土化氣五行所取之由大率類此蓋天地交而萬物通上下交而德業成男女交而志氣同古往今來未有不交合而能成其造化者也衰病代謝未有不繼禪乘代而能致化機之運者也故洪範為大五行凡人命遇甲乙丁庚辛壬癸干居于乾艮巽坤之鄉又當以所變者而論之與十干化氣六十納音納甲相參互看不可只以河圖正五行論儲泳袪疑說曰自古所用大五行雖郭璞元經亦守其說謂之山家五行然先輩皆謂莫曉其立法之因既無可考之理古今豈肯通用而不疑者哉深思其理求之太乙統紀之數而不可得求之皇極先天中天之數而不可得求之後天化合五運六氣之說而不可得反而求之卦畫於是得其說焉分列於後庶幾易見乾卦納壬甲乾為天天一生水戌屬乾自戌順一周匝至辛而極乾陽極而變坤故辛納乙坤納乙癸坤為君火坤用乙而不及癸者六癸皆不化火也癸却自化木木受坤化終於己之隂土土受乾化終於戊之陽土乾用壬申而生水坤乙生火而癸生木各主八位乾坤用足繼以長男長女庚辛運化金土攸定五氣迭布造化之功備矣本以卦畫象數參之六十甲子始得窺其立法之端倪不悖經㫖允合象數後有明者不易吾言矣大五行出於乾坤者十二位出於六子者亦十二位合六子足以當乾坤之數蓋乾坤之策三百六十合六子之策亦三百六十足以當乾坤之策也但郭景純所載未本屬木而金土木各得四位故山家五行篇曰癸丑坤庚名稼穡艮震己未曲直應今皆以未屬土殆必有所據其理亦通木三金四土五是也然一為數之元總攝八位可也火何以不二不七而四耶二說未知孰是將以質諸専門之學造理之士云山家五行郭景純既以名篇又於葬元一篇論坎坤水土之山則曰崇土益申長生位也及論艮山則曰崇土益亥非木之長生乎論巽山則曰崇土益申水長生也此又景純筆之書而用大五行之明證也醫書有左癱右瘓之證人身一氣脈也一息往來骨節毛竅何往不達及其感疾左癱者病不及右右瘓者病不及左五臟六腑一而已矣豈有界限使左之病不得右而右之病不得左耶夫五臟皆一而腎獨有二左為腎而藏精右為命而藏氣神依氣立故曰神門配壬子之水是以人之精敗者必左癱氣敗者必右瘓兩腎各有所主故其病亦各有所歸壬子一位也子屬水而壬屬火左腎配子右腎配壬子水為精壬火為神五臟猶五行也六腑猶六神也甲乙配青龍丙丁配朱雀庚辛配白虎壬癸配元武戊乃配勾陳巳乃配螣蛇蓋坎水納戊離火納己故五行而有六神猶五臟而有六腑壬火子水之說近取諸身理尤明甚今按地理大成之論世所共宗顧牽强支離不足以厭人之心神煞起例所載八干位以卦變而從化似為合矣至于壬不從金則又不可通於是自改其例且所為換爻者亦人之換之以凑合其說非理氣自然不得不換者也至其他遷就處亦不異于地理大成至于儲泳袪疑說以納甲納音得之實超出兩家之上言有本末但癸化木一語究無著落今按葬藏于土而土氣之生死在水故論正五行止有水土二行其金山火山木山云者皆言其形似而非真也所以不用而此洪範五行之說水居八而土居五為獨多也坎水離火兌金震木乾金坤土神煞起例謂其不變是己顧其餘者亦各從方位實有之五行而抉其幽元之義要亦不得謂之變也艮統丑寅其方為木之始氣故為木巽統辰巳其方為水之尾閭故為水然艮方本土也巽方本木也故丑為土而巳為木震統甲乙兌統庚辛木金之全局也震為木木之為行也其滋膏皆水而生氣皆火也是故始於水而終于火其始必由雨露之澤焉其終往往出火以自焚故甲水而乙火也水者震之所以為龍也火者震之所以為雷也兌為金金之為行也水土之所際由水土相比久而成石石乃生金金生而泉發是故始于土而終于水其始必土其終必水故庚為土而辛為水其土也兌之所以為剛鹵也其水也兌之所以為澤也坎統壬癸離統丙丁水火之全局也坎為水四獸北方有兩龜為水而蛇為火是以壬納于離水又比于土地中之水離地即失其性癸地中之水也故壬為火而癸為土離為火火能成金無火則金終埋于土是以丁為庚夫而兌納丁丙者日也八干之中唯丙當與乾坤同例故丙為火而丁為金日月與乾坤同而専言日者辛為月月為水辛固水也若夫寅之為水則以地不滿東南自析木之津以達于巽之地户皆積水之區所為尾閭泄之不知何時已者也故寅甲辰巽皆水也若夫亥之為金也則以天不滿西北自少昊之墟以至于亥之天門皆積山之區山者石而石者金故兌乾亥皆金也金積于西北而水盛于東南海為百川之朝宗而河為之源焉祭川所以先河後海也河源出于崑崙戌位也故戌為水也史記天官書曰漢者其本曰水河圖括地象曰河精為天漢唐書天文志曰北斗自乾攜巽為天綱雲漢自坤抵艮為地紀然則寅申者水之終始也故寅為水而申亦水也要而論之皆幽元之義實有之理而非或變或不變任人造作者也通書大全曰二十四山洪範五行為正運用本年五子元遁數至本山墓辰其墓辰之納音為變運取太歲納音與本年墓運納音相生合為吉墓運納音尅太歲納音尤吉惟忌年月日時之納音尅墓運納音耳甲寅辰巽戌坎辛申八山正運屬水丑癸坤庚未五山正運屬土水土墓在辰甲己年戊辰木運忌用金年月日時乙庚年庚辰金運忌用火年月日時丙辛年壬辰水運忌用土年月日時丁壬年甲辰火運忌用水年月日時戊癸年丙辰土運忌用木年月日時離壬丙乙四山正運屬火火墓在戌甲己年甲戌火運忌用水年月日時乙庚年丙戌土運忌用木年月日時丙辛年戊戌木運忌用金年月日時丁壬年庚戌金運忌用火年月日時戊癸年壬戌水運忌用土年月日時震艮巳三山正運屬木木墓在未甲己年辛未土運忌用木年月日時乙庚年癸未木運忌用金年月日時丙辛年乙未金運忌用火年月日時丁壬年丁未水運忌用土年月日時戊癸年己未火運忌用水年月日時乾亥兌丁四山正運屬金金墓在丑甲己年乙丑金運忌用火年月日時冬至後丁丑水運忌用土年月日時乙庚年丁丑水運忌用土年月日時冬至後己丑火運忌用水年月日時丙辛年己丑火運忌用水年月日時冬至後辛丑土運忌用木年月日時丁壬年辛丑土運忌用木年月日時冬至後癸丑木運忌用金年月日時戊癸年癸丑木運忌用金年月日時冬至後乙丑金運忌用火年月日時按墓龍者本山龍洪範五行之墓庫變運者本墓庫之納音隨歲運而變者也用五子元遁者與七政自冬至起算同義上年冬至已屬今年今年冬至即屬明年天地之運皆自子始也然五子元遁始子終亥而一歲統四時冬至後丑月歲君未更而墓運已改丑為金墓故金山之墓運冬至後又重變也如甲山正運屬水水墓在辰甲己年五子元遁自甲子順數得戊辰納音屬木即為木運乾山屬金金墓在丑甲巳年五子元遁自甲子順數得乙丑納音屬金即為金運冬至後屬乙庚年用乙庚年五子元遁自丙子順數得丁丑或用甲巳年五子元遁自甲子順數至乙亥又進而順數至丑亦得丁丑納音屬水即為水運餘倣此通書大全曰本年二十四山墓龍變運某山運為年月納音所尅即為年月尅某山惟新建宅舍新立墳塋論之其拆修豎造不動地基及舊塋附葬者皆不論如甲子年納音屬金本年水土山墓運戊辰屬木受年納音之尅即為本年尅甲寅辰巽戌坎辛申八水山丑癸坤庚未五土山也甲子年丙寅丁卯甲戌乙亥月納音屬火本年金山墓運乙丑屬金受月納音之尅即為正二九十月尅乾亥兌丁四金山也戊辰己巳月納音屬木本年木山墓運辛未屬土受月納音之尅即為三四月尅震艮巳三木山也庚午辛未月納音屬土本年二十四山無水運即其月無尅也壬申癸酉月納音屬金與本年納音同故亦尅水土山也丙子丁丑月納音屬水本年火山墓運甲戌屬火受月納音之尅即為十一十二月尅離壬丙乙四火山也又如壬申年納音屬金本年二十四山無木運惟冬至後金山墓運癸丑屬木受年納音之尅即為本年二十四山並無尅冬至後尅乾亥兌丁四金山也日時尅山家俱倣此凡自年月起山家之法用本年五子元遁歷數丑辰未戌四墓納音為年月納音所尅者其墓為某山之墓即為年月尅某山蓋墓龍變運從山起而忌年月此從年月起而尅山家參互相推其理一也立春艮雨水寅驚蟄甲春分震清明乙穀雨辰立夏巽小滿巳芒種丙夏至離小暑丁大暑未立秋坤處暑申白露庚秋分兌寒露辛霜降戌立冬乾小雪亥大雪壬冬至坎小寒癸大寒丑四立二分二至正應八卦是為八節奇門九局皆起于此乾納甲坎納癸申辰艮納丙震納庚亥未巽納辛離納壬寅戌坤納乙兌納丁己丑坎離不納戊巳者二十四山無戊巳故離納乾之壬坎納坤之癸其法不知所自來今按啓蒙附論曰火之體隂也其用則陽而天用之故乾中畫與坤交而變為離水之體陽也其用則隂而地用之故坤中畫與乾交而變為坎然則坎離納戊巳者固先天之傳而離納壬坎納癸則後天之用也其四正卦兼納八支取與本卦支為三合局地理家之坐山九星淨隂淨陽皆起于此小遊年變卦小遊年變卦青囊經謂之九曜亦名翻卦從乾卦翻者為天父卦從坤卦翻者為地母卦皆由天定卦翻變而出地理家之淨隂淨陽三吉六秀八貴十二吉龍皆本于此後世借以為男女生命合婚之用故名遊年因陽宅又有遊年變卦之法故此為小遊年其法以貪狼巨門祿存文曲廉貞武曲破軍左輔右弼為序以八卦而論則右弼與左輔同宫以九宫而論則貪狼為一白屬水巨門為二黑屬土祿存為三碧文曲為四緑屬木廉貞為五黃屬土武曲為六白破軍為七赤屬金左輔為八白屬土右弼為九紫屬火又以五星而論則貪狼為生氣屬木巨門為天醫祿存為絶體屬土文曲為遊魂屬水廉貞為五鬼屬火武曲為福德破軍為絶命屬金輔弼從本宫無專屬地理家從龍上起以貪狼巨門武曲廉貞為吉祿存文曲破軍輔弼為凶選擇家從向上起以貪狼巨門武曲文曲為吉祿存廉貞破軍輔弼為凶其取義各自不同卦例具詳於後天定卦例以乾艮坎震後天四陽卦橫列于下離巽坤兌後天四隂卦橫列于上而按先天生卦之序乾與兌對離與震對巽與坎對艮與坤對自本宫對卦一上一下次第翻之中起中止傍起傍止按天定卦例止取本卦之上爻變者為對卦所以便于翻轉究之乾震居中艮坎居傍陽卦居上隂卦居下亦無不可者地理大成另易有三式然則非果有一定也天父卦從乾翻起自上而中而下而復中而復上以次遞變乾上爻變為兌為貪狼兌中爻變為震為巨門震下爻變為坤為祿存坤中爻變為坎為文曲坎上爻變為巽為廉貞巽中爻變為艮為武曲艮下爻變為離為破軍離中爻變復為乾為輔弼是為傍起傍止地母卦從坤翻起坤上爻變為艮為貪狼艮中爻變為巽為巨門巽下爻變為乾為祿存乾中爻變為離為文曲離上爻變為震為廉貞震中爻變為兌為武曲兌下爻變為坎為破軍坎中爻變復為坤為輔弼是為中起中止按青囊經太元終易圖以坤為本宫說云坤為地母諸山所托三吉六秀勢定於此卦例訣曰經云三吉只求來勢好但以地母卦為主求其艮丙巽辛兌丁巳丑震庚亥未十二隂龍諸山所托之故也邱公頌曰三般大卦如何起元女當年親口傳三吉只求來勢好向家須變鬼爻看注曰坤為地母諸山所托察龍坤卦索求三吉後世因此遂有地理貴隂之說今按青囊卦例八宫皆稱地母三吉注曰三吉來山陽山隂落隂山陽落上吉陽山陽落而隂水朝隂山隂落而陽水朝次吉然則山不皆隂苐以與水相配為吉所謂地母卦者特舉坤以見例耳如坤為本龍艮為貪狼巽為巨門兌為武曲故以艮巽兌為三吉艮納丙巽納辛兌納丁故以丙辛丁並三吉為六秀又艮巽震兌四卦抽去中爻餘上下二爻皆隂陽得配謂之九六衝和震卦廉貞雖凶而以得配為吉震納庚故以震庚並三吉六秀為八貴又兌之三合為己丑震之三合為亥未故以己丑亥未并八貴為十二吉山皆由地母卦而定然八宫皆有九曜天父卦得天定卦之乾兌相對巽坎相對地母卦得天定卦之離震相對艮坤相對而六子之用備具故翻卦之法舉天父地母以見例十二吉山又専舉地母以見例邱公頌所謂後來翻作八山推者是也兌卦上爻變為乾為貪狼乾中爻變為離為巨門離下爻變為艮為祿存艮中爻變為巽為文曲巽上爻變為坎為廉貞坎中爻變為坤為武曲坤下爻變為震為破軍震中爻變復為兌為輔弼巽卦上爻變為坎為貪狼坎中爻變為坤為巨門坤下爻變為震為祿存震中爻變為兌為文曲兌上爻變為乾為廉貞乾中爻變為離為武曲離下爻變為艮為破軍艮中爻變復為巽為輔弼坎卦上爻變為巽為貪狼巽中爻變為艮為巨門艮下爻變為離為祿存離中爻變為乾為文曲乾上爻變為兌為廉貞兌中爻變為震為武曲震下爻變為坤為破軍坤中爻變復為坎為輔弼以上三卦俱用天父卦例艮卦上爻變為坤為貪狼坤中爻變為坎為巨門坎下爻變為兌為祿存兌中爻變為震為文曲震上爻變為離為廉貞離中爻變為乾為武曲乾下爻變為巽為破軍巽中爻變復為艮為輔弼震卦上爻變為離為貪狼離中爻變為乾為巨門乾下爻變為巽為祿存巽中爻變為艮為文曲艮上爻變為坤為廉貞坤中爻變為坎為武曲坎下爻變為兌為破軍兌中爻變復為震為輔弼離卦上爻變為震為貪狼震中爻變為兌為巨門兌下爻變為坎為祿存坎中爻變為坤為文曲坤上爻變為艮為廉貞艮中爻變為巽為武曲巽下爻變為乾為破軍乾中爻變復為離為輔弼以上三卦俱用地母卦例按翻卦之法皆以上一爻變為生氣貪狼上二爻變為天醫巨門下一爻變為五鬼廉貞下二爻變為福德武曲上下二爻變為遊魂文曲中爻變為絶命破軍三爻俱變為絶體祿存三爻俱不變為伏位輔弼蓋取上一爻變上二爻變或下一爻變下二爻變者則乾坤坎離四陽卦必變為震艮兌巽之四隂而四隂卦必變為四陽故為三吉以取坐山之用地理家所謂陽龍坐隂山立陽向隂龍坐陽山立隂向是也山與向既有隂陽之不同故論向者又自本宫五鬼方之對位起貪狼而以本宫與五鬼互易謂之五鬼卦如乾為本宫巽為五鬼乃轉以巽為本宫自巽對宫坎上起貪狼坤為巨門震為祿存兌為文曲乾為五鬼離為武曲艮為破軍巽為輔弼然後乾巽互易仍以乾為本宫巽為五鬼則所得坎坤離之三吉又皆與乾本宫成淨陽而其卦變遂一上一下以輔武破廉貪巨祿文為序然則變卦之吉凶皆以所分之隂陽為定耳未必有深義也或謂按諸卦例亦有合焉者其說曰先天八卦上一爻變者本象所生隂陽相配相生相比是猶同氣而相得者也故為生氣上二爻變者本儀所生奇偶相配相制而不相害是猶補偏而救弊者也故曰天醫下一爻變者陽往交隂隂往交陽往為屈屈為鬼而卦序皆相隔五位故曰五鬼下二爻變者老少同情隂陽交易志相得氣相生故為福德上下二爻變者陽儀隔位而交于隂隂儀隔位而交于陽隂陽奇偶俱不相配故曰遊魂中一爻變者陽儀隔位而還于陽隂儀隔位而還于隂其氣反歸而交尅故曰絶命三爻俱變則卦位對衝全非本體故曰絶體三爻俱不變則自得本宫故曰伏位猶云伏吟者也在八宫卦象則上爻持世卦為本宫伏位初世卦為五鬼二世卦為福德三世卦為絶體四世卦為天醫五世卦為生氣遊魂卦為遊魂歸魂卦為絶命如乾遇乾則成重乾為上爻持世卦是為伏吟乾巽相遇則成姤小畜皆初世卦為五鬼乾艮相遇則成遁大畜皆二世卦為福德乾坤相遇則成泰否皆三世卦為絶體乾震相遇則成無妄大壯皆四世卦為天醫乾兌相遇則成履夬皆五世卦為生氣乾坎相遇則成需訟皆遊魂卦為遊魂乾離相遇則成同人大有皆歸魂卦為絶命餘皆倣此今按先天之說甚巧其八宫卦象則唯絶體遊魂絶命與卦變義合餘無所取蓋特以此為記耳圖列於後大遊年變卦大遊年變卦相宅家用之選擇有以宅長行年配合修造之說故名遊年因地理亦有遊年變卦之法故此名大遊年小隂而大陽也其法亦由天定卦翻變而出而以貪狼廉貞武曲文曲祿存巨門破軍輔弼為序如乾為本宫乾上爻變為兌為貪狼兌中爻變為震為五鬼震下爻變為坤為武曲坤中爻變為坎為文曲坎上爻變為巽為祿存巽中爻變為艮為巨門艮下爻變為離為破軍離中爻變復為乾為輔弼貪狼與小遊同亦曰生氣廉貞即小遊之巨門亦曰五鬼武曲即小遊之絶體又曰延年文曲與小遊同又曰六煞祿存即小遊之五鬼又曰禍害巨門即小遊之福德亦曰天醫破軍輔弼與小遊同蓋陽宅之法以乾兌為老陽艮坤為老隂離震為少隂巽坎為少陽二老相配為西四宅二少相配為東四宅東西各自相配為吉交錯相配為凶故變卦之吉凶與小遊年有同異耳翻卦之法皆以上一爻變為生氣貪狼下二爻變為天醫巨門三爻俱變為延年武曲三爻俱不變為伏位輔弼蓋上一爻變者則乾兌互變艮坤互變離震互變巽坎互變下二爻變者則乾艮互變兌坤互變離巽互變震坎互變三爻俱變者則乾坤互變兌艮互變離坎互變震巽互變三爻俱不變者則自得本宫皆老少各自相配故為吉也外此則老少交錯相配故為凶也在八宫卦象則上爻持世卦為伏位初世卦為禍害二世卦為天醫三世卦為延年四世卦為五鬼五世卦為生氣遊魂卦為六煞歸魂卦為絶命與小遊年例亦有異同圖並列後乾上一爻變為兌兌上一爻變為乾離上一爻變為震震上一爻變為離巽上一爻變為坎坎上一爻變為巽艮上一爻變為坤坤上一爻變為艮乾兌老陽所生離震少隂所生巽坎少陽所生艮坤老隂所生乃先天生卦自然之序乾兌兩金相比震離木火相生坎巽水木相生艮坤兩土相比而後天乾陽兌隂震陽離隂坎陽巽隂艮陽坤隂乾坤坎離配洛書之奇兌震艮巽配洛書之偶又皆陽隂得配是為最吉之象故小遊年大遊年皆以為生氣也乾上二爻變為震震上二爻變為乾兌上二爻變為離離上二爻變為兌巽上二爻變為坤坤上二爻變為巽坎上二爻變為艮艮上二爻變為坎乾震金木相尅兌離火金相尅皆為陽儀所生巽坤木土相尅坎艮土水相尅皆為隂儀所生洛書又隂陽相配有相制而不相害之義故小遊年以為天醫大遊年則以其老少不相配為凶又以相尅為鬼故為五鬼義各有取也乾下一爻變為巽巽下一爻變為乾兌下一爻變為坎坎下一爻變為兌離下一爻變為艮艮下一爻變為離震下一爻變為坤坤下一爻變為震以乾兌離震之四陽往交于巽坎艮坤之四隂巽坎艮坤之四隂往交于乾兌離震之四陽老少皆不相配故小遊年以往而屈者為鬼又先天卦序皆隔五位故為五鬼大遊年既取相尅者為鬼則以此為禍害皆不吉也乾下二爻變為艮艮下二爻變為乾兌下二爻變為坤坤下二爻變為兌離下二爻變為巽巽下二爻變為離震下二爻變為坎坎下二爻變為震乾艮土金相生兌坤土金相生二老相配巽離木火相生坎震木土相生二少相配論八卦則以隂陽自得為德論九宫則以隂陽相得為德故小遊年以為福德大遊年以三爻全變之卦老長中少正配為吉不曰福德而曰延年則以此為天醫皆吉卦也乾上下二爻變為坎坎上下二爻變為乾兌上下二爻變為巽巽上下二爻變為兌離上下二爻變為坤坤上下二爻變為離震上下二爻變為艮艮上下二爻變為震二儀四象交相變易而八卦九宫隂陽老少皆不相配往而不相得故小遊年以為遊魂大遊年則以其為本宫卦第六變故為六煞皆不吉也乾中爻變為離離中爻變為乾兌中爻變為震震中爻變為兌巽中爻變為艮艮中爻變為巽坎中爻變為坤坤中爻變為坎乾離火金相尅兌震金木相尅巽艮木土相尅坎坤水土相尅奇耦老少皆不相配且皆自還本儀適與生氣相反又變卦翻卦皆至此七變而止是為最凶之象故小遊年大遊年皆以為絶命也乾三爻俱變為坤坤三爻俱變為乾兌三爻俱變為艮艮三爻俱變為兌坎三爻俱變為離離三爻俱變為坎震三爻俱變為巽巽三爻俱變為震乾坤坎離配洛書之奇兌艮震巽配洛書之偶又一與九三與七二與八四與六相加皆極十數地理家以孤隂孤陽為凶故小遊年取全變之義為絶體乾父坤母震長男巽長女坎中男離中女艮少男兌少女相宅家以隂陽正配為吉故大遊年取皆應之義為延年一吉一凶各隨其用爾欽定協紀辨方書卷二
