body:
  text: 月表十十月十月立冬十月節天道東行宜向東行宜修造東方天德在乙天德合在庚月德在甲月德合在巳月空在庚宜修造取土月建在亥月破在巳月厭在丑月刑在亥月害在申劫煞在申災煞在酉月煞在戌忌修造取土初一日長星十四日短星立冬前一日四絶後十日往亡小雪十月中躔在寅宫為十月將宜用甲丙庚壬時孟年甲子海中金義除日乙丑海中金制滿日丙寅爐中火義平日丁卯爐中火義定日戊辰大林木專執日己巳大林木義破日庚午路傍土伐危日辛未路傍土義成日壬申劔鋒金義收日癸酉劒鋒金義開日甲戌山頭火制閉日乙亥山頭火義建日丙子澗下水伐除日丁丑澗下水寶滿日戊寅城頭土伐平日己卯城頭土伐定日庚辰白鑞金義執日辛巳白鑞金伐破日壬午楊栁木制危日癸未楊栁木伐成日甲申井泉水伐收日乙酉井泉水伐開日丙戌屋上土寶閉日丁亥屋上土伐建日戊子霹靂火制除日己丑霹靂火專滿日庚寅松柏木制平日辛卯松柏木制定日壬辰長流水伐執日癸巳長流水制破日丙申山下火制收日丁酉山下火制開日戊戌平地木專閉日己亥平地木制建日庚子壁上土寶除日辛丑壁上土義滿日壬寅金箔金寶平日癸卯金箔金寶定日甲辰覆燈火制執日乙巳覆燈火寶破日丙午天河水專危日丁未天河水寶成日戊申大驛土寶收日己酉大驛土寶開日庚戌叉釧金義閉日辛亥叉釧金寶建日壬子桑柘木專除日癸丑桑柘木伐滿日甲寅大溪水專平日乙卯大溪水專定日丙辰沙中土寶執日丁巳沙中土專破日戊午天上火義危日己未天上火專成日庚申石榴木專收日辛酉石榴木專開日壬戌大海水伐閉日癸亥大海水專建日右六十干支從建亥者始立冬終小雪其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十九
