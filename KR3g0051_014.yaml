body:
  text: 年表二甲戌至癸未太嵗甲戌幹木枝土納音屬火開山立向修方吉嵗德甲嵗德合巳嵗枝德卯陽貴人未隂貴人丑嵗祿寅嵗馬申奏書坤博士艮三元紫白上元一白乾六白坤八白巽九紫中中元一白震六白艮八白坎九紫坤下元一白離六白中八白兌九紫艮蓋山黃道貪狼坎癸申辰巨門坤乙武曲離壬寅戌文曲兌丁巳丑通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后艮寅功曹乙辰天罡丙午勝光坤申傳送辛戌河魁壬子十二吉山宜寅午戌申子辰年月日時四利三元太陽亥太隂丑龍德巳福德未開山立向修方凶太嵗戌嵗破辰三煞亥子丑坐煞向煞壬癸丙丁浮天空亡離壬開山凶年尅山家乾亥兌丁山隂府太嵗艮巽六害酉死符卯灸退酉立向凶巡山羅㬋乾病符酉修方凶天官符巳地官符寅大煞午大將軍午力士乾蠶室巽蠶官辰蠶命巳嵗刑未黃幡戌豹尾辰飛亷子喪門子弔客申白虎午金神午未申酉獨火乾五鬼午破敗五鬼巽開山立向修方吉開山凶太嵗乙亥幹木枝水納音屬火開山立向修方吉嵗德庚嵗德合乙嵗枝德辰陽貴人申隂貴人子嵗祿卯嵗馬巳奏書乾博士巽三元紫白上元一白兌六白震八白中九紫乾中元一白巽六白離八白坤九紫震下元一白坎六白乾八白艮九紫離蓋山黃道貪狼坎癸申辰巨門坤乙武曲離壬寅戌文曲兌丁巳丑通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十二吉山宜亥卯未巳酉丑年月日時走馬六壬神后癸丑功曹甲卯天罡巽巳勝光丁未傳送庚酉河魁乾亥十二吉山宜亥卯未巳酉丑年月日時四利三元太陽子太隂寅龍德午福德申開山立向修方凶太嵗亥嵗破巳三煞申酉戌坐煞向煞庚辛甲乙浮天空亡坎癸開山凶年尅山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太嵗兌乾六害申死符辰灸退午立向凶巡山羅㬋壬病符戌修方凶天官符寅地官符卯大煞卯大將軍酉力士艮蠶室坤蠶官未蠶命申嵗刑亥黃幡未豹尾丑飛亷丑喪門丑弔客酉白虎未金神辰巳獨火乾五鬼巳破敗五鬼艮開山立向修方吉開山凶太嵗丙子幹火枝水納音屬木開山立向修方吉嵗德丙嵗德合辛嵗枝德巳陽貴人酉隂貴人亥嵗祿巳嵗馬寅奏書乾博士巽三元紫白上元一白艮六白巽八白乾九紫兌中元一白中六白坎八白震九紫巽下元一白坤六白兌八白離九紫坎蓋山黃道貪狼震庚亥未巨門兌丁巳丑武曲巽辛文曲坤乙通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后壬子功曹艮寅天罡乙辰勝光丙午傳送坤申河魁辛戌十二吉山宜申子辰寅午戌年月日時四利三元太陽丑太隂卯龍德未福德酉開山立向修方凶太嵗子嵗破午三煞巳午未坐煞向煞丙丁壬癸浮天空亡巽辛開山凶年尅山家乾亥兌丁山隂府太嵗坎坤六害未死符巳灸退卯立向凶巡山羅㬋癸病符亥修方凶天官符亥地官符辰大煞子大將軍酉力士艮蠶室坤蠶官未蠶命申嵗刑卯黃幡辰豹尾戌飛亷申喪門寅弔客戌白虎申金神寅卯午未子丑獨火艮五鬼辰破敗五鬼坤開山立向修方吉開山凶太嵗丁丑幹火枝土納音屬水開山立向修方吉嵗德壬嵗德合丁嵗枝德午陽貴人亥隂貴人酉嵗祿午嵗馬亥奏書乾博士巽三元紫白上元一白離六白中八白兌九紫艮中元一白乾六白坤八白巽九紫中下元一白震六白艮八白坎九紫坤蓋山黃道貪狼艮丙巨門巽辛武曲兌丁巳丑文曲離壬寅戌通天竅三合前方乾亥壬子癸丑三合後方巽巳丙午丁未十二吉山宜巳酉丑亥卯未年月日時走馬六壬神后乾亥功曹癸丑天罡甲卯勝光巽巳傳送丁未河魁庚酉十二吉山宜巳酉丑亥卯未年月日時四利三元太陽寅太隂辰龍德申福德戌開山立向修方凶太嵗丑嵗破未三煞寅卯辰坐煞向煞甲乙庚辛浮天空亡震庚開山凶年尅山家甲寅辰巽戌坎辛申丑癸坤艮未山隂府太嵗乾離六害午死符午灸退子立向凶巡山羅㬋艮病符子修方凶天官符申地官符巳大煞酉大將軍酉力士艮蠶室坤蠶官未蠶命申嵗刑戌黃幡丑豹尾未飛亷酉喪門卯弔客亥白虎酉金神寅卯戌亥獨火震五鬼卯破敗五鬼震開山立向修方吉太嵗戊寅幹土枝木納音屬土開山立向修方吉嵗德戊嵗德合癸嵗枝德未陽貴人丑隂貴人未嵗祿巳嵗馬申奏書艮博士坤三元紫白上元一白坎六白乾八白艮九紫離中元一白兌六白震八白中九紫乾下元一白巽六白離八白坤九紫震蓋山黃道貪狼艮丙巨門巽辛武曲兌丁巳丑文曲離壬寅戌通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后辛戌功曹壬子天罡艮寅勝光乙辰傳送丙午河魁坤申十二吉山宜寅午戌申子辰年月日時四利三元太陽卯太隂巳龍德酉福德亥開山立向修方凶太嵗寅嵗破申三煞亥子丑坐煞向煞壬癸丙丁浮天空亡坤乙開山凶年尅山家離壬丙乙山隂府太嵗坤震六害巳死符未灸退酉立向凶巡山羅㬋甲病符丑修方凶天官符巳地官符午大煞午大將軍子力士巽蠶室乾蠶官戌蠶命亥嵗刑巳黃幡戌豹尾辰飛亷戌喪門辰弔客子白虎戌金神申酉子丑獨火震五鬼寅破敗五鬼離開山立向修方吉開山凶太嵗巳卯幹土枝木納音屬土開山立向修方吉嵗德甲嵗德合巳嵗枝德申陽貴人子隂貴人申嵗祿午嵗馬巳奏書艮博士坤三元紫白上元一白坤六白兌八白離九紫坎中元一白艮六白巽八白乾九紫兌下元一白中六白坎八白震九紫巽蓋山黃道貪狼乾甲巨門離壬寅戌武曲坤乙文曲巽辛通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸