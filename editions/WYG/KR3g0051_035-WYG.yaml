body:
  text: 辨譌術士好竒而嗜利譌言繁興比以為吉彼以為凶自漢褚少孫補史記已言之況又經六代唐宋元明以來其謬説又不知凡幾二十四向而神煞盈千六十甲子而術家盈百以前民利用之具而成惑世誣民之書不可不辨也顧流傳民間者隨地而異耳目難周即所覩聞亦難盡駁卷中辨論者夫亦舉一隅云耳作辨譌男女合婚大利月諸家鑾駕星曜巡山二十四神煞驛馬臨官刀砧火血逆血刃九良星暗刀煞支退流財神煞同位異名斗首五行尊星帝星神在上吉七聖伏斷日宻日裁衣日上元下元四不祥紅沙章光五合五離的呼日殃煞出去方滿徳吉慶冰消瓦解滅門大禍楊公忌天狗六道五符擇時九僊時男女合婚大利月隂陽家言多病迂泥術士揑造益屬荒唐而惑世誣民則未有如合婚大利月之尤甚者夫婦之道人倫之始書載釐降詩咏闗雎未嘗有合婚之説也詩曰士如歸妻迨冰未泮禮曰仲春之月令民㑹男女未嘗有大利月之説也即祿命之法以人生年月日時去留疏配推人壽夭窮通亦未嘗有以男女年月定妨妻妨夫之説也為是説者不知其所自起而皆托於吕才觀唐書吕才傳其於隂陽術數辨駁甚詳則其為術士之偽托無疑也今取其説而論之三元九宫者乃年九星入中宫之一星非謂其年之生命即在是宫也由年而衍之於人由男而衍之於女已屬展轉支離説見附錄而又以地理家遊年變卦之法兩宫相配以定吉凶無論比儗非倫且地理專取淨隂淨陽説見本原而婚姻則取隂陽配耦是葬之所謂吉正婚之所謂凶更屬顯然背謬又況世傳九星誤以上元為中元説見附錄則宫已非其宫而卦亦非其卦然則世之惘惘焉據以為拘忌者誠不啻謬以千里也孤辰寡宿者乃由竒門孤虚之法而推衍之而荒誕無義理竒門以旬空為孤其對為虚又有年孤月孤日孤時孤乃年月日時後二辰如子年月日時則戌亥為孤辰巳為虚皆以方位言也通書有孤辰寡宿日以令前一辰為孤辰令後一辰為寡宿如寅夘辰春令已為孤辰丑為寡宿寡即孤意孤即虚意已屬無稽説見附錄然一月止忌一日其害猶小而合婚者乃謂亥子丑年正月生男命為孤辰主妨妻九月生女命為寡宿主妨夫蓋因兵書有云背孤擊虚一女可敵十夫術士遂揑為孤寡之名而以妨夫妨妻為説夫以三年而生一月之内合諸日時命以千計而謂其皆妨夫妨妻雖三尺童子亦不信也胞胎相衝者寅申年忌己亥月夘酉年忌子午月蓋術家以隔三為破猶建除之平收也夫隔三之義月日則然而亦非盡以為忌況男年與女月女年與男月了不相干何破之有俗術因産厄之可畏而揑此名以嚇人誠可惡也骨髓破取本生年月與胞胎同而或平或收又非魁罡之義鐵掃帚既取三合而水局取衰病月金局取冠帶與衰月火局取臨官與死月木局取帝旺與胎月參差不倫又必傳寫之誤無端而加以掃破之名當亦不能自為之説也年月六害祿命不忌且年月非夫婦何以遂為不和之占假令年月相衝又當作何論斷此不待辨而知其非也四敗生命既非本於五行又無取於三合其月分更無例可推而謂男女生月犯之多啾唧殊無謂也至於男命以干尅者為妻女命以尅干者為夫乃祿命之法論日干非論年納音也術士從而衍之以男女生命納音為主男取音之所尅為妻女取尅音者為夫自長生至衰為益財自病至養為退財絶為鰥寡死墓為多厄死墓絶為妨妻妨夫如水命男以火為妻火生於寅而衰於未故正月至六月生為益財病於申而養於丑故七月至十二月生為退財絶於亥故十月生為望門鰥死於酉墓於戌故八九月生為妻多厄而八九十月生又為死墓絶妨妻又如水命女以土為夫土長生於申而衰於丑故七月至十二月生為益財病於寅而養於未故正月至六月生為退財絶於已故四月生為望門寡死於夘墓於辰故二三月生為夫多厄而二三四月生又為死墓絶妨夫夫五音之命各十二年三月之中計二萬五千九百二十命六月之中計五萬一千八百四十命無論何日何時而謂生此三月之内皆妨妻妨夫生此六月之内皆退財固萬萬無是理也至於男之益財金命十月誤起七月土命七月誤起五月女之益財火木金命皆差早一月死墓絶妨夫誤與男命同則傳寫之譌更不足辨世人不察其所以然之故惟聽術士之説一一求其悉合多至逾時不得婚嫁嘻俗術之害人何至此極耶然合婚之説北方世俗用之士大夫及南方皆不深信而行嫁大利月則舉世用之而不辨其非而不知其所謂大利者固術士之揑造而無理之甚者也其法以女命為主子寅辰午申戌六陽年自本命前一月向前順數丑夘己未酉亥六隂年自本命後一月向後逆數第一月為大利第二月妨媒氏首子第三月妨翁姑第四月妨女父母第五月妨夫第六月妨本身至第七月又復一轉夫第十二月為女本命第六月為本命之衝雖選擇無忌地支一字之理而猶有可言陽前隂後一月又何取以為大利耶且第一月利矣以次而推何由而妨媒氏何由而妨翁姑何由而妨父母何由而妨夫壻求之隂陽五行九宫八卦堪輿建除叢辰之説無一可通此不亦荒誕不經之至乎而世俗懵然信之一月偶愆輒逾數歳摽梅束楚詩之致慨於失時者比比皆然故曰惑世誣民之尤甚者也今已奏准刪除具錄立成於左觀者當自知辨合婚立成男女生命上元中元下元通書曰吕才云合得生氣天醫福徳為上吉子孫昌盛不避胞胎月内諸凶如遇絶體游魂歸魂為中等可以輕重較量言之如命卦通和月中少忌可以成婚但婚姻之事理無十全中平亦吉若遇五鬼則主男女口舌惟遇絶命則於男女多各有憂雖命卦和悦亦不宜也右煞男女生月犯之毎多啾唧大利月妨媒氏首子妨翁姑妨女父母妨夫主妨女身右女命已上親屬若得行嫁大利月是遇吉期無諸禁忌喜見新人餘月各有所忌如無所忌之人則吉諸家鑾駕星曜玉皇鑾駕紫㣲帝星紫㣲鑾駕北辰帝星撼龍帝星都天寳照都天轉運行衙帝星周仙羅星星馬貴人既非實有此星又且必無此理且于一帝星之中又有金輪火輪水輪天乙太乙諸名皆術士揑造選擇宗鏡日統而論之有五六玉皇終年各守一方絶不移易是六朝之分皇五代之各帝也有是理乎且擇日而取日月星辰到山向者喜山向之光輝也豈謂日月星辰中有神仙乎彼昏不知悞以為道家所稱太陽帝君太隂帝君銀河星君遂各揑一玉皇以壓之以致紛紛不一誣罔極矣今皆刪去不用而各錄立成於左玉皇鑾駕立成紫㣲鑾駕年龍月兔日虎時牛甲巳丁壬戊癸陽年立成北辰帝星立成撼龍帝星立成都天轉運行衙帝星立成星馬貴人吉凶方位立成亥夘未年巡山二十四神煞年支神煞隨二十四山順行者從太歳逼近之方起以次漸推而逺還歸于太歳之方假如子年癸名曰巡山羅㬋凶次丑則曰暗曜凶又次艮則曰土宿凶又次寅則曰瘟星凶又次甲則曰水星吉又次夘則曰財寳吉又次乙則曰金星凶又次辰則曰血光凶又次巽則曰太陽吉又次巳則曰吉星吉又次丙則曰火星凶又次午則曰炎曜凶又次丁則曰紫氣吉又次未則曰榮官吉又次坤則曰計都凶又次申則曰刀兵凶又次庚則曰木星吉又次酉則曰旺田吉又次辛則曰鬼煞凶又次戌則曰傷亡凶又次乾則曰太隂吉又次亥則曰吉慶吉又次壬則曰攝提凶又次子為太歳本位則曰旺蠶吉丑年則巡山羅㬋從艮起以次順推二十四山以居二十四煞十二年例同之今觀其名而思其義考其例而度其情其為術士揑造已屬曉然唯巡山羅㬋逼近太歳俗所最畏而亦尚近乎理故臺本取之餘皆不用而猶載其例于事類總集中其起例錯誤辨見義例又以二十四煞中有計都遂謂羅㬋屬火辨見利用其餘無庸深辨觀立成當共見矣驛馬臨官驛馬臨官即驛馬前二干及其對方俗術又以驛馬前一干為馬前六害對方為金童撞命煞夫同一馬前也以為臨官即吉以為六害即凶顯然自相矛盾究之三合長生對衝為驛馬與前後干支了無干涉命吉命凶皆妄談也臨官六害已非其義金童撞命尤為怪誕不經今一併刪去不用逆血刃九良星暗刀煞逆血刃以八干四維分佈六十甲子各占一字而不用十二支毫無理路但取三字之可怕以恐嚇愚人耳九良星亦分佈六十甲子每日在一處暗刀煞則六十月各占十二處五年一周至為謬妄今為合表列後觀表即知其妄無須深辨也支退流財按起例支神退方子年起已逆行十二支又謂之流財從月起者為月流財從日起者為日流財蓋以一陽生于子而至于巳之六陽一隂生于午而至于亥之六隂乃隂陽順生之序今子年起巳至巳年而在子是陽之退也午年起亥至亥年而在午是隂之退也然師以左次而無咎壯以觸藩而無攸利隂陽之義正不以進退為吉凶且又非實有一物起已而逆行徒曰年各一方更無取義即子年巳方午年亥方為劫煞丑年辰方未年戌方為歳煞乃别從三合起例與支退了不相干特俗情兢進而好財術士遂詭詞以動聽其與刀砧火血雅俗雖有不同而其為揑造則一也況由是而進焉以取支之卦位子年己丑年辰皆巽也寅年夘則震也夘年寅辰年丑皆艮也巳年子則坎也午年亥未年戌皆乾也申年酉則兌也酉年申戌年未皆坤也亥年午則離也又或兼取雙山愈引愈逺而本義遂不可曉今通書支退唯子丑巳午未酉亥年與起例合流財唯辰午未酉戌年與起例合餘年皆誤然則今之所謂退者亦非退而流者亦非流也俗術流失至於此極故刪而辨之作者復起當亦爽然神煞同位異名年月神煞由來舊矣術士好竒每事揑造造之不得則猶是神煞而揑為别名又略為改竄以文其陋而神煞由此日紛即如一浮天空亡也又名之曰頭白空亡又名之曰八山空亡一坐煞向煞也又名之曰翎毛禁向又名之曰八山刀砧而亦自厭其重複也則於八山刀砧而加之以三合月于頭白空亡而加之以八卦山而又叅互錯譌世本遂並列之以為數煞而莫之辨又如六害則别名之曰隂中太歳隂中煞小耗則别名之曰淨欄煞而皆隱其本名又如黄道黒道則又别立名色名曰明星黒星而雷公與天岳吉凶互異雷公即青龍本吉星也天岳即天牢本凶星也因天牢而别名曰天獄因獄而訛嶽又因嶽而訛岳遂以天岳為吉而雷公為凶曹震圭邵泰衢已辨其誤而未之改正又如王官守相民日則衍之而至於十二説見義例而又别為福厚恩勝等名建除十二神已有同位異名而又别為朱雀貴人等號夫神煞一也而名號旁見側出惑人耳目深可厭惡今查明概行刪去而具立成於左此外可以類推亦不能悉舉也壬子巽巳辛戌六山屬土乙辰庚酉四山屬金甲夘坤申四山屬水艮寅丁未四山屬木癸丑丙午乾亥六山屬火魏鑑曰此十干化氣所生也其法用五子元遁視化氣天干所加之支即為同氣而同宫之干維隨之如甲巳化土依五子元遁得甲子己巳甲戌故子巳戌屬土而壬與子巽與巳辛與戌俱同宫故六山俱屬土乙庚化金依五子元遁得庚辰乙酉故辰酉屬金而乙與辰庚與酉俱同宫故四山俱屬金也餘倣此凡斗首俱以坐山所屬五行為王為我為元辰我生者為亷貞為子孫生我者為貪狠為官星我尅者為武曲為妻財尅我者為破軍為鬼賊凡擇日期以年月為上為外為出日時為下為内為入元辰宜生旺有氣宜生出不宜死絶受尅亷貞子孫只喜一位重見則洩氣損子孫貪狼官星不宜生入尅入宜休囚武曲妻財宜生旺有氣宜生入尅入不宜生出尅出破鬼宜休囚尅出不宜生旺有氣按斗首五行不知其所自起為其説者皆托之楊筠松及觀筠松所著諸篇絶無一語論及斗首其為偽托可知今臺本亦不載而四方術士多挾之以為秘訣舉世莫能别其是非不知其説則固支離之甚者也如因甲巳化土遂以甲巳遁出之甲巳二干所臨之支及其同宫干維皆屬土而甲巳反不屬土其大㫖已離其宗而亷貞貪狼諸名又非卦變本義由兹而推衍之别為吉凶格局更不可問故撮其大要而辨之觀者知其無稽自不惑于其説而好竒以自逞者其亦可息矣尊星帝星選擇宗鏡曰凡選擇取用尊帝二星到山到向到方能壓一切凶煞召吉致祥若㑹歳命貴人祿馬同到修造遇之發福最快年起例凡上元下元甲子年尊星起乾六乙丑兌七丙寅艮八順行中元甲子年尊星起坎一亦順行俱不入中宫輪六十年其對宫為帝星如下元甲子年造乾山巽向尊星到乾帝星到巽大吉月起例凡甲丙戊庚壬五陽年正月九月尊星到艮二月十月到離三月十一月到坎四月十二月到坤五月到震六月到巽七月到乾八月到兌乙丁巳辛癸五隂年正月九月到震二月十月到巽三月十一月到乾四月十二月到兌五月到艮六月到離七月到坎八月到坤其對宫為帝星日起例凡冬至後甲子日尊星起乾夏至後甲子日尊星起坎順行六十日不入中宫其對宫為帝星時起例凡子寅辰午申戌六陽日甲子時尊星起乾丑夘己未酉亥六隂日甲子時尊星起坎俱順行不入中宫其對宫為帝星按選擇宗鏡極言尊帝二星之吉今考其起例甚無義理宜乎臺本之不用也其曰年例上元下元甲子起乾六中元甲子起坎一者蓋自上元甲子年起乾六至己未年而七周庚申年又值乾六則中元甲子必起坎一也又至己未年而七周庚申年又起坎一則下元甲子必起乾六也然下元甲子六十年既盡而再起上元則不能復至乾六與三元九宫周而復始之義不合且既用飛九宫而不用中五亦屬非理大抵亦術士之揑造耳其陽年正月起艮八亦即月九星正月起八白之義然年例已不合月日時益不足論矣神在通書以甲子乙丑丁夘戊辰辛未壬申癸酉甲戌丁丑己夘庚辰壬午甲申乙酉丙戌丁亥己丑辛夘甲午乙未丙申丁酉乙巳丙午丁未戊申己酉庚戌乙夘丙辰丁巳戊午己未辛酉癸亥三十五日為神在日其日宜祭祀曹震圭作明原謂為唐賈耽所集曲為之解而不能通又引撮要曰舊本錯誤十有八日今依官本改正未審舊本為非新本為是選擇宗鏡則曰神無所不在以此三十五日為神在日其不在日又何在乎今徧查諸家通書皆無解説惟道藏玉匣記云許真君考天曹案簿三十一日諸神在人間地府祭祀受福餘日諸神在天求福反禍察其日數雖比通書少四日不同九日然其為根本于玉匣記而又加之以傳譌亦可斷矣查玉匣記出道續藏乃明嘉靖年所添許旌陽晉代人有傳可考荒誕不經莫此為甚上吉七聖辛未壬申癸酉己夘壬午甲申壬寅甲辰丙午己酉庚戌丙辰己未庚申辛酉十五日為大明日今通書稱上吉日明原謂是李淳風所集又以丙寅丁夘戊辰己巳壬申癸酉甲戌乙亥丙子丁丑庚辰辛巳甲申乙酉戊子己丑庚寅辛夘甲午乙未戊戌己亥壬寅癸夘甲辰乙巳戊申己酉庚戌壬子癸丑甲寅乙夘戊午己未庚申辛酉三十七日為七聖日明原謂是賈耽所集七聖者黄帝元女文王周公孔子天老董仲舒也其日宜舉百事天老為黄帝時人尚未知其有無至元女之説更為誤謬元者天之色也女者母萬物者也亥在子前至于子而天開矣子前為亥則亥乃生天之本也故乾在亥宋儒曰以形體言之謂之天以主宰言之謂之帝以性情言之謂之乾故乾者天之性情也性情在形體之先故天開於子而乾在亥也乾在亥即是生天者矣故又以元女名之元即天也女為母義故六壬之術于十干中配壬為名謂是元女所傳壬即亥云爾乃以元女為實有此人又能與黄帝文王周公孔子同集此三十七日流傳人世亦可嗤矣又以董仲舒配成七聖益為怪謬不倫伏斷日宻日裁衣日伏斷日宻日裁衣日皆以值宿起算查二十八宿選擇之法來自西域伏斷以日配宿略似旬空路空八十四日而一周其法以子日起虚丑值斗亥值壁亥子丑屬水而又值水宫之宿以水遇水為嫌是與路空之義相似也以下按支逆數則進四宿順數則退四宿蓋支十二而宿二十八支輪二周必差四位故連本位隔四取之戌值胃酉值觜申值鬼未值張午值角已值房辰值箕夘值斗寅值室其值日之宿皆在日支後二宫是與旬空之義相似也然寅夘日在後三宫則因隔四所致必不能合較之旬空路空之義亦又疎矣且伏斷本選時之法兼取亢牛婁鬼四金宿為暗金伏斷時其法以一元甲子日起虚二元甲子日起奎三元甲子日起畢四元甲子日起鬼五元甲子日起翼六元甲子日起氐七元甲子日起箕七元既盡而甲子日又起虚周而復始各從甲子日起子時歴六十日七百二十時而止然其數則亦七日八十四時而一周也如一元甲子日起虚宿即從子時起虚寅時值室巳時值婁酉時值觜故一元甲子日子時寅時酉時皆為伏斷已時為暗金由是順數乙丑日子時起鬼丙寅日子時起箕丁夘日子時起畢戊辰日子時起氐己巳日子時起奎庚午日子時起翼至辛未日子時又起虚與甲子日同二元甲子日起奎宿即從子時起奎丑時值婁申時值鬼故二元甲子日丑時申時皆為暗金申時又為伏斷以次順數乙丑日子時起翼丙寅日子時起虚丁夘日子時起鬼戊辰日子時起箕己巳日子時起畢庚午日子時起氐至辛未日子時又起奎亦與甲子日同三元以後皆倣此但以日而論則七元四百二十日而一周而以時而論則六十日七百二十時自一元甲子日子時起虛至癸亥日亥時至亢而止與二元甲子日子時起奎者尚隔十有二宿不能輪轉則是雖有七元之説而其義實不能通夫理非自然數非脗合皆屬揑造宜今選時之不用也密日者乃房虚星昴四宿七政屬日西語曰密彼地以為主喜事而中國遂以其日忌安𦵏啓攢凶事亦無謂矣且西域二十八宿分屬七政其日各有宜忌與中國風俗逈然不同專取密日更屬無謂至以角亢房斗牛虚壁奎婁鬼張翼軫十三宿為宜裁衣亦出彼地俗忌並不可從密日裁衣日易明不列立成伏斷日時各列立成于後伏斷時立成上兀下兀宋王明清談錄載丁顧言宦蜀至官有期駐舟江滸游憩山寺遇老僧問何為而至丁具以告又問期在何時丁又以告僧曰是取為兀日不可視事勿避之君必以事去丁笑而不應既至官月餘以事免歸是兀日之説自宋已有之矣顧詳其取義不過小六壬之留連赤口日耳陽年正月初一日起小吉隂年正月初一日起留連按日順數毫無深義然則宋時老僧亦偶中耳人之以事去官者豈盡由視事之遇兀日耶以兀日視事者又豈盡去官耶通書以每月初四初七十六十九二十八凡五日謂之四不祥忌上官赴任臨政親民世俗信之惟謹今按其起例蓋以隔三為破對七為衝乃月朔地支衝破之日猶建除家之平破日也假如月朔是子日子破夘而衝午此五日者非夘日則午日也月朔是丑日丑破辰而衝未此五日者非辰日則未日也自寅至亥皆倣此蓋古者以月朔為吉月故術士遂以衝破之日為不祥然日統于月月建當令氣王故以衝破為凶若月朔亦月中之一日耳餘日干支無與月朔衝破之理則四不祥之名亦附㑹支離之甚者也今刪去不用紅沙轉神歴曰紅沙者孟月酉仲月巳季月丑其日忌嫁娶儲泳袪疑説曰己酉丑之所以為煞者先天數之四衝也夫子午之數各九夘酉各六總為三十自子順行極三十而見已是為四仲之正煞寅申各七己亥各四總二十二自子順行極二十二而見酉是為四孟之正煞辰戌各五丑未各八總二十六自子順行極二十六而見丑是為四季之正煞此申壬三煞之所由起也按紅沙即身壬煞儲華谷以為極數然驛馬亦是極數是不得以極為凶也即謂驛馬為三合身壬為四衝然四衝為建破平收而平收亦不盡以為忌況酉月巳日則是三合亥月酉日則是生氣亦未可以其為四衝之總數而遂謂之衝非若驛馬實有動象若四季月丑日則真建破魁罡不待以紅沙而後為忌也又一本孟月取巳仲月取酉皆與季月例同通書萬年書皆不用故今仍之不以轉神為據云章光堪輿經以月厭前一辰為章光後一辰為無翹蓋堪輿家專忌月厭故前後並忌然亦是後人附㑹耳無翹即太陽辨見義例堪輿家專取不將乃厭前干配厭後支章光已是厭前支自在不用之内不須又立章光名色也且日辰非同方位比連無前後並忌之理别本又以厭後為金烏厭前為玉兔並為歳神吉方然則方且不忌何況於日曹震圭謂章光者能為月厭章顯其光故凶將又謂月厭能為太陽章顯其光而以為吉也耶五合五離五合五離見義例俗術又以甲寅乙夘為日月合丙寅丁夘為隂陽合戊寅己夘為人民合庚寅辛夘為金石合壬寅癸夘為江河合甲申乙酉為日月離丙申丁酉為隂陽離戊申己酉為人民離庚申辛酉為金石離壬申癸酉為江河離就五行而立五名不惟非五合五離本義且甲乙何以為日月丙丁何以為隂陽皆不可曉而世俗遂以戊寅己夘為大吉戊申己酉為大凶亦可怪也附㑹之害理多類此入殮安葬的呼日甲子辛丑生人乙丑辛巳丙寅丙午丁夘甲午甲戌戊辰癸未癸酉己巳甲辰己未庚午壬戌辛未己亥壬申丁巳癸酉辛丑甲戌戊子乙亥乙未丙子丁丑丁丑癸未戊寅甲辰丙午己夘丁亥己未庚辰戊辰戊戌辛巳己未壬午壬寅癸未甲申甲申壬辰乙酉丙子丙戌甲子丁亥丁亥丁巳戊子己夘己丑丁未庚寅丙申辛夘辛未壬辰壬申癸巳甲午甲午丁酉庚子乙未丙子丙申丙申乙丑丁酉丁酉戊戌癸亥己亥辛未庚子乙未辛丑壬子壬寅甲辰癸夘丁巳丙辰甲辰庚辰乙巳丙子丙午丁巳丁未丁未己未戊申庚戌己酉庚申庚戌辛丑辛亥辛亥壬子乙亥癸丑丁亥甲寅甲寅癸巳癸未乙夘戊子丙辰丙辰甲辰甲申丁已庚子戊午辛未己未丙戌庚申辛巳辛酉辛酉庚辰壬戌辛酉辛丑癸亥丙寅按通書曰已上的呼臨事之日被呼之人避之而世俗誤於其説孝子生命值被呼者甚至不親殮不臨穴敗俗傷化莫此為甚而考其所忌之日又毫無義理殆術士揑造中之尤不通者外此又有通忌之命取本月建破平收而謂有服者則不忌皆屬謬妄今皆刪之殃煞出去方通書云以月將加死時男取天罡下女取河魁下為殃出日時假令五月甲子日巳時陽人死以月將小吉加巳天罡臨寅殃出當寅日寅時陽人取日干之墓方為所去方甲干屬木木墓在未未為去方是也如五月己酉日夘時隂人死以月將小吉加夘河魁臨午殃出當午日午時隂人取日辰之墓方為所去方酉支屬金金墓在丑丑為去方是也餘倣此此條奉㫖不用按康熈七年欽天監㑹議選擇通書闕少二十三條於通書大全内取用此條亦其一也今按通書大全云出宋司天少監楊惟徳塋元總錄其凡例又云南人並無此説惟北方人避之此不必信又吹劍錄亦深闢避煞之非康熈二十三年重編選擇通書奉㫖不用誠可謂萬世定論矣滿徳吉慶選擇宗鏡以滿徳吉慶為偽吉日信知言也今具立成於左觀名例自見毋庸深辨冰消瓦解滅門大禍冰消瓦解又名夭命煞以例推之即年支之平收也夫平收日已非盡凶而年煞又輕於月煞何年之平收即至於冰消瓦解而夭命乎陽月平隂月收為天罡加本年遁干為滅門陽月收隂月平為河魁加本年遁干為大禍如正月己為平日亥為收日甲巳年五虎遁則為己巳乙亥也二月子為收日午為平日甲巳年五虎遁則為庚午丙子也其餘年月倣此夫甲年之巳為天徳合正月乙亥為天願日有何凶處況其凶至於滅門大禍而取決於一日之干支雖三尺童子亦知不信也蓋術家有祿馬貴人遇本年遁干為真吉之説小人遂從而揑之以平收遇本年遁干為真凶不知彼以方言其説可通此以日言與方無涉也宗鏡以滅門大禍為偽凶日則冰消瓦解益不足辨又曰好利之徒立一吉星又立一凶星謂通書未載惟我獨知使人趨已豈知抄之刻之遂成故典觀諸凶煞火星與官符血刃獨多蓋愚民怕官非與火燭而貧者止以六畜為生計故也今觀此條則充類至義之盡夫名之可畏無有過於冰消瓦解滅門大禍者而究其實則止一平收日嘻術士之揑造大言妄談禍福乃至此極也楊公忌世俗多畏楊公忌通書亦多載之謂其日不宜出行舉事犯之不利皆因未悉其原委故為所惑耳今按其説乃是室火猪日其術元旦起角宿依二十八宿次序順數值室宿之日即為楊公忌不論月之大小二十八日一週每月遞退二日故正月十三二月十一以至七月初一二十九而終于十二月十九凡十三日夫以宿值日亦如用甲子紀日雖未必始於大撓而其來已久每日一宿自然順序不用安排以論趨避猶可説也然亦未聞室宿值日有所避忌今並非值日之宿而强以角宿起元旦每年叧起不能輪轉固不通矣且若正月小則二月十一日乃是危宿二月再小則三月初九日乃是虚宿又安得强指為室火猪乎晉志曰營室為元宫又名清廟必非凶曜詩曰定之方中作於楚宫爾雅曰營室謂之定蓋古者視營室中而興土功未當以為忌也將以其為火歟尾室觜翼皆火宿也何獨忌於室耶將以其為猪歟星係宫像不係肖形顧可實指為猪耶邪説誣民莫此為甚彼楊公者不知為何許人其説殆與宻日同出西域彼俗惡猪聞聲輒厭故併忌之然豈可用之中國耶天狗嫁娶最忌月厭月厭正月從戌起戌為狗術士遂以天狗命之夘戌酉申者春季之月厭也折其中而取酉謂之春季月厭正位命為天狗頭犯之者小姑無子夏午秋夘冬子同此例也反之即為厭對正位而謂之天狗尾犯之者妨夫主月厭前一位為章光正月在酉春季酉申未折其中而取申謂之天狗口忌行嫁天喜之説有以春戌夏丑秋辰冬未論者有以三合成日論者又有以春季未午巳夏季辰夘寅秋季丑子亥冬季戌酉申論者今取此隨月將三合逆行之天喜而亦折其中而取春午夏夘秋子冬酉謂之天喜正位而命之為天狗腹主當年無子春夏之天喜即秋冬之紅鸞乃又取紅鸞十二位折其中而取春子夏酉秋午冬夘謂之紅鸞正位命之天狗背主三年有子春季月將亥戌酉夏季申未午秋季巳辰夘冬季寅丑子亦折其中而取春戌夏未秋辰冬丑為六合正位而謂之天狗足主六年生子春季月害巳辰夘夏季寅丑子秋季亥戌酉冬季申未午亦折其中而取春辰夏丑秋戌冬未謂之月害正位而謂之天狗後足主九年生子夫月厭寅月起戌戌則屬狗若夘月即居酉位而為雞以此遂以天狗名之已屬可笑又諸神與十二辰相為叅伍乃有月厭厭對天喜紅鸞等名非獨重二五八十一四箇月也乃截住兩頭中間取一位起例益屬支離不通以此硬配頭尾口腹背足成一天狗而定生子之年分妨夫妨小姑之占斷謬悠極矣且小姑無子與新婦何涉而天喜正位定必大吉而斷為當年無子蓋里巷小民之情小姑者老婦之所鍾愛而春月行嫁臘月生子新婦有越禮之疑故以小姑無子為凶而以當年無子為吉也術士苦心侮弄鄉愚良可悲歎選擇宗鏡不加辨駁轉編載其説吁可怪也又以春夘夏午秋酉冬子四正位謂之天狗方益屬不經何天狗之彌綸宇宙如此耶天狗頭小姑無子月厭正位天狗尾妨夫主位厭對正六道天地兵人鬼死六道四吉二凶天地兵人吉鬼死凶以十二歳分為兩週自子至已自午至亥輪轉六道子年艮坤天道甲庚地道乙辛兵道巽乾人道丙壬鬼道丁癸死道丑年則從甲庚起天道而艮坤轉為死道寅年則從乙辛起天道而甲庚轉為死道六歳既週午年即同子年之例以達於亥其為謬妄不足深辨又黄帝龍首經有占歳月利道吉凶法陽歳以大吉臨太歳隂歳以小吉臨太歳視天上甲庚所臨為天道丙壬所臨為人道魁罡所臨為拘檢天道人道吉拘檢凶假令今年太歳在寅大吉臨寅視天上甲庚臨地乙辛為天道天上丙壬臨地丁癸為人道魁罡臨己亥為拘檢魁為拘罡為檢他歳倣此歳在子午夘酉為四仲天道及人道皆在四維難可移徙陽月以大吉臨月建隂月以小吉臨月建移徙吉凶皆如太歳法今詳龍首經之法必非出自黄帝亦屬後世假託夫丑未之前一干必是甲庚安得不論五行生尅惟取太歳月建前一位之時辰移徙修造便獲吉耶神煞起例天地兵人鬼死六道蓋即龍首經之法而又推廣之愈鑿愈陋五符擇時用日祿起五符順布十二位名透天闗其法不過日干臨時支以臨官胎養時為吉餘並凶耳其名字乃術士之揑造也然用時無專取胎養時之理即日祿尚須參論各神煞況胎養乎今日表已刪去立成九仙擇時以日干支及時支太元共數十三十五十六十八二十一二十二二十四二十五二十六為九仙吉十四十七十九二十二十三二十七為六神凶如丙寅日巳時丙七寅七巳四共一十八數合天徳仙是也毫無義理通書時表載共數而選擇亦不用今刪去九仙吉十三日光仙十五月光仙十六金玉仙十八天徳仙二十一祭國仙二十二地藏仙二十四送福仙二十五大善仙二十六大吉仙六神凶十四大禍神十七滅門神十九天凶神二十地凶神二十三喪門神二十七弔客神欽定協紀辨方書巻三十六
