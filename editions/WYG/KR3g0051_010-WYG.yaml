body:
  text: 宜忌易傳曰爻彖以情言吉凶以情遷神煞之有宜忌情也有其情即有其力力有相勝則其情隨之而變矣舊厯宜忌多與神煞名義不合且凡吉神所宜之事一遇凶煞則無論輕重而概忌之尤為未當今即其情之愛惡與其力之大小分合考訂然後趨避各當而取舍得宜非惟利用前民亦扶陽抑隂之意也作宜忌天德月德天德合月德合月空天恩天赦母倉天願月恩四相時德陽德隂德王日官日守日相日民日三合臨日驛馬天后天馬建日兵福除日吉期兵寶滿日天巫福德平日定日時隂執日破日危日成日天喜天醫收日開日時陽生氣閉日兵吉六合六儀五富天倉不將要安敬安玉宇金堂普䕶福生聖心益後續世解神除神五合寶日義日制日青龍明堂金匱寶光玉堂司命鳴吠鳴吠對亥子日午申日以上所宜月建小時土府月破大耗平日死神收日滿日天狗閉日血支刼煞災煞天火月煞月虛月刑月害月厭地火厭對招摇大時大敗咸池遊禍天吏致死死氣小耗天賊四擊四耗四廢四忌四窮八龍七鳥九虎六蛇五虛八風五墓九空九坎九焦土符地囊兵禁大煞歸忌血忌徃亡氣徃亡復日重日五離八專觸水龍專日伐日天刑朱雀白虎天牢元武勾陳無禄日反支上朔四離四絶晦日冬至夏至春分秋分土王用事伏社朔弦望月忌日十五日人神所在日長星短星百忌日以上所忌表例附天德月德天德合月德合宜祭祀祈福求嗣上冊進表章上冊受封上表章同頒詔覃恩肆赦施恩封拜襲爵受封同後倣此詔命公卿招賢舉正直施恩惠恤孤惸宣政事行惠愛雪寃枉緩刑獄慶賜賞賀宴㑹行幸遣使安撫邊境選將訓兵出師上官赴任臨政親民結婚姻納采問名嫁娶般移解除求醫療病裁製營建宫室繕城郭興造動土豎柱上梁修倉庫栽種牧養納畜安葬忌畋獵取魚按天德月德乃月建三合旺氣天德合月德合與旺氣作五合皆上吉之日故所宜應如此忌畋獵取魚者恐傷生氣也舊本天德止宜興土工營宮室繕城郭月德并宜上官宴樂天德合宜祭祀祈福覃恩肆赦緩刑獄選將訓兵月德合並宜上册進表章營建宮室殊於名義不合明原引五行論則曰月德合日百福並集又不及天月二德及天德合可見其為畧舉大意而非有義例也夫王者事神行政慶賞刑威與夫分職設官體國經野以及宮室城郭衣服居處所以謀室家之安而錫兆庶之福者無非體天心而行時令故因義起例罄無不宜庶名與事允協矣月空宜上表章見義例天恩宜覃恩肆赦施恩惠恤孤惸布政事行惠愛雪寃枉緩刑獄慶賜賞賀宴㑹與驛馬天馬建日併宜頒詔宣政事與修造吉神併尤宜興作按舊本以天恩為上吉日而所宜止於覃恩慶賞等事葢其日止取一定之干支而不參諸月令其力輕㣲不得與德合赦願比也又按舊本謂天德嵗德月德天德合嵗德合月德合天恩天赦母倉所㑹之辰並宜修營㑹之云者則非專指天恩故曰與修造吉神併尤宜興作天赦宜祭祀祈福求嗣上册進表章頒詔覃恩肆赦施恩封拜詔命公卿招賢舉正直施恩惠恤孤惸宣政事行惠愛雪寃枉緩刑獄慶賜賞賀宴㑹行幸遣使安撫邊境選將訓兵上官赴任臨政親民結婚姻納采問名嫁娶般移解除求醫療病裁製營建宫室繕城郭興造動土豎柱上梁修倉庫栽種牧養納畜安葬忌畋獵取魚按天赦為天地合德又為四時旺辰其力甚大故所宜與二德同舊本止宜覃恩肆赦緩刑獄特顧名而未思義耳不用以出師與忌畋獵取魚同意母倉宜納財栽種牧養納畜與月恩四相開日併宜修倉庫按舊本以母倉為上吉日而所宜止於納財栽種牧養納畜葢其日係四時休氣又不得與天恩比也又按母倉春月亥日吉子日次之夏月寅日吉卯日次之冬月申日吉酉日次之葢亥寅申皆令星之長生而子卯酉為令星之敗地也至秋月之辰戌丑未日土王後之己午日則衰旺各有不同是又不可以不辨天願宜祭祀祈福求嗣上册進表章頒詔覃恩肆赦施恩封拜詔命公卿招賢舉正直施恩惠恤孤惸宣政事行惠愛雪寃枉緩刑獄慶賜賞賀宴㑹行幸遣使安撫邊境選將訓兵上官赴任臨政親民結婚姻納采問名嫁娶進人口般移裁製營建宮室繕城郭興造動土豎柱上梁修倉庫經絡醞釀開市立劵交易納財栽種牧養納畜安葬按天願為太陽加令星其吉最大故所宜與二德同不用以出師者兵隂象兵吉在太陽後四辰不用太陽日也宜葬事則專取太陽日也不用以解除療病者療解無取合義也何以取二德合彼乃德之合氣非兩相合也又按二德乃三合之全氣發于天干德合為其合氣天赦天願皆合干支取義其氣純其力大乃日之最吉者能解諸凶故特表之舊本謂天願宜納財敦睦親族葢其例二十四字已誤十三宜乎失其義也月恩四相時德宜祭祀祈福求嗣施恩封拜舉正直慶賜賞賀宴㑹行幸遣使上官赴任臨政親民結婚姻納采問名般移解除求醫療病裁製修宮室繕城郭興造動土豎柱上梁納財開倉庫出貨財栽種牧養與驛馬天馬併宜詔命公卿招賢按月恩四相時德皆月建所生之日所宜應同舊本月恩宜祭祀上官赴任結婚姻般移修造動土納財四相宜行幸遣使般移繕城郭修造動土栽種牧養時德宜施恩封拜慶賜賞賀宴㑹其義不倫今按月建所生為相氣其吉大於母倉我生為子孫其吉顯於福德觀其㑹通而推其義例故所宜應如此陽德隂德宜施恩惠恤孤惸行惠愛雪寃枉緩刑獄按陽德隂德為乾坤納甲取天地生成之義而以月配爻義不甚切舊本謂陽德宜結婚姻開市交易隂德宜舉正直行惠愛雪寃枉緩刑獄亦無義例可推今按天地之大德曰生則施恩行惠等事庶與名義相稱王日宜頒詔覃恩肆赦施恩封拜詔命公卿招賢舉正直施恩惠恤孤惸宣政事行惠愛雪寃枉緩刑獄慶賜賞賀宴㑹行幸遣使安撫邊境選將訓兵上官赴任臨政親民裁製官日守日相日宜襲爵受封上官赴任臨政親民守日又宜安撫邊境民日宜宴㑹結婚姻納采問名進人口般移開市立劵交易納財栽種牧養納畜按壇經專以此五日為命將登壇拜爵上官之吉日通書止宜施恩封拜上官赴任臨政親民今以義推之則五日所宜應各不同王日為臨官之辰其吉大於月建又居四時之首其吉不減天恩故所宜應如此不用以出師者不欲從我始也官日守日相日舊説可從襲爵受封義同封拜在臣下宜云爾也守日為四時旺土安撫邊境則守土所宜急者民日為令星所生所宜應同時德然既以民日名則上官等事義當另有取也三合宜慶賜賞賀宴㑹結婚姻納采問名嫁娶進人口裁製修宮室繕城郭興造動土豎柱上梁修倉庫經絡醞釀立劵交易納財安碓磑納畜又辰戌丑未日為三合墓庫所宜如前寅申巳亥日為三合長生所宜並同母倉子午卯酉日為三合帝旺所宜並同王日按日之吉者莫如三合天月二德皆從三合取義成定之吉亦由三合生也然三合皆吉而大小不同建為局始定為局中成為局終三合從建取故三合止有二日建在四生日者則三合一為旺一為墓建在四旺日者則三合一為墓一為生建在四墓日者則三合一為生一為旺其為墓日者則取三合之吉足矣其為生旺日者則土旺之吉當并取也故區而别之又三合即成定日而取義各有不同故分屬各條之下若義有兼取者則又不嫌其并見也臨日宜上册進表章上官赴任臨政親民陳詞訟見義例驛馬天后宜行幸遣使般移與天恩併宜頒詔宣政事與月恩四相時德併宜詔命公卿招賢又為天后宜求醫療病按驛馬天馬皆第取行遠之義舊本謂驛馬宜封拜官爵詔命公卿出行赴任移徙天馬宜頒詔封拜招賢宣政事遠行出征則失其義矣今以其日止宜行幸遣使般移與覃恩吉日併而後宜頒詔與封拜舉正直吉日併而後宜詔命公卿招賢與布政事吉日併而後宜宣政事庶為允協天后見義例天馬宜行幸遣使般移與天恩併宜頒詔宣政事與月恩四相時德併宜詔命公卿招賢義見驛馬建日兵福宜施恩封拜詔命公卿招賢舉正直行幸遣使上官赴任臨政親民與天恩併宜頒詔宣政事又為兵福宜安撫邊境選將訓兵出師按建日與王官同義舊本止宜施恩封拜出行夫舉正直之與封拜遣使之與行幸事同一例故增之詔命公卿招賢頒詔宣政事義見驛馬上施則下受故并宜上官赴任臨政親民兵福見義例除日吉期兵寶宜解除沐浴整容剃頭整手足甲求醫療病掃舍宇又為吉期宜施恩封拜舉正直行幸遣使上官赴任臨政親民十月與天馬併宜詔命公卿招賢驛馬不得與吉期併又為兵寶宜安撫邊境選將訓兵出師按舊本除日宜解除求醫療病掃舍宇取除義也沐浴等事亦除舊取新之義故并宜之吉期兵寶義取旺辰故所宜同建日舊謂吉期宜兵事葢兵寶之誤又謂宜結婚姻於義無取故刪滿日天巫福德宜進人口裁製修倉庫經絡開市立劵交易納財開倉庫出貨財補垣塞穴又為天巫宜祭祀祈福又為福德宜上册進表章慶賜賞賀宴㑹修宮室繕城郭按滿取豐豫之義故所宜如此天巫見義例福德義同時德具體而微故止宜上册數事舊本無宴㑹然未有宜慶賞而不宜宴㑹者又謂天巫宜療病與滿日所忌自相牴牾故刪平日宜修飾垣墻平治道塗義取諸平定日時隂宜冠帶又為時隂宜運謀算畫計策按定日為三合之中宜冠帶者既取其成局又取其方中而未昃之義也時隂舊宜睦子孫㑹親友於義不合故刪執日宜捕捉霜降後立春前宜畋獵雨水後立夏前宜取魚義取諸執且順時也破日宜求醫療病破屋壞垣義取諸破危日宜安撫邊境選將訓兵安牀立冬後立春前宜伐木霜降後立春前宜畋獵雨水後立夏前宜取魚按危日取安為義故宜安牀然安不忘危則莫大於安撫訓練之事伐木畋獵取魚則以隂過盛而物當殺也各以其節氣者順時也成日天喜天醫宜入學安撫邊境般移築隄防開市又為天喜宜施恩封拜舉正直慶賜賞賀宴㑹行幸遣使上官赴任臨政親民結婚姻納采問名嫁娶五月與天馬併宜詔命公卿招賢驛馬不得與天喜併乂為天醫宜求醫療病按成為合局之終開為生氣之始故其日宜入學原始要終之義也宜安撫邊境者功成而永奠也般移築隄防開市皆取成義天喜舊宜封拜自宜上官義同建日收日宜進人口納財捕捉納畜霜降後立春前宜畋獵雨水後立夏前宜取魚與月恩四相時德併宜修倉庫義取諸收無修造義故必與月恩四相時德併而後宜修倉庫若開日則雖宜修造不得與收日併若德合赦願則自宜修倉庫又不待與收日併也母倉義亦如此開日時陽生氣宜祭祀祈福求嗣上册進表章頒詔覃恩肆赦施恩封拜詔命公卿招賢舉正直施恩惠恤孤惸宣政事行惠愛雪寃枉緩刑獄慶賜賞賀宴㑹入學行幸遣使上官赴任臨政親民般移解除求醫療病裁製修宫室繕城郭興造動土豎柱上梁開市修置產室開渠穿井安碓磑栽種牧養忌伐木畋獵取魚破土安葬啓攢按開日一陽始生故又為時陽又為生氣其日最吉舊本所宜無祭祀祈福求嗣覃恩拜官等事於義未偹故補之不及婚事者無合義也忌伐木漁獵者恐傷生氣也忌葬事從俗也閉日宜築隄防補垣塞穴義取諸閉兵吉宜安撫邊境選將訓兵出師見義例六合宜宴㑹結婚姻嫁娶進人口經絡醞釀立劵交易納財納畜安葬與月恩四相時德併宜修倉庫按六合之吉不減三合舊本止宜宴㑹結婚姻立劵交易今以義推之所宜當如此宜葬事見天願宜修倉庫見收日六儀宜臨政親民見義例五富宜經絡醞釀開市立劵交易納財開倉庫出貨財栽種牧養