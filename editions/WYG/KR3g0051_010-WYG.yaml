建宮室修宮室繕城郭興造動土豎柱上梁開市立劵交易修置産室栽種牧養納畜破土安葬啟攢五月十一月與月德併則不忌按五墓乃五行旺干臨於墓庫故所忌如此與月德併則為三合旺氣發於天干而不可以墓論矣故不忌也不取德合者不同行也舊忌無冠帶行幸上官療病安葬等事今補之其義始備九空忌進人口修倉庫開市立劵交易納財開倉庫出貨財寅申月值滿日子午卯酉月值開日與月德天德合月德合併則不忌己亥月值月厭從月厭論辰戌丑未月值破日從月破論按九空為三合庫地之衝故所忌如此與德合併則支以干合而忘衝故不忌也若值月厭月破其凶甚於九空故從重論九坎九焦忌補垣塞穴取魚乘船渡水又為九焦忌鼓鑄栽種修築園圃與德合併猶忌赦願不得與九坎併按九坎九焦忌見義例與德合義不相屬故與併猶忌非謂其日之凶德神不能化解也土符地囊歸忌血忌倣此土符地囊忌營建宮室修宫室繕城郭築隄防興造動土修倉庫修置産室開渠穿井安碓磑補垣修飾垣墻平治道塗破屋壞垣栽種破土與德合赦願併猶忌兵禁忌安撫邊境選將訓兵出師與德合赦願併猶忌按兵禁取逆義故忌軍事雖與德合赦願併無解於其逆也故猶忌大煞倣此大煞忌安撫邊境選將訓兵出師與德合併猶忌赦願不得與大煞併按舊本並忌進人口納財豎柱上梁其義不倫故刪歸忌忌般移逺廻與德合赦願併猶忌血忌忌針刺與德合赦願併猶忌徃亡氣徃亡忌上册進表章頒詔詔命公卿招賢宣政事行幸遣使安撫邊境選將訓兵出師上官赴任臨政親民嫁娶進人口般移求醫療病捕捉畋獵取魚與德合赦願併猶忌按徃亡本不為凶第取三合溺於所生而無尅制之義有徃而不返之象故所忌如此然世俗避之惟謹雖值德合赦願不能無疑故與併猶忌舊本并忌施恩封拜而不忌招賢宣政事今按徃亡與封拜無涉應不忌凡宜出行之日方宜招賢宣政事徃亡既忌出行自應并忌之也復日重日忌破土安葬啟攢與天德月德天德合月德合天赦六合併天願必是六合故不言而已在其中則不忌亦不註宜復日又宜裁製按舊本重復日忌為凶事利為吉事故忌破土安葬啟攢然其義亦泛矣夫葬乘生氣經有明文今選擇家亦以無禄四廢為凶日若復日則皆令星孟仲月又皆建禄其吉自無可疑己亥為隂陽盡日亦大率云然而推以十二月㕘以三合此二日無皆凶之理乃惟此之忌而不避刑厭三煞之凶且所宜又止於鳴吠日而舍德赦六合之吉而不知用是與嫁娶之僅取不將而不取德合惟忌章光無翹而不忌刑衝破害等也婚葬為人事之始終而俗論拘忌若此深為不便顧相傳已久遽去之轉不足以牖世故遇鳴吠則忌遇德赦六合則不忌識者自能辨之亦不註宜聊以從俗云爾並詳利用卷五離忌慶賜賞賀宴㑹結婚姻納采問名立劵交易與天德月德天德合月德合天赦三合六合併則不忌按五離為五合之衝故所忌如此與德合天赦三合六合併則其吉大於五合而非五離所能離矣故不忌也五合不宜慶賜賞賀納采問名而五離則并忌之者盖慶賜賞賀之事大於宴㑹納采問名之事大於結婚姻五合之吉可小事不可大事五離不宜其小則大者可知也若嫁娶之事則原不取五合自亦不忌五離矣八專忌安撫邊境選將訓兵出師結婚姻納采問名嫁娶與德合併猶忌與天願併止忌安撫邊境選將訓兵出師餘不忌按八專自以干支取義與德合義不相屬故與併猶忌觸水龍專日伐日倣此又按八專之忌婚嫁取隂陽同居而無别為義天願五月丁未十一月癸丑丁乃午也非未也癸乃子也非丑也是相合而有别矣故不忌婚嫁也觸水龍忌取魚乘船渡水與德合天願併猶忌觸水龍無天赦日見義例專日伐日忌安撫邊境選將訓兵出師與德合赦願併猶忌見義例天刑朱雀白虎天牢元武勾陳與凶神併則從所忌與吉神併則從所宜按舊本六黑道忌興衆務而仍從吉神所宜並無專忌之事若選時則諸事皆忌也並詳六黃道無禄日止註祭祀解除沐浴整容剃頭整手足甲掃舍宇修飾垣墻平治道塗破屋壞垣伐木餘事不註與天德月德併則不以無禄論寅年月甲辰日卯年月乙巳日巳年月丙申戊戌日午年月丁亥己丑日申年月庚辰日酉年月辛巳日亥年月壬申日歲月填實禄空亦不以無禄論雨水後壬申日榖雨後辛巳日小滿後庚辰日大暑後丁亥己丑日處暑後丙申戊戌日霜降後乙巳日小雪後甲辰日太陽填實禄空亦不以無禄論甲巳年亥卯未月己丑日乙庚年己酉丑月乙巳日丙辛年寅午戌月辛巳日丁壬年申子辰月丁亥日嵗德合月德合所㑹之辰亦不以無祿論乙庚年亥月庚辰日丙辛年巳月丙申日丁壬年寅月壬申日戊癸年申月戊戌日天徳合歳徳所㑹之辰亦不以無祿論甲年月甲辰日乙年月乙巳日丙年月丙申日丁年月丁亥日戊年月戊戌日巳年月己丑日庚年月庚辰日辛年月辛巳日壬年月壬申日歳徳嵗徳合天干三朋亦不以無祿論惟癸亥為干支俱盡日雖值天月二徳歳月太陽填實歳徳㑹合仍以無祿論按無祿日以干祿落旬空故諸事不宜惟祭祀解除等事不嫌其空故遇有所宜之神則不忌與天徳月徳併則三合成祿旺之局月建太陽填實則一月皆祿旺之宫至於嵗建填實嵗徳㑹合尤以嵗君為主而旬空不足道矣故不以無祿論也癸亥干支俱盡與上朔晦日同義又交中氣日嵗徳嵗徳合日每年不同故月表與萬年書俱不論無祿日臨時選用詳萬年書鋪註條例反支忌上冊進表章陳詞訟與徳合赦願併猶忌見義例以下諸日皆毎年不同亦月表萬年書所不能載臨時選用詳萬年書鋪註條例上朔四離四絶晦日止不忌祭祀解除沐浴整容剃頭整手足甲補垣塞穴掃舍宇修飾垣牆平治道塗破屋壊垣伐木餘事皆忌與徳合赦願併猶忌以下並同按上朔為隂陽與嵗徳俱盡之日四離四絶為二氣五行分判之日晦為月盡之日故諸事不宜惟祭祀解除等事或以事神而不敢禁或以除舊而不為嫌故遇有所宜之神則不忌晦日雖不與上朔同凶然亦止宜祭祀等事餘事雖不忌亦不註宜也又上朔以年干取義晦日反支以月朔取義四離四絶以節氣取義皆與徳合赦願義不相屬故與併猶忌也下倣此冬至夏至春分秋分不註上册進表章慶賜賞賀宴㑹行幸遣使安撫邊境選將訓兵出師上官赴任臨政親民結婚姻納采問名嫁娶進人口般移開市立劵交易捕捉畋獵取魚冬至日又不註伐木按二至之日隂陽爭二分之日厭建對故雖吉日亦不註此數事冬至又不註伐木與開日同義土王用事忌營建宫室修宫室繕城郭築隄防興造動土修倉庫修置産室開渠穿井安碓磑補垣修飾垣墻平治道塗破屋壊垣栽種破土義同土府伏社忌沐浴按沐浴宜申酉亥子日伏為金伏是申酉之反也社為土旺是亥子之反也故忌沐浴朔弦朢忌求醫療病按朔為日月同度弦為近一逺三朢為日月相對猶建破平收之義也故忌療病月忌日止註祭祀宴㑹沐浴整容剃頭整手足甲求醫療病補垣掃舍宇修飾垣牆平治道塗餘事不註見義例十五日忌求醫療病義同朢日人神所在日十二日在髮際十五日在徧身忌剃頭一日在足大指六日在手十五日在徧身十九日在足二十一日在手小指二十三日在肝及足忌整手足甲長星短星忌進人口裁製經絡開市立劵交易納財納畜見附錄百忌日甲日忌開倉庫出貨財乙日忌栽種丁日忌剃頭庚日忌經絡辛日忌醖釀壬日忌開渠丑日忌冠帶寅日忌祭祀夘日忌穿井巳日忌出行午日忌苫葢未日忌求醫療病申日忌安牀酉日忌宴㑹亥日忌嫁娶以上所忌宜忌等第表鋪註條例凡鋪註萬年書通書先依用事次第察其所宜忌之日於某日下註宜某事某日下註忌某事次按宜忌較量其吉凶之輕重以定去取凡宜宣政事布政事之日止註宜宣政事凡宜營建宫室修宫室之日止註宜營建宫室凡吉足勝凶從宜不從忌者如遇徳猶忌之事則仍註忌凡吉凶相抵不註宜亦不註忌者如遇徳猶忌之事則仍註忌凡徳合赦願月恩四相時徳等日不註忌進人口安牀經絡醖釀開市立劵交易納財開倉庫出貨財如遇徳猶忌及從忌不從宜之日則仍註忌凡天狗寅日忌祭祀不註宜求福祈嗣凡夘日忌穿井不註宜開渠壬日忌開渠不註宜穿井凡巳日忌出行不註宜出師遣使凡酉日忌宴㑹亦不註宜慶賜賞賀凡丁日忌剃頭亦不註宜整容凡吉凶相抵不註忌祈福亦不註忌求嗣凡忌詔命公卿招賢不註宜施恩封拜舉正直襲爵受封凡忌施恩封拜舉正直襲爵受封亦不註宜詔命公卿招賢凡宜宣政事之日遇往亡則改宣為布凡月厭忌行幸上官不註宜頒詔施恩封拜詔命公卿招賢舉正直遇宜宣政事之日則改宣為布凡吉凶相抵不註忌結婚姻亦不註忌冠帶納采問名嫁娶進人口如遇徳猶忌之日則仍註忌凡吉凶相抵不註忌嫁娶亦不註忌冠帶結婚姻納采問名進人口般移安牀如遇徳猶忌之日則仍註忌遇不將而不註忌嫁娶者亦仍註忌遇亥日厭對八專四忌四窮而仍註忌嫁娶者止註所忌之事其不忌者仍不註忌凡吉凶相抵不註忌般移亦不註忌安牀不註忌安牀亦不註忌般移如遇徳猶忌之日則仍註忌凡吉凶相抵不註忌解除亦不註忌整容剃頭整手足甲如遇徳猶忌之日則仍註忌凡吉凶相抵不註忌修造動土豎柱上梁亦不註忌修宫室繕城郭築隄防修倉庫鼓鑄苫葢修置産室開渠穿井安碓磑補垣塞穴修飾垣牆平治道塗破屋壊垣如遇徳猶忌之日則仍註忌凡吉凶相抵不註忌開市亦不註忌立劵交易納財不註忌納財亦不註忌開市立劵交易不註忌立劵交易亦不註忌開市納財凡吉凶相抵不註忌開市立劵交易亦不註忌開倉庫出貨財如遇專忌之日則仍註忌凡吉凶相抵不註忌牧養亦不註忌納畜不註忌納畜亦不註忌牧養凡吉凶相抵有宜安葬不註忌啟攢有宜啟攢不註忌安葬凡土府土符地囊止註忌補垣亦不註宜塞穴凡開日不註宜破土安葬啟攢亦不註忌遇忌則註凡四忌四窮止忌安葬如遇鳴吠鳴吠對亦不註宜破土啟攢凡天吏大時不以死敗論者遇四廢嵗薄逐陣仍以死敗論凡嵗薄逐陣日所宜事照月厭所忌刪所忌仍從本日二月甲戌四月丙申六月甲子七月戊申八月庚辰九月辛夘十月甲子十二月甲子徳合與赦願所㑹之辰諸事不忌欽定協紀辨方書卷十
