body:
  text: 義例一選擇神煞古有建除堪輿叢辰諸家顧其義不盡傳起例尤多襲誤今頗為蒐輯擇其近理而雅馴者加之解釋正其舛誤庶吉凶之義因例可尋而不惑於世俗術數之説也作義例總論歲德歲德合歳幹合歲枝德太歲歲破大耗大將軍奏書博士力士蠶室蠶官蠶命喪門太隂弔客羣醜官符畜官白虎黄幡豹尾病符死符小耗劫煞災煞歲煞伏兵大禍五兵總圖歲刑大煞飛廉金神五鬼破敗五鬼太歲已下神煞出遊日日遊神總論舉事無細大必擇其日辰義歟曰敬天也記曰易抱龜南面天子卷冕北面雖有明智之心必進斷其知焉示不敢專以尊天也夫古之君子居則觀其象而玩其辭一事之至其合於何卦何爻應有何變何應早已謀諸乃心而灼然況又謀及卿士大夫至於庶民夫亦何患其不審乃又必動則觀其變而玩其占耶凡以血氣心知之性必合諸虛靈不昧之天而後天下之理得使足已而不問則未事而先失也選擇之義亦猶夫是天地神祗之所向則順之所忌則避之既奉若於宫廷以彰昭事之忱又申布於閭左以協休嘉之氣凡以敬天云爾如曰若是則福不若是則禍則術士之曲説而非其本原也王充論衡闢之不遺餘力則又儒士拘迂而未見大義善夫荀悦申鑒曰或問時羣忌曰此天地之數也非吉凶所從生也夫知其為天地之數則固修身者所當順也知其非吉凶所從生則一切拘牽謬悠之説具廢而所為順之避之者亦必有道矣曾門經曰歲德者歲中德神也十幹之中五為陽五為隂陽者君道也隂者臣道也君德自處臣德從君也所理之地萬福咸集衆殃自避應有修營並獲福祐廣聖厯曰甲德在甲乙德在庚丙德在丙丁德在壬戊德在戊己德在甲庚德在庚辛德在丙壬德在壬癸德在戊考原曰律吕六陽當位自得六隂則居其衝歲德則五陽干當位自得五隂干則取其合蓋陽以自得為德而隂以從陽為德也按甲丙戊庚壬五陽即以甲丙戊庚壬為德不同于乙丁己辛癸以所合之干為德者曾門經謂君德自處其文不足以暢厥㫖蓋易之道陽一隂二陽為德隂為刑陽善也隂惡也是故陽之為德也在不化乎隂而隂之為德也在棄其本位而從乎陽易曰西南得朋西南陽也得朋隂從乎陽之謂也東北喪朋東北隂也喪朋棄其本位之謂也隂能化陽亦能從陽陽為隂化隂斯慝矣能從乎陽斯為德也然則陽惟一而隂有二矣是故甲德在甲甲陽也故甲即甲之德也乙德在庚乙隂也庚能制乙者也在乙而從庚是即乙之徳也丙丁以下倣此考原曰歲德合者歲德五合之干是也甲年在己乙年在乙丙年在辛丁年在丁戊年在癸巳年在己庚年在乙辛年在辛壬年在丁癸年在癸故歲德屬陽歲德合屬隂按歲德與歲德合並屬上吉有宜無忌然細推其義有剛柔之别焉歲德無問隂年陽年皆剛辰也歲德合無問隂年陽年皆柔辰也外事以剛内事以柔古之志也選擇家雖未論及此用者可以意通也金匱經曰歲幹合者天地隂陽配合也主除滅災咎而興福祐也所理之方可以修營起土上官嫁娶逺行㕘謁厯例曰甲年在己乙年在庚丙年在辛丁年在壬戊年在癸取其與歲干相合者是也考原曰今厯日歲轉吉神無此條按歲幹合為歲中大神而保章氏不著于簡者何也蓋乙丁己辛癸之年則所為甲丙戊庚壬者即歲德也甲丙戊庚壬之年則所為乙丁己辛癸者即歲德合也既有歲德歲徳合則不必復著歲幹合之名也雖然要各有義焉隂陽同職不同性故如五鬼之又為厭對又為六儀之類必兩著之歲幹合仍當存其目不得因彼而廢此也神樞經曰歲枝德者歲中德神也德者得也得福之謂也主救危而濟弱所理之方利以興造舉動衆務李鼎祚曰常居歲前五辰曹震圭曰枝德者從太歲向前五合之辰也假令歲在甲子向前見己巳甲與己合即己為枝德也又如歲在丙子向前見辛己丙與辛合即已為枝德也餘倣此今厯日歲轉吉神無此條按歲枝德者謂甲既在子則巳上必已已甲之合也其所合之神所居之枝則亦必吉矣地必從天枝必從幹幹既吉位枝必無凶其義然也其辰又為死符又為小耗厯家既重死符小耗則不用此條然美惡不嫌同位吉凶不嫌同名死符為營塚等事所忌小耗為市易造作等事所忌茍所舉之事非此屬也則仍為吉神矣即同一興造如為營居室歟則當以小耗論如為治橋梁築堤岸損己之財以利衆之事歟則雖屬小耗而實為枝德乃大吉也此條固不可廢神樞經曰太歲人君之象率領諸神統正方位斡運時序總成歲功以上元閼逢困敦之歲起建於子歲徙一位十二年一週若國家巡狩省方出師畧地營造宫闕開拓封疆不可向之黎庶修營宅舍築壘墻垣並須逥避黄帝經曰太歲所在之辰必不可犯曹震圭曰太歲者歲星也故木星十二年行一周天一年行一次也按周禮馮相氏掌十有二歲鄭康成註曰歲謂太歲歲星與日同次之月斗所建之辰樂説謂歲星與日常應太歲月建以見然則今厯太歲非此也賈公彦疏曰太歲在地與天上歲星相應而行歲星為陽右行於天一歲移一辰又分前辰為一百三十四分而侵一分則一百四十四年跳一辰十二辰帀則總有千七百二十八年十二跳辰帀以此而計之十二歲一小周謂一年移一辰故也千七百二十八年一大周十二跳帀故也太歲左行於地一與歲星跳辰年數同其云歲星與日同次之月斗所建之辰者以歲星為陽人之所見太歲為隂人所不覩歲星與太歲雖右行左行不同要之行度不異故舉歲星以表太歲歲星與日同次之月一年之中惟于一辰之上為法若上元甲子朔旦冬至日月五星同在牽牛之初是歲星與日同次之月也十一月斗建子子有太歲至下年歲星移向子十二月日月會於元􅑎十二月斗建丑丑有太歲自此以後皆然也故引樂説以證太歲在月建之義也今厯太歲無跳辰之義故云非此經太歲也云云今按歲星右行於天太歲左行於地歲星歲移一辰十二年一周故曰歲星則厯之太歲即是保章氏所云十有二歲並非别有太歲顧太歲者歲之神歲星者歲之星舉太歲以表歲星則可謂太歲即歲星則不可曹震圭之説非也太歲為百神之統俗謂之年中天子神樞經謂國家巡狩省方出師畧地營造宫闕開拓封疆不可向之向之云者與太歲對則身居歲破之地也又曰若黎庶修造則並須迴避者太歲君象其方固上吉之方而非下民之所敢用猶月忌日為中宫五黄民間須避是日同一義也故又謂之堆黄煞古人謂之歲下對方則亦曰歲破漢王充論衡載移徙法曰徙抵太歲凶負太歲亦凶抵太歲名曰歲下負太歲名曰歲破是也廣聖厯曰歲破者太歲所衝之辰也其地不可興造移徙嫁娶逺行犯者主損財物及害家長惟戰伐向之吉明時總要曰歲破者子年在午順行十二辰是也按歲破為最凶之神而廣聖厯云戰伐向之吉者蓋向歲破即坐太歲而敵人乃居歲破之位也然則仍是用太歲非用歲破也大耗厯例曰大耗者歲中虛耗之神也所理之地不可營造倉庫納財物犯之當有冦賊驚恐之事明時總要曰常居歲衝之地曹震圭曰大耗者太歲擊衝破散之神也物擊則破衝則散破散則耗也按大耗即係歲破而復以大耗名者為建囷倉納財帛等事重著其義又以見太歲至尊無對如十二神貴人之前為天空雖名天空而空者空空如也非實有是天空之神若夫歲破之義亦言其方為歲所破而非有歲破之神能破太歲也故又名之曰大耗也神樞經曰大將軍者歲之大將也統御威武總領戰伐若國家命將出師攻城戰陣則宜背之凡興造皆不可犯李鼎祚曰孟歲寅申己亥以勝光午仲歲子午夘酉以小吉未季歲辰戌丑未以傳送申加歲枝上逢天罡辰為大將軍如子年為仲年即以未加歲枝子上順數至酉得辰即酉為大將軍也餘倣此曹震圭曰大將軍其德忠直常居四正三年一遷所理之地可以命將帥選威勇以伐不義考原曰大將軍者統御武臣之職有䕶衞虎賁之象故居四正之位而從歲君之後如寅夘辰歲在東方則居正北巳午未歲在南方則居正東申酉戌歲在西方則居正南亥子丑歲在北方則居正西也按剋我者為賊我剋者為仇其拒仇賊而生我又後於我者大將軍之象也淮南云子孫為寶爻即其義也歲在東方木西方金剋我北方水拒隔之歲在南方火北方水剋我東方木拒隔之歲在西方金與東方木為仇中央土拒隔之歲在北方水與南方火為仇西方金拒隔之其必居子午夘酉者在師中吉之義歟或曰歲在西方而大將軍居午午為火何言土也曰五行家以巳為戊以午為已午固土也且大將軍必居太歲之右軍事尚右其右之正位必大將軍也廣聖厯曰奏書者歲之貴神也掌奏記主伺察所理之地宜祭祀求福營建宫室修飾垣牆蓬瀛書曰歲在東方奏書在東北維歲在南方奏書在東南維歲在西方奏書在西南維歲在北方奏書在西北維曹震圭曰奏書者水神也為歲君之諫臣察私屈揚德意之神也常居近歲後維方謂輔佐之道不敢先也初起於乾者順天之道也所理之方可舉賢能於國有益廣聖厯曰博士者歲之善神也掌案牘主擬議所居之方利於興修堪輿經曰博士者常與奏書對衝如奏書在艮博士在坤也曹震圭曰博士者火神也掌天子明堂紀綱政治之神也常處於維方不敢自專也初起於巽者明堂也所理之方可進賢能於國有益堪輿經曰力士者歲之惡神也主刑威掌殺戮所居之方不宜抵向犯之令人多瘟疾明時總要曰歲在東方力士居東南維歲在南方居西南維歲在西方居西北維歲在北方居東北維曹震圭曰力士者天子之䕶衞羽林軍也常居歲前維方不敢逺於君也所在之方可詔此方之臣以誅有罪堪輿經曰蠶室者歲之凶神也主絲繭綿帛之事所理之方不可修動犯之蠶絲不收廣聖厯曰蠶室者常與力士對衝按太歲之四維一奏書二博士三力士四蠶室奏書在太歲之後維天子古與稽今與居左圖右史所鑑之以出治者也故於太歲為最親而近為神之貴而吉者也博士文臣也出納王命行政施惠故與奏書衝而在太歲之前亦吉神也力士武臣也在太歲之前隅若羽林千牛旗纛旄麾之屬專掌殺伐故其方之軍旅可命以討有罪也與力士對衝而在太歲之後隅者後宫之地后妃之屬也後宫之事莫大於親蠶以供郊廟祭祀之服故以蠶室名之而亦不可抵向也厯例曰蠶官者歲中掌絲之神也所理之地忌營構宫室犯之蠶母多病絲繭不收黎幹曰歲在東方居戌在南方居丑在西方居辰在北方居未考原曰蠶官者蠶室之官使蠶得養也如歲在東方屬木木養於戌故在戌歲在南方屬火火養於丑故在丑歲在西方屬金金養於辰故在辰歲在北方屬水水養於未故在未也厯例曰蠶命者掌蠶之命神也所理之地不可舉動百事犯之者主傷蠶絲繭不收黎幹曰歲在北方居申歲在東方居亥歲在南方居寅歲在西方居巳考原曰蠶命者蠶之所係以生也如歲在北方屬水水生於申故在申歲在東方屬木木生於亥故在亥歲在南方屬火火生於寅故在寅歲在西方屬金金生於已故在巳今之蠶命子年未丑年午寅年亥夘年戌辰年己巳年丑午年寅未年申申年夘酉年辰戌年子亥年酉此恐有悞又按萬全廣濟云亥子丑年未坤申寅夘辰年戌乾亥巳午未年丑艮寅申酉戌年辰巽己假如亥子丑年蠶官在未蠶室在坤蠶命在申是也餘倣此蠶官蠶命總論人之生也食穀而衣絲殖穀者在野無一方而不宜也養蠶者在室則營構必有宜忌焉太歲為本年之主則是年之蠶即太歲之所生也所生之庫地即蠶之官府也故有蠶官方位歲在東方東方木木生火火庫戌故戌蠶官也蠶以是年生則是年方位之所受生即蠶所受命也故有蠶命方位歲在東方東方木木長生在亥故亥蠶命也餘倣此紀歲厯曰喪門者歲之凶神也主死喪哭泣之事常居歲前二辰所理之地不可興舉犯之者主盜賊遺亡死喪之事蓬瀛書曰子年在寅順行十二辰曹震圭曰喪門者太歲之轅門也故常居歲前二辰或謂喪門與白虎對衝白虎主喪服之事衝之故凶神樞經曰太隂者歲后也常居歲後二辰所理之地不可興修曹震圭曰后妃所居者后宫也后宫之星在帝後二星紫微垣北極五星第二為帝星第四為后宫故太隂常居太歲後二辰子年起戌順行十二辰如子年則在戌丑年則在亥寅年則在子是也按史記白圭傳曰太隂在夘穰明歲衰惡至午旱明歲美至酉穰明歲衰惡至子大旱明歲美有水至夘積貯率數倍張守節正義曰歲後二辰為太隂也又吳越春秋載計倪曰太隂所居之歲畱息三年貴賤見矣又越絶載計倪曰從寅至未陽也太隂在陽歲德在隂歲美在是聖人動而應之制其收發然則太隂之神為年穀豐歉水旱之占也今厯家謂修造等事不宜抵向其説不符於古然或别有所自來未可遽以為非顧從太隂例之則所謂蠶室蠶官蠶命者其方位所在必有每歲蠶絲豐歉之占而今不可考矣又按四利三元以太歲前三位為太隂與此同名不同位蓋各為一家之言不嫌並存也弔客紀歲厯曰弔客者歲之凶神也主疾病哀泣之事常居歲後二辰所理之地不可興造及問病尋醫弔孝送喪蓬瀛書曰子年在戌順行十二辰是也其位常與官符對衝蓬瀛書曰歲在四孟太隂與大將軍合于四仲名曰羣醜厯神原始曰天地凶殃必在羣醜太隂大將軍喪門弔客總論按天文志中宫天極星其一明者太一常居也旁三星三公或曰子屬後勾四星末大星后妃餘三星後宫之屬也禮記曰天子掌陽教后掌隂教故以歲後二辰象之而名之太隂焉夫太隂之職將以助陽出治也大將軍之職雖主殺伐然殺伐者凡以鋤邪凶而扶正直亦所以佐陽出治也若其年太隂與大將軍同位則是窮隂沍寒奸慝暴亂而絶無生養之意矣故曰羣醜為方位之最凶也然太隂之方又為弔客者何歟蓋歲後二位與歲前二位必屬三合如太歲在午則後二辰前二申申與辰必暗拱子以尅太歲矣太歲在丑則後二亥前二夘夘與亥必暗拱未以衝太歲矣為太歲所衝尅與衝尅太歲者皆死地也然則扶助之者非喪門弔客之象歟門必在前故前為喪門客者自他方至者也故後為弔客隂陽之義美惡不嫌同位各從其所用耳喪門之位又為朱雀則以前朱雀後𤣥武而以太歲前二位為朱雀耳今曹震圭以喪門為太歲之轅門則泥於門字之名而不知太歲之門不必喪也亦可嗤矣厯例曰官符者歲之凶神也主官府詞訟之事所理之方不可興土工犯之者當有獄訟之事常居歲前四辰曹震圭曰歲中掌符信之官文權之職也常居三合前辰故前辰為文官後辰為武職假令歲在寅寅午戌為三合則午有官符文權也戌有白虎武職也餘倣此廣聖厯曰畜官者歲中牧養之神也主養育羣畜之事所理之方忌造牛欄馬􅇫及放牧犯之者損六畜傷財厯例曰居歲前四辰曹震圭曰畜者養也是養畜之官以待百官之乘驛者也居三合前辰與官符同位按通書年表神煞方位以三合五行臨官之位為天官符故此又名地官符以别之地之云者以其隨地支逐歲而移也隂陽家最重山向並論三方地官符三方弔照太歲故忌興造人元祕樞經曰白虎者歲中凶神也常居歲後四辰所居之地犯之主有喪服之災切宜愼之曹震圭曰居三合後辰解見官符節按官符白虎歲三合也太歲之引從也引為文曰官符從為武曰白虎前陽而後隂也畜官同官符者猶先馬也因以為六畜之占乾坤寶典曰黄􅜖者旌旗也常居三合墓辰所理之地不可開門取土嫁娶納財市買及有造作犯之者主有損亡廣聖厯曰黄􅜖者寅午戌歲在戌申子辰歲在辰亥夘未歲在未巳酉丑歲在丑曹震圭曰黄􅜖者歲君安居之位華蓋也故取三合五行墓辰墓者土也故言其黄洞源經曰將出乎中軍蓋張於庫上此之謂也乾坤寶典曰豹尾者亦旌旗之象常居黄􅜖對衝其所在之方不可嫁娶納奴婢進六畜及興造犯之者破財物損小口曹震圭曰豹尾者虎賁之象先鋒之將也故常與黄􅜖相對是置於華蓋之前也黄􅜖豹尾總論黄􅜖者三合之季象華蓋也與黄􅜖相對者為豹尾其喜忌亦相同蓋皆歲君之鹵簿大駕以見不可犯之意耳寅申巳亥年豹尾在前黄􅜖在後子午夘酉年豹尾在後黄􅜖在前曹震圭以豹尾為先鋒之將而置于華蓋之前則非也又按子午夘酉年黄􅜖即是官符豹尾即是弔客寅申己亥年黄􅜖即是白虎豹尾即是喪門辰戌丑未年黄􅜖即是太歲豹尾即是歲破然則黄􅜖豹尾二神固虛設也以其無甚悖理仍存其舊名乾坤寶典曰病符主災病常居歲後一辰曹震圭曰居歲後一辰是言舊歲也新歲將旺舊歲必衰衰則病也經曰死符者歲之凶神也所理之方不可營塚墓置死喪及有穿鑿犯之者主有死亡常居歲前五辰曹震圭曰死符者是太歲自絶之辰也假令太歲在子是當旺也則丑為衰寅為病夘為死辰為墓已為絶也餘倣此經曰小耗者歲中虛耗之神也所理之方不宜運動出入興販經營及有造作犯之者當有遺亡虛驚之事明時總要曰常居歲前五辰曹震圭曰小耗者小損也乃太歲氣絶之辰故曰小耗假令寅年寅旺夘衰辰病巳死午墓未絶也與死符同位餘倣此考原曰小耗常居大耗後一辰未至於大耗故曰小耗病符死符小耗總論病符舊太歲也病符所衝則死符也病之所究極非死而何何以不名本年太歲所衝為死符耶太歲為一歲之君德刑並施其所衝禍且不止於死而福亦未可料也故六壬類神以歲破為貴相謂得坐而論道也若舊太歲休廢之氣所衝則必死矣又為小耗者則以次於大耗而言太歲所衝為大耗則舊太歲所衝為小耗云耳太歲所破其為亡耗大矣迨易歲之後而元氣未復有小耗之象焉故舊歲破為小耗也又易曰天數五地數五數至五而極歲前五辰數居其極故為死符是亦一説也曹震圭以歲前五辰為太歲絶氣蓋亦數窮之意然其説似是而非夫長生沐浴以至絶胎養皆從五行旺相休囚死而言謂之五勝又從五勝細區之而為是十二位云耳夫五行歴乎四季加以中央土則五勝起焉五行歴乎十二辰而各有寖昌寖微之漸則十二位立焉又同為一行陽順而隂逆陽死則隂生隂死則陽生于以成五行之氣之無終絶其㫖深也今太歲者歲隂也雖行乎五行之中而不定其為何行安得指其本位為帝旺而以其前五為絶位哉如以前五為絶位則將以舊太歲為新太歲臨官之位乎不可通矣且陽順則前五為絶矣隂逆則又當以後五為絶隂年太歲豈又將以後五為死符耶神樞經曰劫煞者歲之隂氣也主有殺害所理之方忌有興造犯之主有劫盜傷殺之事李鼎祚曰寅午戌歲在亥亥夘未歲在申申子辰歲在巳巳酉丑歲在寅是也神樞經曰災煞者五行隂氣之位也常居劫煞前一辰主災病疾厄之事所理之方不可抵向營造犯之者當有疾患曹震圭曰災煞者三合五行胎神也洞源經曰劫煞起於絶災煞起於尅假令申子辰年合水局水絶於已故劫煞在巳胎於午又水與午火相尅故災煞在午也巳酉丑年合金局金絶於寅故劫煞在寅胎於夘又金與夘木相尅故災煞在夘也餘倣此神樞經曰歲煞者隂氣尤毒謂之煞也常居四季謂四季之隂氣能遊天上李鼎祚曰寅午戌煞在丑巳酉丑煞在辰申子辰煞在未亥夘未煞在戌廣聖厯曰歲煞之地不可穿鑿修營移徙犯之者傷子孫六畜曹震圭曰月煞者三合五行成形之位所謂養是也大抵物之成形母必有傷故曰煞考原曰劫煞災煞歲煞是為三煞如曹氏説則三合五行絶胎養之位也絶胎養者墓庫以後長生以前神樞經所謂隂氣是也或謂三煞者三合五行當旺之衝故有宜向不宜坐之説如申子辰合水局水旺於北方南方其衝也故三煞在南方巳午未餘倣此厯例曰伏兵大禍者歲之五兵也主兵革刑殺所理之方忌出兵行師及修造犯之主有兵傷刑戮之咎黎幹曰寅午戌歲伏兵在壬大禍在癸亥夘未歲伏兵在庚大禍在辛申子辰歲伏兵在丙大禍在丁巳酉丑歲伏兵在甲大禍在乙是也曹震圭曰伏兵大禍者以三合五行相尅之陽干為伏兵隂干為大禍伏兵災甚大禍災輕考原曰伏兵大禍夾處於三煞之間如申子辰年三煞在巳午未伏兵大禍則在丙丁是也餘倣此按天以一而圓地以兩而方人以三而角天地無心人者天地之心也是故一生二二生三至於三而萬物旅生矣圓而方之三角出焉至於角而一微畢見矣是故本天下之至簡以極天下之至賾推天下之至隠成天下之至顯者必於三角得之然則三角者天地之心隂陽之端鬼神之會五行之秀氣也是故三合者神煞之所最重三合必三角也太歲者為而不宰其性情畢見於三合故太歲之下神之大者以三煞為首焉三煞者與太歲為敵為對者也假如太歲在寅午戌三合方自寅至午中為夘辰巳東南春夏之交非類也自午至戌中為未申酉南西夏秋之交亦非類也若自戌至寅中為正北亥子丑則三冬月令壬癸水之位與寅午戌火局為敵為對矣是故以丑為歲煞歲煞者三合為火而寅為首丑居寅上是據其顛頂而厭之者也猶夫月厭之在太陽前一位也必為歲所煞故曰歲煞也亥為劫煞劫者三合為火而戌居終亥居戌下是睥睨其間以代其位者也有盜之象焉故曰劫煞也三合為火而午居中午者火德盛滿之會也有其衝之必有災也子者正位之衝也故曰災煞也夫地支固如是矣而地支之位必有天干之寄居者焉亥子丑之間壬癸居之陽壬為伏兵隂癸為大禍則以其方位亦與三煞同也不用戊己者戊己中宫之氣既以三合論則不用戊己猶夫三合成局則不得有土局也餘可類推若夫曹震圭絶胎養之説則無當於理矣考原所謂宜向不宜坐之説最為得之蓋三煞之方皆太歲之所惡而不可居非以其能敵太歲而畏之也翼氏風角曰金剛火强各守其方木落歸根水流趨末曾門經曰巳酉丑金之位刑在西方言金恃其剛物莫與對寅午戌火之位刑在南方言火恃其强物莫與對亥夘未木之位刑在北方言木恃榮華故隂氣刑之使其彫落申子辰水之位刑在東方言水恃隂邪故陽氣刑之使不復歸所以子刑夘丑刑戌寅刑己夘刑子巳刑申未刑丑申刑寅戌刑未辰午酉亥為自刑也儲泳袪疑説曰三刑是極數子夘一刑也寅巳申二刑也丑戌未三刑也自夘順至子自子逆至夘極十數自寅逆至巳自巳逆至申極十數丑順至戌戌順至未極十數皇極中天以十為殺數積數至十則悉空其數天道惡盈滿則覆也此三刑之法所由起也廣聖厯曰歲刑之地攻城戰陣不可犯之動土興工亦須迴避犯之多鬬爭考原曰相刑之説翼氏最明蓋以巳酉丑刑申酉戌則巳刑申酉自刑丑刑戌也以寅午戌刑巳午未則寅刑巳午自刑戌刑未也以申子辰刑寅夘辰則申刑寅子刑夘辰自刑也以亥夘未刑亥子丑則亥自刑夘刑子未刑丑也按翼氏風角四語曾門經與考原申其㫖亦明顯矣顧所謂木恃榮華故隂氣刑之水恃隂邪故陽氣刑之其説猶不無矯强而辰午酉亥自刑之理亦未有論及之者也儲泳天道惡盈數極于十之説亦有妙義要亦不出翼奉四語今繹其㫖而得自刑之説焉金火剛强水木柔弱故金刑金方火刑火方剛强者必自戕也而金莫剛於酉火莫强於午則并不特自戕其本方而己且自戕其體焉若水木之柔弱則必被戕於生我者與所生者水生木而刑木木生於水而刑水生我之門死我之户孟子所為死於安樂者其斯之謂歟以亥夘未刑亥子丑而亥轉自刑亥木根也所為木落歸根也以申子辰刑寅夘辰而辰轉自刑辰水庫也所為水流趨末也厯例曰大煞者歲中刺史也主刑傷鬬殺之事所理之地出軍不可向之併忌修造犯者主有刑殺明時總要曰子年起子逆行四仲曹震圭曰大煞者是歲三合五行建旺之辰將星之位名曰刺史考原曰大煞子年在子丑年在酉寅年在午夘年在夘辰年又在子如是逆行四正蓋申子辰三合為水水旺於子也巳酉丑三合為金金旺於酉也寅午戌三合為火火旺於午也亥夘未三合為木木旺於夘也按子午夘酉水火木金之正位也天地之交而日月之衝也故太歲在四正則太歲自當之名太歲則大煞不足云矣猶天子自理其畿内也若太歲在孟季則正位亦成大煞大煞云者亞於太歲而重於官符白虎也故厯例有刺史之稱蓋古刺史得生殺一方也神樞經曰飛廉者歲之廉察使君之象亦名大煞所理之方不可興工動土移徙嫁娶犯之主官府口舌疾病遺亡廣聖厯曰子年在申丑年在酉寅年在戌夘年在巳辰年在午巳年在未午年在寅未年在夘申年在辰酉年在亥戌年在子亥年在丑也按飛廉者力士也事紂以善走名古之力士多矣而取象於飛廉者喻惡煞也三合之序由生而旺由旺而墓由墓而生四時之序由木而火由火而金由金而水由水而木此一元所以迭運而不窮五氣所以順布而成歲也飛廉子年起申子為水旺申為水生是以旺而逆厯於生也由是夘年在巳午年在寅酉年在亥以子夘午酉四旺之序而逆厯於申巳寅亥四生之方則并其生而亦逆矣丑年起酉丑為金墓酉為金旺是以墓而逆厯於旺也由是辰年在午未年在夘戌年在子以丑辰未戌四墓之序而逆厯於酉午夘子四旺之方則并其旺而亦逆矣寅年起戌寅為火生戌為火墓是以生而逆厯於墓也由是巳年在未申年在辰亥年在丑以寅巳申亥四生之序而逆厯於戌未辰丑四墓之方則幷其墓而亦逆矣夫順天者以德逆天者以力此豈非恃力悖德之象乎故以飛廉喻之又名大煞者在歲名飛廉在月名大煞變其名使不紊也又按子丑寅午未申年飛廉即是白虎夘辰巳酉戌亥年飛廉即是喪門然則飛廉之神亦與黄􅜖豹尾同可有可無者也洪範篇曰金神者太白之精白獸之神主兵戈喪亂水旱瘟疫所理之地忌築城池建宫室豎樓閣廣園林興工上梁出軍征伐移徙嫁娶逺行赴任若犯干神者其忌尤甚堪輿經曰甲己之年在午未申酉乙庚之年在辰巳丙辛之年在子丑寅夘午未丁壬之年在寅夘戌亥戊癸之年在申酉子丑也曹震圭曰金神者以年幹五虎元厯之逢庚辛及納音金之位者是也假如甲巳之年起丙寅順行得庚午辛未又壬申癸酉納音為劍鋒金故甲巳年午未申酉為金神也餘倣此按選擇宗鏡以五虎遁得庚辛之方為天金神旬内納音屬金者為地金神以天金神為重即洪範篇所謂若犯干神其忌尤甚也又云天金神一名遊天暗曜犯之患眼最凖其説為近似若洪範篇所云未必若是之甚兵戈喪亂水旱瘟疫豈係一家之犯金神煞所致耶厯例曰子年在辰逆行十二辰曹震圭曰辰與子水之精丑與夘木之精未與酉金之精午與戌火之精寅申巳亥土之精謂土能生育萬物四孟為五行長生之辰也故子年在辰逆行自然相合也考原曰曹氏五行之説未確以理求之殆以歲序起子而順行二十八宿起辰而逆行順者為陽為人逆者為隂為鬼各以其數之起處轉而相應也按五緯皆起於辰而逆行五鬼亦起於辰而逆行然則五鬼者五緯之魄氣也五緯不皆十二歲一周而五鬼則十二歲一周以歲星為五緯之長故從歲星也鬼也者氣返而歸者也象其幽隂故名之曰鬼也鬼必五者鬼五星其中一星曰質曶曶不明為積尸氣明則所臨之下有積尸故取鬼宿第五星以象之而名之曰五鬼非真自一至五而鬼有五也子午年與官符同位丑未年與喪門同位寅申年與太歲同位夘酉年與大隂同位辰戌年與白虎同位己亥年與歲破同位各隨其所同位之神以類相應乾坤寶典曰五鬼者五行之精氣也主虛耗之事所理之方不可興舉犯之主財物耗散厯例曰甲壬年在巽乙癸年在艮丙年在坤丁年在震戊年在離己年在坎庚年在兑辛年在乾曹震圭曰按納甲法乾納甲壬其衝在巽故甲壬之年在巽也坤納乙癸其衝在艮故乙癸之年在艮也艮納丙其衝在坤故丙年在坤也兑納丁其衝在震故丁年在震也坎納戊其衝在離故戊年在離也離納己其衝在坎故己年在坎也震納庚其衝在兑故庚年在兑也巽納辛其衝在乾故辛年在乾也按破敗五鬼云者以其方衝破歲幹所納之卦位故以破敗為名而亦係之以五鬼者言其幽隂之象云爾是從歲破之例例之而及於卦位者也然後天卦位則然而先天卦位則又不爾且後天卦位所為出震齊巽云云者是從東以至東北為一歲天行之序也古聖並未嘗以方位衝射言之若夫先天八卦天地定位山澤通氣雷風相薄水火不相射轉以對待為義不嫌衝射也然則强取易卦以就建除之例謂巽能破敗乾宫之氣艮能破敗坤宫之氣者於理不可通也今以舊厯所用姑存之實則無所關係厯例曰太歲出遊日者甲子日東遊己巳日還位丙子日南遊辛巳日還位戊子日遊中宫癸巳日還位庚子日西遊乙巳日還位壬子日北遊丁巳日還位共出遊二十五日曹震圭曰太歲諸神者隂氣之化地祗也蓋子至巳乃陽氣健旺之辰隂氣受制於陽神不敢用事故假言其出遊耳考原曰出遊日各以五子日幹為所徃之方甲為東方木故甲子日東遊丙為南方火故丙子日南遊庚為西方金故庚子日西遊壬為北方水故壬子日北遊戊為中央土故戊子日遊中宫五者生數之極故各出遊五日共五五二十五也按太歲者地祗也地祗從支故以五子為斷甲木也東也故甲子至己巳在東丙火也南也故丙子至辛巳在南餘三子倣此甲子日東遊則西南北可併工修造也東則雖本屬空方猶當有所忌若本不空則無論矣其曰太歲己下神煞者諸神煞皆從太歲而有太歲既不居本位則諸神煞皆無矣若謂出遊之日四方皆空則但當舉此二十五日為悉無禁忌可也何必分東西南北乎其以五日為斷者天數五地數五五者數之終也厯例曰癸巳至丁酉日在房内北戊戌己亥日在房内中庚子辛丑壬寅日在房内南癸夘日在房内西甲辰至丁未日在房内東戊申日又在中己酉日出遊四十四日遊神所在之方不宜安産室掃舍宇設牀帳其義未明今按日遊神載於時憲書明代承元授時厯即有之其前則莫可考矣歴例曰其義未明自來未有為之説者然俗所遵信南方民俗又有所謂鶴神方者出行忌扺向之甲子乙丑日在東南方之己丙寅轉丙午丁方五日而轉未坤申方六日而轉庚酉辛方五日而轉戌乾亥方六日而轉壬子癸方盡五日則為壬辰矣癸巳日起至戊申日止此十六日謂之鶴神上天至己酉日又出至丑艮寅方六日而轉甲夘乙方五日而轉辰巽巳方凡四日為癸亥矣辰二日巽二日而甲子乙丑又從巳起凡居四維則六日而去居四正則五日而去載於婁元禮所作田家五行其説云鶴神己酉日下地東北方乙夘轉正東庚申轉東南丙寅轉正南辛未轉西南丁丑轉正西壬午轉西北戊子轉正北癸巳上天在天上之北戊戌日轉天上之南甲辰轉天上之東己酉復下地周而復始括云纔逢癸巳上天堂已酉還居東北方上天下地之日晴主久晴雨主久雨轉方稍輕若大旱年雖轉方天並不作變諺云荒年無六親旱年無鶴神今紬繹之暗與日遊神相應蓋日遊神以癸巳日在室共十六日至己酉日而出遊四方共四十四日鶴神以癸巳日上天亦共十六日至己酉而下地巡歴四方亦共四十四日此以為在室則彼以為在天其在四方則同此四十四日也夷考其意確有至理蓋即天罡煞氣之遊行耳夫陽必有隂猶手之有掌背也陽以生而隂以殺道並行而不相悖凡陽所到處即隂所到處其所托始必於陽氣極盛之時故甲子乙丑日起巳方也其居四正則少一日居四維則多一日者正為陽而維為隂陽竒而隂偶也亥子丑者日光之所不照也積隂之區乃其家也故居之特為最久西北維正北方東北維既十七日矣又有上天十六日合為三十三日統而計之其在他方則為二十七日二十七者三三也其在本方則為三十三日三十三者亦三三也癸方遇癸尤為重隂巳者隂生隂盡之㑹也故既起於巳方而上天又必以癸巳日癸巳至戊申十六日乃遇己酉己者革位也酉者金之正位也以己酉日出於丑方合上天而計之則又己酉丑金全局也於是又歴東北以至東南而壬戌癸亥干支數盡焉恰又交於己矣夫陽盡午中隂盡子中已則當莧陸夬夬之爻為金煞之所由起易之大義也室中者與四方為對者也故為中宫之象而以上天之十六日當之夫上天云者言其不偏於一方耳夫豈真有上天者哉故室中之象似之而細區其方仍始自北由北而南而西而東即日遊神所在之方也安産室安牀則不宜抵向日遊神出行則不宜犯鶴神總以其為隂煞之氣故忌之也轉方則天有風雨隂陽之氣交也其義曉然可見唯鶴神之名則從俗之稱而莫可解意者鶴為噩字之訛酉曰作噩噩神猶金神歟欽定協紀辨方書卷三
