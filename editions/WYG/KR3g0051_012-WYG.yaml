body:
  text: 公規一司天之職首重氣候推晝夜永短以辨寒暑之進退察經緯躔舍以識中星之推移皆所以奉天而為協紀之本至於致祭迎春尤關鉅典載諸掌故昭舊職也作公規祀典春牛經歲時紀事氣候日躔過宮日出入晝夜時刻日出入方位朦影限祀典正月上辛日祈穀於上帝冬至大祀天於圜丘夏至大祀地於方澤春分卯時祭大明於朝日壇秋分酉時祭夜明於夕月壇四孟月朔時享太廟孟春同日祭太歲月將之神歲暮祫祭太廟同日祭太歲月將之神仲春仲秋上丁日祭先師孔子仲春仲秋上戊日祭社稷壇仲春仲秋擇日祭關帝廟黒龍潭龍神昭忠寺定南武莊王恪禧公勤襄公文襄公賢良祠仲春仲冬上甲日祭三皇廟季春己日祭先蠶祠季春亥日祭先農壇清明霜降前祭歴代帝王廟六月二十三日祭火神廟季秋擇日祭都城隍廟春牛經造春牛芒神用冬至後辰日於歲徳方取水土成造用桑柘木為胎骨牛身高四尺象四時頭至尾樁長八尺象八節牛頭色視年干甲乙年青色丙丁年紅色戊巳年黄色庚辛年白色壬癸年黒色牛身色視年支亥子年黒色寅卯年青色己午年紅色申酉年白色辰戌丑未年黄色牛腹色視年納音金年白色木年青色水年黒色火年紅色土年黄色牛角耳尾色視立春日干甲乙日青色丙丁日紅色戊巳日黄色庚辛日白色壬癸日黒色牛脛色視立春日支亥子日黒色寅卯日青色己午日紅色申酉日白色辰戌丑未日黄色牛蹄色視立春日納音金日白色木日青色水日黒色火日紅色土日黄色牛尾長一尺二寸象十二月左右繳視年隂陽陽年左繳隂年右繳牛口開合視年隂陽陽年口開隂年口合牛籠頭拘繩視立春日支干寅申己亥日用蔴繩子午卯酉日用苧繩辰戌丑未日用絲繩拘子俱用桑柘木甲乙日白色丙丁日黒色戊巳日青色庚辛日紅色壬癸日黄色牛踏板視年隂陽陽年用縣門左扇隂年用縣門右扇芒神身高三尺六寸五分象三百六十五日芒神老少視年支寅申己亥年面如老人像子午卯酉年面如少壯像辰戌丑未年面如童子像芒神衣帶色視立春日支剋支者為衣色支生者為帶色亥子日黄衣青腰帶寅卯日白衣紅腰帶己午日黑衣黄腰帶申酉日紅衣黒腰帶辰戌丑未日青衣白腰帶芒神髻視立春日納音金日平梳兩髻在耳前木日平梳兩髻在耳後水日平梳兩髻右髻在耳後左髻在耳前火日平梳兩髻右髻在耳前左髻在耳後土日平梳兩髻在頂直上芒神罨耳視立春時子丑時全戴寅時全戴揭起左邊亥時全戴揭起右邊卯巳未酉時用右手提辰午申戌時用左手提芒神行纒鞋袴視立春日納音金日行纒鞋袴俱全左行纒懸於腰木日行纒鞋袴俱全右行纒懸於腰水日行纒鞋袴俱全火日行纒鞋袴俱無土日著袴無行纒鞋子芒神鞭杖用柳枝長二尺四寸象二十四氣鞭結視立春日支寅申巳亥日用蔴結子午卯酉日用苧結辰戌丑未日用絲結俱用五色醮染芒神忙閒立牛前後視立春距正旦前後遠近立春距正旦前後五日内芒神忙與牛並立立春距正旦前五日外芒神早忙立於牛前邊立春距正旦後五日外芒神晚閒立於牛後邊芒神立牛左右視年隂陽陽年立於牛左隂年立於牛右歲時紀事迎春先設春牛勾芒神於東郊牛頭東向立春先一日府州縣官吏綵仗鼔樂迎春於東郊祭拜勾芒神迎春牛勾芒神安置各衙門頭門内至立春本日用綵仗鞭春牛蓋即出土牛送寒氣之遺意也龍治水視元旦後第幾日得辰即為幾龍治水也得辛視正月上旬第幾日值辛即為幾日得辛也二社歴例曰二分前後近戊為社三伏夏至後三庚為初伏四庚為中伏立秋後初庚為末伏如庚日夏至即為初庚庚日立秋即為末伏霉天通書曰神樞經芒種後逢丙入小暑後逢未出碎金云芒種後逢壬入夏至後逢庚出謂之霉天氣候立春東風解凍蟄蟲始振魚陟負冰雨水獺祭魚候鴈北草木萌動驚蟄桃始華倉庚鳴鷹化為鳩春分𤣥鳥至雷乃發聲始電清明桐始華田䑕化為鴽虹始見穀雨萍始生鳴鳩拂其羽戴勝降於桑立夏螻蟈鳴蚯蚓出王𤓰生小滿苦菜秀靡草死麥秋至芒種螳螂生鵙始鳴反舌無聲夏至鹿角解蜩始鳴半夏生小暑溫風至蟋蟀居壁鷹始摰大暑腐草為螢土潤溽暑大雨時行立秋凉風至白露降寒蟬鳴處暑鷹乃祭鳥天地始肅禾乃登白露鴻鴈來𤣥鳥歸羣鳥養羞秋分雷始收聲蟄蟲坯戸水始涸寒露鴻鴈來賔雀入大水為蛤菊有黄華霜降豺乃祭獸草木黄落蟄蟲咸俯立冬水始冰地始凍雉入大水為蜃小雪虹藏不見天氣上升地氣下降閉塞而成冬大雪鶡鴠不鳴虎始交荔挺出冬至蚯蚓結麋角解水泉動小寒鴈北鄉鵲始巢雉雊大寒雞乳征鳥厲疾水澤腹堅日躔每月中氣過宮雨水日躔亥宮初度是為娵訾之次春分日躔戌宮初度是為降婁之次穀雨日躔酉宮初度是為大梁之次小滿日躔申宮初度是為實沈之次夏至日躔未宮初度是為鶉首之次大暑日躔午宮初度是為鶉火之次處暑日躔巳宮初度是為鶉尾之次秋分日躔辰宮初度是為壽星之次霜降日躔卯宮初度是為大火之次小雪日躔寅宮初度是為析木之次冬至日躔丑宮初度是為星紀之次大寒日躔子宮初度是為元枵之次故月將正月在亥二月在戌三月在酉四月在申五月在未六月在午七月在巳八月在辰九月在卯十月在寅十一月在丑十二月在子月建視節氣斗杓也月將視中氣太陽也日出入之早晚晝夜永短所由分也而早晚之故有二一由於日行之内外一由於人居之南北蓋日行黄道與赤道斜交春秋分日行正當交㸃與地平交於卯酉地平上下之度相等故晝夜適均所謂日中宵中也春分以後日行赤道内至夏至而極其距等圏與地平交於寅戌地平上下之度上多下少故晝長夜短所謂日永也秋分以後日行赤道外至冬至而極其距等圏與地平交於辰申地平上下之度上少下多故晝短夜長所謂日短也二分前後距交不遠黄道勢斜則緯行疾故數日而差一刻二至前後黄道勢平則緯行遲故半月而差一刻此永短由日行之内外而生者也至於人居有南北則北極出地有高下於是見日之出入早晚隨地不同中國在赤道北北極出地上南極入地下故夏晝長冬晝短自京而北北極愈高則永短之差愈多至於北極之下則赤道當地平夏則有晝而無夜冬則有夜而無晝蓋以半年為晝半年為夜矣所居之地愈南北極漸低則永短之差漸少至於赤道之下則兩極當地平而晝夜常均矣赤道以南與北相反此永短由人居之南北而生者也今按京師北極出地三十九度五十五分推得各節氣日出入晝夜時刻如左至各省日出入時刻不同俱以各省北極出地及太陽赤道緯度立算法見考成上編春分戌宮初度日出卯正初刻晝四十八刻日入酉正初刻夜四十八刻五度日出卯初三刻八分晝四十八刻十四分日入酉正初刻七分夜四十七刻一分十度日出卯初三刻二分晝四十九刻十一分日入酉正初刻十三分夜四十六刻四分清明十五度日出卯初二刻十分晝五十刻十分日入酉正一刻五分夜四十五刻五分二十度日出卯初二刻四分晝五十一刻七分日入酉正一刻十一分夜四十四刻八分二十五度日出卯初一刻十二分晝五十二刻六分日入酉正二刻三分夜四十三刻九分穀雨酉宮初度日出卯初一刻六分晝五十三刻三分日入酉正二刻九分夜四十二刻十二分五度日出卯初一刻晝五十四刻日入酉正三刻夜四十二刻十度日出卯初初刻九分晝五十四刻十二分日入酉正三刻六分夜四十一刻三分立夏十五度日出卯初初刻三分晝五十五刻九分日入酉正三刻十二分夜四十刻六分二十二度日出寅正三刻十一分晝五十六刻八分日入戌初初刻四分夜三十九刻七分小滿申宮初度日出寅正三刻三分晝五十七刻九分日入戌初初刻十二分夜三十八刻六分七度日出寅正二刻十三分晝五十八刻四分日入戌初一刻二分夜三十七刻十一分芒種十五度日出寅正二刻八分晝五十八刻十四分日入戌初一刻七分夜三十七刻一分夏至未宮初度日出寅正二刻五分晝五十九刻五分日入戌初一刻十分夜三十六刻十分小暑十五度日出寅正二刻八分晝五十八刻十四分日入戌初一刻七分夜三十七刻一分二十三度日出寅正二刻十三分晝五十八刻四分日入戌初一刻二分夜三十七刻十一分大暑午宮初度日出寅正三刻三分晝五十七刻九分日入戌初初刻十二分夜三十八刻六分八度日出寅正三刻十一分晝五十六刻八分日入戌初初刻四分夜三十九刻七分立秋十五度日出卯初初刻三分晝五十五刻九分日入酉正三刻十二分夜四十刻六分二十度日出卯初初刻九分晝五十四刻十二分日入酉正三刻六分夜四十一刻三分二十五度日出卯初一刻晝五十四刻日入酉正三刻夜四十二刻處暑己宮初度日出卯初一刻六分晝五十三刻三分日入酉正二刻九分夜四十二刻十二分五度日出卯初一刻十二分晝五十二刻六分日入酉正二刻三分夜四十三刻九分十度日出卯初二刻四分晝五十一刻七分日入酉正一刻十一分夜四十四刻八分白露十五度日出卯初二刻十分晝五十刻十分日入酉正一刻五分夜四十五刻五分二十度日出卯初三刻二分晝四十九刻十一分日入酉正初刻十三分夜四十六刻四分二十五度日出卯初三刻八分晝四十八刻十四分日入酉正初刻七分夜四十七刻一分秋分辰宮初度日出卯正初刻晝四十八刻日入酉正初刻夜四十八刻五度日出卯正初刻七分晝四十七刻一分日入酉初三刻八分夜四十八刻十四分十度日出卯正初刻十三分晝四十六刻四分日入酉初三刻二分夜四十九刻十一分寒露十五度日出卯正一刻五分晝四十五刻五分日入酉初二刻十分夜五十刻十分二十度日出卯正一刻十一分晝四十四刻八分日入酉初二刻四分夜五十一刻七分二十五度日出卯正二刻三分晝四十三刻九分日入酉初一刻十二分夜五十二刻六分霜降卯宮初度日出卯正二刻九分晝四十二刻十二分日入酉初一刻六分夜五十三刻三分五度日出卯正三刻晝四十二刻日入酉初一刻夜五十四刻十度日出卯正三刻六分晝四十一刻三分日入酉初初刻九分夜五十四刻十二分立冬十五度日出卯正三刻十二分晝四十刻六分日入酉初初刻三分夜五十五刻九分二十二度日出辰初初刻四分晝三十九刻七分日入申正三刻十一分夜五十六刻八分小雪寅宮初度日出辰初初刻十二分晝三十八刻六分日入申正三刻三分夜五十七刻九分七度日出辰初一刻二分晝三十七刻十一分日入申正二刻十三分夜五十八刻四分大雪十五度日出辰初一刻七分晝三十七刻一分日入申正二刻八分夜五十八刻十四分冬至丑宮初度日出辰初一刻十分晝三十六刻十分日入申正二刻五分夜五十九刻五分小寒十五度日出辰初一刻七分晝三十七刻一分日入申正二刻八分夜五十八刻十四分二十三度日出辰初一刻二分晝三十七刻十一分日入申正二刻十三分夜五十八刻四分大寒子宮初度日出辰初初刻十二分晝三十八刻六分日入申正三刻三分夜五十七刻九分八度日出辰初初刻四分晝三十九刻七分日入申正三刻十一分夜五十六刻八分立春十五度日出卯正三刻十二分晝四十刻六分日入酉初初刻三分夜五十五刻九分二十度日出卯正三刻六分晝四十一刻三分日入酉初初刻九分夜五十四刻十二分二十五度