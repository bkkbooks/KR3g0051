body:
  text: 立成神煞之所由起義例備矣然各為一篇不能一覽而盡其條理且年神方位通書時憲書取用各有不同而月家吉凶神又合建除叢辰諸家以輕重為次第則義例猶未盡焉今将時憲書及月表所用吉凶神另編立成入萬年書外而合通書萬年書嵗月日時吉凶神煞彚列成表各分起例以類相從庶其例益明而其義亦從可知也作立成年神從嵗干起者年神從嵗干取納甲卦變者年神隨嵗方順行者年神隨歲支順行者年神隨嵗支退行者年神從嵗支三合者年神隨嵗支順行一方者年神從嵗支取納甲卦變者年神從三元起者年神從嵗納音起者月神從嵗干起者月神從三元起者月神從嵗支起者月神從八節九宫順逆行者月神取月建三合者月神隨四序者月神隨建旺取墓辰者月神隨月建三合逆行一方者月神隨四序行三合者月神隨四時行三合納甲者月神隨月建行納甲六辰者月神隨月建逆行一方者月神隨月建三合順行一方者月神隨孟仲季順行三支者月神隨月建隂陽順行六辰者月神隨月將逆行者月神隨月建行隂陽六辰者月神取月建生比者月神從厭建起者日神取一定干支者天恩甲子乙丑丙寅丁夘戊辰己夘庚辰辛巳壬午癸未己酉庚戌辛亥壬子癸丑五合寅夘除神五離申酉鳴吠甲午丙午庚午壬午甲申丙申庚申壬申乙酉丁酉己酉辛酉癸酉鳴吠對丙子庚子壬子甲寅丙寅庚寅壬寅乙夘丁夘辛夘癸夘寶日丁丑丙戌甲午庚子壬寅癸夘乙巳丁未戊申己酉辛亥丙辰義日甲子丙寅丁夘己巳辛未壬申癸酉乙亥庚辰辛丑庚戌戊午制日乙丑甲戌壬午戊子庚寅辛夘癸巳乙未丙申丁酉己亥甲辰專日戊辰己丑戊戌丙午壬子甲寅乙夘丁巳己未庚申辛酉癸亥伐日庚午丙子戊寅己夘辛巳癸未甲申乙酉丁亥壬辰癸丑壬戌八専甲寅丁未己未庚申癸丑觸水龍丙子癸未癸丑無禄甲辰乙巳丙申丁亥戊戌己丑庚辰辛巳壬申癸亥重日己亥日神按年取干支者上朔甲年癸亥乙年己巳丙年乙亥丁年辛巳戊年丁亥己年癸巳庚年己亥辛年乙巳壬年辛亥癸年丁巳日神按月取日數者長星正月七日二月四日三月一日四月九日五月十五日六月十日七月八日八月二日五日九月三日四日十月一日十一月十二日十二月九日短星正月二十一日二月十九日三月十六日四月二十五日五月二十五日六月二十日七月二十二日八月十八日十九日九月十六日十七日十月十四日十一月二十二日十二月二十五日日神按月朔取日數者反支子丑朔六日寅夘朔五日辰巳朔四日午未朔三日申酉朔二日戌亥朔一日日神按節氣取日數者四離冬至夏至春分秋分各前一日四絶立春立夏立秋立冬各前一日氣往亡立春後七日驚蟄後十四日清明後二十一日立夏後八日芒種後十六日小暑後二十四日立秋後九日白露後十八日寒露後二十七日立冬後十日大雪後二十日小雪後三十日時神從日干起者日干日禄天乙貴人喜神天官貴人福星貴人五不遇時路空時神從日支起者日支日建日合日馬日破日害日刑青龍明堂日支天刑朱雀金匱寶光白虎玉堂天牢元武司命勾陳時神隨月將者四大吉時時神隨月將及日干支者貴登天門時甲日旦夕乙日旦夕丙日旦夕丁日旦夕戊庚日旦夕己日旦夕辛日旦夕壬日旦夕癸日旦夕九醜戊子日戊午日壬子日壬午日乙夘日己夘日辛夘日乙酉日己酉日辛酉日時神隨日六旬者欽定協紀辨方書卷九戊午日壬子日壬午日乙夘日己夘日辛夘日乙酉日己酉日辛酉日時神隨日六旬者欽定協紀辨方書卷九
