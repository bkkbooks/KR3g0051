body:
  text: 月表五五月芒種五月節天道西北行宜向西北行宜修造西北維天徳在乾月徳在丙月徳合在辛月空在壬宜修造取土月建在午月破在子月厭在午月刑在午月害在丑劫煞在亥災煞在子月煞在丑忌修造取土十五日長星二十五日短星芒種後十六日徃亡夏至前一日四離夏至五月中日躔在未宫為五月將宜用艮巽坤乾時甲子海中金義破日乙丑海中金制危日丙寅鑪中火義成日丁夘鑪中火義収日戊辰大林木專開日己巳大林木義閉日庚午路傍土伐建日辛未路傍土義除日壬申劒鋒金義滿日癸酉劒鋒金義平日甲戌山頭火制定日乙亥山頭火義執日丙子澗下水伐破日丁丑澗下水寶危日戊寅城頭土伐成日己卯城頭土伐収日庚辰白鑞金義開日辛巳白鑞金伐閉日壬午楊栁木制建日癸未楊栁木伐除日甲申井泉水伐滿日乙酉井泉水伐平日丙戌屋上土寶定日丁亥屋上土伐執日戊子霹􅋬火制破日己丑霹􅆮火專危日庚寅松柏木制成日辛夘松柏木制収日壬辰長流水伐開日癸巳長流水制閉日甲午砂石金寶建日乙未砂石金制除日丙申山下火制滿日丁酉山下火制平日戊戌平地木專定日己亥平地木制執日庚子壁上土寶破日辛丑壁上土義危日壬寅金箔金寶成日癸卯金箔金寶収日甲辰覆燈火制開日乙巳覆燈火寶閉日丙午天河水專建日丁未天河水寶除日戊申大驛土寶滿日己酉大驛土寶平日庚戌釵釧金義定日辛亥釵釧金寶執日壬子桑柘木專破日癸丑桑柘木伐危日甲寅大溪水專成日乙夘大溪水專収日丙辰沙中土寶開日丁巳沙中土專閉日戊午天上火義建日己未天上火專除日庚申石榴木專滿日辛酉石榴木專平日壬戌大海水伐定日癸亥大海水專執日右六十干支從建午者始芒種終夏至其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十四
