body:
  text: 年表四甲午至癸卯太歲甲午幹木枝火納音屬金開山立向修方吉歲徳甲歲徳合巳歲枝徳亥陽貴人未隂貴人丑歲禄寅歲馬申奏書巽博士乾三元紫白上元一白艮六白巽八白乾九紫兌中元一白中六白坎八白震九紫巽下元一白坤六白兌八白離九紫坎蓋山黄道貪狼巽辛巨門艮丙武曲震庚亥未文曲乾甲通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后丙午功曹坤申天罡辛戌勝光壬子𫝊送艮寅河魁乙辰十二吉山宜寅午戌申子辰年月日時四利三元太陽未太隂酉龍徳丑福徳卯開山立向修方凶太歲午歲破子三煞亥子丑坐煞向煞壬癸丙丁浮天空亡離壬開山凶年尅山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太歲艮巽六害丑死符亥灸退酉立向凶巡山羅㬋丁病符巳修方凶天官符巳地官符戌大煞午大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑午黄幡戌豹尾辰飛亷寅喪門申弔客辰白虎寅金神午未申酉獨火兑五鬼戌破敗五鬼巽開山立向修方吉太歲乙未幹木枝土納音屬金開山立向修方吉歲徳庚歲徳合乙歲枝徳子陽貴人申隂貴人子歲禄卯歲馬巳奏書巽博士乾三元紫白上元一白離六白中八白兌九紫艮中元一白乾六白坤八白巽九紫中下元一白震六白艮八白坎九紫坤蓋山黄道貪狼坤乙巨門坎癸申辰武曲乾甲文曲震庚亥未通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十二吉山宜亥卯未巳酉丑年月日時走馬六壬神后巽巳功曹丁未天罡庚酉勝光乾亥𫝊送癸丑河魁甲卯十二吉山宜亥卯未巳酉丑年月日時四利三元太陽申太隂戌龍徳寅福徳辰開山立向修方凶太歲未歲破丑三煞申酉戌坐煞向煞庚辛甲乙浮天空亡坎癸開山凶年尅山家震艮巳山隂府太歲兌乾六害子死符子灸退午立向凶巡山羅㬋坤病符午修方凶天官符寅地官符亥大煞卯大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑丑黄幡未豹尾丑飛亷卯喪門酉弔客巳白虎卯金神辰巳獨火離五鬼酉破敗五鬼艮開山立向修方吉太歲丙申幹火枝金納音屬火開山立向修方吉歲徳丙歲徳合辛歲枝徳丑陽貴人酉隂貴人亥歲禄巳歲馬寅奏書坤博士艮三元紫白上元一白坎六白乾八白艮九紫離中元一白兑六白震八白中九紫乾下元一白巽六白離八白坤九紫震蓋山黄道貪狼坤乙巨門坎癸申辰武曲乾甲文曲震庚亥未通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后乙辰功曹丙午天罡坤申勝光辛戌𫝊送壬子河魁艮寅十二吉山宜申子辰寅午戌年月日時四利三元太陽酉太隂亥龍徳卯福徳巳開山立向修方凶太歲申歲破寅三煞巳午未坐煞向煞丙丁壬癸浮天空亡巽辛開山凶年尅山家震艮巳山隂府太歲坎坤六害亥死符丑灸退卯立向凶巡山羅㬋庚病符未修方凶天官符亥地官符子大煞子大將軍午力士乾蠶室巽蠶官辰蠶命巳歲刑寅黄幡辰豹尾戌飛亷辰喪門戌弔客午白虎辰金神寅卯午未子丑獨火離五鬼申破敗五鬼坤開山立向修方吉太歲丁酉幹火枝金納音屬火開山立向修方吉歲徳壬歲徳合丁歲枝徳寅陽貴人亥隂貴人酉歲禄午歲馬亥奏書坤博士艮三元紫白上元一白坤六白兌八白離九紫坎中元一白艮六白巽八白乾九紫兌下元一白中六白坎八白震九紫巽蓋山黄道貪狼離壬寅戌巨門乾甲武曲坎癸申辰文曲艮丙通天竅三合前方乾亥壬子癸丑三合後方巽巳丙午丁未十二吉山宜巳酉丑亥卯未年月日時走馬六壬神后甲卯功曹巽巳天罡丁未勝光庚酉𫝊送乾亥河魁癸丑十二吉山宜巳酉丑亥卯未年月日時四利三元太陽戌太隂子龍徳辰福徳午開山立向修方凶太歲酉歲破卯三煞寅卯辰坐煞向煞甲乙庚辛浮天空亡震庚開山凶年尅山家離壬丙乙山隂府太歲乾離六害戌死符寅灸退子立向凶巡山羅㬋辛病符申修方凶天官符申地官符丑大煞酉大將軍午力士乾蠶室巽蠶官辰蠶命已歲刑酉黄幡丑豹尾未飛亷亥喪門亥弔客未白虎巳金神寅卯戌亥獨火坤五鬼未破敗五鬼震開山立向修方吉太歲戊戌幹土枝土納音屬木開山立向修方吉歲徳戊歲徳合癸歲枝徳卯陽貴人丑隂貴人未歲禄巳歲馬申奏書坤博士艮三元紫白上元一白震六白艮八白坎九紫坤中元一白離六白中八白兌九紫艮下元一白乾六白坤八白巽九紫中蓋山黄道貪狼坎癸申辰巨門坤乙武曲離壬寅戌文曲兌丁巳丑通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后艮寅功曹乙辰天罡丙午勝光坤申傳送辛戊河魁壬子十二吉山宜寅午戌申子辰年月日時四利三元太陽亥太隂丑龍徳巳福徳未開山立向修方凶太歲戌歲破辰三煞亥子丑坐煞向煞壬癸丙丁浮天空亡坤乙開山凶年尅山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太歲坤震六害酉死符卯灸退酉立向凶巡山羅㬋乾病符酉修方凶天官符己地官符寅大煞午大將軍午力士乾蠶室巽蠶官辰蠶命巳歲刑未黄幡戌豹尾辰飛亷子喪門子弔客申白虎午金神申酉子丑獨火乾五鬼午破敗五鬼離開山立向修方吉太歲巳亥幹土枝水納音屬木開山立向修方吉歲徳甲歲徳合巳歲枝徳辰陽貴人子隂貴人申歲禄午歲馬巳奏書乾博士巽三元紫白上元一白巽六白離八白坤九紫震中元一白坎六白乾八白艮九紫離下元一白兌六白震八白中九紫乾蓋山黄道貪狼坎癸申辰巨門坤乙武曲離壬寅戌文曲兌丁己丑通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十二吉山宜亥卯未巳酉丑年月