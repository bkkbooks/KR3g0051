body:
  text: 月表一嵗有十二月月有六十日神煞隨月轉換葢月三十日者朔㑹之常期而章蔀既周則日法必得六十甲子也今逐月逐日推排吉凶神而分列宜忌於下隨事選用展卷瞭然作月表正月立春正月節天道南行宜向南行宜修造南方天徳在丁天徳合在壬月徳在丙月徳合在辛月空在壬宜修造取土月建在寅月破在申月厭在戌月刑在巳月害在巳劫煞在亥災煞在子月煞在丑忌修造取土初七日長星二十一日短星立春前一日四絶後七日往亡雨水正月中日躔在亥宫為正月將宜用甲丙庚壬時甲子海中金義開日乙丑海中金制閉日丙寅鑪中火義建日丁卯鑪中火義除日戊辰大林木專滿日己巳大林木義平日庚午路傍土伐定日辛未路傍土義執日壬申劒鋒金義破日癸酉劒鋒金義危日甲戌山頭火制成日乙亥山頭火義收日丙子澗下水伐開日丁丑澗下水寳閉日戊寅城頭土伐建日己夘城頭土伐除日庚辰白鑞金義滿日辛己白鑞金伐平日壬午楊栁木制定日癸未楊栁木伐執日甲申井泉水伐破日乙酉井泉水伐危日丙戌屋上土寳成日丁亥屋上土伐收日戊子霹靂火制開日己丑霹靂火專閉日庚寅松栢木制建日辛卯松栢木制除日壬辰長流水伐滿日癸巳長流水制平日甲午砂石金寳定日乙未砂石金制執日丙申山下火制破日丁酉山下火制危日戊戌平地木專成日己亥平地木制收日庚子壁上土寳開日辛丑壁上土義閉日壬寅金箔金寳建日癸卯金箔金寳除日甲辰覆燈火制滿日乙巳覆燈火寳平日丙午天河水專定日丁未天河水寳執日戊申大驛土寳破日己酉大驛土寳危日庚戌釵釧金義成日辛亥釵釧金寳收日壬子桑柘木專開日癸丑桑柘木伐閉日甲寅大溪水專建日乙卯大溪水專除日丙辰沙中土寳滿日丁巳沙中土專平日戊午天上火義定日己未天上火專執日庚申石榴木專破日辛酉石榴木專危日壬戌大海水伐成日癸亥大海水專收日右六十干支從建寅者始立春終雨水其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十
