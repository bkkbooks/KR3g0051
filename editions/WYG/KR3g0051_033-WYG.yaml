body:
  text: 利用二年神總論月吉神總論月凶神總論諸家年月日吉凶神附論制煞要法四柱法用日法用時法時刻方位圖太陽到方圖太陽到方時刻表造𦵏權法年神總論選擇宗鏡曰年家吉凶神起例有八一曰本年天干二曰三合五行三曰本年十二建星四曰本年五虎遁五曰本年納音六曰四方七曰納卦八曰羊刄凡吉凶神從此八者而起則為真扵真凶之中又分輕重大者避之中者制之小者以吉星照之而已歳徳歳德合歳禄馬貴人山方皆吉能制諸凶煞歳干化氣尅坐山化氣為正隂府凶帶卦者為傍隂府亦凶俗術丙辛隂府用甲巳二干化土制之乙庚隂府用戊癸二干化火制之切不可信傍隂府有吉星制或年月吉則不妨楊筠松開乾山用壬申壬子壬辰壬寅又用壬子壬子壬子庚子合天地一氣格又取壬禄到乾亥為吉也如祔𦵏及修造正傍俱不忌以上從嵗天干起例三煞大凶伏兵大禍夾三煞亦凶三煞止忌單修先從吉方起手連及修之無害惟嵗煞不可犯伏兵亦凶大禍與吉星㑹不為害與凶煞㑹凶臨官為天官符忌單修若從吉方起手連及修之無害月家飛宫同到小凶地官符扵吉方起手連及修之無害單修凶或用太陽紫白命貴禄馬制之吉帝旺為金匱星吉又為打頭火主火燭凶若疊太歳尤凶打頭火大忌不可犯或年獨火月逰火月家丙丁火但有一火㑹合其火即發如月日得一白水星到方有氣或有壬癸水星到能壓制不妨三煞最凶伏兵大禍次之天官符打頭火又次之以上從三合起例建星如子年子上起建丑為除丑年丑上起建寅為除是也建為歳君為元神為吉凶衆神之主可坐不可向在山在方疊吉星則大吉疊凶星則大凶在方為堆黄方亦疊吉則吉疊凶則凶除為四利太陽小吉滿為土瘟為四利䘮門凶又為天富小吉平為三台又為土曲又為四利太隂大吉定為歳三合為顯星吉又為地官符為畜官次凶執為四利死符又為小耗凶破為歳破為大耗大凶危為極富星為谷将星為四利龍德吉成為三合為天喜吉又為飛亷又為四利白虎小凶收為四利福徳小吉開為青龍太隂為生氣華蓋又為官國星上吉又為四利弔客小凶閉為病符凶平成開危最吉定除次吉破大凶建可吉可凶以上從十二建星起例五虎遁干戊巳為都天丙丁為獨火庚辛為天金神天金神一名遊天暗曜犯之患眼疾用丙丁九紫火星制之無害以上從五虎遁起例本年納音尅坐山墓上納音者為年尅山家凶屬金者為地金神次凶以上從納音起例奏書博士吉蠶室力士小凶有吉星可用大将軍有吉星制年月利主吉年月不利亦主凶又忌與太隂㑹尤凶以上從四方起例太歳天干納在何卦其衝破對卦名曰破敗五鬼忌修方吉多不忌以上從納卦起例本年禄前一位為羊刃對衝為飛刃名李廣箭凶然惟八干山有之忌坐山不忌方與向乾坤艮巽山無禄亦無刄古人𦵏課犯隂府年尅者甚多而八干山絶無犯李廣箭者其犯箭者皆四維山原無箭故也以上從羊刄起例按年神總論宗鏡自為一家之言大體醇正故備録之然唯太歳歳破不可犯三煞猶可制化況其他乎隂府以納甲為正卦為傍與通書不合而亦有理然其義紆逺輕于年尅山家見義例本篇十二建星不足為憑當兼諸神叅看見義例四利三元條下天干臨官為禄帝旺為刄刄固不如禄之吉然其凶亦不過如大煞止耳大扺大煞羊刄皆不為凶疊凶星則凶猶疊太嵗月建也且其起例既從年干又曰乾坤艮巽四山無刄則必年與山同夫甲山用夘月日正為扶山何凶之有故今臺官不用然本條内云古人𦵏課犯隂府年尅者甚多則不為無功也至其中所云神煞不忌新宅而忌舊宅又云年尅山家傷祖父無祖父則不忌種種支離概刪不録月吉神總論天徳方即天道方月徳方即三合月官旺之間大吉天徳合月徳合方次吉此四德到方大能制此方之煞併歳徳歳徳合共名六徳俱走天干不走地支不能制地支方煞也月金匱方吉即三合月分之旺方也修之發丁修年金匱不如修月金匱比月徳後一步吉與月徳同月天赦方吉春戊寅夏甲午秋戊申冬甲子此天赦也然原無定在故以月建入中宫遁之遁得天赦落在何方此方宜修造可制官符等煞天月徳三合周轉已有飛宫之義不宜再飛天赦必飛乃現月凶神總論月破山方皆凶坐山尤凶造𦵏皆不可犯月隂府山凶月天干尅坐山所納之甲為正隂府帶卦者為傍隂府月尅山家凶月之納音尅山墓音也以年日納音制之大月建乃月家土煞占山占向占方占中宫皆凶動土尤凶吉不能制小月建占方凶占山占向亦凶忌修不忌𦵏月家打頭火小凶與丙丁火併不可修造用一白壬癸制之月逰火不足忌飛宫天地官符小凶有吉星可用諸家年月日吉凶神附論曾文辿曰太歳坐山留福徳却将年月更加臨還須四柱無沖尅共轉天河福愈深楊筠松曰太歳可坐不可向又曰吉莫吉扵修太歳凶莫凶扵犯太歳又曰太歳疊吉星則貢福疊凶星則降禍俱言坐太歳之法也造𦵏者坐太歳極吉向太歲極凶然坐之有數端焉一查太嵗不疊戊巳隂府年尅打頭火乃可坐二要八節三竒照之三要月日時或與太嵗一氣或與太嵗三合乃吉若支沖之干尅之則犯歳君而大凶四要太陽紫白諸吉同到則尤妙福大而乆非别吉之可比也太歳禄馬貴人能壓一切凶星貴人為上禄馬次之要與造主本命禄馬同行乃能致福用命貴禄馬而歳貴禄馬不至者命主無管攝用歳貴禄馬而命貴禄馬不值者歳君不依歸歳命交㑹方為全美選擇務令有氣得時如木向春生金逢秋旺之類飛宫亦有六合之法合貴為上合禄次之如甲命禄在寅十二月作艮以月建丑入中宫遁得寅字到乾乾中有亥合艮中之寅也餘倣此邱平甫曰諸家年月多差舛惟有紫白却可憑曽文辿曰禄到山頭主進財從外壓将來馬到山頭進官職要合三元白貴人與白同旺相貴子入朝堂六白屬金秋月旺紫火春夏强一八水土旺三冬立見福禄崇此言紫白之真且宜與貴人禄馬同到又紫白喜旺相則愈有力皆不二之論也桑道茂及一行禪師皆云紫白所到之方不避太嵗将軍官符諸凶惟不能制大月建而已不避宅長一切凶年並不能為害惟不能制天罡四旺煞而已則紫白之吉古所共宗通書有謂飛宫弔替多有不合故紫白難用者妄也凡月家吉星弔替飛宫不犯衝伏為美如一白到坎八白為艮為星伏之地九紫到坎八白到坤為星衝之地其吉減力右論三篇亦出選擇宗鏡其中飛天赦為今所不用然亦不背扵理録之以備一義也金匱星今亦不用葢金匱即大煞以其旺為吉又以其旺為凶未免自相矛盾大抵金匱大煞本無吉凶疊吉星則吉疊凶星則凶亦猶疊太嵗月建耳其曰六徳不能制支煞非是夫支之凶者正當以干制之方見制化之理如乙酉年歳煞在辰用庚辰月日時則天干一氣皆金與乙作合為嵗徳而辰亦不以煞論矣故精扵造命之法則建除與山方猶屬第二義所謂天光下臨也烏有重支而輕干者乎其曰大月建吉不能制亦非夫月建謂之土煞自較太嵗為輕況又不論定位而論飛宫㫁無山方中宫無往不忌之理其論坐太歳之法慎重周詳體用兼備非惟日者之妙用實亦君子之存心俗術並不論此漫曰太嵗可坐何孟浪也其中太嵗不疊戊巳可坐一語則又可以明戊巳煞之誤兼可以證大小月建之偽誠破的之論其論禄馬貴人嵗命同到與古課脗合而語義尤備其曰甲命丑月寅禄到乾則亦止用地支一字可與真禄叅觀各神制化諸説不同詳見後制煞要法選擇宗鏡曰坐三煞向太嵗此不能制者也不可犯也三煞在方在向及隂府在山此可制而不易制者也不可輕也其餘紛紛神煞中煞制之小煞不必制有吉星同到自能壓伏除太歳在山在方宜合不宜衝灸退在山在方宜補不宜尅此外則四法而已干犯干制如隂府天金神皆以干制干也支犯支制如地官符之類擇其死月死日修之可也三合犯三合制如三煞打頭火天官符以三合局尅之可也納音犯納音制如年尅地金神以納音制之可也今通書制三煞等法皆用納音不知納音力輕仍當兼地支三合取用方是千金曰煞在山頭更若何貴人禄馬喜相過三竒諸德能降煞吉制凶神發福多此言山頭之中煞小煞不用尅制而止以諸吉照之者也蓋尅則尅倒坐山矣山值休囚月亦不吉又曰吉星有氣小成大惡曜休囚不降災則尅制修方法也勿作一例看尅制者尅制得法為主吉星為用若小煞則不必制遇吉星自伏太陽三竒能降諸煞紫白竅馬能制地官符大将軍以下諸煞禄制空亡貴人降諸煞以本命飛到者最為上太歳飛到者次之同到者尤吉制煞之法宜用四柱尅之而不宜衝尅之則伏衝之則起而反為禍除太歳隂府在坐山不宜尅外其餘諸煞如三煞官符大将軍伏兵大禍等項在坐則重而難制在向在方則輕而可降方上有煞可制者先從吉方起手連及修作又從吉方住手亦佳凶方怕疊太歳怕太歳對衝怕太歳三合其方則皆大凶次之怕月建相疊相衝相合則亦為禍不然不甚為禍也葢嵗君與月建之力極大吉星必藉其力方能作福凶星必藉其力方能作禍吉方宜動不修動決不作福凶方宜靜不修動亦不作禍惟年納音所尅之方雖凶亦無害已為太嵗所制故也嵗君月建衝破吉方則不吉無力故也若衝破凶方則又凶蓋煞如虎如火合之固起衝之亦起惟浮天空亡占向可以八字衝之太歳可坐不可向三煞可向不可坐不易之論也凡制神煞先令其星失時無氣更泊死絶休廢之鄉得禄馬貴人當旺之令修之化煞為權較之尅制尤穏恐壓伏太過或遇衝合反為禍也書曰若要貴修太歳若要發修三煞要大興修火星要小興修金神要發富修官符救冷退修灸退又曰制煞修方反獲吉福此言修非言𦵏言修方非言修山也蓋煞必須尅而坐山宜補尅之則山傷補之則煞旺故單云制煞修方者以方可尅故也惟太嵗或在山或在方皆可修蓋修太嵗者可合而不可尅不尅則不傷山也隂府與山分而為二亦可修尅隂府不尅坐山也其餘諸煞皆與山方合而為一故尅制此方即所以尅制此煞惟方不怕尅也故皆指修方言此皆修年家坐宫煞非修月家飛宫煞太嵗必疊吉星不疊凶星而後修之君明臣良其吉可知故曰大富大貴三煞連占一方其力極大制之得法自然發福然此煞最凶制不得法必至為禍修主孱弱亦難駕御不可輕試火星乃三合旺方即打頭火也尅而修之旺氣發越大發人丁故曰大興火尅金神則為財以丙丁竒制之則旺田産故曰小興地官符為嵗三合修之得法亦主旺財故曰發富三合死方為灸退以月日旺相輔之則無氣而有氣矣故曰救冷退制煞之法古云干犯干制支犯支制三合犯三合制納音犯納音制此確論也又有化氣犯者化氣制坐宫犯者坐宫制飛宫犯者飛宫制如隂府甲巳屬土則以丁壬木制之乙庚屬金則以戊癸火制之此化氣制化氣也如病符小耗年家之不飛者以年月日吉照之此坐宫制坐宫也如月家打頭火則以月家一白或壬癸水徳制之此飛宫制飛宫也又有以隂府甲乙屬木戊巳屬土三煞打頭火官符等項在寅夘辰則屬木己午未則屬火本煞又自分五行尅制者倣此辨衰旺者亦倣此制煞全看月令必本煞衰月制神旺月乃可惟太嵗灸退另論若諸煞聚㑹或與太嵗同宫則不可制勿犯可也通書曰太嵗以下凶煞甚多難以盡避其各神所臨之地惟奏書􅀶士宜向之餘各有所忌須辨生旺休囚制化得宜如有破壊須修營者以天徳嵗徳月徳天徳合嵗徳合月徳合天恩天赦母倉所㑹之辰或各神出遊日併工修之無妨凡制凶神宜酌其輕重不可用煞之生旺如煞屬木者忌春令并忌亥夘未日時如用午字則木煞死申字則木煞絶餘可類推按宗鏡載制煞之法甚詳醇多疵少故節取而録之其曰吉方不動不作福凶方不動不作禍即洪範龜蓍共違靜吉作凶之理原文有曰戊巳煞不動亦凶則悖謬已甚矣隂府制法似是而非辨見後通書二則言畧而意該時憲書載扵年神之下制煞之大要也今為逐條詳具扵左太嵗嵗破宗鏡曰太嵗君也坐之吉向之凶衝破坐山故也四柱八字合之吉衝之尅之凶以臣犯君故也疊紫白三竒禄馬貴人等吉星則極吉得君行道膏澤及民也疊戊巳年尅隂府大煞等凶星則又極凶衆凶有藉倚勢作孽也故太嵗或在山或在方審其疊吉而不疊凶則以四柱合之或一氣或三合局造𦵏移徙其福大而且久非諸吉星可比也必要八節三竒太陽紫白諸吉同到本命貴禄臨之尤妙曽文辿曰吉莫吉扵修太嵗凶莫凶扵犯太嵗太歳所在宜造𦵏宜移徙宜補葺皆修也不可拆毁不可穵窖開池皆犯也按太嵗為歳君吉星㑹扵坐山乘旺固吉然不得已而修作及𦵏事則可矣若興造之事本屬可緩行險儌倖未必得福不如其勿犯也通書有用月日納音尅太嵗納音之説益屬無理至可坐不可向則不易之論蓋向太歳則坐于歳破矣雖有吉星不能解也又按坐太歳固吉而亦有不同如子午夘酉年太歳與大煞同位三然與歳破同方則坐之亦不吉宗鏡因飛宫大煞名打頭火遂謂太歳疊打頭火凶失其義矣今改正三煞伏兵大禍通書曰三煞止忌修方先從吉方起手連及修之無害如子年三煞在己午未若巽坤方有吉星則從巽方起工連及己午未方至坤方止工亦可止忌單修己午未方是也宗鏡曰三煞乃極猛之煞伏兵大禍次之要制伏得倒占山造𦵏皆忌惟占方可制而修也制法有三一要三合局以勝之二要三合得令之月三煞休囚之月三要本命貴人禄馬及八節三竒或日月以照臨之小修則或月或日之納音尅三煞方之納音得一吉星到方可也三煞在南方己午未則屬火用申子辰月日時在東方寅夘辰則屬木用己酉丑月日時在西方申酉戌則屬金用寅午戌月日時在北方亥子丑則屬水三合無土局不能制忌用辰戌丑未相衝曽文辿為壬申宅主修午未三煞方取甲辰年戊辰月壬子日庚子時豎柱與壬申年生命成申子辰水局以尅火煞一吉也甲戊庚天干三竒又辰子兩支不雜二吉也榖雨前太陽在戌與午方三合而甲戊庚貴人在未三吉也甲年午未方為庚午辛未納音屬土而戊辰月壬子日納音皆木以木尅土四吉也命馬壬寅歳禄歳馬丙寅俱到離五吉也八白在坎照離九紫正在未坤六吉也古人之妙用如此按三煞為太歳三合之衝可向不可坐故占山則造𦵏皆忌占方則可制而修也然各年不可概論寅申己亥年煞在生我之方為收開閉之位又當休氣辰戌丑未年煞在我生之方為除滿平之位又當相氣制化之法雖輕重亦有不同而要可制之化之變凶而為吉也若子午夘酉年則三然與歳破同方對方太歳又與大煞同位雖有制伏亦難以吉論矣故子午夘酉年災煞最凶劫煞歳煞次之寅申己亥年嵗煞最凶刼煞災煞次之辰戌丑未年畧與子午夘酉等若寅申年之刼煞夘酉年之歳煞與太歳為六合其凶尤小如壬寅年用壬寅月日時修亥方則四禄聚亥乙酉年用庚辰月日時修辰方則一氣皆金並不以歳煞論矣又寅午戌亥夘未年為煞尅歳己酉丑申子辰年為歳尅煞煞尅嵗者俟其休囚之令用之嵗尅煞者則惟忌子午夘酉四旺月餘月皆可用只取吉神到方八字成格而已又化煞變尅為生與制煞之義有别煞尅嵗者用煞之子如金煞尅木歳用水局月日時則洩金以生木矣嵗尅煞者用煞之財如水嵗尅火煞用金局月日時則洩火以生水矣用子煞休用財煞囚具有妙義惟木煞無土局則不用化而用制可也水煞無土局則不用制而用化可也曽文辿取用甚精夫亦舉一隅耳引而伸之觸類而長之選擇之能事畢矣月三煞倣此年月尅山家通書曰山家以得氣運為妙如月分與山運生旺比和宜用之月分衰病亦可用惟忌年月日時尅山運耳然止忌開山凡新立宅舍修造動土逾月安𦵏論之旬日之内不忌袝𦵏祖塋倒堂豎造或現成基址不動地基亦不忌又本日尅山家者如甲子年作水土山年納音屬金尅山家木運當取火月日時生旺兼作主火命併禄馬貴人制之吉月日尅者亦然按洪範五行専論山運自為一家之言年尅山家世俗避之唯謹雖有月日尅制之説用者絶少惟旬日内不忌世多用之深以為便夫𦵏之吉凶不因日之近久旬日無咎踰月何傷荀悦曰非吉凶所從生洵知言矣然以五行生尅之理而論則以月日尅年納音不如以年納音生月日化尅為生於理為順再得正五行補龍扶山自應吉無不利月尅較輕日時尤輕八字成局納音自可勿論俗本又云年尅妨宅長月尅妨宅母日尅妨子孫則無稽已甚不足道矣隂府太嵗通書曰此煞惟忌山頭不忌作向修方惟安𦵏不可犯又曰正隂府忌修陽宅安𦵏不忌傍隂府忌坐山修造不妨用天月徳太陽到山制之宗鏡曰舊説隂府單占坐山以正五行之七煞尅之必隂府衰月七煞旺相得令之月如甲乙隂府屬木宜以庚尅甲以辛尅乙然必七月八月金旺木衰乃可制也又隂府生山者可制為坐山所尅者可制若與坐山同類則不可制制則尅倒坐山如震金山戊癸年為隂府癸生震戊受尅扵震可制而修也若兑木山乙庚年為隂府乙可制也若以丙尅庚則兑山傷矣此皆指修山而言若𦵏地決不可犯且尅隂府即尅嵗君嵗君不可尅也按隂府之義本屬紆逺義例甚明術士不知其義又以襲誤傳譌遂各為臆説而不可解如甲山丁壬年為隂府以丁壬屬木尅甲巳之土也丙辛山甲巳年為隂府以甲巳屬土尅丙辛之水也宗鏡引舊説乃曰甲隂府屬木宜以庚尅之将謂丁壬年用庚尅甲山則山已受太嵗化氣之尅何堪又受月日正五行之尅将謂丙辛山用庚尅甲年無論嵗干不宜尅而尅又非其所尅夫甲年之所以尅丙辛山者在土不在木而欲以金尅之誠不解其何謂也若其與坐山同類不可制之説則專指尅太嵗而言而五行亦不合如兑山乙庚年為隂府乃以兑為屬木而謂以丙尅庚傷兑山則又以兑為屬金夫五行各有專屬理之自然雖諸家取義不同亦必自成一説㫁無忽命為木忽命為金之理然曰尅隂府即尅嵗君猶知隂府之義在年不在山若諸家通書從年起例所列隂府皆山則所謂制隂府者皆尅山耳並未有知尅嵗君者也至其曰正曰傍諸説不一大抵天干畧近卦義尤逺然觀臺官所傳及展轉遺誤之故又似卦係正文詳見義例本節究之五行之義當以正五行為本其有取化氣者必實有合化之義而後取之兹乃舍正取化又非逐年遞變與五運之義亦不合良不可為典要世人不察以其名為太嵗也而即謂不可犯以其名為隂府也而即謂安𦵏凶又無確切制化之法為之解説多致疑畏誤事宗鏡補龍篇載曽文辿開乾山一用丁酉年己酉月甲申日己巳時一用己酉年癸酉月壬申日丁巳時謂隂府有金制甚為精當蓋乾納甲申巳化土丁壬為隂府用申巳酉年月日時一氣皆金則丁壬不得化木非但制之已也且安知其非以金局扶乾山乎若甲山隂府則不可用金制蓋甲之化土其理曲而甲本屬木其理直茍以金尅丁壬丁壬未必受尅而甲木已先傷矣毋寧丁年用火局壬年用水局用水以生甲之本行用火以生甲之化氣而丁壬各從旺論自不能化木而尅土乃為得之倣此類推則制之可也化之亦可也使各從其類而自不尅我亦無不可也總之以補龍扶山為主太嵗而外各隨其義以為化裁則不惑扵俗術之曲説矣灸退通書曰灸退為三合死地可向而不可坐取天道天徳月徳嵗禄貴人制之宗鏡曰凡煞皆强梁有餘故宜尅灸退乃休囚不足故宜補蓋二十四方位之氣皆隨太嵗轉移灸退乃太歳死地山方無氣冷淡休囚故宜擇旺相月或月日時一氣或月日時三合補之則不退而反盛旺也若再加尅制則愈休囚愈退敗矣如申子辰年屬水水死扵夘夘為灸退曽文辿取丙申年辛夘月乙夘日己夘時修夘方則三夘一氣局也或亥夘未三合亦可餘倣此再得命禄嵗禄同到或天干堆禄尤妙假如修夘方灸退用三乙字乙禄到夘也然以一氣局或三合局為主而禄不必甚拘通書有用六合者有單取堆禄者非是已上補法雖係修方然修山亦可按補灸退之法宗鏡得之通書用徳禄亦是貴人則差輕耳大將軍太隂通書曰大将軍方伯之神其方忌興造若不㑹諸凶用真太陽制之吉太隂弔客同方嵗后也其方忌興造宜太陽嵗徳三合制之宗鏡曰大将軍占方不可修然有輕重如己午未年将軍在夘甲巳年則夘乃丁夘也再以月建入中宫順數九宫惟乙亥月丁夘仍在夘上謂之将軍還位修造犯之凶餘月則丁夘飛出别方夘上得年家月家之紫白或太陽三竒亦可修也按蓬瀛書曰嵗在四孟太隂與大将軍合扵四仲名曰羣醜必須太陽到方如申年太隂大将軍合扵午必六月太陽到午宫又用午時修之所謂真太陽到方也大吉若寅月太隂與大将軍合扵子子時太陽無光兼取丙丁竒九紫到方為吉若不㑹太隂不疊凶煞則有一二吉星亦可修也官符白虎大煞通書曰官符有天官符地官符用年月日時納音尅之如甲子年天官符在亥遁得乙亥納音屬火以水納音制之又用一白水星水徳制之餘倣此又曰官符一年止占一字三竒紫白禄馬貴人一吉星到方即從吉方起工連及修之吉宗鏡曰官符本非大凶遇竅馬吉或太陽到或紫白到或扵其死月以天赦日解之以修主命貴人禄馬臨之反吉曽文辿曰紛紛神煞不須求但逢尅應便堪修吉星若照官符位為官職位顯皇州此言官符之可修也地官符遇竅馬即吉遇紫白亦吉不必尅也楊筠松為人解訟以命貴解官符癸亥年地官符在夘修主乙亥生命隂貴人戊子以太嵗癸亥入中宫戊子到震夘方也用午月夘木死扵午也用甲午日天赦也訟果解所謂支犯支制也天官符乃三合中煞或倣上制三煞例以三合局制之然比三煞則輕矣年月納音尅之亦可修也己未年天官符在寅十一月有𦵏寅山申向者小雪後太陽到山平安迪吉至月家飛宫官符尤無妨碍謂必不可犯者謬也又曰天官符以年月納音尅之或日納音亦可再得太陽照之三竒紫白亦可若以三合局尅之則尤伏矣但不喜其還宫月分耳按官符白虎大煞為嵗三合若疊凶煞則為太嵗所弔照其凶有力故以為忌若疊吉星則亦吉矣故當以吉星照臨為取用之法納音尅制次之其曰三合制之尤伏似亦以為太過之意月家飛宫復臨本位謂之還宫飛伏同到嫌其過旺則以三合局尅之可也天官符為歳臨官之方亦畧與地官符同義大煞疊太嵗則凶見火星條下喪門弔客紀嵗歴曰喪門所理之地不可興舉弔客所理之地不可興造及問病尋醫弔孝送喪按喪門弔客為嵗破三合小煞也三合之衝破則凶破之三合未為凶也如兩方同修則與嵗破合局衝尅嵗君大忌若單修一方則止取吉星照蓋用嵗三合月日惟忌嵗破三合月日耳如子年喪門在寅弔客在戌修寅方宜用子辰月日時合太嵗忌用寅午戌月日時合嵗破亦不用申衝寅方也問病尋醫弔孝送喪應不忌且如太嵗在南方将終年不向南行乎黄幡豹尾乾坤寳典曰黄幡所理之地不可取土開門豹尾所在之方不宜嫁娶興造按子午夘酉年黄幡即官符豹尾即弔客寅申己亥年黄幡即白虎豹尾即喪門辰戌丑未年黄幡即太歳豹尾即歳破當從各神以為制化黄幡為歳三合墓地忌取土開門亦屬有理如不得已而用之則取天道天徳月徳到方可矣豹尾尤輕嫁娶非忌其方惟上轎下轎忌向之凡凶煞皆然豹尾却不足忌也巡山羅㬋病符死符小耗宗鏡曰巡山羅㬋忌立向不忌開山修方通書曰以一白水星制之明原曰病符主災病死符小耗同方忌塜墓置死喪及穿掘造作按巡山羅㬋為太歳前一位逼近太嵗故立向忌之寅年在甲巳年在丙申年在庚亥年在壬雖近而不同宫對宫雙山之月有吉星到山到向坐山乘旺猶可擇吉取用若子年在癸丑年在艮夘年在乙辰年在巽午年在丁未年在坤酉年在辛戌年在乾則與太歳同宫勿犯可也通書謂以一白水星制之則誤作四餘之羅㬋以為屬火謬矣病符為舊太嵗故亦忌立向死符為舊歳破故亦忌開山然皆小煞子午夘酉年猶與太歳歳破同行餘年則性情迥别各取山向三合月吉星蓋照便自可用但日時勿干犯本年太嵗歳破耳歳刑六害月刑月害附通書曰歳刑忌修方六害忌開山月刑月害止忌修方宜取太陽三竒紫白禄馬貴人制之按辰午酉亥年歳刑即太歳未申年歳刑即嵗破開山立向修方皆忌吉不能制也餘年止忌修方太陽六徳可以化之月刑亦然六害為六合之衝故忌開山然惟辰戌年疊灸退己亥年疊刼煞子午年疊歳煞當兼補制之法而以太陽六徳化之餘年則凡有吉星到山三合月六合六徳日即吉惟六合月不可用蓋嵗之六合月則六害為月破六害之六合月則月又為嵗破皆不吉也若月害對方即是太陽但擇吉日即可修惟忌刑衝耳蠶室蠶官蠶命堪輿經曰蠶室所理之方不可修動歴例曰蠶官所理之地忌營搆宫室蠶命所理之地不可舉動百事犯之皆絲繭不收按蠶室蠶官蠶命為歳方長生之宫皆無凶義而堪輿經歴例以為絲繭之占亦恐傷生氣耳非凶煞也應忌扵其方修作蠶室若養蠶則又應為吉方餘當不忌力士飛亷堪輿經曰力士所居之方不宜抵向神樞經曰飛亷所理之方不可興工動土按力士恒居太歳前維辰戌丑未年與巡山羅㬋同位太嵗同宫不惟不宜抵向修造亦不可犯餘年不忌也飛亷亦小煞子丑寅午未申年同白虎夘辰巳酉戌亥年同喪門當同各煞制之火星通書曰獨火打頭火月逰火忌修造不忌安𦵏然必與年遁丙丁或月家丙丁獨火㑹合方忌不㑹不忌丙丁獨火不與諸火㑹合亦不忌也宜用一白水星水徳制之又本曰忌用丙丁寅午戌月日時並丙丁竒九紫助其火氣宗鏡曰打頭火即大煞為太歳三合旺方又為金匱星書云人家衰弱修金匱獨火将星原同位是也蓋大旺則亢亢則屬火然制化得宜修動旺方則發丁旺家惟子午夘酉年疊歳君不可犯其餘年分倣上制三煞法以三合局制之通書忌用寅午戌局非是若己酉丑年打頭火在酉不用寅午戌火局何以制金之旺氣乎此煞與天官符俱可吉可凶不與三煞比三合制矣再得年月一白水星或年月壬癸水徳本命貴禄尤妙四柱忌用丙丁至八節之丙丁竒則又吉而不忌也年金匱不空則修月金匱尤穏月金匱又不必尅但諸吉同到則吉寅午戌月在午巳酉丑月在酉申子辰月在子亥夘未月在夘擇吉日修之主發人丁亦要無别𦂳煞乃可按制火星之法諸説皆同水徳壬癸也年家用年干起五虎遁月家用月建入中宫順數至壬癸是也四柱忌丙丁不忌寅午戌宗鏡説是三竒丙丁三元九紫雖不忌亦不取耳月家金匱方今通書不載然亦有理四仲月會月建亦須避忌與太歳同金神通書曰金神遇天干庚辛者宜用天干丙丁制之遇納音屬金者宜用地支己午制之更宜用丙丁竒太陽羅星九紫及寅午戌火局制之宗鏡曰金神忌修方動土犯之主目疾蓋目屬肝肝屬木金能尅木也𦵏事不忌制之之法以火尅之而已庚辛干者為天金神以丙丁干制之納音金者為地金神以納音火制之又八節之丙丁竒或年家之九紫有氣皆能制之修作無害非甚𦂳煞也巳月金生申酉月金旺則不可犯金神在申酉方謂生旺得地則必扵火旺之月以寅午戌三合制之若在午未方則火地尅之不待制而自可修矣浮天空亡通書曰浮天空亡乃年干納卦絶命破軍之位用天徳月徳照之本命貴人禄馬制之按浮天空亡以年干取納甲之卦又以卦變絶命兼取所納之干較之隂府太歳取義更為紆逺各本通書俱用之然亦年家小煞耳當以六徳照之非但天月二徳而已絶命破軍扵九曜屬金取三竒九紫到方扵義為切貴人禄馬則通例也一説用月日刑衝之大謬夫以月刑衝之則其方係月刑月破矣以日刑衝之則其方係日刑日破矣二者皆選擇之所忌欲以制凶而反召凶可乎破敗五鬼通書曰修造犯之主虛耗宜用太陽三竒嵗月徳合嵗命貴人禄馬制之按破敗五鬼為年干納卦之衝較之浮天空亡尤為小煞歳月徳合制之固為親切然太陽三竒紫白有一吉星到方亦自可修矣月厭五鬼月厭為堪輿宗㫖董仲舒言之極詳今時憲書與天道天德並載扵逐月之下天道天徳用日而兼用方則月厭當亦兼方論也子午夘酉月與建破同方必不可犯己亥月次之寅申辰戌為月三合丑未月為生氣太陽丙丁照之可用又按古有歳厭之説子年起子逆行與月厭同義五鬼子年起辰逆行常居歳厭三合前辰今以方位考之則五鬼乃月厭之白虎厭所謂前猶歳所謂後也為月厭之後從隂中之隂故曰五鬼然亦小煞太陽三竒紫白禄馬貴人蓋照皆可用也月建月破天寳歴曰月建所理之方戰鬬攻伐宜背之不可抵向太白經曰五帝所在出軍不可向之按月建可坐不可向月破可向不可坐與太歳歳破同歳尊而月親也通書建破論日而不論方大小月建論飛宫而不論定位殊失其㫖世俗春不開東門夏不開南門秋不開西門冬不開北門則太白經五帝之義也大月建小月建通書曰大月建忌修方動土小月建即小兒煞止忌修方用禄馬太陽三白九紫制之宗鏡曰月家土煞為大月建小兒煞與年家戊巳煞同小月建忌修方不忌安𦵏修方占山占向占中宫亦凶大月建尤凶不可制造𦵏皆忌通書遷𦵏不載者非按小月建陽年以正月寅建入中宫隂年以正月戌厭入中宫皆順數至本建則小月建者乃月支飛宫耳大月建子年正月起艮逆飛九宫三年一周十五年三元周而復始則大月建者乃月干支飛宫即其月入中宫一星之本宫耳詳見義例以理而論自較月建之定位為輕通書説是宗鏡據俗術之妄説謂大月建主傷宅長小月建主傷小兒占山占向占方占中宫皆忌而反詆通書不忌安𦵏為非實為過當且太嵗三煞亦或止忌山或止忌向或止忌方安有山方中宫只占一處遂無往不忌之理乎其曰月家土煞則是然亦惟子午夘酉年正七月辰戌丑未年八九月寅申己亥年十一月大月建與本月建同宫謂之還位及疊戊巳五黄或入中宫則不可犯餘月則有貴人禄馬六徳之竒到方便自可修如太嵗疊吉星則吉是也大抵術士之説多自相矛盾而不可通如謂月建為吉凶衆神之主疊吉星則吉疊凶星則凶而又謂大月建凶不可制其不可從明矣以上各條各隨其義以為制化若然多而大凶則不可犯若二三小煞則叅互取義可也四柱法四柱以年為君月為相日為有司時為胥吏所貴支干純粹成格成局扶龍相主如君臣合徳官吏奉法而人民實受其福也年為君故四柱切忌衝動太嵗月為相當旺一時故扶龍山相主命必擇龍山主命旺相之月而制煞修方必擇煞神休囚之月日為有司君相之徳賴以承宣故日之吉凶較年月尤切用日之法又以日干為君日支為臣干重而支輕日干必要旺相切忌休囚總看月令以辨衰旺如寅夘月遇甲乙日為旺丙丁日為相皆吉如庚辛日為廢壬癸日為洩戊巳日為受尅皆不吉也然此不當令之日干如四干三干一氣則比助身强如二月用四辛夘此大八字也難逢難遇則取小八字如五月甲日休囚楊筠松亥年修夘方地官符用癸亥年戊午月甲午日丙寅時蓋甲日生在亥禄在寅又有年干癸水亥宫壬水以生之此古人扶持日干之法也此之謂小八字以四柱支干不純将就取用也楊公曰取干最宜逢健旺即日干也造命書曰日干休囚非貧即夭皆名言也若日干休囚而又無比肩無印綬立見退敗用時有二法或與本日支干一類或日干之禄時而已時神吉凶不必拘也四柱最忌地支相衝大凶衝龍衝山衝主命亦大凶天干尅龍山凶惟辰戌丑未為四庫自衝可衝山亦可衝主命則凶凡四柱得天干一氣或地支一氣或兩干兩支不雜或三台或三竒三徳謂之成格三合局謂之成局皆吉格也然必扶龍山相主命乃吉如是則體立矣再得日月竒白照臨山向又四柱之貴人禄馬到山到命則用行矣體用兼全上也然有體而後求用切不可騖用而失體按宗鏡四柱法造𦵏皆然其上取大八字其次亦取小八字謂用時止有二法則其義未備三合六合貴人皆吉不專取禄如申年月甲日則禄為破要在合年月以取用耳小修止擇吉日吉時與山方年命生合則吉蓋選擇所以利民過拘則廢事篇中所謂難逢難遇是也用日法日貴旺相得令忌休囚無氣而日干尤重日之吉凶全看衰旺日之衰旺全看月令當令者旺受生者相皆大吉尅月令者囚受尅扵月令者死皆凶日生月者休亦不為吉故母倉非上吉日寅夘月甲乙寅夘為旺丙丁巳午為相己午月丙丁巳午為旺戊巳辰戌丑未為相申酉月庚辛申酉為旺壬癸亥子為相亥子月壬癸亥子為旺甲乙寅夘為相辰戌丑未月戊巳為旺庚辛申酉為相此内惟戊巳日忌動土亦忌修中宫天干旺相者吉支旺者有轉煞之疑二月夘五月午八月酉十一月子乃謂轉煞然古人𦵏課四夘四午四酉是不忌𦵏也楊公取午月甲午日修官符方是不忌造也古人用四辛夘亦天干四廢四辛相扶故不忌也日干休囚四柱又無印綬比肩貧賤夭折之課也切忌勿用寅月甲日夘月乙日巳月丙日午月丁日申月庚日酉月辛日亥月壬日子月癸日既得令而又得禄吉而又吉者也辰戌月戊日丑未月巳日雖不得禄實得令中吉日干為君支為臣與月令同氣或與月三合或月建相生及天德歳徳月徳為上吉三徳合日天恩天赦日為次吉通書忌天吏日與年灸退同寅午戌月忌酉日亥夘未月忌午日申子辰月忌夘日己酉丑月忌子日即三合死地也甚有理亦主退氣不致傷人破日大凶與月相衝日衝嵗亦大凶正四廢大凶謂支干俱無氣也傍四廢亦凶或支或干無氣也書云傍四廢吉多可用荒蕪日次凶與四廢大同小異亦是失令休囚之日春己酉丑夏申子辰秋亥夘未冬寅午戌然正月止忌巳日二月止忌酉日三月止忌丑日為準三季倣此有謂百事皆忌者謬也四廢荒蕪相兼日尤凶春酉夏子秋夘冬午建破平收俗之所忌然惟破日最凶必不可犯建日吉多可用平日甚吉收日吉多無妨書云其日與黄道天月徳併可用凡辰戌丑未月修作中宫決不可用戊巳日蓋中宫與四季月皆屬土再見土日必不吉按宗鏡用日法專取旺相自為一家之言而與建除叢辰諸家亦不相背甚為可取然其論戊巳日則謂辰戌丑未月日忌修中宫者是謂動土最忌者非論四廢日則以正四廢為凶者是以傍四廢為凶者非荒蕪日即五虚日以忌百事為謬者是謂一月止忌一字者非蓋古人造𦵏四柱取全局故春月忌巳酉丑及庚辛申酉年月日時夘月酉衝故尤忌非謂見一字之即為荒廢也且又有此肩相扶之法亦非概以荒廢為凶觀其謂子午夘酉為轉煞而又載古人之不忌以為明徵其義可見至其以寅月甲日夘月乙日為得令得禄則醇乎其醇勝扵復日之義逺矣總之日神吉凶皆以生旺為主四時五行至為活變當與宜忌叅看則輕重取舍甚明至以年時合成八字則又非宜忌之所能盡神而明之存乎其人耳用時法時者日之用也全在幇扶日辰或與日支干比和或與日支三合六合即吉時家吉凶神不必盡拘惟貴人禄馬為吉如甲戊庚日以丑未時為貴人甲日禄到寅時子辰日馬到寅時是也時衝月令衝歳君皆凶大事則忌小事可勿論時破大凶日支衝時支也如子日午時之類時刑次凶日支刑時支也如子日夘時之類五不遇時次凶時干尅日干也如甲日庚午時之類三元歌曰縱得三竒與三門五不遇兮損光明可知其凶切忌之旬中空亡截路空亡忌出行不忌𦵏事時建吉與日比和也凡犯五不遇則凶古人多用建時決不用破時用五不遇者亦少楊筠松𦵏丁巳亡命子山午向用壬申戊申壬申戊申建時五不遇然取兩干不雜地支一氣又戊禄到己申與已合且戊壬同生扵申故不以不遇為嫌也凡用時小修則只取幇扶日主大修與埋𦵏則要幇扶四柱使四柱純粹以補龍山相主命乃千古不二之法也孟月甲丙庚壬時仲月艮巽坤乾時季月乙辛丁癸時謂之四大吉時又為神藏煞沒但學者不明歸垣入局之理以取吉耳如正月雨水後亥将用事用子時上四刻作壬子山向則為神藏煞沒其他甲庚丙山向亦倣此推每一日只有一時諸星歸垣入局如太陽在子則壬子時吉太陽在午則丙午時吉此即歸垣入局之妙也吉莫大焉元經云善用時者常令朱雀鎩羽勾陳登陛白虎焼身元武折足螣蛇落水天空投匭所謂六神悉伏也如不得六神悉伏則得吉将加時亦吉日干不旺用禄時則旺如甲日寅時乙日夘時皆吉時能幇日干及幇四柱者真吉神也時家亦有三竒紫白倣月例推遁甲竒門時乃行兵之用非為造𦵏也然造𦵏修方嫁娶上官出行等事用之皆吉凡選時用竒門之法先以超接為定次看禄馬貴人到局與竒相合斯為上吉能解一切凶煞召吉致福如竒到而禄不到為獨脚竒禄到而竒不到為空亡禄不能為制煞之用也按宗鏡用時之法甚為切當惟四大吉時一條誤以四煞沒時為神藏煞沒辨見義例元經六神悉伏則神藏煞沒之正義也其曰太陽在子則壬子時吉太陽在午則丙午時吉專取太陽當自為一義其以壬時為子時上四刻扵義尤精見義例貴登天門條下其曰壬時作壬子山向乃取真太陽到山到向之法但時刻係天常赤道度山向係地平方位度惟北極之下赤道與地平合十二支占時之中四刻八干四維占前後時各二刻合之亦為四刻如已正二刻至午初二刻屬丙方午初二刻至午正二刻屬午方之類自是以南則北極漸低偏度漸多又夏至日行北陸距地平逺則偏度多冬至日行南陸距地平近則偏度少術家不明天學乃以二十四方位為二十四時既與六壬之法不合又不與山向相應今按京師北極出地推得各節氣太陽到方時刻列為表甲為北極乙為京師天頂甲乙相距五十度五分丙丁為赤道戊為太陽甲戊為夏至太陽去極六十六度三十分即戊巳之餘戊庚為髙弧庚辛為太陽地平經度距午七度三十分即庚乙辛角用弧三角形法法見考成上編求得戊甲乙角二度二十六分即丙巳弧為太陽距午赤道度變時得十分以減午正得午初三刻五分為太陽到午方時刻以加午正得午正初刻十分為太陽到丁方時刻也餘倣此推太陽到方時刻表地平二十四方每方十五度子正初刻當子中午正初刻當午中則是午正前七度半巳交午而午正後七度半方盡午而交丁也前後遞加十五度算用表之法如夏至節作午方宜用午初三刻五分至午正初刻十分皆為太陽到方餘倣此造𦵏權法通書云凡修造必身命年月方向皆利則修作吉如或不利而又不得不作者則當遷居自所遷之處視所作之方為吉可也如年命利作兑不利作震則當遷居而東既居扵東則自其居視所作之方昔為震者今為兑矣自此作之則無不可論作方終始凡所作止在一宫選擇固易如連跨數宫有吉有凶則當扵吉宫起工自此連及不利之宫殊無害也若興造月日利而工作未辦則畧起造以應日時自此接連以作之固無不可也及其畢工須歸福徳之方吉論取土方道太歳三煞官符大小月建等方忌取土若逺隔百步之外目所不見則不問方道論清明前後修墓法凡已𦵏墓塋或加土或種樹或砌祭臺或破壊修整宜扵寒食清明之間鳩工修作不論山向年月日時按荆楚記寒食係冬至後一百零五日以古厯平氣計之清明在冬至後一百零六日半寒食乃清明前二日也魏時寒食亦是三日論豎造宅舍大寒五日後擇日拆屋起手立春前擇日豎造完工不忌開山立向年月尅山家及歳月諸凶神謂之歳官交承如已過立春後年月凶神方位已定不可修作如方位無凶神修作不妨論安𦵏擇大寒五日後立春前先擇日破土又擇日安𦵏不忌開山立向年月日時尅山家歳月諸凶神要扵立春前依時謝墓或扵來年寒食清明節加土謝墓論凶𦵏法凡人初死乗凶𦵏之雖值凶神亦不為害今人盡三日之内或一旬之内並不問開山立向年月但擇吉日破土盡一日之内成墳俟凶神過方加土謝墓右權法世多用之雖屬變通而亦有理利用之道扵斯備矣欽定協紀辨方書卷三十四
