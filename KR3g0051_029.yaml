body:
  text: 月表十一十一月大雪十一月節天道東南行宜向東南行宜修造東南維天德在巽月德在壬月德合在丁月空在丙宜修造取土月建在子月破在午月厭在子月刑在卯月害在未劫煞在巳災煞在午月煞在未忌修造取土十二日長星二十二日短星大雪後二十日往亡冬至前一日四離冬至十一月中日躔在丑宫為十一月將宜用艮巽坤乾時甲子海中金義建日乙丑海中金制除日丙寅爐中火義滿日丁卯爐中火義平日戊辰大林木専定日己巳大林木義執日庚午路傍土伐破日辛未路傍土義危日壬申劒鋒金義成日癸酉劔鋒金義收日甲戌山頭火制開日乙亥山頭火義閉日丙子澗下水伐建日丁丑澗下水寶除日戊寅城頭土伐滿日己卯城頭土伐平日庚辰白鑞金義定日辛巳白鑞金伐執日壬午楊栁木制破日癸未楊栁木伐危日甲申井泉水伐成日乙酉井泉水伐收日丙戌屋上土寶開日丁亥屋上土伐閉日戊子霹靂火制建日己丑霹靂火専除日庚寅松柏木制滿日辛卯松柏木制平日壬辰長流水伐定日癸巳長流水制執日甲午砂石金寶破日乙未砂石金制危日丙申山下火制成日丁酉山下火制收日戊戌平地木專開日己亥平地木制閉日庚子壁上土寶建日辛丑壁上土義除日壬寅金箔金寶滿日癸卯金箔金寶平日甲辰覆燈火制定日乙巳覆燈火寶執日丙午天河水専破日丁未天河水寶危日戊申大驛土寶成日己酉大驛土寶收日庚戌叉釧金義開日辛亥叉釧金寶閉日壬子桑柘木専建日癸丑桑柘木伐除日甲寅大溪水專滿日乙卯大溪水専平日丙辰沙中土寶定日丁巳沙中土専執日戊午天上火義破日己未天上火専危日庚申石榴木専成日辛酉石榴木専收日壬戌大海水伐開日癸亥大海水専閉日右六十干支從建子者始大雪終冬至其神煞吉凶用事宜忌具於表欽定協紀辨方書卷三十
