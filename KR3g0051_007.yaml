body:
  text: 義例五黃道黑道天乙貴人天官貴人福星貴人喜神八録日建日破日合日害日刑四大吉時四煞沒時貴登天門時五不遇時九醜旬中空亡截路空亡神樞經曰青龍明堂金匱天德玉堂司命皆月內天黃道之神也所值之日皆宜興衆務不避太嵗將軍月刑一切凶惡自然避之天刑朱雀白虎天牢元武勾陳者月中黑道也所理之方所值之日皆不可興土功營屋舍移徙逺行嫁娶出軍李鼎祚曰青龍正月起子金匱正月起辰司命正月起戌皆順行六陽辰也明堂正月起丑天德正月起巳玉堂正月起未皆順行六隂辰也天刑者正月起寅白虎者正月起午天牢者正月起申皆順行六陽辰也朱雀者正月起卯元武者正月起酉勾陳者正月起亥皆順行六隂辰也曹震圭曰此天黃道也蓋天者萬物之主黃者中央之色道者乃天皇居九重之內出入所履之道也故名曰天黃道其神逐年月日各有所主易傳云乾為天為君為父是天皇之正位也主御羣靈司萬物生死故曰司命亦能掌握萬物故又名曰天符今皆作天府此乾卦之主也初行其道起於戌是乾之世爻納甲也其對衝巽宫為明堂是天皇治事之宫也聖人南面而聽天下故以巽為明堂又名曰執儲是天皇所操執以除暴虐也故曰齊乎巽初行其道起於丑是巽之初爻納甲也其明堂之左有青龍宰相之象是震宫也震為雷為龍故曰青龍又名曰雷公初行其道起於子是震之初爻納甲也其明堂之前有朱雀是離宫也又曰飛流故離為火朱雀飛流之象初行其道起於卯是離卦初爻納甲也其明堂之右有白虎將軍之象又曰天棒是天皇之先驅也又曰天馬是天皇之所乘也初行其道起於午是震卦外體之納甲也謂震為大臣之象向外則為將軍也其天皇之右有玉堂是天皇寢安之宫天后之位是坤宫也又曰天玉是天皇寵愛之所初行其道起於未是坤之初爻納甲也天皇之左有金匱是寶藏之府庫艮之位也又曰天寶初行其道起於辰是艮卦初爻納甲也天皇右旁有天德兑也是天皇施仁布德喜樂之宫又曰天對是天皇納諫聽政論道經邦之所初行其道起於巳是兑之初爻納甲也天皇左旁有天刑坎也勞卦也是掌刑罰之所又曰蚩尤蚩尤者虐民之神初行其道起於寅坎之初爻納甲也白虎天棒之後有天牢又曰天獄是囚禁之所也配之朱雀明堂之間蓋使刑禁明而無私也初行其道起於申是坎之外體納甲也故云勞乎坎也天皇天牢之間有元武又曰隂私是邪妄之臣故論正道必有讒言舉正直則邪妄亦進易卦爻辭半君子半小人則天下之道然也初行其道起於酉是離卦外體納甲也故離為朱雀飛流皆小人之輩也中宫之位有勾陳是天皇嬪妃之位天帝之所居也初行其道起於亥是乾宫之隂辰兑宫之外體納甲也蓋兑者説也是天皇喜悅之宫也故用配焉又曰青龍即雷公明堂即執儲金匱即天寶天德即天對玉堂即天玉司命即天府天刑即蚩尤朱雀即飛流白虎即天棒天牢即天嶽元武即隂私土勃即勾陳邵泰衢曰黃道明星十二神異其名為二十四龍雷一也而一吉一凶天獄凶也而字誤為嶽不知即建除滿平定執破危成收開閉也今人以除危定執成開為黃道建破平收滿閉為黑道除即明堂黃道破即白虎黑道皆相合獨青龍之建而以為黑道者雷公之凶誤之也以天獄之黑道曰黃道者天嶽之吉誤之也不知此即長生沐浴冠帶臨官帝旺衰病死墓絶胎養也建危即生死也在時曰建危在人曰墓在物曰成所謂蓋棺而論定也建危以時候言生死以蠢動言也黃道明堂則其神也人之初生時之建立猶龍雷之出震也人之入墓時之巳成如天獄之囚牢也人物之胎有開之先也而曰司命命根之由立也閉固則養之之道而勾陳之土所以藏之也總不出王相休囚之四者分之為王官守建除滿長生沐浴冠帶青龍明堂天刑雷公執儲蚩尤名雖異而其理固不異也干支之生死以長生沐浴言之四時十二月之建立以建除言之日時之吉凶以青龍雷公言之更以王相卜之未常非合一之旨也擇日之家不能類觀兼察泥執神煞之名以立異而并不察其誤各自異説欲自名家幾何不為識者之所棄也建除等皆次第行黃道以六陽六隂行故人不悟也考原曰黃黑二道者黃道六黑道六共十有二以配十有二辰一青龍二明堂三天刑四朱雀五金匱六天德七白虎八玉堂九天牢十元武十一司命十二勾陳其法則寅申青龍起子卯酉起寅辰戌起辰巳亥起午子午起申丑未起戌順行十二辰月起日則建寅之月子日為青龍丑日為明堂日起時則子日申時起青龍酉時為明堂依次順數按神樞經載黃黑道十二神厯來通書用之顧此十二神之何以吉何以凶則未言其故通書又専用之以選時相沿日久終身由之而不知其道曹震圭作明原則以為納甲而斥坎離為小人荒唐不經已甚邵泰衢作原始以為與建除相配而不顧六陽六隂十二神各得一半萬不能與建除相合徒多遁詞此考原所以疑之而存而弗論也今按司命即是子勾陳即是丑青龍即是寅明堂即是卯天刑即是辰朱雀即是巳金匱即是午天德即是未白虎即是申玉堂即是酉天牢即是戌元武即是亥其法以天罡加於建上視各神所臨之辰神吉則吉神凶則凶天罡者厭對也招搖也六儀也隨所取義而異其名其實一也所以用天罡加建者天罡為北斗臨制四方之柄故以加建擇日則加月建擇時則加日建此神道之樞機也罡既加於陽建則破必指於隂建矣此隂陽之妙用也罡指陽建則陽明用事破指隂建則隂慝伏藏於是視其日其時所履之神以定吉凶焉如寅月日罡為辰加陽建破為申指隂建申月日罡為戌加陽建破為寅指隂建則寅天刑卯朱雀辰金匱巳天德午白虎未玉堂申天牢酉元武戌司命亥勾陳子青龍丑明堂矣卯月日罡為卯加陽建破為酉指隂建酉月日罡為酉加陽建破為卯指隂建是為伏吟則卯明堂辰天刑巳朱雀午金匱未天德申白虎酉玉堂戌天牢亥元武子司命丑勾陳寅青龍矣午月日罡為子加陽建破為午指隂建子月日罡為午加陽建破為子指隂建是為反吟則午司命未勾陳申青龍酉明堂戌天刑亥朱雀子金匱丑天德寅白虎卯玉堂辰天牢巳元武矣餘月日倣此竒門所謂月月常加戌時時建破軍亦即此義蓋用建則月月常加戌矣言昏時斗柄所指之方當以天罡加之便得起例也又此司命以下十二神向以黃道黑道命之今按黃道為日行躔度無只以子午卯酉寅未為黃道之理若黑道之説蓋不見經傳即黃赤二道亦厯家識於儀象以紀天度後世相沿以為名稱豈天真有此黃赤異色耶然則此所為黃黑道云者亦即吉凶之别名而非有深義決矣子曰司命子位正當天極斗衡所枕為斗之中央故曰司命也春秋文耀鈎曰北宫黑帝其精元武亥為天門故以為北帝之坐也亥為北方之始寅為東方之始巳為南方之始申為西方之始四神之名各於其始重始也丑者建星之位建星者旗也故為勾陳猶鹵簿也東方蒼龍寅為攝提格日月始子則斗始寅嵗且更始焉故寅為青龍春秋説題辭曰房心為明堂天王布政之宫房心卯也房南衆星左角理右角將當辰之位理者法官故辰為天刑也辰者天罡戌者河魁河魁者天獄戌獄而辰刑天之罡魁也南方朱鳥太微三光之廷春秋合誠圖曰太微主法式故以午為金匱金匱石室以藏先王之訓典法式之所在也巳為鶉尾朱鳥形成故以巳為朱雀也未者坤方萬物之成雖於秋而其所以成者實在於庚伏之會中央土之正位也坤作成物其致役者未而非申至於申則役休矣故以未為天德天德云者乾知大始而不為首成之者皆坤也能使坤之克有成則天德也西宫白虎參為白虎在申故以白虎名申酉者月也卯為明堂故以酉為玉堂帝主日而后主月玉堂猶言後宫也史記律書曰戌者言萬物盡滅也漢書志曰畢入於戌金者殺氣戌又金行之終故河魁為天獄也合而觀之子午卯酉天之四正洗心退藏基命宥密必於子則古昔法先王嚮明而出治復有以垂百世之法則必於午出乎震説乎兑如日月東西相從而不巳以先天而不違後天而奉天時必於卯酉無成而有終終則有始觀天地之生物必於寅服中色而處下飾順承天德觀天地之成物必於未餘辰莫有可與比盛者也故以六辰為黃道餘則曰黑道也又按三合旺氣曰天德此黃道亦名天德以無别為嫌查天德黃道又名天對明星又名寶光天對名不雅馴故取名寶光以别於天德云蠡海集曰天乙貴人當有陽貴隂貴之分蓋陽貴起於子而順隂貴起於申而逆此神實得隂陽配合之和故能為吉慶可解凶厄也且如陽貴以甲加子甲與巳合所以巳用子為貴人以乙加丑乙與庚合所以庚用丑為貴人以丙加寅丙與辛合所以辛用寅為貴人以丁加卯丁與壬合所以壬用卯為貴人辰為天罡貴人不臨以戊加巳戊與癸合所以癸用巳為貴人午衝子原不數以巳加未巳與甲合所以甲用未為貴人以庚加申庚與乙合所以乙用申為貴人以辛加酉辛與丙合所以丙用酉為貴人戌為河魁貴人不臨以壬加亥壬與丁合所以丁用亥為貴人子原宫不數以癸加丑癸與戊合所以戊用丑為貴人此乃陽貴順取也且如隂貴以甲加申甲與巳合所以巳用申為貴人以乙加未乙與庚合所以庚用未為貴人以丙加午丙與辛合所以辛用午為貴人以丁加巳丁與壬合所以壬用巳為貴人辰為天罡貴人不臨以戊加卯戊與癸合所以癸用卯為貴人寅衝申原不數以巳加丑巳與甲合所以甲用丑為貴人以庚加子庚與乙合所以乙用子為貴人以辛加亥辛與丙合所以丙用亥為貴人戌為河魁貴人不臨以壬加酉壬與丁合所以丁用酉為貴人申原宫不數以癸加未癸與戊合所以戊用未為貴人此乃隂貴逆取也古云丑未為天乙貴人出入之門緣陽貴以甲起子循丑順行至癸復歸於丑隂貴以甲起申由未逆行至癸復歸於未豈非丑未為貴人出入之門乎曹震圭曰天乙者乃紫微垣左樞傍之一星萬神之主掌也一日二者隂陽分治內外之義也辰戌為魁罡之位故貴人不臨戊以配中央之位乃勾陳后宫之象故與甲同其起例以丑乃紫微後門之左陽界之辰也未乃紫微南門之右隂界之辰也甲者十干之首故陽貴以甲加丑逆行甲得丑乙得子丙得亥丁得酉巳得申庚得未辛得午壬得巳癸得卯此晝日之貴也隂貴以甲加未順行甲得未乙得申丙得酉丁得亥巳得子庚得丑辛得寅壬得卯癸得巳此暮夜之貴也戊以助甲成功故亦得丑未若六辛之獨得寅午則自然所致更無疑矣通書云郭景純以十干貴人為吉神之首至靜而能制羣動至尊而能鎮飛浮以其為坤黃中通理乃貴人之德是以陽貴人出於先天之坤而順隂貴人出於後天之坤而逆天干之德未足為貴而干德之合氣乃為貴也先天坤卦在正北陽貴起於先天之坤故從子起甲甲德在子氣合於己故己以子為陽貴以次順行乙德在丑氣合於庚丙德在寅氣合於辛丁德在卯氣合於壬辰為天羅貴人不居故戊跨在巳氣合於癸午與先天坤位相對名曰天空貴人有獨無對故陽貴人不入於午己德在未氣合於甲庚德在申氣合於乙辛德在酉氣合於丙戌為地網貴人不居故壬跨在亥氣合於丁子坤位貴人不再居故癸跨在丑氣合於戊是為陽貴起例申庚合乙酉辛合丙戌地網亥壬合丁未巳合甲子甲合己午天空丑乙合庚癸合戊巳戊合癸辰天羅卯丁合壬寅丙合辛後天坤卦在西南隂貴起於後天之坤故從申起甲甲德在申氣合於巳故己以申為隂貴以次逆行乙德在未氣合於庚丙德在午氣合於辛丁德在巳氣合於壬辰為天羅貴人不居故戊跨在卯氣合於癸寅於後天坤位相對名曰天空貴人有獨無對故隂貴人不入於申己德在丑氣合於甲庚德在子氣合於乙辛德在亥氣合於丙戌為地網貴人不居故壬跨在酉氣合於丁申坤位貴人不再居故癸跨在未氣合於戊是為隂貴起例申甲合己酉壬合丁戌地網亥辛合丙未乙合庚癸合戊子庚合乙午丙合辛丑巳合甲巳丁合壬辰天羅卯戊合癸寅天空考原曰曹氏與通書二説各有意義但曹氏則以陽為隂以隂為陽夫陽順隂逆陽前隂後自然之理也當以起未而順者為陽起丑而逆者為隂方是按貴人云者干德合方之神也何以不用干德而用其合干德體也合則其用也合干之德其所用必大吉矣故以貴人名之合方之論考厯書所載審矣而曹震圭隂陽順逆倒置者則世俗並如其説考其根原則以元女經有旦大吉夕小吉之文故也然其理良不可通則亦未得以元女經有其文而可遽信也且大小二字易以淆訛安知非淺學之人轉以俗説改竄元女經遂傳刻襲謬耶至其晝夜之分則或以卯酉為限或以日出入為限今考其義自當以日出入為定也神煞起例日隨干官星曰天官貴人按酉中有辛甲之官也故甲日酉申中有庚乙之官也故乙日申子中有癸丙之官也故丙日子亥中有壬丁之官也故丁日亥卯中有乙戊之官也故戊日卯寅中有甲巳之官也故巳日寅午中有丁庚之官也故庚日午巳中有丙辛之官也故辛日巳丑未中有己壬之官也故壬日丑未辰戌中有戊癸之官也故癸日辰戌不取五鼠遁者伏藏者為貴為官顯露者為尅為伐也神煞起例日干生時干曰福星貴人按淮南子甲日寅時必為丙寅乙日丑時亥時必為丁丑丁亥丙日子時戌時必為戊子戊戌丁日酉時必為己酉戊日申時必為庚申己日未時必為辛未庚日午時必為壬午辛日巳時必為癸巳壬日辰時必為甲辰癸日卯時必為乙卯皆本日日干之食神子孫子孫為寶爻故曰福星貴人也甲巳日艮方寅時乙庚日乾方戌時丙辛日坤方申時丁壬日離方午時戊癸日巽方辰時曹震圭曰大抵物之所喜者母見子也假令甲巳化土生金為子金之所居者丑也丑近於艮丙辛化水生木為子木之所居者未也未近於坤戊癸化火生土為子土居於辰近於巽也乙庚化金生水為子水居於辰辰既有土故居於乾乾為亥子也丁壬化木生火為子火旺於午離也考原曰物以相見為喜易傳曰相見乎離離者南方之卦也於五行為火於十干為丙喜神者見丙也假令甲巳之干用五虎元起丙寅寅為艮故在艮也乙庚之干得丙戌戌為乾故在乾也丙辛之干得丙申申為坤故在坤也丁壬之干得丙午午為離故在離也戊癸之干得丙辰辰為巽故在巽也按喜神之義考原得之其日之方與其時並取利用然亦須與其他神煞參論如甲巳之日得丙寅時固為喜神時矣而在申日則為日破又不得以其為喜神而用之也餘倣此按神煞起例有八祿時本日之祿位也定為吉時詳年神例以本日地支為主而以時參之或為日之建或為日之破或為日之合或為日之害或為日之刑建合則吉而破刑害則凶也其與年月相參亦必有此五者逺大之事亦須參觀近小之事則勿論也歷例曰四大吉時月將在四孟用甲丙庚壬時月將在四仲用癸乙丁辛時月將在四季用艮巽坤乾時考原曰四煞者寅午戌火煞在丑亥卯未木煞在戌申子辰水煞在未巳酉丑金煞在辰凡取四煞沒時者以月將加時使四煞臨乾坤艮巽之位為四煞沒於四維正四七十四孟月用甲丙庚壬時二五八十一四仲月用艮巽坤乾時三六九十二四季月用癸乙丁辛時如正月月將在亥則以亥加甲或加丙或加庚或加壬依二十四方位順推之則辰戌丑未四煞皆臨四維卦位是為四煞沒時也以四煞既沒故又曰四大吉時按辰戌丑未謂之四煞者以其為五行之氣所終盡也若臨長生之位則是生生不已循環無端故謂之四煞沒時即壬課四墓覆生之説也其以八干四卦言者則選擇宗鏡謂時之上四刻其説得之蓋選擇取時之通例而非此四煞沒時獨與八干四卦相干涉也俗又以此為神藏煞沒時則因煞沒二字而至訛謬蓋惟貴登天門則餘十一將皆居其所凶神受制吉神得位為名之曰神藏煞沒若四煞沒時甫將十二支加於地盤尚未論及於神將安得有神藏煞沒之理選擇家不參壬遁之過也通書曰經云年之善不如月之善月之善不如日之善日之善不如時之善貴人登天門乃時之最善者也其法以月將加用時晝用陽貴夜用隂貴以天乙貴人為主而螣蛇朱雀六合勾陳青龍天空白虎太常元武太隂天后隨之故貴人臨乾亥登天門則螣蛇臨壬子而落水朱雀臨癸丑而鎩羽六合臨艮寅而乘軒勾陳臨甲卯而登陛青龍臨乙辰而遊海天空臨巽已而投匭白虎臨丙午而燒身太常臨丁未而登筵元武臨坤申而折足太隂臨庚酉而回宫天后臨辛戌而入帷六吉將得地而六凶將斂威故曰神藏煞沒又為六神悉伏此擇時之妙用也又曰貴人己丑土六合乙卯木青龍甲寅木太常己未土太隂辛酉金天后壬子水為六吉將螣蛇丁巳火朱雀丙午火勾陳戊辰土天空戊戌土白虎庚申金元武癸亥水為六凶將按貴登天門為選時第一義其月將加時貴人隂陽順逆皆六壬法也日家未知壬遁之法故誤以四煞沒時為神藏煞沒而貴登天門之説錯雜於其間觀者遂不可曉今為取而序之則知神藏者安於其居之義郭璞所謂藏神合朔宗鏡所謂歸垣入局是也煞沒者隱而不現之義通書所謂六凶斂威六神悉伏是也乾亥為天門貴人居之六合木而臨艮寅青龍木而臨乙辰太常土而臨丁未太隂金而臨庚酉天后水而臨辛戌皆各得其位當旺受生故曰神藏螣蛇朱雀火而臨壬子癸丑勾陳天空土而臨甲卯巽巳白虎金而臨丙午元武水而臨坤申皆不得其位受制潛伏故曰煞沒然皆由貴登天門而得之故貴登天門即神藏煞沒而非有二義也一日只有一時然貴分隂陽又卯酉辰戌時兼占晝夜故一日有兩時者其或晝不得陽夜不得隂則又有一日不得一時者今既按日起例於前而又於總括七百二十課貴登天門時為表於左雨水亥將春分戌將穀雨酉將小滿申將夏至未將大暑午將處暑巳將秋分辰將霜降卯將小雪寅將冬至丑將大寒子將如雨水後甲日卯時以月將亥加甲卯則陽貴未加乾亥是陽貴登天門也又如雨水後甲日酉時以月將亥加庚酉則隂貴丑加乾亥是隂貴登天門也其法以日干為主以貴人加乾亥上視某月將加某時即某時貴登天門如甲日陽貴在未加乾亥上看旦時雨水亥將加甲卯即雨水後甲日卯時陽貴登天門大寒子將加乙辰即大寒後甲日辰時陽貴登天門又如甲日隂貴在丑加乾亥上看夕時雨水亥將加庚酉即雨水後甲日酉時隂貴登天門大寒子將加辛戌即大寒後甲日戌時隂貴登天門餘倣此例至宗鏡以壬時為子時上四刻則與雙山法合而取義尤切如乾為天貴登天門取乾非取亥也朱雀鎩羽取癸非取丑也天空投匭取巽非取巳也元武折足取坤非取申也天后入帷取辛非取戌也然雙山以干維與支同宫故六壬用支亦謂神藏煞沒則知二十四時之法由來舊矣後世失其義謂乾時為戌正二刻至亥初二刻亥時為亥初二刻至亥正二刻壬時為亥正二刻至子初二刻子時為子初二刻至子正二刻以十二支占十二時之中四刻而以前後各二刻分隸前後干維似亦有理然乾巽為天門地戶隂陽之界貴人順逆所由分若以乾為戌正二刻則乾淪於隂貴罹於網而螣蛇以下諸神皆當逆轉又烏覩所謂貴登天門神藏煞沒者乎神煞起例五不遇時干尅日干也按五不遇時以五鼠遁得本時所臨之干尅本日之干則為凶時而遁甲隱公歌注則又以本時尅本日之支亦為五不遇今考其義不若神煞起例之善亦列圖而辨之如左遁甲隱公歌時尅干兮五不遇此時名為辱損明舉事遙遙終不定朝行暮敗損精兵注曰時干尅日干時支尅日支名為損明凡事不用如甲乙日庚辛時亥子日辰戌時寅卯日申酉時之類並是按天干五行氣純地支五行氣雜如寅中有火則遇土日有相生之理五行之性逢生即生而見尅不尅此天地之性也故干尅干斯純而不雜然尚須論其所臨之支是否與日干日支相生如其相生則又不為五不遇也焉得以土日寅卯時即為五不遇耶金匱經曰乙者雷電始發之日戊巳者北辰下位之日辛者萬物決斷之日壬者三光不照之日子午卯酉四仲之辰日月之門隂陽之界五干臨此四辰其日不可出軍嫁娶移徙築室曹震圭曰卯酉為日月出入之門子午為隂陽交爭之界乙為六合辛為太隂壬為元武己為六賊戊為勾陳故此五干加此四辰名曰醜又以五干四辰其共數九故以名之指掌賦曰乙戊己辛壬同四仲名曰九醜天地歸殃注凡戊子戊午壬子壬午乙卯己卯辛卯乙酉己酉辛酉日而大吉又臨日辰子午卯酉上者為真九醜卦也蓋乙是雷電始動之日震而不安戊己是諸神下位之日又戊己為坤諸神清虛之氣合德于乾轉入坤維曰下位是也壬是三光不照之位壬祿在亥六隂俱足日月之光至此損照辛是西方殺物之位如何又居在四仲極隂位上大吉是十二宫神之主為貴人之本家所以為星紀言諸星朝會於斗也今又臨四仲極隂之位是為九醜九陽數九醜言陽之醜也按辰戌為天羅地網子午卯酉為四敗丑為星紀惟此十日支既為四敗而星紀又落於支上則干又必遭羅網矣否則其干本屬羅網且羅網又必臨四敗是以謂之天地歸殃若丑不臨支則皆不然自不得為九醜也乙戊己辛壬合子午卯酉為九故曰九醜曹震圭之説得之必大吉臨日辰乃為九醜指掌賦注得之若其九醜之義則皆支離牽強無足取也十二月將每日各得一時合計七百二十日內有一百二十時為九醜餘並非是如圖內一層為月將外一層為所得之時假如內一層為子則是大寒立春也戊子日則丑時為九醜戊午日則未時為九醜餘倣此歷例曰旬中空亡者甲子旬戌亥時甲戌旬申酉時甲申旬午未時甲午旬辰巳時甲辰旬寅卯時甲寅旬子丑時考原曰十日為旬以十干配十二支自甲至癸而止餘二辰天干不及故為空亡如甲子至癸酉不及戌亥故甲子旬以戌亥為空餘倣此按劉歆七略有風后孤虛二十卷今其書亡矣古人以旬空為虛其對為孤如甲子旬中無戌亥則戌亥為虛辰巳即為孤也兵法曰背孤擊虛一女可敵十夫又按旬中空亡云者就一旬之內十干不及之二支而言也空亡固不利矣然猶有火空則發金空則鳴之義隨五行之性與所遇之事以為斷未可盡以為凶況又從空亡而論日祿如甲辰旬內寅卯之類謂之祿陷空亡而又以甲辰乙巳本日之寅卯二時謂之十惡大敗無祿時益屬無謂夫甲辰日寅時乙巳日卯時即巳得本日之祿矣而以其為旬空也而謂之無祿豈非騎驢覔驢之誚耶若甲辰本旬內寅卯時而本日為丙丁則尤為他人之無祿何與於己而亦謂為祿陷空亡而忌之豈不謬哉歷例曰截路空亡者甲巳日申酉時乙庚日午未時丙辛日辰巳時丁壬日寅卯時戊癸日子丑戌亥時考原曰截路空亡遇壬癸也行路而遇水則不可行也如甲巳日以五鼠遁起甲子順歷之得壬申癸酉故甲巳日以申酉為截路空亡也餘倣此按截路空亡之義謂十干至此而極其下二支即是旬空便如下臨無地故曰截路空亡也其説載於神煞起例以五鼠遁取日干遁支得甲乙則無吉無凶得丙丁則為喜神得戊己則為五鬼得庚辛則為金神得壬癸則為截路空亡通書惟取截路空亡一種今推其義蓋由竒門最重丙丁故忌壬癸尅之也若以行路遇水為截則方之舟之可矣何截之有欽定協紀辨方書卷七
