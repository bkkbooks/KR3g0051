body:
  text: 成於星官之手因訛襲謬見之施行往往舉矛刺盾皇祖聖祖仁皇帝知其荒率不可以訓曾纂為星厯考原一書刋刻頒行而未將監本改正葢以待夫後人聖人之心慎而又慎如此也以諭監臣監臣曰通書之謬允宜改正朕因其請謂及今猶有莊親王等數人曾經皇祖指授稍明此理使此時不加訂正恐後此益復無可任使爰命編輯成書頒布天下較之舊本謬說少除然俗所久沿則亦不能盡去便民用也命名曰協紀辨方書夫協紀辨方者敬天之紀敬地之方也一作止一語黙天地實式臨之况其大乎如曰如是則吉如是則凶如是則福如是則禍則明者所弗道也雖然敬不敬之間吉凶禍福隨之矣是為序乾隆六年十二月望日奏議欽天監監正兼佐領臣進愛謹奏為請㫖重修選擇通書萬年書以昭畫一以垂永久事竊惟隂陽選擇書籍繁多彼此參差最難考定康熙二十二年聖祖仁皇帝特命九卿詹事科道㑹議照依前定選擇通書萬年書遵行仍取通書大全内二十四條附入選擇通書彚為一部與萬年書一同永逺遵行臣監遵奉編校繕成十卷擬名欽定選擇通書進呈御覽奉㫖依議欽遵在案惟是從來選擇諸書皆未考究根源臣監當年編校亦止照依舊本聖祖仁皇帝道通法象學貫天人康熙五十二年大内蒙養齋開局命和碩莊親王率同翰林何國宗梅㲄成等恭編御製算法律吕諸書併發曹震圭所著厯事明原著同大學士李光地重加考訂親加披覽賜名御定星厯考原頒賜臣監臣等欽遵考校始知從前選擇通書内尚有傳譌即萬年書與選擇通書亦未畫一除時憲書紀年九宫已奉特㫖改正外其餘參差錯誤之處甚多因係久經九卿定議遵行之書未敢遽議更改今臣監開設增修時憲算書館和碩莊親王現在總理梅㲄成何國宗現在總裁臣蒙皇上天恩特授監正職叨協理館事所有臣監選擇通書萬年書參差錯誤之處應請一併考訂重修庶可昭畫一而垂永久倘蒙皇上恩准請以梅㲄成何國宗為總裁臣監監副李廷耀專司選擇請以為副總裁再量選臣監通曉選擇官生十員分修校録除現今在館各員已蒙聖恩賞給桌飯銀兩外其餘亦請照例支給應用紙張等項照例該處支取書成之日進呈御覽恭請欽定一併交武英殿刋刻頒行所有應改條目關係神煞及合婚俗論應行刪去之處臣監未敢擅便謹另單臚列伏乞皇上睿鑒勅部定議臣監遵奉施行為此謹奏請㫖計開一天徳乃月建三合五行中和之氣孟月用隂干季月用陽干仲月用庫宫如申子辰月三合水局申孟月以癸為天徳辰季月以壬為天徳子仲月以巽為天徳水庫在辰屬巽宫也天徳不用地支故不用辰而用巽通書子月巳月誤載天徳宜改正一月恩乃月建所生之氣陽月生陽干隂月生隂干通書五月丙戌日十二月甲子日誤載月恩宜改正一喜神乃取時干見丙如甲日丙寅時則以寅時為喜神論方向則以寅屬艮即以艮方為喜神是方向原從時起通書以丑寅皆屬艮誤以甲日丑時亦為喜神逐日皆誤俱宜改正一復日乃月建所同之干如正月建寅為陽木而甲亦陽木故正月以甲日為復日七月建申為陽金而庚亦陽金故七月以庚日為復日世俗作為歌訣云正七連庚甲通書因誤以正月之庚日七月之甲日皆為復日逐月皆誤俱宜改正一九空乃月建三合庫地對衝之日如寅午戌月合火局火庫在戌故以辰日為九空通書九空誤為寅午戌月辰卯寅日卯未亥月丑子亥日辰申子月戌酉申日己酉丑月未午巳日俱宜改正一大敗乃月建三合五行沐浴如寅午戌月合火局火長生在寅沐浴在卯故寅午戌月以卯日為大敗日通書誤以春卯夏午秋酉冬子為大敗日俱宜改正一蠶官蠶室蠶命乃取歳方生養之地如歳在東方寅卯辰屬木木養于戌為蠶官生于亥為蠶命乾在戌亥之間為蠶室通書蠶命惟寅午二年合餘年俱誤宜改正一男女合婚以生命之九宫配卦爻之變動六爻不動為歸魂一爻變為五鬼二爻變為福徳三爻變為絶體四爻變為天醫五爻變為生氣游魂卦為游魂歸魂卦為絶命牽合非倫至年命神煞雖亦附㑹五行然非祿命之理如以年命之納音五行生于死墓絶之三月為男妨妻女妨夫尤屬妄誕愚民拘牽俗論往往婚姻失時應請刪去一紅沙日忌嫁娶上兀下兀四不祥日忌上官選擇通書皆不載萬年書亦不載紅沙臣監舊例註時憲書時按期添入查紅沙乃己酉丑金局日孟月巳日仲月酉日季月丑日相傳又誤以為孟月酉日仲月巳日甚屬無當上兀下兀乃俗傳小六壬之留連赤口日陽年正月初一日起小吉隂年正月初一日起留連按日順數尤為荒陋四不祥乃從朔日取對七為衝隔三為破自初一順數初四日為隔三初七日為對七十六日又為隔三十九日又為對七二十八日又為隔三故皆為四不祥日不論月建與干支而以月朔定衝破甚屬不經應請一併刪去等因于乾隆四年七月二十七日交與奏事郎中張文彬等轉奏本日奉㫖該部議奏欽此禮部謹題為遵㫖議奏事該臣等議得欽天監監正進愛條奏重修選擇通書萬年書以昭畫一以垂永久一摺據進愛奏稱從來選擇諸書皆未考究根源臣監當年編校亦止照依舊本康熙五十二年命和碩莊親王等恭編御製算法律吕諸書賜名御定星厯考原頒賜臣監臣等欽遵考校始知從前選擇通書内尚有傳譌即萬年書與選擇通書亦未畫一除時憲書紀年九宫已奉特㫖改正外其餘參差錯誤之處甚多因係九卿定議遵行之書未敢遽議更改今臣監開設增修時憲算書館和碩莊親王現在總理梅㲄成何國宗現在總裁所有選擇通書萬年書參差錯誤之處應請一併考訂重修請以梅㲄成何國宗為總裁監副李廷耀專司選擇請以為副總裁再量選臣監通曉選擇官生十員分修校録除現今在館各員已蒙賞給桌飯銀兩外其餘亦請照例支給應用紙張等項照例該處支取書成之日交武英殿刋刻頒行所有應改條目關係神煞及合婚俗論應行刪去之處另單臚列伏乞皇上睿鑒勅部定議等語查選擇通書紀隂陽之正協剛柔之宜究象數本原以順時趨事載入時憲昭示萬方誠宜考校精詳歸於至當今該監既稱尚有參差錯誤之處應仍請勅交總理增修時憲算書館和碩莊親王總裁梅㲄成何國宗等一併考訂重修至稱監副李廷耀專司選擇請以為副總裁等語查監正進愛現在協理館事監副李廷耀選擇既係專司自宜令其協同辦理其請以為副總裁之處無庸議至分修校録不可乏員應如所請令該監於通曉選擇之挈壺正博士天文生挑取十員其桌飯銀兩併應用紙張等項照該館例支取報銷所有单内應改條目交與該館詳核訂正務於畫一可垂永久書成之日進呈御覽恭候欽定一併交與武英殿刋刻頒行可也等因於乾隆四年八月二十六日題本月二十九日奉㫖依議欽此總理増修時憲算書館事務和碩莊親王臣允禄謹奏為請㫖事竊臣館奉㫖重修萬年時憲書選擇通書務期考據精詳校訂明確方可昭示天下垂諸永久但神煞宜忌各有根源而諸本吉凶多相矛盾臣等現將各神宜忌之事與各事宜忌之神悉心參互考訂正其譌謬去其重複分派在館各員重加修註此外根據未詳彼此互異之處尚多查内閣學士張照學問淹博家多藏書且素日亦留心神煞選擇之事伏乞皇上天恩准令張照兼臣館總裁行走遇有考訂之處與梅㲄成何國宗一同商酌辦理於臣館事務實有裨益為此謹奏請㫖等因於乾隆五年二月初九日交與奏事郎中張文彬等轉奏本日奉㫖好欽此總理增修時憲算書館事務和碩莊親王臣允禄等謹奏為請㫖事竊臣館奉㫖重修選擇通書萬年書先據欽天監監正臣進愛奏稱應改條目關係神煞及合婚俗論應行刪去之處另单臚列伏乞皇上睿鑒勅部定議經禮部議覆单内應改條目交與該館詳核訂正務歸畫一可垂永久奉㫖依議欽此欽遵臣等謹按圖書為五行生尅之原卦疇為吉凶變化之本聖人作卜筮以前民用即選擇之道所由昉也術數之家更相推衍神煞之名愈多而選擇愈無準的恭查康熙二十二年為葉鍾龍誣告王府動土一案奉聖祖仁皇帝諭㫖隂陽選擇書籍浩繁吉凶禍福多相矛盾且事屬渺茫難以憑信若各據一書偏執己見捏造大言恣相告訐將來必致誣訟繁興作何立法永行無弊著九卿詹事科道㑹同確議具奏欽此聖言煌煌萬世為則矣但當時定議之臣雖經刪其矛盾而尚多未盡應用神煞亦未考據本原臣等悉心考訂務求其理而得其合正其舛誤加之解說因見其荒誕錯誤尚有出於臣進愛所奏之外而必不可不改者春秋傳云國之大事在祀與戎今通書祭祀用神在日查所謂神在日者全無理解及檢道藏乃云許真君奏玉帝而定之荒誕已甚通書出軍忌九醜日今查九醜出於六壬凡十日每日各有一時為九醜乃選時之法而通書誤以選時為選日大事尚然其小者又無論矣他如嫁娶周堂五姓修宅之類悉屬荒唐謬說而載在時憲書内又如天徳月徳乃上吉之日諸事皆宜今註時憲書天徳日止宜修造動土月徳日止宜修造動土宴樂上官殊於名義不合其餘吉凶宜忌亦多類此兹當奉㫖重修之時臣等又經查出自應一併釐定昔年時憲書内九宫錯誤聖祖仁皇帝特諭欽天監具題改正有例可循但事重司天議須衆允且於時憲書内多所更定大典攸關臣等謹將一切應刪應改之處與欽天監官員公同商酌另單開列恭呈御覽伏乞皇上睿鑒勅下大學士九卿定議施行臣等未敢擅便為此謹奏請㫖計開一時憲書載五姓修宅以五音分五姓始於漢時䜟緯之說託之孔子歴代以來諸儒駁論不勝枚舉即使其說果是則自今日以溯黄帝民間姓氏屢改豈能猶合本音況實無義理徒滋拘忌應刪去一男女合婚臣進愛已經奏請刪去至其嫁娶大利月及周堂日亦屬不經皆術士之妄說也查大利月以女命為主陽年本命前一月隂年本命後一月為大利次月妨媒次月妨翁姑次月妨女父母次月妨夫次月妨女本身惟妨本身月為女之本命與其對衝然選擇亦無專取本命年支一字之例餘更無義可推至于周堂載在時憲書以乾為翁坎為第艮為竈震為婦巽為㕑離為夫坤為姑兌為堂大月從夫順數小月從婦逆數遇第堂㕑竈為吉遇翁姑夫婦則妨其人並不論本命與日干支尤屬無理細按其圖合於儀禮成婚之次日新婦盥饋而舅姑饗婦之位次其所為翁姑夫婦者各人所立之方向也宅與堂者宅為坎宅堂為坐西朝東之堂行禮之所古人堂室如是也有㕑又有竈者㕑為女氏之行㕑所以饋舅姑竈為男氏之爨竈所以饗新婦婦在震方則㕑竈在艮巽乃便也此豈得有吉凶生於其間耶查月有十二而忌者居其十而兩月六十日中忌者又居其半是使民間可以婚嫁之日至少也不便於民莫此為甚亦應刪去一時憲書載太白遊方不宜抵向其法每月一日十一日二十一日在正東二日十二日二十二日在東南以次轉至東北八方既周則以九日十九日二十九日為在中宫十日二十日三十日為在天查太白星隨太陽出入前引後從總不逺離太陽右行太白豈能左行以算術求之萬不能符考其根原出於西域日時吉凶善惡宿曜經徧查釋藏並無此經不知其出何印度但彼處以每月初三為一日又或以每月上弦為一日與中國朔望總不相合然則太白即使左行亦與中國日辰不同況又萬無此理應刪去一時憲書載長星短星每月各一日八九月各二日無論月之大小有閏無閏每年皆然義實無謂曹震圭以長星為金短星為火牽合虎鼠二遁為之而其數仍必不能合則遷就他說以粘合之邵泰衢以為生乎月而其說又無理之可申查長星短星所忌不過裁衣開市立劵交易納財事既無關重輕世亦未嘗避忌亦毫無應驗應俱刪去一時憲書伏斷日密日裁衣日皆以值宿起算查二十八宿選擇之法來自西域其伏斷以日配宿與旬空路空之義相似尚屬有理至所謂密日者乃房虚星昴四宿七政屬日西語曰密主喜事中國遂以其日忌安葬啟攢今查西域二十八宿分屬七政其日各有宜忌與中國風俗迥然不同專取其密日殊屬無謂至以角亢房斗牛虚壁奎婁鬼張翼軫十三宿日為宜裁衣亦無取義應一併刪去一時憲書以每月三日四日八日九日十日十一日十三日十四日十五日二十二日二十三日二十六日二十七日及申酉亥子日為宜洗頭日查通書祓除澡雪之事用申酉亥子日其尋常洗頭原不待擇日也況初三初四等日義亦無取應刪去一二十八宿次舍星經天官書原係觜宿在前參宿在後選擇家以酉日值觜宿為伏斷日星命家二十八宿分配七政以日月火水木金土為序觜屬火參屬水皆依古宿次舎而定者也新法算書以參宿前一星為距星參在前觜在後則觜宿與酉日不得相值星命家以為水火顛倒查宿之距星惟人所指與算法疎密全無關礙又七政時憲書之羅㬋計都乃月行正交中交之度古以正交為羅㬋新法算書以中交為羅㬋星命家以為羅㬋屬火計都屬土遂謂顛倒羅計查羅㬋計都並非實有此星亦於字義無取於算法尤無關礙應俱依古改正一通書時憲書推日出入晝夜時刻春秋分前後隔六度小滿小雪前後一隔九度一隔十二度冬夏至前後隔十五度故交節氣之日無日出入晝夜時刻者有之今查春秋分前後隔五度小滿小雪前後一隔七度一隔八度則交節之日皆有日出入晝夜時刻于授時之義允協應改正一通書以甲子乙丑丁卯戊辰辛未壬申癸酉甲戌丁丑己卯庚辰壬午甲申乙酉丙戌丁亥己丑辛卯甲午乙未丙申丁酉乙巳丙午丁未戊申己酉庚戌乙卯丙辰丁巳戊午己未辛酉癸亥三十五日為神在日其日宜祭祀曹震圭作明原謂為唐賈耽所集曲為之解而不能通又引撮要曰舊本錯誤十有八日今依官本改正未審舊本為非新本為是選擇宗鏡則曰神無所不在以此三十五日為神在日其不在日又何在乎今徧查諸家通書皆無解說惟道藏玉匣記云許真君考天曹案簿三十一日諸神在人間地府祭祀受福餘日諸神在天求福反禍察其日數雖比通書少四日不同九日然其為根本於玉匣記而又加之以傳譌亦可斷矣荒誕不經實甚宜昔人之疑而駁之也今現用之殊屬未合按明原引神樞經等書天徳合月徳合福徳普䕶福生聖心續世天后天巫宜祭祀祈福求嗣等事較之神在日為近理應取天徳合等日為宜祭祀其神在日應刪去一九醜本於壬遁其法以乙卯己卯辛卯乙酉己酉辛酉戊午戊子壬午壬子十日内視丑臨於支上則其時為九醜課推其理唯此十課魁罡及日干皆落敗地故謂之醜乙巳辛戊壬五干加子午卯酉四支共為九故曰九醜並非此十日皆為九醜日也今通書選時内原有九醜之說而又誤用之以選日則此十日内儘有吉日非盡應避忌也應改正一辛未壬申癸酉己卯壬午甲申壬寅甲辰丙午己酉庚戌丙辰己未庚申辛酉十五日為大明日今通書稱上吉日明原謂是李淳風所集又以丙寅丁卯戊辰己巳壬申癸酉甲戌乙亥丙子丁丑庚辰辛巳甲申乙酉戊子己丑庚寅辛卯甲午乙未戊戌己亥壬寅癸卯甲辰乙巳戊申己酉庚戌壬子癸丑甲寅乙卯戊午己未庚申辛酉三十七日為七聖日明原謂是賈耽所集七聖者黄帝元女文王周公孔子天老董仲舒也其日宜舉百事其說不倫全無義理今選擇雖不用而通書猶載其名應刪去一玉皇鑾駕紫微帝星紫㣲鑾駕北辰帝星撼龍帝星都天寶照都天轉運行衙帝星周仙羅星星馬貴人既非實有此星又且必無此理且於一帝星之中又有金輪火輪水輪天乙太乙諸名選擇宗鏡曰皆術士捏造也今通書雖載其名實不用以選擇應俱刪去一逆血刃𨼆伏血刃千金血刃五子打劫血刃山家火血山家刀砧或從年干起或從年支起其於生尅制化之理了不相干選擇宗鏡曰民間最畏刀砧火血術士捏造惡名以嚇人耳今選擇不用而通書猶載其名應俱刪去一九良星按年周遊於井㕑門路庭堂寺觀之間全無義理通書總論内載元朝奏罷等語今選擇雖不用而年局仍然開載又有暗刀煞亦是此類皆世俗妄說應一併刪去一通書以本年五虎元遁甲干所臨之支為穿山大羅㬋乙干所臨之支為天禁朱雀二支所夾之方為山家困龍今時憲書惟以庚辛二干所臨之支為金神並不避甲乙所有穿山大羅㬋等名應刪去一通書以驛馬前干為驛馬臨官主吉又為馬前六害主凶為凶為吉皆無義理彼此牴牾最為惑人應一併刪去一飛天獨火又名皇天灸退通書總論已言其無驗而年局猶載之應併刪去一頭白空亡八山空亡即浮天空亡八山刀砧翎毛禁向即坐煞向煞流財即支退舊刻彼此錯譌遂致異同莫辨而並列之今查明重複應刪去一通書以月厭前一辰為章光其日忌嫁娶查嫁娶不將日取厭前干厭後支章光為厭前之支自在不用之内則章光之名亦虚設也應刪去一天願乃十二月將以四時旺干順配之正月乙亥二月甲戌三月乙酉四月丙申五月丁未六月戊午七月己巳八月庚辰九月辛卯十月壬寅十一月癸丑十二月甲子甲乙各二者十干配十二支勢必重見十二月木將旺五氣順布而四時行且甲子干支之首十二月月之終有貞下起元之理故不用壬子而用甲子也今通書正月乙亥譌甲午四月丙申譌丙子五月丁未譌丁丑七月己巳譌甲寅八月庚辰譌丙辰十月壬寅譌戊辰十一月癸丑譌甲子十二月甲子譌癸未俱應改正一通書以春酉夏子秋卯冬午為守日春辰夏未秋戌冬丑為牢日原始謂守牢以字形相近而誤當易守日為牢日易牢日為守日今按春辰夏未秋戌冬丑乃四時當旺之土以為守日宜也春酉夏子秋卯冬午乃四時死囚之辰以為牢日宜也應照原始改正一天獄天火通書載寅午戌月子日亥卯未月卯日申子辰月午日己酉丑月酉日按原始引李鼎祚語亥卯未月當是酉日己酉丑月當是卯日乃三合之對沖猶年之災煞也又原始以春木旺酉為牢日秋金旺卯為牢日尤與天獄名義相合至天火既以子為寅午戌火局之天火午為申子辰水局之天火則木必用酉金必用卯義例始得相符蓋天火者推其氣之根原故正以相反而互根即陽根隂而隂根陽也應同天獄一併改正一八風乃取四時對衝三合之辰以木火二干配之蓋對衝為虚虚則生風木火所以生風也春衝酉用丁丑丁巳日夏衝子用甲申甲辰日秋衝卯用丁亥丁未日冬衝午用甲寅甲戌日今通書丁巳譌己酉丁亥譌辛未應改正一地囊乃四時三合卦之納甲蓋三合無土局而土旺於四季木火金水之所以生旺墓者無適非土故用當時三合卦内外兩初爻之納甲為地囊日其一卦兩用者則再用世應二爻之納甲日春木亥卯未局為震坤乾卦正月用震内卦初爻庚子外卦初爻庚午二月用坤内卦初爻乙未外卦初爻癸丑三月用乾内卦初爻甲子外卦初爻壬午夏火寅午戌局為離乾艮卦四月用離内卦初爻己卯外卦初爻己酉五月用乾世爻壬戌應爻甲辰六月用艮内卦初爻丙辰外卦初爻丙戌秋金己酉丑局為兌艮巽卦七月用兌内卦初爻丁巳外卦初爻丁亥八月用艮世爻丙寅應爻丙申九月用巽内卦初爻辛丑外卦初爻辛未冬水申子辰局為坎巽坤卦十月用坎内卦初爻戊寅外卦初爻戊申十一月用巽世爻辛卯應爻辛酉十二月用坤世爻癸酉應爻乙卯今通書二月乙未譌癸未三月壬午譌甲寅四月己酉譌己丑五月譌戊午戊辰六月譌癸未癸巳七八月互易丁亥譌丁卯九月譌戊辰戊子十月譌庚戌庚子十一十二月闕今俱應改正一通書安葬用庚寅壬寅丙午庚午壬午甲申丙申庚申壬申乙酉丁酉己酉辛酉癸酉十四日為鳴吠日啓攢用丙子庚子壬子甲寅丙寅乙卯丁卯辛卯癸卯甲午十日為鳴吠對日相傳始自郭璞取金雞鳴玉犬吠之義而其用日則不知所由來明原曲為之解而不能通原始考原疑其有誤今按神煞起例以雞為酉犬為戌酉為日入之門戌為閉物之㑹然葬歸於土避土日不用故不用戌而用酉星命之術卯為命宫取東方出地之義葬埋之術酉為命宫取西方入地之義自酉上溯至午而一隂生故鳴吠用午申酉日鳴吠對則子寅卯日也其法以甲丙庚壬四干配午申得八日避戌土不用以乙丁己辛癸五干配酉得五日避未土不用共十三日為鳴吠日已為隂土生於酉故配酉而不避也又以丙庚壬三干配子得三日避戊土不用甲配子為純陽亦避不用以甲丙庚壬四干配寅得四日避戊不用以乙丁辛癸四干配卯得四日避已不用共十一日為鳴吠對日通共二十四日干支皆與通書合而自各有義例通書特悞以庚寅壬寅為鳴吠甲午為鳴吠對故遂不可解耳應依起例改正一臨日陽月取三合前辰隂月取三合後辰其義應吉歴事明原樞要經以為居上臨下容保無疆之義皆有吉無凶而通書萬年書誤以為凶日忌臨官視事上表陳訟於理乖謬應改為吉日宜臨政親民上冊進表章陳詞訟一天徳月徳乃上吉之日諸事皆宜今註時憲書天徳日止宜修造動土月徳日止宜修造動土宴樂上官諸如此類凡吉神所宜凶神所忌皆多與義例不合應逐條斟酌改正一刑衝破害在日為最不宜之日在方亦為最不宜之方而通書年表皆不載即時憲書年神方位通書亦或載或不載而刀砧火血謬妄之說俱未芟除殊為矛盾亦應增刪改正乾隆五年六月十五日交與奏事郎中張文彬等轉奏本日奉㫖大學士九卿定議具奏其翰詹科道内如有通曉算書者亦著入議欽此大學士伯臣鄂爾泰等謹題為遵㫖議奏事該臣等㑹議得總理增修時憲算書館事務和碩莊親王等奏稱奉㫖重修選擇通書萬年書經禮部議覆應改條目交與該館詳核訂正務歸畫一可垂永久奉㫖依議欽此欽遵臣等悉心考訂務求其理而得其合正其舛悞加之解說因見其荒誕錯悞尚有出於臣進愛所奏之外而必不可不改者兹當奉㫖重修之時臣等又經查出自應一併釐定昔年時憲書内九宫錯悞蒙聖祖仁皇帝特諭欽天監具題改正有例可循但事重司天議須衆允且於時憲書内多所更定大典攸關臣等謹將一切應刪應改之處與欽天監官員公同商酌另單開列恭呈御覽伏乞皇上睿鑒勅下大學士九卿定議施行等因具奏前來臣等伏思選擇吉日三代以上祇論干支之剛柔絶少拘忌後世論說日多術家遞衍增設神煞本一日而吉凶頓殊本一星而名號雜出以致民間趨避無所適從現在算書館奉㫖重修選擇通書萬年書先據監臣進愛將應改條目及神煞俗論應行刪去之處奏請勅部定議經禮部議交該館詳核訂正奉㫖依議欽此欽遵在案今和碩莊親王等奏稱悉心攷訂尚有出於臣進愛所奏之外而必不可不改者自應一併釐定且於時憲書内多所更定大典攸關請勅廷議等語臣等查和碩莊親王等開列應刪應改之處共二十八條其載在時憲書者共七條一曰五姓修宅一曰嫁娶周堂一曰太白遊方一曰長星短星一曰洗頭日一曰參觜易位一曰交節日出入晝夜時刻臣等公同酌議五姓修宅見於黄帝宅經以姓音分五行修造各有宜忌歴代以來諸儒駁論甚詳然後世雖姓氏繁多猶往往上溯得姓之始拘忌姓音以為趨避嫁娶周堂太白遊方為婚嫁擇吉之用長星短星宜於裁衣交易等項洗頭日宜於申酉亥子等日原無甚義理而載在時憲書民俗便安遵行已久應將莊親王等奏請刪去之處無庸議至於參觜先後之序由於距星之不同從前用參中星為距星則觜在先參在後康熙年間用新法算書以參西第一星為距星遂改為參先觜後今莊親王等奏稱宿之距星惟人所指與算法疎密全無關礙等語夫既與算法全無關礙則既經康熙年間改定今亦不必更改應將所奏參觜仍改觜參之處無庸議至本條内請將羅㬋計都依古改正之處查羅㬋計都生於日月交行謂之天首天尾中法以天首屬羅天尾屬計自古而然今以西法起算由彼土占候後天行一日遂以羅為尾計為首查羅計止入七政書内應如所奏依古改正再七政古有四餘今以紫氣無憑起算遂去其一然古法具在應請添入以備四餘之用至奏添時憲書内交節日出入晝夜時刻雖屬比舊精密但時憲書欵式頒行已久亦不便増添應將所奏添入之處無庸議仍令刻入通書内可也其不載入時憲書而為選擇通書欽天監所據以選擇者二十一條皆民間修方造葬趨吉避凶之用原係術士推衍各家不同謬妄者固多譌舛者亦復不少其係于修方者二條曰九良星曰飛天獨火係于造葬者六條曰密日曰玉皇鑾駕等星曰逆血刃等煞曰穿山大羅㬋曰馬前六害曰頭白空亡等煞或係術士捏造或係緯書所測名目繁多莊親王等既稱實不用以選擇且查明牴牾重複應刪之處應如所奏刪去若七聖日之不經神在日章光日之無謂此三條亦應如所奏刪去至於九醜日天願日守牢日天獄天火日八風日地囊日鳴吠日臨日共八條既經該館查明錯譌應如所奏照善本改正又天徳月徳等吉神所宜通書未經該載刑衝破害等凶神所忌亦未經該載及諸謬妄之說未盡芟除此二條係該館應辦之事應如所奏令莊親王等率同該館各員細心詳考編輯成書一併進呈御覽恭候欽定再通書所有神煞名目雖經刪改應仍將舊有名目附載卷末以示傳疑以備博攷俟命下之日令欽天監照例辦理可也等因於乾隆五年七月二十五日題本月二十七日奉㫖依議欽此總理增修時憲算書館事務和碩莊親王臣允禄等謹奏臣等恭纂萬年書通書今已告竣謹將纂就萬年書稿本一套通書稿本五套恭呈御覽伏候欽定俟命下之日欽遵原奉諭㫖辦理再通書向循俗稱理合恭請欽定嘉名以光典策另擬書名一單仰懇欽㸃為此謹奏等因於乾隆五年八月初七日交與奏事郎中張文彬等轉奏本日奉㫖知道了書名著用協紀辨方書字樣欽此乾隆六年十二月十八日奉㫖開載諸臣職名總理和碩莊親王臣允禄武英殿監理和碩和親王臣𢎞晝總裁經筵講官刑部左侍郎臣張照鴻臚寺卿紀録一次臣梅㲄成原任工部右侍郎臣何國宗協理館事欽天監監正兼佐領紀録二次臣進愛纂修協同辦理館事員外郎銜仍留欽天監右監副任臣李廷耀刑部主事留欽天監時憲科中官正任加三級臣何國宸工部主事留欽天監時憲科秋官正任加一級臣方穀欽天監時憲科春官正加三級臣何君惠欽天監漏刻科五官挈壺正加二級臣熊佑欽天監漏刻科五官挈壺正紀録二次臣劉毓圻欽天監時憲科博士加四級臣潘汝瑛欽天監漏刻科博士臣齊克昌國子監算學教習原任福建汀州府知府臣何國棟提調欽天監天文科五官靈臺郎紀録三次臣薩哈圖欽天監主簿加一級紀録一次臣毛嘉梓收掌欽天監時憲科博士加一級臣祝喬齡欽天監博士臣張𢎞渶欽天監時憲科博士紀録一次臣永定欽天監時憲科天文生加一級臣李鏊欽天監時憲科天文生加一級臣白士傑校録繪圖推算欽天監天文科五官靈臺郎加三級臣陳世銓欽天監時憲科博士加一級臣羅廷欽天監時憲科博士加一級臣孫君徳欽天監時憲科博士紀録一次臣鮑懐仁欽天監時憲科博士臣王徳明欽天監天文科天文生加一級臣何國勲欽天監天文科天文生加一級臣徐彭年欽天監時憲科天文生加一級臣何國政欽天監時憲科天文生臣潘從源欽天監時憲科天文生臣何廷禄欽天監時憲科天文生加一級臣徐文學欽天監時憲科天文生加一級臣董又新欽天監時憲科天文生臣程鐸欽天監時憲科天文生臣劉必顯欽天監時憲科天文生臣門泰欽天監天文科天文生臣歐天瑞欽天監時憲科天文生臣路銓武英殿監造内務府南苑郎中兼佐領加五級紀録十次臣雅爾岱内務府錢糧衙門郎中兼佐領加六級紀録十次臣永保内務府廣儲司郎中加一級紀録二次臣衆神保内務府錢糧衙門主事臣永忠内務府廣儲司司庫加二級臣胡三格監造加一級臣李保監造臣鄭桑格庫掌臣李延偉庫掌臣胡什泰欽定四庫全書子部七欽定協紀辨方書目錄術數類六隂陽五行之屬卷一本原一卷二本原二卷三義例一卷四義例二卷五義例三卷六義例四卷七義例五卷八義例六卷九立成卷十宜忌卷十一用事卷十二公規一卷十三公規二卷十四年表一卷十五年表二卷十六年表三卷十七年表四卷十八年表五卷十九年表六卷二十月表一卷二十一月表二卷二十二月表三卷二十三月表四卷二十四月表五卷二十五月表六卷二十六月表七卷二十七月表八卷二十八月表九卷二十九月表十卷三十月表十一卷三十一月表十二卷三十二日表卷三十三利用一卷三十四利用二卷三十五附錄卷三十六辨訛臣等謹案欽定協紀辨方書三十六卷乾隆四年皇上特允監臣進愛之請命和碩莊親王等修訂越三年成編凡本原二卷義例六卷立成宜忌用事各一卷公規二卷年表六卷月表十二卷日表一卷利用二卷附錄辨訛各