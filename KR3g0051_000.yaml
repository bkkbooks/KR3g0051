front:
  text: 欽定四庫全書御製協紀辯方書序粤昔帝堯命羲和敬授人時厥民知析因夷隩之節後聖有作推而彌廣至於外事用剛日内事用柔日此皆載之經典百王不易者也厥後濫觴日以訛謬術士以吉凶禍福之說震驚朕師不可方物如褚少孫補史記所稱彼家云吉此家云凶彼家云小吉此家云大凶茫乎不知其畔岸漢武以來已如聚訟而荀悅王充輩斥為理之所無弃而勿論者也雖然天以日月行四時人奉天而時若嚮明而治嚮晦而息后王君公所以奉若天道也日出而作日入而息羣黎百姓所以奉若天道也否則不能晨夜不夙則暮詩人譏焉人人所知也然則舉大事動大衆協乎五紀辨乎五方以順天地之性豈無寸分節解以推極其至精至微之理者歟其支離蒙昧拘牽謬悠之說乃術士之過而非可因噎而廢食者也欽天監舊有選擇通書刻於康熙二十二年其書
