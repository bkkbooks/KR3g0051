body:
  text: 年表三甲申至癸巳太嵗甲申幹木枝金納音屬水開山立向修方吉嵗德甲嵗德合巳嵗枝德丑陽貴人未隂貴人丑嵗祿寅嵗馬寅奏書坤博士艮三元紫白上元一白兑六白震八白中九紫乾中元一白巽六白離八白坤九紫震下元一白坎六白乾八白艮九紫離蓋山黃道貪狼坤乙巨門坎癸申辰武曲乾申文曲震庚亥未通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后乙辰功曹丙午天罡坤申勝光辛戌傳送壬子河魁艮寅十二吉山宜申子辰寅午戌年月日時四利三元太陽酉太隂亥龍德卯福德巳開山立向修方凶太嵗申嵗破寅三煞巳午未坐煞向煞丙丁壬癸浮天空亡離壬開山凶年尅山家離壬丙乙山隂府太嵗艮巽六害亥死符丑炙退卯立向凶巡山羅㬋庚病符未修方凶天官符亥地方符子大煞子大將軍午力士乾蠶室巽蠶官辰蠶命巳嵗刑寅黃幡辰豹尾戌飛亷辰喪門戌弔客午白虎辰金神午未申酉獨火離五鬼申破敗五鬼巽開山立向修方吉開山凶太歲乙酉幹木枝金納音屬水開山立向修方吉歲德庚歲德合乙歲枝德寅陽貴人申隂貴人子歲祿卯歲馬亥奏書坤博士艮三元紫白上元一白艮六白巽八白乾九紫兑中元一白中六白坎八白震九紫巽下元一白坤六白兑八白離九紫坎蓋山黃道貪狼離壬寅戌巨門乾甲武曲坎癸申辰文曲艮丙通天竅三合前方乾亥壬子癸丑三合後方巽巳丙午丁未十二吉山宜巳酉丑亥卯未年月日時走馬六壬神后甲卯功曹巽巳天罡丁未勝光庚酉傳送乾亥河魁癸丑十二吉山宜巳酉丑亥卯未年月日時四利三元太陽戌太隂子龍德辰福德午開山立向修方凶太歲酉歲破卯三煞寅卯辰坐煞向煞甲乙庚辛浮天空亡坎癸開山凶年尅山家二十四山並無尅冬至後尅乾亥兌丁山隂府太歲兌乾六害戌死符寅灸退子立向凶巡山羅㬋辛病符申修方凶天官符申地官符丑大煞酉大將軍午力士乾蠶室巽蠶官辰蠶命巳歲刑酉黃幡丑豹尾未飛亷亥喪門亥弔客未白虎巳金神辰巳獨火坤五鬼未破敗五鬼艮開山立向修方吉開山凶太歲丙戌幹火枝土納音屬土開山立向修方吉歲德丙歲德合辛歲枝德卯陽貴人酉隂貴人亥歲祿巳歲馬申奏書坤博士艮三元紫白上元一白離六白中八白兌九紫艮中元一白乾六白坤八白巽九紫中下元一白震六白艮八白坎九紫坤蓋山黃道貪狼坎癸申辰巨門坤乙武曲離壬寅戌文曲兌丁巳丑通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后艮寅功曹乙辰天罡丙午勝光坤申傳送辛戌河魁壬子十二吉山宜寅午戌申子辰年月日時四利三元太陽亥太隂丑龍德巳福德未開山立向修方凶太歲戌歲破辰三煞亥子丑坐煞向煞壬癸丙丁浮天空亡巽辛開山凶年尅山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太歲坎坤六害酉死符卯灸退酉立向凶巡山羅㬋乾病符酉修方凶天官符巳地官符寅大煞午大將軍午力士乾蠶室巽蠶官辰蠶命巳歲刑未黃幡戌豹尾辰飛亷子喪門子弔客申白虎午金神寅卯午未子丑獨火乾五鬼午破敗五鬼坤開山立向修方吉開山凶太歲丁亥幹火枝水納音屬土開山立向修方吉歲德壬歲德合丁歲枝德辰陽貴人亥隂貴人酉歲祿午歲馬巳奏書乾博士巽三元紫白上元一白坎六白乾八白艮九紫離中元一白兌六白震八白中九紫乾下元一白巽六白離八白坤九紫震蓋山黃道貪狼坎癸申辰巨門坤乙武曲離壬寅戌文曲兌丁巳丑通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十二吉山宜亥卯未巳酉丑年月日時走馬六壬神后癸丑功曹甲卯天罡巽巳勝光丁未傳送庚酉河魁乾亥十二吉山宜亥卯未巳酉丑年月日時四利三元太陽子太隂寅龍德午福德申開山立向修方凶太歲亥歲破巳三煞申酉戌坐煞向煞庚辛甲乙浮天空亡震庚開山凶年尅山家震艮巳山隂府太歲乾離六害申死符辰灸退午立向凶巡山羅㬋壬病符戌修方凶天官符寅地官符卯大煞卯大將軍酉力士艮蠶室坤蠶官未蠶命申歲刑亥黃幡未豹尾丑飛亷丑喪門丑弔客酉白虎未金神寅卯戌亥獨火乾五鬼巳破敗五鬼震開山立向修方吉開山凶太歲戊子幹土枝水納音屬火開山立向修方吉歲德戊歲德合癸歲枝德巳陽貴人丑隂貴人未歲祿巳歲馬寅奏書乾博士巽三元紫白上元一白坤六白兌八白離九紫坎中元一白艮六白巽八白乾九紫兌下元一白中六白坎八白震九紫巽蓋山黃道貪狼震庚亥未巨門兌丁巳丑武曲巽辛文曲坤乙通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后壬子功曹艮寅天罡乙辰勝光丙午𫝊送坤申河魁辛戌十二吉山宜申子辰寅午戌年月日時四利三元太陽丑太隂卯龍德未福德酉開山立向修方凶太歲子歲破午三煞巳午未坐煞向煞丙丁壬癸浮天空亡坤乙開山凶年尅山家二十四山並無尅冬至後尅乾亥兌丁山隂府太歲坤震六害未死符巳灸退卯立向凶巡山羅㬋癸病符亥修方凶天官符亥地官符辰大煞子大將軍酉力士艮蠶室坤蠶官未蠶命申歲刑卯黃幡辰豹尾戌飛亷申喪門寅弔客戌白虎申金神申酉子丑獨火艮五鬼辰破敗五鬼離開山立向修方吉開山凶太歲巳丑幹土枝土納音屬火開山立向修方吉歲德甲歲德合巳歲枝德午陽貴人子隂貴人申歲祿午歲馬亥奏書乾博士巽三元紫白上元一白震六白艮八白坎九紫坤中元一白離六白中八白兌九紫艮下元一白乾六白坤八白巽九紫中蓋山黃道貪狼艮丙巨門巽辛武曲兌丁巳丑文曲離壬寅戌通天竅三合