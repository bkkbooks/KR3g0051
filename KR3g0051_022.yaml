body:
  text: 月表四四月立夏四月節天道西行宜向西行宜修造西方天德在辛天德合在丙月德在庚月德合在乙月空在甲宜修造取土月建在己月破在亥月厭在未月刑在申月害在寅劫煞在寅災煞在卯月煞在辰忌修造取土初九日長星二十五日短星立夏前一日四絶後八日往亡小滿四月中日躔在申宫為四月將宜用甲丙庚壬時甲子海中金義危日乙丑海中金制成日丙寅爐中火義收日丁卯爐中火義開日戊辰大林木專閉日己巳大林木義建日庚午路傍土伐除日辛未路傍土義滿日壬申劒鋒金義平日癸酉劒鋒金義定日甲戌山頭火制執日乙亥山頭火義破日丙子澗下水伐危日丁丑澗下水寶成日戊寅城頭土伐收日己卯城頭土伐開日庚辰白鑞金義閉日辛巳白鑞金伐建日壬午楊栁木制除日癸未楊栁木伐滿日甲申井泉水伐平日乙酉井泉水伐定日丙戌屋上土寶執日丁亥屋上土伐破日戊子霹靂火制危日己丑霹靂火專成日庚寅松柏木制收日辛卯松柏木制開日壬辰長流水伐閉日癸巳長流水制建日甲午砂石金寶除日乙未砂石金制滿日丙申山下火制平日丁酉山下火制定日戊戌平地木專執日己亥平地木制破日庚子壁上土寶危日辛丑壁上土義成日壬寅金箔金寶收日癸卯金箔金寶開日甲辰覆燈火制閉日乙巳覆燈火寶建日丙午天河水專除日丁未天河水寶滿日戊申大驛土寶平日己酉大驛土寶定日庚戌叉釧金義執日辛亥叉釧金寶破日壬子桑柘木專危日癸丑桑柘木伐成日甲寅大溪水專收日乙卯大溪水專開日丙辰沙中土寶閉日丁巳沙中土專建日戊午天上火義除日己未天上火專滿日庚申石榴木專平日辛酉石榴木專定日壬戌大海水伐執日癸亥大海水專破日右六十干支從建巳者始立夏終小滿其神煞吉凶用事宜忌具於表欽定協紀辨方書卷二十三
