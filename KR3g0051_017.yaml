body:
  text: 年表五甲辰至癸丑太歲甲辰幹木枝土納音屬火開山立向修方吉歲徳甲歲徳合巳歲枝徳酉陽貴人未隂貴人丑歲祿寅歲馬寅奏書艮博士坤三元紫白上元一白離六白中八白兌九紫艮中元一白乾六白坤八白巽九紫中下元一白震六白艮八白坎九紫坤蓋山黄道貪狼兌丁巳丑巨門震庚亥未武曲艮丙文曲坎癸申辰通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后坤申功曹辛戌天罡壬子勝光艮寅𫝊送乙辰河魁丙午十二吉山宜申子辰寅午戌年月日時四利三元太陽巳太隂未龍徳亥福徳丑開山立向修方凶太歲辰歲破戌三煞己午未坐煞向煞丙丁壬癸浮天空亡離壬䦕山凶年剋山家乾亥兌丁山隂府太歲艮巽六害卯死符酉灸退卯立向凶巡山羅㬋巽病符卯修方凶天官符亥地官符申大煞子大將軍子力士巽蠶室乾蠶官戌蠶命亥歲刑辰黄幡辰豹尾戌飛亷午喪門午弔客寅白虎子金神午未申酉獨火巽五鬼子破敗五鬼巽䦕山立向修方吉太歲乙巳幹木枝火納音屬火䦕山立向修方吉歲徳庚歲徳合乙歲枝徳戌陽貴人申隂貴人子歲祿卯歲馬亥奏書巽博士乾三元紫白上元一白坎六白乾八白艮九紫離中元一白兌六白震八白中九紫乾下元一白巽六白離八白坤九紫震蓋山黄道貪狼兌丁己丑巨門震庚亥未武曲艮丙文曲坎癸申辰通天竅三合前方乾亥壬子癸丑三合後方巽巳丙午丁未十二吉山宜己酉丑亥卯未年月日時走馬六壬神后丁未功曹庚酉天罡乾亥勝光癸丑𫝊送甲卯河魁巽巳十二吉山宜己酉丑亥卯未年月日時四利三元太陽午太隂申龍徳子福徳寅䦕山立向修方凶太歲巳歲破亥三煞寅卯辰坐煞向煞甲乙庚辛浮天空亡坎癸開山凶年剋山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太歲兌乾六害寅死符戌灸退子立向凶巡山羅㬋丙病符辰修方凶天官符申地官符酉大煞酉大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑申黄幡丑豹尾未飛亷未喪門未弔客卯白虎丑金神辰巳獨火巽五鬼亥破敗五鬼艮䦕山立向修方吉太歲丙午幹火枝火納音屬水開山立向修方吉歲徳丙歲徳合辛歲枝徳亥陽貴人酉隂貴人亥歲祿巳歲馬申奏書巽博士乾三元紫白上元一白坤六白兌八白離九紫坎中元一白艮六白巽八白乾九紫兌下元一白中六白坎八白震九紫巽蓋山黄道貪狼巽辛巨門艮丙武曲震庚亥未文曲乾甲通天竅三合前方坤申庚酉辛戌三合後方艮寅甲卯乙辰十二吉山宜寅午戌申子辰年月日時走馬六壬神后丙午功曹坤申天罡辛戌勝光壬子𫝊送艮寅河魁乙辰十二吉山宜寅午戌申子辰年月日時四利三元太陽未太隂酉龍徳丑福徳卯開山立向修方凶太歲午歲破子三煞亥子丑坐煞向煞壬癸丙丁浮天空亡巽辛開山凶年剋山家乾亥兌丁山隂府太歲坎坤六害丑死符亥灸退酉立向凶巡山羅㬋丁病符巳修方凶天官符巳地官符戌大煞午大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑午黄􅜖戌豹尾辰飛亷寅喪門申弔客辰白虎寅金神寅卯午未子丑獨火兌五鬼戌破敗五鬼坤開山立向修方吉太歲丁未幹火枝土納音屬水開山立向修方吉歲徳壬歲徳合丁歲枝徳子陽貴人亥隂貴人酉歲祿午歲馬巳奏書巽博士乾三元紫白上元一白震六白艮八白坎九紫坤中元一白離六白中八白兌九紫艮下元一白乾六白坤八白巽九紫中蓋山黄道貪狼坤乙巨門坎癸申辰武曲乾甲文曲震庚亥未通天竅三合前方巽巳丙午丁未三合後方乾亥壬子癸丑十二吉山宜亥卯未巳酉丑年月日時走馬六壬神后巽巳功曹丁未天罡庚酉勝光乾亥𫝊送癸丑河魁甲卯十二吉山宜亥卯未巳酉丑年月日時四利三元太陽申太隂戌龍徳寅福徳辰開山立向修方凶太歲未歲破丑三煞申酉戌坐煞向煞庚辛甲乙浮天空亡震庚開山凶年剋山家甲寅辰巽戌坎辛申丑癸坤庚未山隂府太歲乾離六害子死符子灸退午立向凶巡山羅㬋坤病符午修方凶天官符寅地官符亥大煞卯大將軍卯力士坤蠶室艮蠶官丑蠶命寅歲刑丑黄􅜖未豹尾丑飛亷卯喪門酉弔客巳白虎卯金神寅卯戌亥獨火離五鬼酉破敗五鬼震開山立向修方吉太歲戊申幹土枝金納音屬土開山立向修方吉歲徳戊歲徳合癸歲枝徳丑陽貴人丑隂貴人未歲祿巳歲馬寅奏書坤博士艮三元紫白上元一白巽六白離八白坤九紫震中元一白坎六白乾八白艮九紫離下元一白兊六白震八白中九紫乾蓋山黄道貪狼坤乙巨門坎癸申辰武曲乾申文曲震庚亥未通天竅三合前方艮寅甲卯乙辰三合後方坤申庚酉辛戌十二吉山宜申子辰寅午戌年月日時走馬六壬神后乙辰功曹丙午天罡坤申勝光辛戌𫝊送壬子河魁艮寅十二吉山宜申子辰寅午戌年月日時四利三元太陽酉太隂亥龍徳卯福徳巳開山立向修方凶太歲申歲破寅三煞巳午未坐煞向煞丙丁壬癸浮天空亡坤乙開山凶年剋山家離壬丙乙山隂府太歲坤震六害亥死符丑灸退卯立向凶巡山羅㬋庚病符未修方凶天官符亥地官符子大煞子大將軍午力士乾蠶室巽蠶官辰蠶命巳歲刑寅黄􅜖辰豹尾戌飛亷辰喪門戌弔客午白虎辰金神申酉子丑獨火離五鬼申破敗五鬼離開山立向修方吉太歲己酉幹土枝金納音屬土開山立向修方吉歲徳甲歲徳合巳歲枝徳寅陽貴人子隂貴人申歲祿午歲馬亥奏書坤博士艮三元紫白上元一白中六白坎八白震九紫巽中元一白坤六白兌八白離九紫坎下元一白艮六白巽八白乾九紫兌蓋山黄道貪狼離壬寅戌巨門乾甲武曲坎癸申辰文曲艮丙通天竅三合前方乾亥壬子癸丑三合後方巽巳丙午丁未十二吉山宜巳酉丑亥卯未