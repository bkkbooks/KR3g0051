body:
  text: 本原一朱子曰本圖書原卦畫隂陽家者流其亦衷諸此也作本原河圖洛書先天八卦次序先天八卦方位後天八卦次序後天八卦方位先天卦配河圖之象後天卦配河圖之象先天卦配洛書之數後天卦配洛書之數甲歴十干十二支十二律二十八舎四序六辰十二月辟卦十二辰二十八宿星象二十八宿配日五行五行用事五行生旺干支五行三合六合五鼠遁五虎遁五合化氣納音納甲河圖一六為水居北二七為火居南三八為木居東四九為金居西五十為土居中北方水生東方木東方木生南方火南方火生中央土中央土生西方金西方金生北方水此五行相生之序也洛書戴九履一左三右七二四為肩六八為足五居中央一六水尅二七火二七火尅四九金四九金尅三八木三八木尅五中土五中土尅一六水此五行相尅之序也繫辭傳曰易有太極是生兩儀兩儀生四象四象生八卦邵子曰乾一兌二離三震四巽五坎六艮七坤八乾兌離震為陽巽坎艮坤為隂乾兌為太陽離震為少隂巽坎為少陽艮坤為太隂說卦傳曰天地定位山澤通氣雷風相薄水火不相射八卦相錯邵子曰乾南坤北離東坎西兌居東南震居東北巽居西南艮居西北所謂先天之學也說卦傳曰乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女說卦傳曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮邵子曰乾統三男於東北坤統三女於西南乾坎艮震為陽巽離坤兌為隂啓蒙附論曰圖之左方陽内隂外即先天之震離兌乾陽長而隂消也其右方隂内陽外即先天之巽坎艮坤隂長而陽消也葢所以象二氣之交運也啓蒙附論曰圖之一六為水即後天之坎位也三八為木即後天震巽之位也二七為火即後天之離位也四九為金即後天兌乾之位也五十為土即後天之坤艮周流四季而偏旺於丑未之交也葢所以象五氣之順布也啓蒙附論曰洛書九數虚中五以配八卦陽上隂下故九為乾一為坤因自九而逆數之震八坎七艮六乾生三陽也又自一而順數之巽二離三兌四坤生三隂也以八數與八卦相配而先天之位合矣按術家以乾配九坤配一離配三坎配七其數奇故為陽兌配四震配八巽配二艮配六其數偶故為隂啓蒙附論曰火上水下故九為離一為坎火生燥土故八次九而為艮燥土生金故七六次八而為兌乾水生濕土故二次一而為坤濕土生木故三四次二而為震巽以八數與八卦相配而後天之位合矣按邵子以文王八卦為入用之位後天之學朱子以洛書為數之用術家飛宫弔替俱用後天配洛書其法以坎一坤二震三巽四中五乾六兌七艮八離九為序劉歆曰八卦九章相為表裏張衡曰聖人重之以卜筮雜之以九宫則所從來遠矣甲歴周禮十日之號十有二辰之號十有二月之號十有二歳之號二十有八星之號鄭𤣥注曰日謂從甲至癸辰謂從子至亥月謂從娵至荼歳謂從攝提格至赤奮若星謂從角至軫爾雅月陽月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在已曰則在庚曰窒在辛曰塞在壬曰終在癸曰極月名正月為娵二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為元十月為陽十一月為辜十二月為涂歳陽太歳在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰强圉在戊曰著雍在已曰屠維在庚曰上章在辛曰重光在壬曰𤣥黓在癸曰昭陽歳名太歳在寅曰攝提格在卯曰單閼在辰曰執徐在已曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若十干十二支十二律二十八舎蔡邕獨斷云干幹也其名有十甲乙丙丁戊己庚辛壬癸是也支枝也其名一十有二子丑寅卯辰巳午未申酉戌亥是也禮記月令春月其日甲乙夏月其日丙丁中央土其日戊巳秋月其日庚辛冬月其日壬癸史記律書曰七正二十八舍律歴天所以通五行八正之氣天所以成熟萬物也舎者日月所舎舎者舒氣也不周風居西北主殺生東壁居不周風東主辟生氣而東之至於營室營室者主營胎陽氣而産之東至於危危垝也言陽氣之危垝故曰危十月也律中應鐘應鐘者陽氣之應不用事也其於十二子為亥亥者該也言陽氣藏於下故該也廣莫風居北方廣莫者言陽氣在下隂莫陽廣大也故曰廣莫東至於虚虚者能實能虚言陽氣冬則宛藏於虚日冬至則一隂下藏一陽上舒故曰虚東至於須女言萬物變動其所隂陽氣未相離尚相如胥也故曰須女十一月也律中黄鐘黄鐘者陽氣踵黄泉而出也其於十二子為子子者滋也滋者言萬物滋於下也其於十母為壬癸壬之為言任也言陽氣任養萬物於下也癸之為言揆也言萬物可揆度故曰癸東至牽牛牽牛者言陽氣牽引萬物出之也牛者冒也言地雖凍能冒而生也牛者耕植種萬物也東至於建星建星者建諸生也十二月律中大吕大吕者其於十二子為丑丑者紐也言陽氣在上未降萬物厄紐未敢出條風居東北主出萬物條之言條治萬物而出之故曰條風南至於箕箕者言萬物根棋故曰箕正月也律中泰簇泰簇者言萬物簇生也故曰泰簇其於十二子為寅寅言萬物始生螾然也故曰寅南至於尾言萬物始生如尾也南至於心言萬物始生有華心也南至於房房者言萬物門户也至於門則出矣明庶風居東方明庶者明衆物盡出也二月也律中夾鐘夾鐘者言隂陽相夾厠也其於十二子為卯卯之為言茂也言萬物茂也其於十母為甲乙甲者言萬物剖符甲而出也乙者言萬物生軋軋也南至於氐氐者言萬物皆至也南至於亢亢者言萬物亢見也南至於角角者言萬物皆有枝格如角也三月也律中姑洗姑洗者言萬物洗生其於十二子為辰辰者言萬物之蜄也清明風居東南維主風吹萬物而西之軫軫者言萬物益大而軫軫然西至於翼翼者言萬物皆有羽翼也四月也律中仲吕仲吕者言萬物盡旅而西行也其於十二子為己巳者言陽氣之已盡也西至於七星七星者陽數成於七故曰七星西至於張張者言萬物皆張也西至於注注者言萬物之始衰陽氣下注故曰注五月也律中㽔賓㽔賓者言隂氣幼少故曰㽔痿陽不用事故曰賓景風居南方景者言陽氣道竟故曰景風其於十二子為午午者隂陽交故曰午其於十母為丙丁丙者言陽道著明故曰丙丁者言萬物之丁壯也故曰丁西至于弧弧者言萬物之吳落且就死也西至于狼狼者言萬物可度量斷萬物故曰狼涼風居西南維主地地者沈奪萬物氣也六月也律中林鐘林鐘者言萬物就死氣林林然其於十二子為未未者言萬物皆成有滋味也北至於罰罰者言萬物氣奪可伐也北至於參參言萬物可參也故曰參七月也律中夷則夷則言隂氣之賊萬物也其於十二子為申申者言隂用事申賊萬物故曰申北至於濁濁者觸也言萬物皆觸死也故曰濁北至於留留者言陽氣之稽留也故曰留八月也律中南吕南吕者言陽氣之旅入藏也其於十二子為酉酉者萬物之老也故曰酉閶闔風居西方閶者倡也闔者藏也言陽氣道萬物闔黄泉也其於十母為庚辛庚者言隂氣庚萬物故曰庚辛者言萬物之辛生故曰辛北至於胃胃者言陽氣就藏皆胃胃也北至於婁婁者呼萬物且内之也北至於奎奎者主毒螫殺萬物也奎而藏之九月也律中無射無射者隂氣盛用事陽氣無餘也故曰無射其於十二子為戌戌者言萬物盡滅故曰戌四序寅卯辰木己午未火申酉戌金亥子丑水右謂之令星即春夏秋冬五氣也六辰子寅辰午申戌為陽丑卯己未酉亥為隂右陽從陽隂從隂六陽辰四陽卦納之六隂辰四隂卦納之正月建寅泰卦月令孟春鄭注曰孟春者日月㑹於娵訾而斗建寅之辰也正月三陽之月泰三陽之卦故以配之二月建卯大壯卦月令仲春鄭注曰仲春者日月㑹於降婁而斗建卯之辰也二月四陽之月大壯四陽之卦故以配之三月建辰夬卦月令季春鄭注曰季春者日月㑹於大梁而斗建辰之辰也三月五陽之月夬五陽之卦故以配之四月建巳乾卦月令孟夏鄭注曰孟夏者日月㑹於實沈而斗建巳之辰也四月純陽之月乾純陽之卦故以配之五月建午姤卦月令仲夏鄭注曰仲夏者日月㑹於鶉首而斗建午之辰也夏至一隂始生姤一隂之卦故以配之六月建未遯卦月令季夏鄭注曰季夏者日月㑹於鶉火而斗建未之辰也六月二隂之月遯二隂之卦故以配之七月建申否卦月令孟秋鄭注曰孟秋者日月㑹於鶉尾而斗建申之辰也七月三隂之月否三隂之卦故以配之八月建酉觀卦月令仲秋鄭注曰仲秋者日月㑹於壽星而斗建酉之辰也八月四隂之月觀四隂之卦故以配之九月建戌剝卦月令季秋鄭注曰季秋者日月㑹於大火而斗建戌之辰也九月五隂之月剝五隂之卦故以配之十月建亥坤卦月令孟冬鄭注曰孟冬者日月㑹於析木而斗建亥之辰也十月純隂之月坤純隂之卦故以配之十一月建子復卦月令仲冬鄭注曰仲冬者日月㑹於星紀而斗建子之辰也冬至一陽始生復一陽之卦故以配之十二月建丑臨卦月令季冬鄭注曰季冬者日月㑹於𤣥枵而斗建丑之辰也十二月二陽之月臨二陽之卦故以配之考原曰按史記天官書曰用昏建者杓夜半建者衡平旦建者魁又春秋運斗極云第一天樞第二璇第三璣第四權第五衡第六開陽第七搖光第一至第四為魁第五至第七為杓合而為斗如正月初昏則用斗杓指寅夜半則用斗衡指寅平旦則用斗魁指寅也其日月所㑹之宫謂之月將娵訾亥也降婁戌也大梁酉也實沈申也鶉首未也鶉火午也鶉尾已也壽星辰也大火卯也析木寅也星紀丑也𤣥枵子也子曰神后丑曰大吉寅曰功曹卯曰太衝辰曰天罡已曰太乙午曰勝光未曰小吉申曰傳送酉曰從魁戌曰河魁亥曰登明月建運天道而左旋為天關月將稟地道而右轉為地軸蠡海集曰十二肖屬子為隂極幽潛隠晦以鼠配之鼠藏迹午為陽極顯易剛健以馬配之馬快行丑為隂俯而慈愛以牛配之牛䑛犢未為陽仰而秉禮以羊配之羊跪乳寅為三陽陽勝則暴以虎配之虎性暴申為三隂隂勝則黠以猴配之猴性黠卯酉為日月之門二肖皆一竅䑛雄毛則孕感而不交也雞合踏而無形交而不感也辰巳陽起而變化龍為盛蛇次之故龍蛇配辰巳龍蛇者變化之物也戌亥隂斂而持守狗為盛猪次之故狗猪配戌亥狗猪者鎮靜之物也或云皆取不全之物配肖屬者非也庶物萬類豈特十二哉况無義理不足信也明矣考原曰十二辰禽象子鼠丑牛寅虎卯辰龍巳蛇午馬未羊申猴酉雞戌狗亥猪其說相沿已久莫知其所自來雖於經典無見然以傳記子史考之則不獨宋以後也如韓愈毛穎傳謂食於卯地祭張員外文謂虎取而去來寅其徵則唐時有之矣管輅傳推東方朔龍蛇之占以為變化相推㑹於辰巳又譙周謂司馬為典午則漢晉時有之矣遡而上之陳敬仲筮者言當昌於姜姓之國而釋春秋謂觀之六四納得辛未辛為巽長女未為羊羊加女為姜則是周時又已有之也至於二十八宿禽象則近代方有之意者因十二辰所取而附㑹其說耳何則十二辰以子午卯酉為四中宫故一宫各筦三象子宫女虚危虚星居中故為鼠之本象女為蝠危為燕則取其似鼠者以配之也卯宫氐房心房星居中故為之本象氐為貉心為狐則取其似者以配之也午宫柳星張星居中故為馬之本象柳為獐張為鹿則取其似馬者以配之也酉宫胃昴畢昴星居中故為雞之本象胃為雉畢為烏則取其似雞者以配之也其餘寅申己亥辰戌丑未八宫則各筦兩象而以近中宫者為主辰宫亢近中宫故為龍之本象角居其旁則取蛟為龍之類以配之寅宫尾近中宫故為虎之本象箕居其旁則取豹為虎之類以配之丑宫牛近中宫故為牛之本象斗居其旁則取獬為牛之類以配之亥宫室近中宫故為猪之本象壁居其旁則取㺄為猪之類以配之戌宫婁近中宫故為狗之本象奎居其旁則取狼為狗之類以配之申宫觜近中宫故為猴之本象參居其旁則取猿為猴之類以配之未宫鬼近中宫故為羊之本象井居其旁則取犴為羊之類以配之已宫翼近中宫故為蛇之本象軫居其旁則取蚓為蛇之類以配之也二十八宿配日考原云日有六十宿有二十八四百二十日而一週四百二十者以六十與二十八俱可以度盡也故有七元之說一元甲子日起虚以子象鼠而虚為日鼠也二元甲子起奎三元甲子起畢四元甲子起鬼五元甲子起翼六元甲子起氐七元甲子起箕至七元盡而甲子又起虚周而復始但一元起於何年月日則不可得而考矣今按日月五星運行二十八舎遲速不齊躔次各别交錯參差遲留伏逆縱使推之歴始必有甲子年月日時日在虚月在危五星以次居室壁奎婁胃者然少選月即過其度矣且安得又從昴至鬼復順次而列之哉以不齊之天行按一定之星舎乃萬無之理也七政安得與二十八宿相配耶徧閱羣書莫可考究及見西域吉凶時日善惡宿曜經乃得其說葢彼國不知十干十二支之名而用二十八宿以紀日其七政加二十八宿猶干之加於支非謂七政之果躔于此宿也又其術以人之生日所逢何曜何宿為本命謂之命宿而以加於行事所逢曜宿參伍攷之以命凶吉又以宿曜性情合所為之事之剛柔健順以定從違亦有似於中國之建除星命家言者其宿曜之名虚昴星房屬日危畢張心屬月室觜翼尾屬火壁參軫箕屬水奎井角斗屬木婁鬼亢牛屬金胃柳氐女屬土則各從其國語假如日曜太陽在回鶻則曰蜜在波斯則曰曜森勿在天竺則曰阿你底耶重譯之即中國之日也其他皆倣此七元周而復始恰與此相符其書又謂中國西天諸國此法並所通行今按厯家每歳鋪注于六十甲子載在時憲書而無所用神煞中惟伏斷暗金二者從此起例其他並不關渉然外域既以此紀年則厯家存此可使絶域殊方同曉某日是何甲子甚為有益良不可廢也五行六經論五行者始見於尚書洪範曰一五行一曰水二曰火三曰木四曰金五曰土大禹謨曰水火金木土穀惟修其源起於河圖洛書之數葢圖書之一六水也二七火也三八木也四九金也五十土也在圖則左旋而相生在書則右轉而相克也然土於圖書為五十中宫之數無定位無專體者也惟吕氏春秋則以土直季夏之月以順相生之序白虎通又以土直辰戌丑未之四季而分旺於四時文王後天圖象坤艮二土獨居夏秋冬春之交則以火必得土而後能成金水必得土而後能生木也今按行也者言其行於地者也質行於地而氣通於天數之有五焉故曰五行也地者土也以其對天言之則曰地以其質言之固土也土之為四行君也固也君則不專其司不居其部是故以火之克金而秋乃承夏令也則謂既有四方必有中央而中央固土也可以嗣火之老而生金也以春秋冬夏之遞嬗四行轉多而土轉少也則謂季月必辰戌丑未而辰戌丑未固土也減十二日以與本令餘十八日為土王用事則各七十二日也坤艮二土居四氣之交為土之真體則後天圖象明之乾巽二方據魁罡之户示土之神用則素問運氣詳之土之君乎四行也審矣然此猶皆為有象可示者也若其無象可示者則寅申己亥子午卯酉實無一之離乎土焉何也非土則水火金木不能以行其能以行者皆土也神樞經曰五行旺各有時惟土居無所定乃於四立之前各旺一十八日歴例曰立春木立夏火立秋金立冬水各旺七十二日土於四立之前各旺一十八日合之亦為七十二日總三百有六十而歳成矣考原曰木長生於亥火長生於寅金長生於己水長生於申土亦長生於申寄生於寅各由長生沐浴冠帶臨官帝旺衰病死墓絶胎養順歴十二辰葢天道循環生生不已故木方旺而火已生火方旺而金已生金方旺而水已生水方旺而木已生由長生而順推穉則必壯盛則必衰終而復始迭運不窮此四時之所以錯行五氣之所以順布也至於土生於申而寄生於寅則後天坤艮之位故易於坤曰萬物皆致養焉於艮曰萬物之所成終而所成始也按五行長生之義考原之說甚明而土之生於寅申則引而未發由今考之水土之同生於申也申為坤坤為地水土所以凝也土之寄生於寅也寅為孟春孟春之月天氣下降地氣上騰天地所以和同草木所以萌動也是故洪範家獨以土生於申為五行之體隂陽選擇諸家皆以土生於寅為五行之用葢長生在寅則臨官在已乃為土旺金生與木火水同為一例然則以土為生於寅者所以順五行相生之序固與月令土旺於夏秋之交以順四時相生之序者同出於理之自然而非為臆說也外此又有陽死隂生陽順隂逆之說甲木死於午則乙木生焉丙戊死於酉則丁巳生焉庚金死於子則辛金生焉壬水死於卯則癸水生焉由長生而沐浴十二位皆逆轉陽死則隂生隂死則陽生此二氣之分也陽臨官則隂帝旺隂臨官則陽帝旺此四時之㑹也順逆分合俱極妙理論十干則分隂陽論五行則陽統隂尤天地自然之義故凡言數者皆祖之此吉凶神煞所由起也天干則甲乙屬木丙丁屬火戊己屬土庚辛屬金壬癸屬水地支則寅卯辰屬木配東方也己午未屬火配南方也申酉戌屬金配西方也亥子丑屬水配北方也而土寄旺於辰戌丑未之間配四季也五星家又以寅亥屬木卯戌屬火辰酉屬金子丑屬土而午則為日未則為月者則以子丑在下故為土午未在上故為日為月寅卯辰巳申酉戌亥分布左右則如四時之流行於天地之間故以其左右之合宫而别為木火金水之序也右皆考原所載今具録之其言五星五行則引而未發蓋天者日也月也星者日月之餘也午未者離子丑者坎離為日坎為月午之為日是己子之不為月者何月者水之精懸乎上而受日之光者非北方子之位也子丑之氣衝乎上而與日並其方固必在未也地者水也土也子水丑土丑又比水之土其為地之體無可疑也地土也故子丑為土也天位乎上地位乎下行乎兩間者必木火金水矣子丑為水土水土之際木必生焉所以亥寅為木一長生一禄位也木成而火已出矣寅火長生也卯木旺也旺則必嬗嬗則必歸其根故卯戌為火也卯戌為火則戌為黅天之氣戊之所居黅天之氣始於辰辰亦戊也土旺必生金故辰酉為金酉者金之帝也酉居金旺之極於其未至於極而水已生於申對宫為己巳金之母也水必以申巳者申巳逼於午未最髙之地無水也舉母則子歸水不得舎土而自立其麗於土者即子丑之位土之所攝命為土而不命為水若其離土而言水必納於母氣故申巳為水也水為生物之源是以麗乎日月其次則金其次則火其次則木其次則土五緯之序水最近日金次之火又次之木又次之土又次之此麗乎天者之自然之序也水土所生者木上生而為火土又上生而為金又上生而為水如畫卦之由下而上也此行乎地者之自然之序也然則五星五行具有實理而非人所能强為也申子辰合水局亥卯未合木局寅午戌合火局己酉丑合金局考原曰三合者取生旺墓三者以合局也水生於申旺於子墓於辰故申子辰合水局也木生於亥旺於卯墓於未故亥卯未合木局也火生於寅旺於午墓於戌故寅午戌合火局也金生於巳旺於酉墓於丑故己酉丑合金局也今按淮南子云木生於亥壯於卯死於未三辰皆木也火生於寅壯於午死於戌三辰皆火也土生於午壯於戌死於寅三辰皆土也金生於己旺於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也故五勝生一壯五終九五九四十五故神四十五日而一徙以三應五故八徙而歳終由今考之隂陽家言三合者唯水火木金而已不及於土也然言隂陽之書淮南子亦可為古矣所為三合之說未必不始於是書而土之三合則不傳於世者何歟且世所言土之長生等十二位與火無異而淮南子則謂生午壯戌死寅亦他書所無有也今附載於此以備一義子與丑合寅與亥合卯與戌合辰與酉合巳與申合午與未合蠡海集曰隂陽家地支六合者日月㑹於子則斗建丑日月㑹於丑則斗建子故子與丑合日月㑹於寅則斗建亥日月㑹於亥則斗建寅故寅與亥合日月㑹於卯則斗建戌日月㑹於戌則斗建卯故卯與戌合日月㑹於辰則斗建酉日月㑹於酉則斗建辰故辰與酉合日月㑹於己則斗建申日月㑹於申則斗建巳故巳與申合日月㑹於午則斗建未日月㑹於未則斗建午故午與未合考原曰六合者以月建與月將為相合也如正月建寅月將在亥故寅與亥合二月建卯月將在戌故卯與戌合也月建左旋月將右轉順逆相值故為六合按月將即是日月無光受日之光月行與日合而成歳紀則是日者月之將也故曰月將非别有神從日而右轉者也其躔次亥曰娵訾戌曰降婁酉曰大梁申曰實沈未曰鶉首午曰鶉火巳曰鶉尾辰曰壽星卯曰大火寅曰析木丑曰星紀子曰𤣥枵春秋左氏傳已有其說至今用之其躔度過宫具載公規甲己日起甲子時乙庚日起丙子時丙辛日起戊子時丁壬日起庚子時戊癸日起壬子時考原曰甲子日起甲子時從甲子順數至次日子時得丙子故乙日起丙子從甲至巳越五日共六十時花甲周而復始故己日子時亦為甲子也甲己年正月起丙寅乙庚年正月起戊寅丙辛年正月起庚寅丁壬年正月起壬寅戊癸年正月起甲寅考原曰上古歴元年月日時皆起於甲子是甲子年必甲子月為年前冬至十一月也而正月建寅故得丙寅二月丁卯以次順數至次年正月得戊寅故乙年正月起戊寅從甲至巳越五年共六十月花甲周而復始故已年正月亦為丙寅也甲與己合乙與庚合丙與辛合丁與壬合戊與癸合甲己化土乙庚化金丙辛化水丁壬化木戊癸化火考原曰五合者即五位相得而各有合也河圖一與六二與七三與八四與九五與十皆各有合以十干之次言之一為甲六為己故甲與己合二為乙七為庚故乙與庚合三為丙八為辛故丙與辛合四為丁九為壬故丁與壬合五為戊十為癸故戊與癸合又年起月日起時越五則花甲周而復始而月時同干亦即五合之義按化氣之理沈括據黄帝素問論之最明素問有五運六氣所謂五運者甲己為土運乙庚為金運丙辛為水運丁壬為木運戊癸為火運也黄帝問岐伯五運之所始岐伯引太始天元冊文曰始于戊巳之分所謂戊巳分者奎壁角軫也奎壁角軫天地之門户也王冰注引遁甲六戊為天門六已為地户天門在戌亥之間奎壁之分地户在辰巳之間角軫之分隂陽皆始于辰五運起于角軫者亦始于辰也甲巳之歳戊巳黅天之氣經于角軫角屬辰軫屬己其歳得戊辰己巳干皆土故為土運乙庚之歳庚辛素天之氣經于角軫其歳得庚辰辛巳干皆金故為金運丙辛之歳壬癸元天之氣經于角軫其歳得壬辰癸巳干皆水故為水運丁壬之歳甲乙蒼天之氣經于角軫其歳得甲辰乙巳干皆木故為木運戊癸之歳丙丁丹天之氣經于角軫其歳得丙辰丁巳干皆火故為火運運臨角軫則氣在奎壁氣與運常司天地之門户戊巳在角軫則甲乙在奎壁甲己歳必甲戌乙亥也故素問曰土位之下風氣承之庚辛在角軫則丙丁在奎壁乙庚歳必丙戌丁亥也故曰金位之下火氣承之壬癸在角軫則戊巳在奎壁丙辛歳必戊戌己亥也故曰水位之下土氣承之甲乙在角軫則庚辛在奎壁丁壬歳必庚戌辛亥也故曰風位之下金氣承之丙丁在角軫則壬癸在奎壁戊癸歳必壬戌癸亥也故曰相火之下水氣承之五行家以戊寄於己巳寄於午六壬家以戊寄於己巳寄於未惟素問以戊寄於戌巳寄於辰遁甲以六戊為天門六己為地户與素問同水土相隨水金子也陽土故居金行之末以為亥始水木母也已金祖也隂土故居水行之墓以為巳始故曰天地之門户而萬物所從出星家有逢龍則化之說亦本於此此十干化氣之源也納音沈括曰六十甲子有納音鮮原其意蓋六十律旋相為宫法也一律含五音十二律納六十音也凡氣始於東方而右行音起於西方而左行隂陽相錯而生變化所謂氣始於東方者四時始於木右行傳於火火傳於土土傳於金金傳於水所謂音始於西方者五音始於金左旋傳于火火傳于木木傳于水水傳於土納音與易納甲同法乾納甲而坤納癸始于乾而終于坤納音始于金金乾也終于土土坤也納音之法同類娶妻隔八生子此律吕相生之法也五行先仲而後孟孟而後季此遁甲三元之紀也甲子金之仲黄鐘之商同位娶乙丑大吕之商同位謂甲與乙丙與丁之類下皆倣此隔八下生壬申金之孟夷則之商隔八謂大吕下生夷則也下皆倣此壬申同位娶癸酉南吕之商隔八上生庚辰金之季姑洗之商此金三元終若只以陽辰言之則依遁甲順傳仲孟季若兼妻言之則逆傳孟仲季也庚辰同位娶辛巳仲吕之商隔八下生戊子火之仲黄鐘之徵金三元終則左行傳南方火也戊子娶己丑大吕之徵生丙申火之孟夷則之徵丙申娶丁酉南吕之徵生甲辰火之季姑洗之徵甲辰娶乙巳仲吕之徵生壬子木之仲黄鐘之角火三元終則左行傳于東方木如是左行至於丁巳仲吕之宫五音一終復自甲午金之仲娶乙未隔八生壬寅一如甲子之法終於癸亥謂㽔賓娶林鐘上生太簇之類子至於巳為陽故自黄鐘至於仲吕皆下生自午至於亥為隂故自林鐘至於應鐘皆上生蠡海集曰萬物之所為以生者必由氣氣者何金也金受氣順行則為五行之體逆行則為五行之用順行為五行之體者金生水水生木木生火火生土冬至起歴之元自冬而春春而夏夏而長夏長夏而歸於秋返本歸原而收斂也逆行為五行之用者金出鑛而從革於火以成材成材則為有生之用然火非木不生必循木以繼之木必依水以滋榮水必托土以止畜故木而水水而土是則四行之類土以定位故大撓作甲子分配五行為納音蓋金能受聲而宣氣故也法曰甲娶乙妻隔八生子子生孫而後行繼代其位初一曰金金為氣居先甲子為受氣之始甲娶乙妻隔八壬申是為子矣壬娶癸妻隔八庚辰是為孫矣庚娶辛妻隔八戊子火代其位次二曰火戊繼其後戊娶己妻隔八丙申是為子矣丙娶丁妻隔八甲辰是為孫矣甲娶乙妻隔八壬子木代其位次三曰木壬繼其後壬娶癸妻隔八庚申是為子矣庚娶辛妻隔八戊辰是為孫矣戊娶己妻隔八丙子水代其位次四曰水丙繼其後丙娶丁妻隔八甲申是為子矣甲娶乙妻隔八壬辰是為孫矣壬娶癸妻隔八庚子土代其位次五曰土庚娶辛妻隔八戊申是為子矣戊娶己妻隔八丙辰是為孫矣丙娶丁妻隔八甲子金復代其位甲午乙未起如前法是故有五子歸庚之說道家者流取其義用配五方之位自子干頭數至庚字則為其數甲子金自甲數至七逢庚則西方金得七氣戊子火自戊數至三逢庚則南方火得三氣壬子木自壬數至九逢庚則東方木得九氣丙子水自丙數至五逢庚則北方水得五氣庚子土則自得一為中方一氣是為五子歸庚也乃知金者受氣之先順行則為五行之體逆行則為五行之用故六十甲子納音者以充萬物之用考原曰五行以氣始形終為次則洪範之水火木金土是也以播於四時相生為次則月令之木火土金水是也以飭庀五材相尅為次則禹謨之水火金木土是也納音五行始金次火次木次水次土既非本其始終又無取於生尅故說者莫知其所自來詳考其義蓋亦祖述易象之意即先後天卦之理也各為圖以明之先天之圖乾兌居首屬金次以離屬火又次震巽屬木又次以坎屬水終於艮坤屬土故始於金終於土者乾始坤成之義也金取於天之剛土取於地之柔火附於天水附於地而木以生氣居中此納音所本於先天之序也後天之圖亦以乾居首而逆轉自乾兌之金旺於西方次轉而為離火旺於南方次又轉而為震巽之木旺於東方次又轉而為坎水旺於北方而土旺於四季故退艮坤以居終焉此納音所本於後天之序也右圖以甲子乙丑為金上元壬申癸酉為金中元庚辰辛巳為金下元三元俱周則傳於戊子己丑為火上元丙申丁酉為火中元甲辰乙巳為火下元自此以後皆依前圖金火木水土之次而用樂律同位娶妻隔八生子之法以終於丁巳而納音小成矣又自甲午乙未為金上元起如前法以終於丁亥而納音大成矣按十干十二支相錯為六十五音十二律相乗亦為六十甲子金而乙丑亦為金者同位娶妻也乙丑金而壬申又為金者隔八生子也一行各三元而後傳於次行猶春有孟仲季三月而後傳於夏也自甲子至丁巳而五行之三元一周猶易之三畫為小成也自甲午至丁亥而五行之三元又一周猶易之六畫為大成也其立法皆與律吕相應納音干支起數合五行甲巳子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五己亥屬四數蠡海集云或問曰先天之數何縁而起余答曰數極於九自九逆退取之故甲己子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五天干己盡而地支獨遺己亥是以己亥得四終焉况夫亥為天門己為地户純陽之位為開闔之樞所以關鍵五行也瑞桂堂暇録曰六十甲子之納音以金木水火土之音而明之也一六為水二七為火三八為木四九為金五十為土然五行之中惟金木有自然之音水火土必相假而後成音蓋水假土火假水土假火故金音四九木音三八水音五十火音一六土音二七此不易之論也何以言之甲巳子午九也乙庚丑未八也丙辛寅申七也丁壬卯酉六也戊癸辰戌五也己亥四也甲子乙丑其數三十有四四者金之音也故曰金戊辰己巳其數二十有三三者木之音也故曰木庚午辛未其數三十有二二者火也土以火為音故曰土甲申乙酉其數三十十者土也水以土為音故曰水戊子己丑其數三十有一一者水也火以水為音故曰火凡六十甲子莫不皆然此納音之所由起也考原曰此揚子雲太𤣥論聲律所紀數也凡兩干兩支之合其餘數得四九者為金得一六者為火得三八者為木得五十者為水得二七者為土如甲子皆九得數十八乙丑皆八得數十六合之三十有四故為金壬六申七得數十三癸五酉六得數十一合之二十有四故亦為金也其餘按數推之莫不皆然但所配一六二七等數與河圖之數不同今按大衍之數五十其用四十有九以兩干兩支之合數於四十九内減之餘數滿十去之餘一六為水二七為火三八為木四九為金五十為土各取所生之五行以為納音如是則與河圖相同又揲蓍之法用餘策以定奇偶此用餘數以定五行其理正相合也如甲九子九乙八丑八其合數三十四於四十九内減之餘十五十不用餘五屬土土生金故曰金丙寅丁卯共合數二十六於四十九内減之餘二十三十不用餘三屬木木生火故曰火戊辰己巳共合數二十三於四十九内減之餘二十六十不用餘六屬水水生木故曰木庚午辛未共合數三十二於四十九内減之餘十七十不用餘七屬火火生土故曰土餘倣此按揚雄太𤣥經曰子午之數九丑未八寅申七卯酉六辰戌五己亥四故律四十二吕三十六并律吕之數或還或否凡七十有八黄鐘之數立焉其以為度也皆生黄鐘又曰甲已之數九乙庚八丙辛七丁壬六戊癸五聲生於日律生於辰聲以情質律以和聲聲律相協而八音生歴代以來宗之謂之先天之數顧其甲巳子午之何以九乙庚丑未之何以八則罕有確論焉今按子午者乾震之所納也丑未者坤巽之所納也寅申者坎所納也卯酉者離所納也辰戌者艮所納也己亥者兌所納也陽數極於九隂數極於八故乾坤得之震巽長而統於父母其餘以次而降兩大六子男女長少之序秩然不紊實非人之能强為也若夫十日之序則又各隨化氣壽夭之數而亦無一毫造作於其間甲已土也土終古不毁即析為微塵蕩為鄰虚而其質固在也為最壽故數九其次則金雖火鑠之亦有質灰氣散之時而堅固為萬物王也乙庚金也故次甲己也又次則水日炙風銷而火煎烹之亦有乾盡之時而無自然銷滅之期雖其堅固不若金而其柔弱轉能久壽而物莫若也丙辛水也故次乙庚也又次則木一歳之中榮落有定期也丁壬木也故次丙辛也又次則火一晝夜間顯晦有定期也戊癸火也故次丁壬也且甲己土生乙庚金乙庚金生丙辛水丙辛水生丁壬木丁壬木生戊癸火層累而下之又自然而然之數也然則無十無一二三何也曰數終於九十即一也若夫一二三乃天地人之大數不得偏寄於一日一辰之間者也且言九八七六五四則一二三在其中也故黄鐘八十一十二辰止得七十八而揚子曰黄鐘之數立焉蓋已虚函三數而成八十一也五行五音宫屬土生金甲子乙丑甲午乙未壬申癸酉壬寅癸卯庚辰辛巳庚戌辛亥商屬金生水丙子丁丑丙午丁未甲申乙酉甲寅乙卯壬辰癸巳壬戌癸亥角屬木生火戊子己丑戊午己未丙申丁酉丙寅丁卯甲辰乙巳甲戌乙亥徵屬火生土庚子辛丑庚午辛未戊申己酉戊寅己卯丙辰丁巳丙戌丁亥羽屬水生木壬子癸丑壬午癸未庚申辛酉庚寅辛卯戊辰己巳戊戌己亥朱子曰樂聲是土金木火水洪範是水火木金土蓋納音者以干支分配於五音而本音所生之五行即為其干支所納之音也初一宫商角徵羽納甲丙戊庚壬係以五子而隨以五丑宫得甲子商得丙子角得戊子徵得庚子羽得壬子宫為土土生金故甲子乙丑納音金商為金金生水故丙子丁丑納音水角為木木生火故戊子己丑納音火徵為火火生土故庚子辛丑納音土羽為水水生木故壬子癸丑納音木次二商角徵羽宫納甲丙戊庚壬係以五寅而隨以五卯商金得甲寅乙卯納音水角木得丙寅丁卯納音火徵火得戊寅己卯納音土羽水得庚寅辛卯納音木宫土得壬寅癸卯納音金次三角徵羽宫商納甲丙戊庚壬係以五辰而隨以五巳角木得甲辰乙巳納音火徵火得丙辰丁巳納音土羽水得戊辰己巳納音木宫土得庚辰辛巳納音金商金得壬辰癸巳納音水以上六甲得其半納音小成次四復以宫商角徵羽納甲丙戊庚壬係以五午而隨以五未宫土得甲午乙未納音金商金得丙午丁未納音水角木得戊午己未納音火徵火得庚午辛未納音土羽水得壬午癸未納音木次五復以商角徵羽宫納甲丙戊庚壬係以五申而隨以五酉商金得甲申乙酉納音水角木得丙申丁酉納音火徵火得戊申己酉納音土羽水得庚申辛酉納音木宫土得壬申癸酉納音金次六復以角徵羽宫商納甲丙戊庚壬係以五戌而隨以五亥角木得甲戌乙亥納音火徵火得丙戌丁亥納音土羽水得戊戌己亥納音木宫土得庚戌辛亥納音金商金得壬戌癸亥納音水於是六甲全而納音大成矣陽生於子自甲子以至癸巳隂生於午自甲午以至癸亥故三十而復從宫起宫君商臣角民皆人道也故皆可以為首徵事羽物皆人所用也故不可以為首是以三甲終而復始於宫干為天支為地音為人三才之五行備矣陶宗儀曰甲子乙丑海中金者子屬水又為湖又為水旺之地兼金死於子墓於丑水旺而金死墓故曰海中金也丙寅丁卯鑪中火者寅為三陽卯為四陽火既得地又得寅卯之木以生之此時天地開鑪萬物始生故曰鑪中火也戊辰己巳大林木者辰為原野已為六陽木至六陽則枝榮葉茂以茂盛之木而在原野之間故曰大林木也庚午辛未路傍土者未中之木而生午位之旺火火旺則土焦未能育物猶路傍土若也故曰路傍土也壬申癸酉劍鋒金者申酉金之正位兼臨官申帝旺酉金既生旺則成剛矣剛則無踰於劍鋒故曰劍鋒金也甲戌乙亥山頭火者戌亥為天門火照天門其光至髙故曰山頭火也丙子丁丑澗下水者水旺於子衰於丑旺而反衰則不能為江河故曰澗下水也戊寅己卯城頭土者天干戊巳屬土寅為艮山土積而為山故曰城頭土也庚辰辛巳白鑞金者金養於辰生於巳形質初成未能堅利故曰白鑞金也壬午癸未楊柳木者木死於午墓於未木既死墓雖得天干壬癸之水以生之終是柔弱故曰楊柳木也甲申乙酉井泉水者金臨官申帝旺酉金既生旺則水由以生然方生之際力量未洪故曰井泉水也丙戌丁亥屋上土者丙丁屬火戌亥為天門火既炎上則土非在下而生故曰屋上土也戊子己丑霹靂火者丑屬土子屬水水居正位而納音乃火水中之火非神龍則無故曰霹靂火也庚寅辛卯松栢木者木臨官寅帝旺卯木既生旺則非柔弱之比故曰松栢木也壬辰癸巳長流水者辰為水庫巳為金長生之地金生則水性已存以庫水而逢生金則泉源終不竭故曰長流水也甲午乙未砂石金者午為火旺之地火旺則金敗未為火衰之地火衰則金冠帶敗而方冠帶未能盛滿故曰砂石金也丙申丁酉山下火者申為地户酉為日入之門日至此時而藏光故曰山下火也戊戌己亥平地木者戌為原野亥為木生之地夫木生於原野則非一根一株之比故曰平地木也庚子辛丑壁上土者丑雖土家正位而子則水旺之地土見水多則為泥也故曰壁上土也壬寅癸卯金箔金者寅卯為木旺之地木旺則金羸又金絶於寅胎於卯金既無力故曰金箔金也甲辰乙巳覆燈火者辰為食時已為禺中日之將中豔陽之勢光於天下故曰覆燈火也丙午丁未天河水者丙丁屬火午為火旺之地而納音乃水水自火出非銀漢不能有也故曰天河水也戊申己酉大驛土者申為坤坤為地酉為兌兌為澤戊巳之土加於坤澤之上非其他浮薄之土也故曰大驛土也庚戌辛亥釵釧金者金至戌而衰至亥而病金既衰病則誠柔矣故曰釵釧金也壬子癸丑桑柘木者子屬水丑屬金水方生木金則伐之猶桑柘木也甲寅乙卯大溪水者寅為東北維卯為正東水流正東則其性順而川澗池沼俱合而歸故曰大溪水也丙辰丁巳沙中土者土庫辰絶已而天干丙丁之火至辰冠帶已臨官土既庫絶旺火復與生之故曰沙中土也戊午己未天上火者午為火旺之地未中之木又復生之火性炎上又逢生地故曰天上火也庚申辛酉石榴木者申為七月酉為八月此時木則絶矣惟石榴之木反結實故曰石榴木也壬戌癸亥大海水者水冠帶戌臨官亥水臨官冠帶則力厚矣兼亥為江非他水之比故曰大海水也納甲蠡海集云納甲之說自甲為一至壬為九陽數之始終也故歸乾易順數也乙為二至癸為十隂數之始終也故歸坤易逆數也乾一索而得男為震坤一索而得女為巽故庚入震辛入巽乾再索而得男為坎坤再索而得女為離故戊趨坎巳趨離乾三索而得男為艮坤三索而得女為兌故丙從艮丁從兌陽生於北而成於南故乾始甲子而終以壬午隂生於南而成於北故坤始乙未而終以癸丑震巽一索也故庚辛始於子丑坎離再索也故戊巳始於寅卯艮兌三索也故丙丁始於辰巳也又一說乾坤者二氣之正位也坎離者二氣之交互也正位則始終全備故甲壬歸乾乙癸歸坤交互則往來處中故戊歸坎已歸離震巽乃受氣之始故庚辛歸焉艮兌乃生化之終故丙丁歸焉乾坤位隂陽之極故子午丑未配於甲壬乙癸父母總攝内外之義震巽長男長女為初索是以子丑配庚辛坎離中男中女為再索是以寅卯配戊巳艮兌少男少女為三索是以辰巳配丙丁納之為言受也容受六甲於八卦中也易者逆也數皆以逆而推之考原曰乾納甲壬坤納乙癸乾坤包括始終之義也其餘六卦則自下而上法畫卦者之自下而上也震巽隂陽起於下故震納庚巽納辛坎離隂陽交於中故坎納戊離納己艮兌隂陽極於上故艮納丙兌納丁甲丙戊庚壬為陽干皆納陽卦乙丁巳辛癸為隂干皆納隂卦考原曰此以六卦應月候而坎離為日月之本體居中不用震直生明者一陽始生又生明之時以初昏候之月見庚方也兌直上弦者二陽浸盛又上弦之時以初昏候之月見丁方也乾直望者三陽盛滿又望時以初昏候之月見甲方也巽直生魄則一隂始生又生魄之時以平明候之月見辛方也艮直下弦則二隂浸盛又下弦之時以平明候之月見丙方也坤直晦則三隂盛滿又晦時以平明候之月見乙方也皆與納甲相應考原曰此以八卦之六畫分納六辰之法也凡乾在内卦則為甲而納子寅辰如初九為甲子九二為甲寅九三為甲辰也在外卦則為壬而納午申戌如九四為壬午九五為壬申上九為壬戌也凡坤在内卦則為乙而納未己卯如初六為乙未六二為乙巳六三為乙卯也在外卦則為癸而納丑亥酉如六四為癸丑六五為癸亥上六為癸酉也因乾坤各納兩干故别為内外二卦若震止納庚則初九為庚子六二為庚寅六三為庚辰九四為庚午六五為庚申上六為庚戌巽止納辛則初六為辛丑九二為辛亥九三為辛酉六四為辛未九五為辛巳上九為辛卯坎離艮兌四卦依震巽例推之又曰納甲之法不知其所自起其以六卦直月候明魄死生隂陽消息與先天圖有相似如魏伯陽參同契中所陳即其說也參同契曰三日出為爽震庚受西方八日兌受丁上弦平如繩十五乾體就盛滿甲東方七八道已訖屈折低下降十六轉就統巽辛見平明艮直于丙南下弦二十三坤乙三十日東北喪其朋節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終朱子以為即先天之傳孔子之後諸儒失之而方外之流密相付授以為丹竈之術耳今按先天之圖八卦俱備而納甲除去坎離以為二用則其法亦不盡合或曰說卦言天地定位山澤通氣雷風相薄乃以三陽三隂至一陽一隂為序而其後方言水火不相射蓋以六卦寓消息而以水火為用或者古有此說也至其參錯六辰之法則陽皆順行隂皆逆轉隂陽之老長中少每差一位惟震與乾同者長子繼父體也坤不起於丑而起於未尤與洛書耦數起未位後天圖坤居西南樂律林鐘為地統而應未月之氣者相合故諸術之中惟納甲為近理今火珠林卜卦即其法也欽定協紀辨方書卷一
