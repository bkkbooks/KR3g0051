body:
  text: 用事選擇用事宜忌備矣然鋪注萬年書則以事為經以神為緯選擇吉日時則以神為目以事為綱蓋鋪注以事序而選擇由事起也大清會典載萬年書御用六十七事民用三十七事通書載選擇六十事今以次合為一編而分列宜忌於事下依事之次第察其所宜忌之日而分注之則輕重去取可辨矣作用事御用六十七事祭祀祈福求嗣上册進表章頒詔覃恩肆赦施恩封拜詔命公卿招賢舉正直施恩惠恤孤惸宣政事布政事行惠愛雪寃枉緩刑獄慶賜賞賀宴會入學冠帶行幸遣使安撫邊境選將訓兵出師上官赴任臨政親民結婚姻納采問名嫁娶進人口般移安牀解除沐浴整容剃頭整手足甲求醫療病裁製營建宮室修宮室繕城郭築隄防興造動土豎柱上梁經絡開市立券交易納財修置産室開渠穿井安碓磑補垣掃舍宇修飾垣墻平治道塗伐木捕捉畋獵取魚栽種牧養納畜民用三十七事祭祀上表章上官入學冠帶結婚姻會親友嫁娶進人口出行移徙安牀沐浴剃頭療病裁衣修造動土豎柱上梁經絡開市立券交易納財修置産室開渠穿井安碓磑掃舍宇平治道塗破屋壞垣伐木捕捉畋獵栽種牧養破土安葬啓攢通書選擇六十事祭祀祈福求嗣上册受封上表章襲爵受封會親友入學冠帶出行上官赴任臨政親民結婚姻納采問名嫁娶進人口移徙遠回安牀解除沐浴剃頭整手足甲求醫療病療目針刺裁衣築隄防修造動土豎柱上梁修倉庫鼓鑄苫蓋經絡醞釀開市立券交易納財開倉庫出貨財修置産室開渠穿井安碓磑補垣塞穴掃舍宇修飾垣墻平治道塗破屋壞垣伐木捕捉畋獵取魚乘船渡水栽種牧養納畜破土安葬啓攢祭祀宜天德月德天德合月德合天赦天願月恩四相時德天巫開日普護福生聖心益後續世忌天狗寅日祈福宜天德月德天德合月德合天赦天願月恩四相時德天巫開日普護福生聖心益後續世忌月建月破平日收日劫煞災煞月煞月刑月害月厭大時遊禍天吏四廢又忌祿空上朔等日見鋪注條例餘倣此求嗣宜天德月德天德合月德合天赦天願月恩四相時德開日益後續世忌月建月破平日收日劫煞災煞月煞月刑月害月厭大時遊禍天吏四廢上册進表章上册受封同宜天德月德天德合月德合天赦天願臨日福德開日忌月建月破平日收日閉日劫煞災煞月煞月刑月害月厭大時天吏四廢往亡上表章宜天德月德天德合月德合月空天赦天願臨日福德開日解神忌月建月破平日收日閉日劫煞災煞月煞月刑月害月厭大時天吏四廢往亡頒詔宜天德月德天德合月德合天赦天願王日開日又天恩與驛馬天馬建日併者忌月破平日收日閉日劫煞災煞月煞月刑月厭四廢往亡覃恩肆赦宜天德月德天德合月德合天恩天赦天願王日開日忌無施恩封拜襲爵受封同宜天德月德天德合月德合天赦天願月恩四相時德王日建日吉期天喜開日官日守日相日止宜襲爵受封忌月破平日收日滿日閉日劫煞災煞月煞月刑月厭大時天吏四廢詔命公卿招賢宜天德月德天德合月德合天赦天願王日建日開日又月恩四相時德吉期天喜與驛馬天馬併者忌月破平日收日滿日閉日劫煞災煞月煞月刑月厭大時天吏四廢往亡舉正直宜天德月德天德合月德合天赦天願月恩四相時德王日建日吉期天喜開日忌月破平日收日滿日閉日劫煞災煞月煞月刑月厭大時天吏四廢施恩惠恤孤惸宜天德月德天德合月德合天恩天赦天願陽德隂德王日開日忌無宣政事宜天德月德天德合月德合天赦天願王日開日又天恩與驛馬天馬建日併者忌月破平日收日閉日劫煞災煞月煞月刑月厭四廢往亡布政事宜天恩忌月破平日收日閉日劫煞災煞月煞月刑月厭四廢行惠愛雪寃枉緩刑獄宜天德月德天德合月德合天恩天赦天願陽德隂德王日開日忌無慶賜賞賀宜天德月德天德合月德合天恩天赦天願月恩四相時德王日三合福德天喜開日忌月破平日收日閉日劫煞災煞月煞月刑月害月厭四廢五離宴會會親友同宜天德月德天德合月德合天恩天赦天願月恩四相時德王日民日三合福德天喜開日六合五合忌月破平日收日閉日劫煞災煞月煞月刑月害月厭四廢五離酉日入學宜成日開日忌無冠帶宜定日忌月破平日收日劫煞災煞月煞月刑月厭大時天吏四廢五墓丑日行幸遣使出行同宜天德月德天德合月德合天赦天願月恩四相時德王日驛馬天馬建日吉期天喜開日忌月破平日收日閉日劫煞災煞月煞月刑月厭大時天吏天賊四廢五墓往亡巳日安撫邊境宜天德月德天德合月德合天赦天願王日守日兵福兵寶兵吉危日成日忌月破平日死神收日劫煞災煞月煞月刑月害月厭大時天吏死氣四擊四耗四廢四忌四窮五墓兵禁大煞往亡八專專日伐日選將訓兵宜天德月德天德合月德合天赦天願王日兵福兵寶兵吉危日忌月破平日死神收日劫煞災煞月煞月刑月害月厭大時天吏死氣四擊四耗四廢四忌四窮五墓兵禁大煞往亡八專專日伐日出師宜天德月德天德合月德合兵福兵寶兵吉忌月破平日死神收日閉日劫煞災煞月煞月刑月害月厭大時天吏死氣四擊四耗四廢四忌四窮五墓兵禁大煞往亡八專專日伐日上官赴任宜天德月德天德合月德合天赦天願月恩四相時德王日官日守日相日臨日建日吉期天喜開日忌月破平日收日滿日閉日劫煞災煞月煞月刑月厭大時天吏四廢五墓往亡臨政親民宜天德月德天德合月德合天赦天願月恩四相時德王日官日守日相日臨日建日吉期天喜開日六儀忌月破平日收日滿日閉日劫煞災煞月煞月刑月厭大時天吏四廢五墓往亡結婚姻宜天德月德天德合月德合天赦天願月恩四相