body:
  text: 公規二更漏中星星圖步天歌星鳥星火肇於虞書昏中旦中詳於月令中星之來尚矣周禮司寤氏掌夜時以星分夜漢儀晝漏盡夜漏起省中黃門持五夜又名五更此更漏中星所由昉也然古今更點之制亦微有不同元授時之法於日入後日出前減去晨昏分各二刻半餘為夜時分為五更每更又分為五點於初更三點時起更五更三點時攢點今臺官相傳之法則於日入後八刻起更日出前九刻攢點計起更至攢點共若干時刻五分之以為五更日出前減朦影刻分為旦刻日入後加朦影刻分為昏刻如第一圖舉春秋分為例外大圜地平經圈也內半圜地平下赤道也中直線子午圈也二橫線上為地平緯圈下則朦影限地平距等圈也與赤道交於昏旦自天頂至昏旦作經圈其地平下為十八度與大圈朦影限度等自北極至昏旦作經圈其所截昏旦距日出入之度即朦影刻分也日入至日出計四十八刻減一更距日入後八刻攢點距日出前九刻餘三十一刻以五分之得六刻三分自一更遞加之即得各更時刻也如以度數而論日入後八刻起更在赤道為三十度日出前九刻攢點在赤道為三十三度四十五分於地平下赤道半周一百八十度內減之餘一百一十六度一十五分以五分之得二十三度一十五分為每更相距赤道度每一度當時之四分亦得六刻三分為每更相距時刻也第二圖外層三百六十度地平經度也次內十二時九十六刻地平刻分也時刻之在赤道其度常均而在地平則闊狹不等其法為半徑與時刻距午赤道度切線之比同於北極出地之正弦與日影距午地平經度切線之比故子午卯酉四正之位不移而子午前後則狹卯酉前後則闊也次內圓者為節氣線曲者為節氣時刻線蓋日出入昏旦更點時刻各節不同自中心對各時刻於各節圈上作點識之聯之必成曲線也最內一層為地平二十四方位以明此圖即晷表之理日在南則影在北日在東則影在西也夜無日影以晝例夜也今依其法推得京師各節氣昏旦更點時刻中星著於篇星圖步天歌并附於後春分戌宮初度昏刻戌初二刻五分北河三偏西一度二十分一更戌正初刻鬼宿一偏東四度十四分二更亥初二刻三分張宿一偏東一度三十分三更子初初刻六分翼宿一偏西四度三十八分四更子正二刻九分角宿一偏東八度十分五更丑正初刻十二分大角偏西一度五十七分攢點寅初三刻房宿一偏西二十一分旦刻寅正一刻十分尾宿一偏東一度二十五分戌宮五度昏刻戌初二刻十三分鬼宿一偏東三度五十四分一更戌正初刻七分柳宿一偏西十九分二更亥初二刻七分軒轅十四偏西十分三更子初初刻七分五帝座偏東二度三十八分四更子正二刻八分角宿一偏東三度五十分五更丑正初刻八分氐宿一偏東二度三十七分攢點寅初二刻八分心宿一偏東二度十六分旦刻寅正一刻二分尾宿一偏西一度十分戌宮十度昏刻戌初三刻五分柳宿一偏西四十分一更戌正初刻十三分星宿一偏東六度二十分二更亥初二刻十一分軒轅十四偏西五度四十六分三更子初初刻九分五帝座偏西二度二十八分四更子正二刻六分角宿一偏西十六分五更丑正初刻四分氐宿一偏西五十九分攢點寅初三刻二分心宿一偏西五十分旦刻寅正初刻十分尾宿一偏西四度一分清明戌宮十五度昏刻戌初三刻十三分星宿一偏東五度二十八分一更戌正一刻五分星宿一偏西二分二更亥初三刻翼宿一偏東一度四十九分三更子初初刻十分軫宿一偏西三十六分四更子正二刻五分角宿一偏西四度三十八分五更丑正初刻氐宿四偏東二度攢點寅初一刻十分尾宿一偏東二度三十七分旦刻寅正初刻二分帝座偏東二度十二分戌宮二十度昏刻戌正初刻六分星宿一偏西一度十一分一更戌正一刻十一分張宿一偏西十二分二更亥初三刻四分翼宿一偏西三度五十分三更子初初刻十一分軫宿一偏西五度三十分四更子正二刻四分亢宿一偏東二度四十八分五更丑初三刻十一分氐宿四偏西一度三十九分攢點寅初一刻四分尾宿一偏西三十二分旦刻寅初三刻九分帝座偏西二十七分戌宮二十五度昏刻戌正一刻軒轅十四偏東一度四十六分一更戌正二刻三分軒轅十四偏西二度四十四分二更亥初三刻八分五帝座偏東二度三十四分三更子初初刻十三分角宿一偏東六度三十一分四更子正二刻二分大角偏西六分五更丑初三刻七分貫索一偏西十二分攢點寅初初刻十二分尾宿一偏西三度二十九分旦刻寅初三刻帝座偏西二度五十四分穀雨酉宮初度昏刻戌正一刻七分軒轅十四偏西四度四十四分一更戌正二刻九分翼宿一偏東四度十三分二更亥初三刻十一分五帝座偏西二度五十六分三更子初初刻十四分角宿一偏東一度三十一分四更子正二刻一分氐宿一偏東三度三十三分五更丑初三刻四分房宿一偏東四十五分攢點寅初初刻六分帝座偏東二度六分旦刻寅初二刻八分箕宿一偏東四度三十一分酉宮五度昏刻戌正二刻翼宿一偏東一度四十分一更戌正三刻翼宿一偏西二度五分二更亥正初刻軫宿一偏西二度三更子初一刻角宿一偏西三度三十二分四更子正二刻氐宿一偏西一度五更丑初三刻心宿一偏東二度二十四分攢點寅初初刻帝座偏西一度十二分旦刻寅初二刻箕宿一偏東一度四十三分酉宮十度昏刻戌正二刻八分翼宿一偏西五度十二分一更戌正三刻六分五帝座偏東三度三十九分二更亥正初刻四分軫宿一偏西七度五十二分三更子初一刻一分亢宿一偏東三度十一分四更子正一刻十四分氐宿四偏東五十九分五更丑初二刻十一分心宿一偏西一度二