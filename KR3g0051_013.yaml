名衡南門樓外兩星橫亢四星恰似彎弓狀大角一星直上明折威七子亢下橫大角左右攝提星三三相似如鼎形折威下左頓頑星兩箇斜安黃色精頑下二星號陽門色若頓頑直下存氐四星似斗側量米天乳氐上黑一星世人不識稱無名一箇招搖梗河上梗河橫列三星狀帝席三黑河之西亢池六星近攝提氐下衆星騎官出騎官之衆二十七三三相連十欠一陳車氐下騎官次騎官下三車騎位天輻兩星立陳旁將軍陳裏鎮威霜房四星直下主明堂鍵閉一黃斜向上鈎鈐兩箇近其旁罰有三星直鍵上兩咸夾罰似房狀房西一星號為日從官兩星日下出心三星中央色最深下頭積卒共十二三三相聚心下是尾九星如鈎蒼龍尾下頭五點號龜星尾上天江四橫是尾東一箇名傅説傅説東畔一魚子尾西一室是神宮所以列在后妃中箕四星形狀似簸箕箕下三星名木杵箕前一黑是粳皮按星經步天歌折威七星帝席三星今儀象志無庫樓十星今九星柱十五星今十四星亢池六星今四星騎官二十七星今七星積卒十二星今二星南門二星騎陳將軍一星龜五星在京師地平下故不入圖北方元武七宿斗六星其狀似北斗魁上建星三相對天辨建上三三九斗下圓安十四星雖然名鱉貫索形天雞建背雙黑星天籥柄前八黃精狗國四方雞下生天淵十星鱉東邊更有兩狗斗魁前農家丈人斗下眠天淵十黃狗色元牛六星近在河岸頭頭上雖然有兩角腹下從來欠一腳牛下九黑是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗各九星河鼓兩畔右邊明更有四黃名天桴河鼓直下如連珠羅堰三烏牛東居漸臺四星似口形輦道東足連五丁輦道漸臺在何許欲得見時近織女女四星如箕主嫁娶十二諸國在下陳先從越國向東論東西兩周次二秦雍州南下雙雁門代國向西一晉伸韓魏各一晉北輪楚之一國魏西屯楚城南畔獨燕軍燕西一郡是齊鄰齊北兩邑平原君欲知鄭在越下存十六黃星細區分五箇離珠女上星敗瓜珠上瓠瓜生兩箇各五瓠瓜明天津九箇彈弓形兩星入牛河中橫四箇奚仲天津上七箇仲側扶筐星虛上下各一如連珠命祿危非虛上呈虛危之下哭泣星哭泣雙雙下壘城天壘團圓十三星敗臼四星城下橫臼西三箇離瑜明危三星不直舊先知危上五黑號人星人畔三四杵臼形人上七烏號車府府上天鈎九黃晶鈎下五鴉字造父危下四星號墳墓墓下四星斜虛梁十箇天錢梁下黃墓旁兩星能蓋屋身著黑衣危下宿室兩星上有離宫出繞室三雙有六星下頭六箇雷電形壘壁陳次十二星十二兩頭大似井陳下分布羽林軍四十五卒三為羣軍西西下多難論子細歷歷看區分三粒黃金名鈇鉞一顆真珠北落門門東八魁九箇子門西一宿天綱是電旁兩黑土公吏螣蛇室上二十二壁兩星下頭是霹靂霹靂五星橫著行雲雨之次曰四方壁上天廄十圓黃鈇鑕五星羽林旁土公兩黑壁下藏按星經步天歌天籥八星農丈人一星天田九星離珠五星八魁九星今儀象志無鱉十四星今十三星右旗九星今八星九坎九星今四星天桴四星今二星羅堰三星今二星十二諸國十六星今十二星司危二星今一星天壘城十三星今五星離瑜三星今二星敗臼四星今二星人星五星今四星杵三星今一星臼四星今三星天鈎九星今六星扶筐七星今四星天錢十星今九星蓋屋二星今一星羽林軍四十五星今二十三星土公吏二星今一星螣蛇二十二星今十八星天廄十星今三星西方白虎七宿奎腰細頭尖似破鞋一十六星繞鞋生外屏七烏奎下橫屏下七星天溷明司空左畔土之精奎上一宿軍南門河中六箇閣道形附路一星道旁明五箇吐花王良星良星近上一䇿明婁三星不勻近一頭左更右更烏夾婁天倉六箇婁下頭天庾三星倉東腳婁上十一將軍侯胃三星鼎足河之次天廩胃下斜四星天囷十三如乙形河中八星名大陵陵北九箇天船名陵中積尸一箇星積水船中一黑精昴七星一聚實不少阿西月東各一星阿下五黃天隂名隂下六烏芻藁營營南十六天苑形河中六星名卷舌舌中黑點天讒星礪石舌旁斜四丁畢恰似爪乂八星出附耳畢股一星光天街兩星畢背旁天節耳下八烏幢畢上橫列六諸王王下四皂天高星節下團圓九州城畢口斜對五車口車有三柱任縱橫車中五箇天潢精潢畔咸池三黑星天關一星車腳邊參旗九箇參車間旗下直建九斿連斿下十三烏天園九斿天園參腳邊參總是七星觜相侵兩肩雙足三為心伐有三星足裏深玉井四星右足隂屏星兩扇井南襟軍井四星屏上吟左足下四天厠臨厠下一物天屎沉觜三星相近作參蘂觜上座旗直指天尊卑之位九相連司怪曲立座旗邊四鴉大近井鉞前按星經步天歌咸池三星今儀象志無天溷七星今四星九斿九星今八星天園十三星京師地平上只見九星南方朱雀七宿井八星橫列河中靜一星名鉞井邊安兩河各三南北正天鐏三星井上頭鐏上橫列五諸侯侯上北河西積水欲覔積薪東畔是越下四星名水府水位東邊四星序四瀆橫列南河裏南河下頭是軍市軍市團圓十三星中有一箇野雞精孫子丈人市下列各立兩星從東説闕邱兩星南河東邱下一狼光蓬茸左畔九箇彎弧弓一矢擬射頑狼胸有箇老人南極中春秋出入壽無窮鬼四星册方似木匱中央白者積尸氣鬼上四星是爟位天狗七星鬼下是外厨六間柳星次天社六星弧東倚社東一星名天記柳八星曲頭垂似柳近上三星號為酒享宴大酺五星守星七星如鈎柳下生星上十七軒轅形軒轅東頭四內平平下三箇名天相相下稷星橫五靈張六星似軫在星旁張下只是有天廟十四之星册四方長垣少微雖向上星數欹在太微旁太尊一星直上黃翼二十二星大難識上五下五橫著行中心六箇恰似張更有六星在何處三三相連張畔附必若不能分處所更請向前看野取五箇黑星翼下頭欲知名字是東甌軫四星似張翼相近中央一箇長沙子左轄右轄附兩星軍門兩黃近翼是門西四箇土司空門東七烏青邱子青邱之下名器府器府之星三十二已上便是太微宮黃道向上看取是按星經步天歌積水一星天稷五星天廟十四星東甌五星土司空四星軍門二星器府三十二星今儀象志無軍市十三星今十星青邱七星今三星天社六星京師地平上只見三星老人星在京師地平下故不入圖欽定協紀辨方書卷十三
